<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requirements Dashboard</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #222533;
      --bg-hover: #2a2e3f;
      --bg-column: #181b24;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --border: #2e3347;
      --accent-blue: #4f8cff;
      --accent-green: #34d399;
      --accent-orange: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #a78bfa;
      --accent-cyan: #22d3ee;
      --accent-pink: #f472b6;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d27 0%, #222533 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header-left p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .header-stats {
      display: flex;
      gap: 20px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .prd-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .prd-link:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(79,140,255,0.08);
    }

    /* Tab Bar */
    .tab-bar {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 40px 0;
      display: flex;
      gap: 4px;
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }

    .tab-btn:hover {
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
    }

    .tab-btn.active {
      color: var(--accent-blue);
      border-bottom-color: var(--accent-blue);
      background: rgba(79,140,255,0.06);
    }

    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      background: rgba(79,140,255,0.15);
      color: var(--accent-blue);
    }

    .tab-btn.active .tab-count {
      background: var(--accent-blue);
      color: #fff;
    }

    /* Main Content */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 40px 40px;
    }

    /* Requirement List */
    .req-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Compact Requirement Card */
    .req-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .req-card:hover {
      border-color: var(--accent-blue);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      background: var(--bg-hover);
    }

    .req-card-left {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .req-card-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 56px;
    }

    .req-card-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .req-card-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .req-card-priority {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .priority-p0 { background: rgba(239,68,68,0.15); color: #ef4444; }
    .priority-p1 { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .priority-p2 { background: rgba(79,140,255,0.15); color: #4f8cff; }
    .priority-p3 { background: rgba(107,114,128,0.15); color: #6b7280; }

    .req-card-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .req-card-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .req-card-owner {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .req-card-part-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(167,139,250,0.1);
      color: var(--accent-purple);
      border: 1px solid rgba(167,139,250,0.2);
      white-space: nowrap;
    }

    .req-list-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90%;
      max-width: 640px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title-area {
      flex: 1;
    }

    .modal-id {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 4px;
    }

    .modal-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-primary);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px 28px 28px;
    }

    .modal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .modal-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      padding: 12px 16px;
      background: rgba(79,140,255,0.05);
      border-left: 3px solid var(--accent-blue);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 16px;
    }

    .modal-links {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .modal-link:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(79,140,255,0.08);
    }

    .modal-link.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .modal-notes {
      padding: 10px 14px;
      background: rgba(245,158,11,0.06);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-muted);
      border: 1px dashed rgba(245,158,11,0.2);
    }

    .modal-notes::before {
      content: 'Note: ';
      font-weight: 600;
      color: var(--accent-orange);
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-status {
      gap: 5px;
    }

    .badge-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-pending-review { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-pending-review::before { background: #f59e0b; }
    .status-pending-design { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .status-pending-design::before { background: #a78bfa; }
    .status-designing { background: rgba(34,211,238,0.15); color: #22d3ee; }
    .status-designing::before { background: #22d3ee; }
    .status-design-done { background: rgba(52,211,153,0.15); color: #34d399; }
    .status-design-done::before { background: #34d399; }
    .status-pending-dev { background: rgba(79,140,255,0.15); color: #4f8cff; }
    .status-pending-dev::before { background: #4f8cff; }
    .status-developing { background: rgba(244,114,182,0.15); color: #f472b6; }
    .status-developing::before { background: #f472b6; }

    /* Column Empty State */
    .column-empty {
      text-align: center;
      padding: 24px 12px;
      color: var(--text-muted);
      font-size: 13px;
      opacity: 0.5;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 40px;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .kanban-board {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .header { padding: 16px 20px; }
      .tab-bar { padding: 16px 20px 0; }
      .main { padding: 16px 20px 32px; }
      .header-content { flex-direction: column; gap: 12px; align-items: flex-start; }
      .header-right { flex-direction: column; align-items: flex-start; gap: 12px; }
      .kanban-board {
        grid-template-columns: 1fr;
      }
      .tab-bar {
        overflow-x: auto;
      }
    }

    /* Scrollbar */
    .column-body::-webkit-scrollbar {
      width: 4px;
    }
    .column-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .column-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
    .modal::-webkit-scrollbar {
      width: 6px;
    }
    .modal::-webkit-scrollbar-track {
      background: transparent;
    }
    .modal::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>

// ==================== State ====================
let currentPart = requirementsData.parts[0];

// ==================== Helpers ====================
function getStatusMeta(status) {
  return requirementsData.statusMeta[status] || requirementsData.statusMeta["待对焦"];
}

function getReqsByPartAndStatus(part, status) {
  return requirementsData.requirements.filter(
    req => req.part === part && req.status === status
  );
}

function getReqsByPart(part) {
  return requirementsData.requirements.filter(req => req.part === part);
}

// ==================== Render ====================
function renderStats() {
  const container = document.getElementById("headerStats");
  const allReqs = requirementsData.requirements;
  const totalReqs = allReqs.length;
  const partCounts = {};
  requirementsData.parts.forEach(part => {
    partCounts[part] = getReqsByPart(part).length;
  });

  container.innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${totalReqs}</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color: var(--accent-cyan)">${partCounts["交易导购"] || 0}</div>
      <div class="stat-label">导购交易</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color: var(--accent-purple)">${partCounts["机票辅营"] || 0}</div>
      <div class="stat-label">机票辅营</div>
    </div>
  `;
}

function renderTabs() {
  const container = document.getElementById("tabBar");
  container.innerHTML = requirementsData.parts.map(part => {
    const count = getReqsByPart(part).length;
    const activeClass = currentPart === part ? "active" : "";
    return `<button class="tab-btn ${activeClass}" onclick="switchPart('${part}')">
      ${part}<span class="tab-count">${count}</span>
    </button>`;
  }).join("");
}

function switchPart(part) {
  currentPart = part;
  renderTabs();
  renderKanban();
}

function renderKanban() {
  const container = document.getElementById("kanbanBoard");
  const statuses = requirementsData.statuses;

  container.innerHTML = statuses.map(status => {
    const meta = getStatusMeta(status);
    const reqs = getReqsByPartAndStatus(currentPart, status);

    const cardsHtml = reqs.length > 0
      ? reqs.map(req => renderReqCard(req)).join("")
      : `<div class="column-empty">No items</div>`;

    return `
      <div class="kanban-column">
        <div class="column-header">
          <div class="column-title">
            <span class="column-dot ${meta.dotClass}"></span>
            ${status}
          </div>
          <span class="column-count">${reqs.length}</span>
        </div>
        <div class="column-body">
          ${cardsHtml}
        </div>
      </div>
    `;
  }).join("");
}

function renderReqCard(req) {
  const priorityClass = {
    "P0": "priority-p0",
    "P1": "priority-p1",
    "P2": "priority-p2",
    "P3": "priority-p3"
  }[req.priority] || "priority-p2";

  return `
    <div class="req-card" onclick="openModal('${req.id}')">
      <div class="req-card-id">${req.id}</div>
      <div class="req-card-name">${req.name}</div>
      <div class="req-card-meta">
        <span class="req-card-priority ${priorityClass}">${req.priority}</span>
        <span class="req-card-owner">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${req.owner}
        </span>
        <span class="req-card-date">${req.updated_at}</span>
      </div>
    </div>
  `;
}

// ==================== Modal ====================
function openModal(reqId) {
  const req = requirementsData.requirements.find(r => r.id === reqId);
  if (!req) return;

  const meta = getStatusMeta(req.status);
  const priorityClass = {
    "P0": "priority-p0",
    "P1": "priority-p1",
    "P2": "priority-p2",
    "P3": "priority-p3"
  }[req.priority] || "priority-p2";

  const modal = document.getElementById("modalContent");
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title-area">
        <div class="modal-id">${req.id}</div>
        <div class="modal-name">${req.name}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta">
        <span class="badge badge-status ${meta.cssClass}">${req.status}</span>
        <span class="badge req-card-priority ${priorityClass}">${req.priority}</span>
        <span class="badge" style="background:rgba(79,140,255,0.1);color:var(--accent-blue);border:1px solid rgba(79,140,255,0.2)">${req.part}</span>
      </div>
      <div class="modal-summary">${req.summary}</div>
      <div class="modal-links">
        <a href="${req.prd_url || '#'}" target="_blank" class="modal-link ${!req.prd_url ? 'disabled' : ''}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          PRD
        </a>
        <a href="${req.design_url || '#'}" target="_blank" class="modal-link ${!req.design_url ? 'disabled' : ''}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Design
        </a>
      </div>
      ${req.notes ? `<div class="modal-notes">${req.notes}</div>` : ''}
      <div style="margin-top:16px;font-size:12px;color:var(--text-muted)">
        Owner: ${req.owner} | Created: ${req.created_at} | Updated: ${req.updated_at}
      </div>
    </div>
  `;

  document.getElementById("modalOverlay").classList.add("visible");
  document.body.style.overflow = "hidden";
}

function closeModal(event) {
  if (event && event.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("visible");
  document.body.style.overflow = "";
}

// Close modal on Escape
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    document.getElementById("modalOverlay").classList.remove("visible");
    document.body.style.overflow = "";
  }
});

// ==================== Init ====================
renderStats();
renderTabs();
renderKanban();
</script>
