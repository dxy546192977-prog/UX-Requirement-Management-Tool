<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requirements Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #161616;
      --bg-card: #1a1a1a;
      --bg-card-hover: #1f1f1f;
      --bg-sub: #141414;
      --text-primary: #e8e4df;
      --text-secondary: #9a9590;
      --text-muted: #6b6560;
      --accent-warm: #d4a574;
      --accent-pink: #e8b4b8;
      --accent-gold: #c9b896;
      --accent-sage: #8fa88a;
      --accent-blue: #7ba4c9;
      --border: rgba(232, 228, 223, 0.06);
      --border-hover: rgba(212, 165, 116, 0.2);
      --shadow: 0 8px 40px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 60px rgba(212, 165, 116, 0.06);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --font-display: 'Cormorant', Georgia, serif;
      --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* === BACKGROUND ATMOSPHERE === */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -15%;
      left: -5%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(232, 180, 184, 0.04) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* === HEADER === */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: clamp(16px, 3vw, 28px) clamp(20px, 5vw, 48px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .header-brand h1 {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      font-style: italic;
    }

    .header-brand .version-tag {
      font-size: 11px;
      font-weight: 400;
      color: var(--accent-warm);
      border: 1px solid rgba(212, 165, 116, 0.25);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .header-stats {
      display: flex;
      gap: clamp(16px, 3vw, 32px);
    }

    .stat-block {
      text-align: center;
    }

    .stat-number {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      line-height: 1;
    }

    .stat-number.warm { color: var(--accent-warm); }
    .stat-number.pink { color: var(--accent-pink); }
    .stat-number.gold { color: var(--accent-gold); }
    .stat-number.sage { color: var(--accent-sage); }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* === MAIN === */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 48px) clamp(20px, 5vw, 48px);
      position: relative;
      z-index: 1;
    }

    /* === SECTION TITLE === */
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      font-style: italic;
    }

    /* === FILTER BAR === */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-pill {
      padding: 6px 18px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.3s var(--ease-out-expo);
      letter-spacing: 0.3px;
    }

    .filter-pill:hover {
      border-color: var(--border-hover);
      color: var(--accent-warm);
    }

    .filter-pill.active {
      background: rgba(212, 165, 116, 0.1);
      border-color: var(--accent-warm);
      color: var(--accent-warm);
    }

    /* === PROJECT CARD === */
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.4s var(--ease-out-expo);
      position: relative;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent-warm), var(--accent-pink));
      opacity: 0;
      transition: opacity 0.4s;
    }

    .project-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .project-card:hover::before {
      opacity: 1;
    }

    /* === PROJECT HEADER === */
    .project-head {
      padding: clamp(20px, 3vw, 28px) clamp(20px, 3vw, 32px) clamp(14px, 2vw, 18px);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .project-info { flex: 1; }

    .project-id-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .project-id {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .project-date {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .project-name {
      font-family: var(--font-display);
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .project-tags {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    /* === BADGES === */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .badge-dot {
      gap: 6px;
    }

    .badge-dot::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Status colors */
    .s-pending { background: rgba(212, 165, 116, 0.1); color: var(--accent-warm); }
    .s-pending::before { background: var(--accent-warm); }
    .s-dev { background: rgba(123, 164, 201, 0.1); color: var(--accent-blue); }
    .s-dev::before { background: var(--accent-blue); }
    .s-integration { background: rgba(201, 184, 150, 0.1); color: var(--accent-gold); }
    .s-integration::before { background: var(--accent-gold); }
    .s-testing { background: rgba(143, 168, 138, 0.1); color: var(--accent-sage); }
    .s-testing::before { background: var(--accent-sage); }
    .s-live { background: rgba(143, 168, 138, 0.15); color: #a8c9a0; }
    .s-live::before { background: #a8c9a0; }
    .s-paused { background: rgba(107, 101, 96, 0.15); color: var(--text-muted); }
    .s-paused::before { background: var(--text-muted); }
    .s-cancelled { background: rgba(200, 120, 120, 0.1); color: #c87878; }
    .s-cancelled::before { background: #c87878; }

    .badge-priority {
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .p-p0 { background: rgba(200, 120, 120, 0.12); color: #d49090; }
    .p-p1 { background: rgba(212, 165, 116, 0.12); color: var(--accent-warm); }
    .p-p2 { background: rgba(123, 164, 201, 0.12); color: var(--accent-blue); }
    .p-p3 { background: rgba(107, 101, 96, 0.12); color: var(--text-muted); }

    .badge-category {
      background: rgba(232, 180, 184, 0.08);
      color: var(--accent-pink);
      border: 1px solid rgba(232, 180, 184, 0.12);
    }

    .badge-owner {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 300;
    }

    /* === EXPAND ICON === */
    .expand-arrow {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: transform 0.35s var(--ease-out-expo);
      flex-shrink: 0;
      margin-top: 8px;
    }

    .expand-arrow.open {
      transform: rotate(90deg);
    }

    /* === PROGRESS BAR === */
    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(232, 228, 223, 0.04);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-warm), var(--accent-pink));
      border-radius: 1px;
      transition: width 0.6s var(--ease-out-expo);
    }

    /* === COLLAPSIBLE BODY === */
    .project-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s var(--ease-out-expo);
    }

    .project-body.open {
      max-height: 3000px;
    }

    .project-body-inner {
      padding: 0 clamp(20px, 3vw, 32px) clamp(20px, 3vw, 28px);
    }

    /* === SUMMARY === */
    .summary-block {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(212, 165, 116, 0.03);
      border-left: 2px solid var(--accent-warm);
      border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
    }

    /* === LINKS === */
    .link-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 400;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all 0.3s var(--ease-out-expo);
    }

    .link-item:hover {
      border-color: var(--border-hover);
      color: var(--accent-warm);
      background: rgba(212, 165, 116, 0.04);
    }

    .link-item.empty {
      opacity: 0.3;
      pointer-events: none;
    }

    .link-icon {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    /* === KEY DATA === */
    .key-data {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .data-card {
      background: var(--bg-sub);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
      text-align: center;
      transition: all 0.3s;
    }

    .data-card:hover {
      border-color: var(--border-hover);
    }

    .data-value {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 700;
      color: var(--accent-warm);
      line-height: 1;
    }

    .data-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* === SUB REQUIREMENTS === */
    .sub-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .sub-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      font-style: italic;
    }

    .sub-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-sub);
      padding: 2px 10px;
      border-radius: 12px;
    }

    .sub-list {
      display: grid;
      gap: 8px;
    }

    .sub-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      background: var(--bg-sub);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all 0.3s var(--ease-out-expo);
    }

    .sub-item:hover {
      border-color: var(--border);
      background: var(--bg-card-hover);
    }

    .sub-id {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      white-space: nowrap;
      padding-top: 3px;
      min-width: 80px;
    }

    .sub-content { flex: 1; }

    .sub-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .sub-summary {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .sub-badge {
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* === NOTES === */
    .note-block {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(201, 184, 150, 0.04);
      border-radius: var(--radius-xs);
      border: 1px dashed rgba(201, 184, 150, 0.12);
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .note-label {
      font-weight: 500;
      color: var(--accent-gold);
      margin-right: 4px;
    }

    /* === FOOTER === */
    .footer {
      text-align: center;
      padding: 40px clamp(20px, 5vw, 48px);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 300;
      border-top: 1px solid var(--border);
      margin-top: 48px;
      letter-spacing: 0.5px;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: var(--accent-warm);
      margin: 0 auto 16px;
      opacity: 0.3;
    }

    /* === ANIMATIONS === */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-inner {
      animation: fadeInDown 0.6s var(--ease-out-expo) both;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .key-data { grid-template-columns: repeat(2, 1fr); }
      .sub-item { flex-direction: column; gap: 8px; }
      .sub-id { min-width: auto; }
      .sub-badge { align-self: flex-start; }
    }

    @media (max-width: 480px) {
      .project-tags { gap: 6px; }
      .key-data { grid-template-columns: 1fr; }
    }

    /* === REDUCED MOTION === */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.2s !important;
      }
    }
  </style>
</head>
<body>

        { id: "PRJ-002-06", name: "导航搜索-公共交通-本地搜索-返程机票入口", summary: "本地公共交通场景（700w UV）搜索机场时增加订返程机票入口，探索推荐订机票返程。", status: "待评审" }

};

/* === STATUS & PRIORITY MAPS === */
const STATUS_CLASS = {
  "待评审": "s-pending", "开发中": "s-dev", "联调中": "s-integration",
  "测试中": "s-testing", "已上线": "s-live", "已暂停": "s-paused", "已取消": "s-cancelled"
};

const PRIORITY_CLASS = {
  "P0": "p-p0", "P1": "p-p1", "P2": "p-p2", "P3": "p-p3"
};

let activeFilter = "All";

/* === RENDER STATS === */
function renderStats() {
  const totalProjects = DATA.projects.length;
  const totalSubs = DATA.projects.reduce((s, p) => s + p.subRequirements.length, 0);
  const pending = DATA.projects.filter(p => p.status === "待评审").length;

  document.getElementById("headerStats").innerHTML = `
    <div class="stat-block"><div class="stat-number warm">${totalProjects}</div><div class="stat-label">Projects</div></div>
    <div class="stat-block"><div class="stat-number gold">${totalSubs}</div><div class="stat-label">Sub-reqs</div></div>
    <div class="stat-block"><div class="stat-number pink">${pending}</div><div class="stat-label">Pending</div></div>
  `;
}

/* === RENDER FILTERS === */
function renderFilters() {
  const usedCategories = ["All", ...new Set(DATA.projects.map(p => p.category))];
  document.getElementById("filterBar").innerHTML = usedCategories.map(cat =>
    `<button class="filter-pill ${activeFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">${cat === 'All' ? 'All Projects' : cat}</button>`
  ).join("");
}

function setFilter(category) {
  activeFilter = category;
  renderFilters();
  renderProjects();
}

/* === TOGGLE PROJECT === */
function toggleProject(projectId) {
  const body = document.getElementById("body-" + projectId);
  const arrow = document.getElementById("arrow-" + projectId);
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

/* === CALCULATE PROGRESS === */
function calcProgress(subs) {
  if (!subs.length) return 0;
  return Math.round(subs.filter(s => s.status === "已上线").length / subs.length * 100);
}

/* === RENDER PROJECTS === */
function renderProjects() {
  const filtered = activeFilter === "All" ? DATA.projects : DATA.projects.filter(p => p.category === activeFilter);
  const container = document.getElementById("projectList");

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-style:italic;">No projects found.</div>`;
    return;
  }

  container.innerHTML = filtered.map((project, index) => {
    const progress = calcProgress(project.subRequirements);
    const statusClass = STATUS_CLASS[project.status] || "s-pending";
    const priorityClass = PRIORITY_CLASS[project.priority] || "p-p2";

    return `
      <div class="project-card reveal" style="transition-delay: ${index * 0.08}s">
        <div class="project-head" onclick="toggleProject('${project.id}')">
          <div class="project-info">
            <div class="project-id-line">
              <span class="project-id">${project.id}</span>
              <span class="project-date">${project.updatedAt}</span>
            </div>
            <div class="project-name">${project.name}</div>
            <div class="project-tags">
              <span class="badge badge-dot ${statusClass}">${project.status}</span>
              <span class="badge badge-priority ${priorityClass}">${project.priority}</span>
              <span class="badge badge-category">${project.category}</span>
              <span class="badge-owner">${project.owner}</span>
            </div>
          </div>
          <div class="expand-arrow" id="arrow-${project.id}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <div class="progress-track">
          <div class="progress-bar" style="width: ${progress}%"></div>
        </div>

        <div class="project-body" id="body-${project.id}">
          <div class="project-body-inner">

            <div class="summary-block">${project.summary}</div>

            <div class="link-row">
              <a href="${project.prdUrl || '#'}" target="_blank" class="link-item ${!project.prdUrl ? 'empty' : ''}">
                <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                PRD Document
              </a>
              <a href="${project.designUrl || '#'}" target="_blank" class="link-item ${!project.designUrl ? 'empty' : ''}">
                <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Design File
              </a>
            </div>

            ${project.keyData ? `
              <div class="key-data">
                ${project.keyData.map(d => `
                  <div class="data-card">
                    <div class="data-value">${d.value}</div>
                    <div class="data-label">${d.label}</div>
                  </div>
                `).join("")}
              </div>
            ` : ''}

            <div class="sub-header">
              <span class="sub-title">Sub Requirements</span>
              <span class="sub-count">${project.subRequirements.length}</span>
            </div>

            <div class="sub-list">
              ${project.subRequirements.map(sub => `
                <div class="sub-item">
                  <span class="sub-id">${sub.id}</span>
                  <div class="sub-content">
                    <div class="sub-name">${sub.name}</div>
                    <div class="sub-summary">${sub.summary}</div>
                  </div>
                  <div class="sub-badge">
                    <span class="badge badge-dot ${STATUS_CLASS[sub.status] || 's-pending'}">${sub.status}</span>
                  </div>
                </div>
              `).join("")}
            </div>

            ${project.notes ? `
              <div class="note-block">
                <span class="note-label">Note:</span> ${project.notes}
              </div>
            ` : ''}

          </div>
        </div>
      </div>
    `;
  }).join("");

  observeReveal();
}

/* === INTERSECTION OBSERVER FOR ANIMATIONS === */
function observeReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: "0px 0px -40px 0px" });

  document.querySelectorAll(".reveal").forEach(element => observer.observe(element));
}

/* === INIT === */
renderStats();
renderFilters();
renderProjects();
</script>
