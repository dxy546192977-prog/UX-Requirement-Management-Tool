<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国内机票需求</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #222533;
      --bg-hover: #2a2e3f;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --border: #2e3347;
      --accent-blue: #4f8cff;
      --accent-green: #34d399;
      --accent-orange: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #a78bfa;
      --accent-cyan: #22d3ee;
      --accent-pink: #f472b6;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d27 0%, #222533 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .header-left p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .header-stats {
      display: flex;
      gap: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Main Content */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 40px;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .filter-btn.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }

    /* Project Card */
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.25s;
    }

    .project-card:hover {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .project-header {
      padding: 24px 28px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      cursor: pointer;
    }

    .project-title-area {
      flex: 1;
    }

    .project-id {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 4px;
    }

    .project-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .project-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .meta-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-status {
      gap: 5px;
    }

    .badge-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-pending::before { background: #f59e0b; }
    .status-dev { background: rgba(79,140,255,0.15); color: #4f8cff; }
    .status-dev::before { background: #4f8cff; }
    .status-integration { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .status-integration::before { background: #a78bfa; }
    .status-testing { background: rgba(34,211,238,0.15); color: #22d3ee; }
    .status-testing::before { background: #22d3ee; }
    .status-live { background: rgba(52,211,153,0.15); color: #34d399; }
    .status-live::before { background: #34d399; }
    .status-paused { background: rgba(107,114,128,0.15); color: #6b7280; }
    .status-paused::before { background: #6b7280; }
    .status-cancelled { background: rgba(239,68,68,0.15); color: #ef4444; }
    .status-cancelled::before { background: #ef4444; }

    .badge-priority {
      font-weight: 600;
      font-size: 11px;
    }

    .priority-p0 { background: rgba(239,68,68,0.15); color: #ef4444; }
    .priority-p1 { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .priority-p2 { background: rgba(79,140,255,0.15); color: #4f8cff; }
    .priority-p3 { background: rgba(107,114,128,0.15); color: #6b7280; }

    .badge-category {
      background: rgba(167,139,250,0.1);
      color: var(--accent-purple);
      border: 1px solid rgba(167,139,250,0.2);
    }

    /* Project Body */
    .project-body {
      padding: 0 28px 24px;
    }

    .project-summary {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(79,140,255,0.05);
      border-left: 3px solid var(--accent-blue);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .project-links {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .link-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(79,140,255,0.08);
    }

    .link-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* Sub Requirements */
    .sub-req-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sub-req-count {
      background: var(--bg-primary);
      color: var(--text-muted);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 400;
    }

    .sub-req-list {
      display: grid;
      gap: 8px;
    }

    .sub-req-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-primary);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .sub-req-item:hover {
      border-color: var(--border);
      background: var(--bg-hover);
    }

    .sub-req-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      padding-top: 2px;
    }

    .sub-req-content {
      flex: 1;
    }

    .sub-req-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .sub-req-summary {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .sub-req-status {
      flex-shrink: 0;
    }

    /* Notes */
    .project-notes {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(245,158,11,0.06);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-muted);
      border: 1px dashed rgba(245,158,11,0.2);
    }

    .project-notes::before {
      content: 'Note: ';
      font-weight: 600;
      color: var(--accent-orange);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 40px;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* Collapse Animation */
    .collapsible {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .collapsible.expanded {
      max-height: 2000px;
    }

    .expand-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: transform 0.3s;
      flex-shrink: 0;
    }

    .expand-icon.rotated {
      transform: rotate(90deg);
    }

    /* Progress Bar */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-primary);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .progress-fill.green { background: linear-gradient(90deg, #34d399, #22d3ee); }
    .progress-fill.orange { background: linear-gradient(90deg, #f59e0b, #f472b6); }
    .progress-fill.blue { background: linear-gradient(90deg, #4f8cff, #a78bfa); }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 16px 20px; }
      .main { padding: 20px; }
      .header-content { flex-direction: column; gap: 16px; align-items: flex-start; }
      .project-header { padding: 16px 20px 12px; }
      .project-body { padding: 0 20px 20px; }
      .project-links { flex-direction: column; }
      .project-meta { gap: 10px; }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div class="header-left">
      <h1>国内机票需求</h1>
      <p>Last updated: 2026-04-14</p>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </div>
</header>

<main class="main">
  <div class="filter-bar" id="filterBar"></div>
  <div id="projectList"></div>
</main>

<footer class="footer">
  国内机票需求管理系统 v1.0 | Owner: Liang Yu
</footer>

<script>
const requirementsData = {
  "meta": {
    "version": "1.0",
    "created_at": "2026-04-14",
    "description": "国内机票需求"
  },
  "categories": [
    "正向导购交易", "保险&辅营", "搜索", "订单", "支付", "售后", "营销", "基础能力", "其他"
  ],
  "status_enum": ["待评审", "开发中", "联调中", "测试中", "已上线", "已暂停", "已取消"],
  "projects": [
    {
      "id": "PRJ-001",
      "name": "正向导购交易 & 保险辅营需求",
      "prd_url": "https://aliyuque.antfin.com/lbnxdv/eo7e7e/vv4o2li9dzlgf5e1",
      "design_url": null,
      "category": "正向导购交易",
      "status": "待评审",
      "priority": "P1",
      "summary": "包含两个子模块：1) 正向导购交易 - 用户购买流程相关需求；2) 保险 & 辅营 - 保险产品和辅营产品相关需求。（PRD 子文档需权限访问，待补充详细摘要）",
      "sub_requirements": [
        { "id": "PRJ-001-01", "name": "正向导购交易", "summary": "待补充（子文档需权限）", "status": "待评审" },
        { "id": "PRJ-001-02", "name": "保险 & 辅营", "summary": "待补充（子文档需权限）", "status": "待评审" }
      ],
      "owner": "良予",
      "created_at": "2026-04-14",
      "updated_at": "2026-04-14",
      "notes": "PRD 子文档链接权限受限，需要开放权限后补充详细需求摘要"
    },
    {
      "id": "PRJ-002",
      "name": "高德机票全量切飞猪",
      "prd_url": "https://aliyuque.antfin.com/xinchuan.lxc/kb/rb5i1112gigu4e8z?singleDoc#TwaNx",
      "design_url": "https://www.figma.com/design/usgAklz7EPzQ9R9dUvePv5/%E9%AB%98%E5%BE%B7%E6%9C%BA%E7%A5%A8%E5%85%A8%E9%87%8F%E5%88%87%E9%A3%9E%E7%8C%AA?node-id=4-10529&t=R2dLA8Ptsg8aQhnX-4",
      "category": "正向导购交易",
      "status": "待评审",
      "priority": "P1",
      "summary": "将高德地图中的机票相关入口全量切换至飞猪，提升机票转化率。核心目标：统一账户体系、统一列表页体验、接入飞猪智慧出行方案，覆盖高德首页金刚位、地图导航搜索、公共交通等多个入口场景。",
      "sub_requirements": [
        { "id": "PRJ-002-01", "name": "高德首页切量：机票切飞猪机票首页", "summary": "高德首页金刚位点击机票/火车票后跳转飞猪机票首页，解决当前不支持国际机票搜索、对新用户不友好等问题。切换后可支持国际搜索和更友好的搜索体验。", "status": "待评审" },
        { "id": "PRJ-002-02", "name": "地图导航搜索-飞机入口跳转飞猪列表页", "summary": "地图导航搜索中飞机入口（搜索点击大，飞机占比20%）直接跳转飞猪独家列表页，提升转化。", "status": "待评审" },
        { "id": "PRJ-002-03", "name": "登录授权优化", "summary": "用户全部授权淘宝账户登录，无淘宝账户则由高德提供手机号注册并提醒，确保账户体系一致，营销优惠权益统一，提升用户转化。", "status": "待评审" },
        { "id": "PRJ-002-04", "name": "导航搜索-公共交通-异地搜索-智慧出行方案", "summary": "异地公共交通场景（400w UV）接入飞猪智慧出行推荐方案，当前短途火车占90%、机票仅10%，通过智慧推荐提升机票占比。", "status": "待评审" },
        { "id": "PRJ-002-05", "name": "导航搜索-公共交通-异地搜索-推荐飞机入口", "summary": "异地搜索场景推荐飞机入口，跳转飞猪独家列表。", "status": "待评审" },
        { "id": "PRJ-002-06", "name": "导航搜索-公共交通-本地搜索-返程机票入口", "summary": "本地公共交通场景（700w UV）搜索机场时增加订返程机票入口，探索推荐订机票返程。", "status": "待评审" }
      ],
      "owner": "良予",
      "created_at": "2026-04-14",
      "updated_at": "2026-04-14",
      "notes": "PRD 作者: xinchuan.lxc。高德入口盘点包含12个场景入口，产品落地方案聚焦4大方向。关键数据：地图搜索飞机占比20%，异地公共交通400w UV，本地公共交通700w UV。"
    }
  ]
};

const statusClassMap = {
  "待评审": "status-pending",
  "开发中": "status-dev",
  "联调中": "status-integration",
  "测试中": "status-testing",
  "已上线": "status-live",
  "已暂停": "status-paused",
  "已取消": "status-cancelled"
};

const priorityClassMap = {
  "P0": "priority-p0",
  "P1": "priority-p1",
  "P2": "priority-p2",
  "P3": "priority-p3"
};

let currentFilter = "all";

function getStatusClass(status) {
  return statusClassMap[status] || "status-pending";
}

function getPriorityClass(priority) {
  return priorityClassMap[priority] || "priority-p2";
}

function renderStats() {
  const container = document.getElementById("headerStats");
  const projects = requirementsData.projects;
  const totalProjects = projects.length;
  const totalSubReqs = projects.reduce((sum, project) => sum + project.sub_requirements.length, 0);
  const statusCounts = {};
  projects.forEach(project => {
    statusCounts[project.status] = (statusCounts[project.status] || 0) + 1;
  });

  container.innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${totalProjects}</div>
      <div class="stat-label">Projects</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${totalSubReqs}</div>
      <div class="stat-label">Sub-Reqs</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color: var(--accent-orange)">${statusCounts["待评审"] || 0}</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color: var(--accent-green)">${statusCounts["已上线"] || 0}</div>
      <div class="stat-label">Live</div>
    </div>
  `;
}

function renderFilters() {
  const container = document.getElementById("filterBar");
  const categories = ["all", ...new Set(requirementsData.projects.map(p => p.category))];
  const labels = { "all": "All Projects" };

  container.innerHTML = categories.map(category => {
    const label = labels[category] || category;
    const activeClass = currentFilter === category ? "active" : "";
    return `<button class="filter-btn ${activeClass}" onclick="setFilter('${category}')">${label}</button>`;
  }).join("");
}

function setFilter(category) {
  currentFilter = category;
  renderFilters();
  renderProjects();
}

function toggleProject(projectId) {
  const body = document.getElementById(`body-${projectId}`);
  const icon = document.getElementById(`icon-${projectId}`);
  body.classList.toggle("expanded");
  icon.classList.toggle("rotated");
}

function calculateProgress(subRequirements) {
  if (!subRequirements.length) return 0;
  const completedStatuses = ["已上线"];
  const completed = subRequirements.filter(sub => completedStatuses.includes(sub.status)).length;
  return Math.round((completed / subRequirements.length) * 100);
}

function renderProjects() {
  const container = document.getElementById("projectList");
  const filteredProjects = currentFilter === "all"
    ? requirementsData.projects
    : requirementsData.projects.filter(p => p.category === currentFilter);

  if (!filteredProjects.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">[ ]</div>
        <p>No projects found for this filter.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = filteredProjects.map(project => {
    const progress = calculateProgress(project.sub_requirements);
    const progressColor = progress >= 80 ? "green" : progress >= 40 ? "blue" : "orange";

    return `
      <div class="project-card">
        <div class="project-header" onclick="toggleProject('${project.id}')">
          <div class="project-title-area">
            <div class="project-id">${project.id}</div>
            <div class="project-name">${project.name}</div>
            <div class="project-meta">
              <span class="badge badge-status ${getStatusClass(project.status)}">${project.status}</span>
              <span class="badge badge-priority ${getPriorityClass(project.priority)}">${project.priority}</span>
              <span class="badge badge-category">${project.category}</span>
              <span class="meta-item">
                <span class="meta-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                ${project.owner}
              </span>
              <span class="meta-item">
                <span class="meta-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </span>
                ${project.updated_at}
              </span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${progressColor}" style="width: ${progress}%"></div>
            </div>
          </div>
          <div class="expand-icon" id="icon-${project.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>

        <div class="collapsible" id="body-${project.id}">
          <div class="project-body">
            <div class="project-summary">${project.summary}</div>

            <div class="project-links">
              <a href="${project.prd_url}" target="_blank" class="link-btn ${!project.prd_url ? 'disabled' : ''}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                PRD Document
              </a>
              <a href="${project.design_url || '#'}" target="_blank" class="link-btn ${!project.design_url ? 'disabled' : ''}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Design File
              </a>
            </div>

            <div class="sub-req-title">
              Sub Requirements
              <span class="sub-req-count">${project.sub_requirements.length}</span>
            </div>

            <div class="sub-req-list">
              ${project.sub_requirements.map(sub => `
                <div class="sub-req-item">
                  <span class="sub-req-id">${sub.id}</span>
                  <div class="sub-req-content">
                    <div class="sub-req-name">${sub.name}</div>
                    <div class="sub-req-summary">${sub.summary}</div>
                  </div>
                  <div class="sub-req-status">
                    <span class="badge badge-status ${getStatusClass(sub.status)}">${sub.status}</span>
                  </div>
                </div>
              `).join("")}
            </div>

            ${project.notes ? `<div class="project-notes">${project.notes}</div>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

// Initialize
renderStats();
renderFilters();
renderProjects();
</script>

</body>
</html>
