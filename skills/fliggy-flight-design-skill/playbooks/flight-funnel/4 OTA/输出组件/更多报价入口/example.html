<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>更多报价入口示例</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f2f3f5;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #0e131b;
    }

    img { display: block; }

    .stage {
      width: 750px;
      margin: 0 auto;
      padding: 0 18px;
    }

    .entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 714px;
      height: 78px;
      padding: 0 24px 0 29px;
      border-radius: 12px;
      background: #ffffff;
    }

    .copy {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      line-height: 26px;
      font-weight: 500;
    }

    .copy-text {
      color: #0e131b;
    }

    .copy-price {
      color: #ff1c00;
    }

    .action {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 24px;
      line-height: 29px;
      font-weight: 400;
      color: #0e131b;
    }

    .action img {
      width: 12px;
      height: 12px;
      transform: rotate(90deg);
      transform-origin: center;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="entry">
      <div class="copy">
        <span class="copy-text">更多报价</span>
        <span class="copy-price">¥1043起</span>
      </div>
      <div class="action">
        <span>展开</span>
        <img src="https://gw.alicdn.com/imgextra/i3/O1CN01r65nUg1Eh0QgL9Edx_!!6000000000382-2-tps-12-12.png" alt="展开">
      </div>
    </div>
  </div>
</body>
</html>
