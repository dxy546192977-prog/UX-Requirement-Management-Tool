<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>商品卡_首坑_带辅营_左右</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f2f3f5;
      color: #0e131b;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    img { display: block; }
    .card {
      width: 714px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }
    .head {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 66px;
      padding: 20px 17px 12px;
    }
    .head img { width: 105px; height: 34px; flex: none; }
    .head-copy {
      padding-bottom: 2px;
      color: #5b5f67;
      font-size: 20px;
      line-height: 28px;
    }
    .body {
      position: relative;
      display: flex;
      gap: 36px;
      padding: 24px 24px 30px;
    }
    .buy {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 84px;
      height: 84px;
      border: 0;
      border-radius: 12px;
      background: #ff8400;
      color: #ffffff;
      font-size: 36px;
      line-height: 36px;
      font-weight: 500;
    }
    .price-col {
      width: 204px;
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .price-row {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      width: 204px;
      height: 40px;
    }
    .price-main {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      width: 140px;
      height: 45px;
    }
    .currency {
      color: #ff4119;
      font-size: 36px;
      line-height: 31px;
      font-weight: 700;
      font-family: "Alibaba Sans 102", "Fliggy Sans 102", "PingFang SC", sans-serif;
    }
    .amount {
      color: #ff4119;
      font-size: 54px;
      line-height: 45px;
      font-weight: 700;
      letter-spacing: -0.04em;
      font-family: "Alibaba Sans 102", "Fliggy Sans 102", "PingFang SC", sans-serif;
    }
    .strike {
      width: 60px;
      height: 20px;
      font-size: 20px;
      line-height: 20px;
      font-weight: 400;
      text-align: right;
      text-decoration: line-through;
      color: #91949a;
      white-space: nowrap;
    }
    .price-note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      min-height: 32px;
      padding: 0 6px;
      border-radius: 6px;
      background: linear-gradient(90deg, #ffe5df 0%, rgba(255, 229, 223, 0.0001) 100%);
      color: #ff4119;
      font-size: 22px;
      line-height: 26px;
      font-weight: 400;
    }
    .price-note img { width: 10px; height: 20px; }
    .info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 96px;
      font-size: 22px;
      line-height: 31px;
    }
    .muted {
      color: #90949a;
      font-size: 22px;
      line-height: 31px;
    }
    .benefit {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #90949a;
      font-size: 24px;
      line-height: 24px;
    }
    .benefit img.badge { width: 24px; height: 24px; }
    .benefit-copy {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      flex: 1;
    }
    .benefit-copy img { width: 83px; height: 20px; flex: none; }
    .benefit-copy span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .benefit img.arrow { width: 12px; height: 12px; }
    .upsell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 20px 24px;
      background: linear-gradient(180deg, #fff9f2 26.61%, #fff1e6 100%);
      color: #87533c;
    }
    .upsell-left {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }
    .upsell-left img { width: 90px; height: 24px; }
    .upsell-price {
      color: #ff4119;
      font-size: 24px;
      line-height: 24px;
      font-weight: 500;
    }
    .upsell-copy {
      flex: 1;
      min-width: 0;
      color: #87533c;
      font-size: 22px;
      line-height: 31px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upsell-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #87533c;
      font-size: 22px;
      line-height: 22px;
    }
    .upsell-action img { width: 12px; height: 12px; }
  </style>
</head>
<body>
  <article class="card">
    <div class="head">
      <img src="https://gw.alicdn.com/imgextra/i4/O1CN01prBGxg1bPMKbP0dVL_!!6000000003457-2-tps-105-34.png" alt="超值精选">
      <div class="head-copy">超值低价 出行无忧</div>
    </div>
    <div class="body">
      <button class="buy" aria-label="预订">订</button>
      <div class="price-col">
        <div class="price-row">
          <div class="price-main">
            <span class="currency">¥</span>
            <span class="amount">1045</span>
          </div>
          <div class="strike">¥1094</div>
        </div>
        <div class="price-note">
          <span>2项优惠减¥35</span>
          <img src="https://gw.alicdn.com/imgextra/i4/O1CN01sYLDJz1HEYfwleQxX_!!6000000000726-2-tps-10-20.png" alt="">
        </div>
      </div>
      <div class="info">
        <div>托运行李共20公斤</div>
        <div>退改¥41起</div>
        <div>经济舱2.6折</div>
        <div class="muted">赠首单立减69元飞猪券</div>
        <div class="benefit">
          <img class="badge" src="https://gw.alicdn.com/imgextra/i4/O1CN01IINuL62A20gw5YBi0_!!6000000008144-2-tps-24-24.png" alt="礼">
          <div class="benefit-copy">
            <img src="https://gw.alicdn.com/imgextra/i2/O1CN01GPCFyc1pSw2oml6Ti_!!6000000005360-2-tps-83-20.png" alt="旅行套餐">
            <span>赠送旅行套餐权益</span>
          </div>
          <img class="arrow" src="https://gw.alicdn.com/imgextra/i4/O1CN017pJeeo1OH27tRM2ci_!!6000000001679-2-tps-12-12.png" alt="">
        </div>
      </div>
    </div>
    <div class="upsell">
      <div class="upsell-left">
        <img src="https://gw.alicdn.com/imgextra/i1/O1CN01iPOAcf1wfUCumFpaH_!!6000000006335-2-tps-90-24.png" alt="延误无忧">
        <span class="upsell-price">¥49</span>
      </div>
      <div class="upsell-copy">航班延误赔付400，赠快速理赔服务</div>
      <div class="upsell-action">
        <span>更换</span>
        <img src="https://gw.alicdn.com/imgextra/i4/O1CN017pJeeo1OH27tRM2ci_!!6000000001679-2-tps-12-12.png" alt="">
      </div>
    </div>
  </article>
</body>
</html>
