<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>底bar示例</title>
  <style>
    :root {
      --color-primary: #0E131B;
      --color-white: #FFFFFF;
      --color-bg-light: #F7F8FA;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background-color: var(--color-bg-light);
      min-height: 100vh;
      padding-bottom: 200px;
    }

    /* 底bar - 外层容器 */
    .bottom-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0;
      position: fixed;
      width: 750px;
      height: 160px;
      left: 0;
      bottom: 0;
      z-index: 9999;
      filter: drop-shadow(0px 6px 20px rgba(0, 0, 0, 0.1));
    }

    /* 按钮区 */
    .bottom-bar__button-area {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 24px;
      width: 750px;
      height: 96px;
      background: #FFFFFF;
      border-radius: 24px 24px 0 0;
      flex: none;
      order: 0;
      align-self: stretch;
      flex-grow: 0;
    }

    /* 单个按钮 */
    .bottom-bar__button {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 48px;
      gap: 6px;
      width: 234px;
      height: 96px;
      background: #FFFFFF;
      flex: none;
      align-self: stretch;
      flex-grow: 1;
      cursor: pointer;
    }

    .bottom-bar__button:nth-child(1) { order: 0; }
    .bottom-bar__button:nth-child(2) { order: 1; }
    .bottom-bar__button:nth-child(3) { order: 2; }

    /* 按钮图标 */
    .bottom-bar__icon {
      width: 36px;
      height: 36px;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 文字区 */
    .bottom-bar__label {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      padding: 0;
      gap: 6px;
      height: 28px;
      flex: none;
      order: 1;
      align-self: stretch;
      flex-grow: 0;
    }

    /* 按钮文字（普通态） */
    .bottom-bar__text {
      height: 28px;
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 400;
      font-size: 20px;
      line-height: 140%;
      text-align: center;
      color: #0E131B;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 选中态文字加粗 */
    .bottom-bar__button.active .bottom-bar__text {
      font-weight: 500;
    }

    /* 更多箭头（隐藏） */
    .bottom-bar__arrow {
      display: none;
      width: 12px;
      height: 6.75px;
      background: #0E131B;
      flex: none;
      order: 1;
      flex-grow: 0;
    }

    /* iPhone安全区 */
    .bottom-bar__safe-area {
      width: 750px;
      height: 64px;
      background: #FFFFFF;
      flex: none;
      order: 1;
      align-self: stretch;
      flex-grow: 0;
      position: relative;
    }

    /* 底部条（Bar） */
    .bottom-bar__home-indicator {
      position: absolute;
      width: 268px;
      height: 10px;
      left: calc(50% - 268px/2 + 1px);
      top: calc(50% - 10px/2 + 15px);
    }

    .bottom-bar__home-indicator img {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="bottom-bar">
    <!-- 按钮区 -->
    <div class="bottom-bar__button-area">
      <!-- 03 时间排序（普通态） -->
      <div class="bottom-bar__button">
        <img class="bottom-bar__icon" src="https://gw.alicdn.com/imgextra/i4/O1CN017xYij91ps7pOwTilH_!!6000000005415-2-tps-36-36.png" alt="时间排序">
        <div class="bottom-bar__label">
          <span class="bottom-bar__text">时间排序</span>
          <span class="bottom-bar__arrow"></span>
        </div>
      </div>
      <!-- 02 低价优先（选中态） -->
      <div class="bottom-bar__button active">
        <img class="bottom-bar__icon" src="https://gw.alicdn.com/imgextra/i2/O1CN01KKwfc41KPUz474TW3_!!6000000001156-2-tps-36-36.png" alt="低价优先">
        <div class="bottom-bar__label">
          <span class="bottom-bar__text">低价优先</span>
          <span class="bottom-bar__arrow"></span>
        </div>
      </div>
      <!-- 01 惠后价（普通态） -->
      <div class="bottom-bar__button">
        <img class="bottom-bar__icon" src="https://gw.alicdn.com/imgextra/i2/O1CN016nCy0c1QOTnUhCRVh_!!6000000001966-2-tps-36-36.png" alt="惠后价">
        <div class="bottom-bar__label">
          <span class="bottom-bar__text">惠后价</span>
          <span class="bottom-bar__arrow"></span>
        </div>
      </div>
    </div>
    <!-- iPhone安全区 + 底部条 -->
    <div class="bottom-bar__safe-area">
      <div class="bottom-bar__home-indicator">
        <img src="https://gw.alicdn.com/imgextra/i1/O1CN01kYyq8C1SeAb6K7wIx_!!6000000002271-2-tps-268-10.png" alt="">
      </div>
    </div>
  </div>
</body>
</html>
