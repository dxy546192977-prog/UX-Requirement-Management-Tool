<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>返现金型</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }

    :root {
      --color-primary: #0E131B;
      --color-secondary: #90949A;
      --color-price: #FF4119;
      --color-accent: #009DAA;
      --color-white: #FFFFFF;
      --color-bg: #F2F3F5;
      --color-divider: #E0E0E0;
      --color-discount-bg-start: rgba(255, 229, 223, 0.0001);
      --color-discount-bg-end: #FFE5DF;
      --color-discount-arrow: #FF775D;
      --color-chip-border: rgba(144, 148, 154, 0.5);
      --color-cashback-border: rgba(255, 65, 25, 0.5);
      --color-arrow-line: rgba(230, 231, 235, 0.8);
      --radius-s: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background: var(--color-bg);
    }

    img {
      display: block;
    }

    .direct-card {
      position: relative;
      width: 750px;
      height: 200px;
      padding: 30px 30px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: var(--color-white);
      border-bottom: 1px solid var(--color-bg);
    }

    .direct-card__info {
      width: 490px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .direct-card__route {
      width: 430px;
      height: 68px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .direct-card__time-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .direct-card__time-group--arrival {
      align-items: flex-end;
    }

    .direct-card__time {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 26px;
      color: var(--color-primary);
      white-space: nowrap;
    }

    .direct-card__airport {
      font-size: 22px;
      line-height: 22px;
      color: var(--color-primary);
      white-space: nowrap;
    }

    .direct-card__route-arrow {
      width: 124px;
      height: 68px;
      flex: none;
    }

    .direct-card__route-arrow img {
      width: 124px;
      height: 68px;
    }

    .direct-card__meta {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 20px;
      white-space: nowrap;
    }

    .direct-card__meta-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .direct-card__icon {
      width: 20px;
      height: 20px;
      flex: none;
    }

    .direct-card__meta-text {
      font-size: 20px;
      line-height: 20px;
      color: var(--color-secondary);
      white-space: nowrap;
    }

    .direct-card__divider {
      width: 1px;
      height: 20px;
      flex: none;
      background: var(--color-divider);
    }

    .direct-card__benefits {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      flex-wrap: nowrap;
    }

    .direct-card__chip {
      height: 28px;
      padding: 0 6px;
      border: 1px solid var(--color-chip-border);
      border-radius: var(--radius-s);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 20px;
      line-height: 28px;
      color: var(--color-secondary);
      white-space: nowrap;
      background: var(--color-white);
    }

    .direct-card__chip--cashback {
      border-color: var(--color-cashback-border);
      color: var(--color-price);
    }

    .direct-card__chip-icon {
      width: 20px;
      height: 20px;
      flex: none;
    }

    .direct-card__chip-arrow {
      width: 14px;
      height: 10px;
      flex: none;
    }

    .direct-card__chip-chevron {
      font-size: 20px;
      line-height: 1;
      color: var(--color-price);
      transform: translateY(-1px);
    }

    .direct-card__price {
      width: 150px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      flex: none;
    }

    .direct-card__price-row {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 4px;
      min-height: 32px;
    }

    .direct-card__original-price {
      font-size: 20px;
      line-height: 20px;
      color: var(--color-secondary);
      text-decoration: line-through;
      white-space: nowrap;
    }

    .direct-card__price-group {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
    }

    .direct-card__price-symbol {
      font-family: 'Alibaba Sans 102', 'PingFang SC', sans-serif;
      font-size: 24px;
      line-height: 22px;
      font-weight: 700;
      color: var(--color-price);
      white-space: nowrap;
    }

    .direct-card__price-number {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 26px;
      color: var(--color-price);
      white-space: nowrap;
    }

    .direct-card__discount {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      height: 28px;
      padding: 0 6px;
      border-radius: var(--radius-s);
      background: linear-gradient(90deg, var(--color-discount-bg-start) 42.38%, var(--color-discount-bg-end) 100%);
      font-size: 20px;
      line-height: 28px;
      color: var(--color-price);
      white-space: nowrap;
    }

    .direct-card__discount-arrow {
      font-size: 22px;
      line-height: 1;
      color: var(--color-discount-arrow);
      transform: translateY(-1px);
    }

    .direct-card__cabin {
      font-size: 22px;
      line-height: 22px;
      color: var(--color-secondary);
      text-align: right;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="direct-card">
    <div class="direct-card__info">
      <div class="direct-card__route">
        <div class="direct-card__time-group">
          <div class="direct-card__time">15:20</div>
          <div class="direct-card__airport">萧山T4</div>
        </div>

        <div class="direct-card__route-arrow">
          <img src="https://gw.alicdn.com/imgextra/i4/O1CN01Zz6fJr1hyypVXg88S_!!6000000004347-2-tps-124-68.png" alt="箭头">
        </div>

        <div class="direct-card__time-group direct-card__time-group--arrival">
          <div class="direct-card__time">19:05</div>
          <div class="direct-card__airport">首都T2</div>
        </div>
      </div>

      <div class="direct-card__meta">
        <span class="direct-card__meta-group">
          <img class="direct-card__icon" src="../../../list切图/东方航空logo.png" alt="东航">
          <span class="direct-card__meta-text">东航MU5131</span>
        </span>
        <span class="direct-card__divider"></span>
        <span class="direct-card__meta-text">空客738(中)</span>
        <span class="direct-card__divider"></span>
        <span class="direct-card__meta-group">
          <img class="direct-card__icon" src="../../../list切图/餐食.png" alt="">
          <span class="direct-card__meta-text">正餐</span>
        </span>
      </div>

      <div class="direct-card__benefits">
        <span class="direct-card__chip direct-card__chip--cashback">
          <span>返现金</span>
          <span>部分返¥170</span>
          <span class="direct-card__chip-chevron">›</span>
        </span>

        <span class="direct-card__chip">
          <img class="direct-card__chip-icon" src="../../../list切图/权益标小icon.png" alt="">
          <span>飞飞乐现金抽奖</span>
        </span>

        <span class="direct-card__chip">
          <img class="direct-card__chip-icon" src="../../../list切图/权益标小icon_飞机.png" alt="">
          <span>含共享</span>
          <img class="direct-card__chip-arrow" src="../../../list切图/向下展开箭头.png" alt="">
        </span>
      </div>
    </div>

    <div class="direct-card__price">
      <div class="direct-card__price-row">
        <span class="direct-card__original-price">¥623</span>
        <span class="direct-card__price-group">
          <span class="direct-card__price-symbol">¥</span>
          <span class="direct-card__price-number">590</span>
        </span>
      </div>

      <div class="direct-card__discount">
        <span>2项已优惠¥70</span>
        <span class="direct-card__discount-arrow">›</span>
      </div>

      <div class="direct-card__cabin">经济舱3.3折</div>
    </div>
  </div>
</body>
</html>
