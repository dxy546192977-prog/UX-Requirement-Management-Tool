<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>图片组件预览</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        /* 预览环境样式 */
        body {
            background-color: var(--color-label);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            gap: 48px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        .section-label {
            font-size: 24px;
            color: var(--color-lightgray);
            margin-bottom: -30px;
        }

        /* 
         ========================================
         == 图片组件 (Image Gallery Skill)
         ========================================
         支持 1/2/3 图，所有图片强制 1:1 比例。
        */
        
        /* 基础容器 */
        .image-gallery {
            display: flex;
            width: 690px;
            gap: 12px;
            padding-top: 24px;
        }
        
        /* 单个图片项 */
        .image-gallery .item {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            aspect-ratio: 1 / 1; /* 所有布局统一 1:1 正方形 */
        }

        /* 实际图片样式 */
        .image-gallery .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 图片占位符 SVG */
        .image-gallery .item .placeholder-svg {
            opacity: 0.5;
        }

        /* 左上角标签 */
        .image-gallery .item .tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: var(--radius-m);
            padding: 2px 10px;
            color: #FFFFFF;
            font-size: 20px;
            line-height: 1.4;
            font-weight: 400;
        }

        /* 1图模式 */
        .image-gallery.layout-1 .item {
            border-radius: var(--radius-xl);
            background-color: #8EBBFF;
        }

        /* 2图模式 */
        .image-gallery.layout-2 .item {
            border-radius: var(--radius-l);
        }
        .image-gallery.layout-2 .item:nth-child(1) {
            background-color: #71C6A5;
        }
        .image-gallery.layout-2 .item:nth-child(2) {
            background-color: #FFC575;
        }
        
        /* 3图模式 */
        .image-gallery.layout-3 .item {
            border-radius: var(--radius-l);
        }
        .image-gallery.layout-3 .item:nth-child(1) {
            background-color: #8EBBFF;
        }
        .image-gallery.layout-3 .item:nth-child(2) {
            background-color: #71C6A5;
        }
        .image-gallery.layout-3 .item:nth-child(3) {
            background-color: #FFC575;
        }
    </style>
</head>
<body>

    <!-- 1图模式 -->
    <p class="section-label">样式=1图</p>
    <div class="image-gallery layout-1">
        <div class="item" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=400&fit=crop'); background-size: cover; background-position: center; background-color: #8EBBFF;">
