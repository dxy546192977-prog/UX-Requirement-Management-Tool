<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>机票首页/小搜模块
  </title>
  <style>
    @font-face {
      font-family: "Fliggy Sans 102";
      src: url("./Fonts/Fliggy Sans 102-Bold.ttf") format("truetype");
      font-weight: 400;
      font-display: swap;
    }

    :root {
      --color-darkgray: #0f131a;
      --color-midgray: #5c5f66;
      --color-lightgray: #919499;
      --color-indigo-1: #6666ff;
      --color-indigo-4: #ebebff;
      --color-warning-1: #ff3333;
      --color-pay-1: #ff5533;
      --color-white: #ffffff;
      --color-label: #f7f8fa;
      --color-bg: #f2f3f5;

      --radius-xl: 36px;
      --radius-l: 24px;
      --radius-m: 12px;
      --radius-s: 6px;
      --radius-none: 0;

      --color-search-yellow: #ffe033;
      --color-promo-red-a: #ff4b6c;
      --color-promo-red-b: #ff1835;
      --color-promo-red-c: #ff4a6c;
      --color-separator: #d2d4d9;
      --color-aux-text: #575757;
      --color-tip-green: #149aa8;
      --color-overlay-dark: rgba(0, 0, 0, 0.5);
      --color-shadow-card: rgba(0, 0, 0, 0.03);
      --color-shadow-pill: rgba(0, 0, 0, 0.06);
      --color-white-25: rgba(255, 255, 255, 0.25);
      --color-search-gradient-start: rgba(242, 243, 245, 0.6);
      --color-search-yellow-clear: rgba(255, 224, 51, 0);

      --radius-search-top: 26px;
      --radius-search-pill: 42px;
      --radius-indicator: 3px;
      --radius-promo-tail: 2px;
      --radius-round: 999px;
      --radius-promo-top: 19px;
      --radius-promo-left: 16px;

      --shadow-card: 0 6px 20px var(--color-shadow-card);
      --shadow-pill: 0 6px 12px var(--color-shadow-pill);
      --color-border-tab: rgba(255, 255, 255, 0.6);

      --gradient-search-surface: linear-gradient(180deg, var(--color-search-gradient-start) 0%, var(--color-bg) 70%);
      --gradient-tab-bg: linear-gradient(180deg, var(--color-search-gradient-start) -48.68%, var(--color-bg) 62.83%);
      --gradient-primary-bar: linear-gradient(90deg, var(--color-search-yellow) 4.76%, var(--color-search-yellow-clear) 106.55%);
      --gradient-promo: linear-gradient(91.13deg, var(--color-promo-red-a) -3.42%, var(--color-promo-red-b) 74.28%, var(--color-promo-red-c) 100.65%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "PingFang SC", "SimHei", sans-serif;
      background: var(--color-label);
      color: var(--color-darkgray);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .skill-search {
      width: 750px;
      background: var(--gradient-search-surface);
      border-radius: var(--radius-search-top);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .skill-search__top {
      padding: 0 24px;
      background: transparent;
    }

    .skill-search__primary {
      position: relative;
      width: 702px;
      height: 84px;
      border-radius: var(--radius-search-top) var(--radius-search-top) 0 0;
      overflow: hidden;
      flex: none;
      order: 0;
      align-self: stretch;
      flex-grow: 0;
    }

    .skill-search__primary-bg {
      position: absolute;
      left: 0;
      right: 0;
      top: 9.52%;
      bottom: 0;
      background: var(--gradient-tab-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-search-top) var(--radius-search-top) 0 0;
      border: 2px solid var(--color-border-tab);
      border-bottom: none;
    }

    .skill-search__primary-selected {
      position: absolute;
      left: 0;
      top: 0;
      width: 328px;
      height: 84px;
    }

    .skill-search__primary-bar {
      position: absolute;
      left: 30px;
      top: 48px;
      width: 84px;
      height: 24px;
      border-radius: var(--radius-l);
      background: var(--gradient-primary-bar);
    }

    .skill-search__primary-row {
      position: absolute;
      z-index: 1;
      inset: 0;
    }

    .skill-search__brand {
      position: absolute;
      left: 36px;
      top: 26px;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 242px;
      height: 34px;
    }

    .skill-search__brand-sep {
      width: 2px;
      height: 26px;
      background: var(--color-separator);
    }

    .skill-search__tab-icon {
      display: block;
      flex-shrink: 0;
    }

    .skill-search__nav-item {
      position: absolute;
      top: 32px;
      display: block;
    }

    .skill-search__nav-item--train {
      left: 328px;
      width: 78px;
      height: 27px;
    }

    .skill-search__nav-item--bus {
      left: 438px;
      width: 80px;
      height: 27px;
    }

    .skill-search__nav-item--transfer {
      left: 550px;
      width: 122px;
      height: 27px;
    }

    .skill-search__subtabs {
      background: var(--color-white);
      border-radius: var(--radius-none) var(--radius-search-top) var(--radius-none) var(--radius-none);
      display: flex;
      justify-content: space-between;
      padding: 0 18px 18px;
      min-height: 98px;
      align-items: flex-end;
    }

    .skill-search__subtab {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .skill-search__subtab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 120px;
      padding-top: 18px;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-family: inherit;
    }

    .skill-search__subtab-label {
      font-size: 30px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-lightgray);
    }

    .skill-search__subtab-indicator {
      width: 54px;
      height: 6px;
      border-radius: var(--radius-indicator);
      background: transparent;
    }

    .skill-search__subtab--active .skill-search__subtab-label {
      color: var(--color-darkgray);
    }

    .skill-search__subtab--active .skill-search__subtab-indicator {
      width: 46px;
      background: var(--color-darkgray);
    }

    .skill-search__body {
      padding: 0 24px;
      background: transparent;
    }

    .skill-search__card {
      background: var(--color-white);
      border-radius: var(--radius-none) var(--radius-none) var(--radius-search-top) var(--radius-search-top);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .skill-search__row {
      padding: 24px 30px;
      border-bottom: 1px solid var(--color-bg);
    }

    .skill-search__row--od {
      position: relative;
      padding: 20px 30px;
      border-bottom: none;
      isolation: isolate;
    }

    .skill-search__row--date {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 30px;
      gap: 10px;
      isolation: isolate;
      position: relative;
      border-bottom: none;
      width: 702px;
      height: 100px;
      background: var(--color-white);
    }

    .skill-search__row--pax {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 22px 30px;
      gap: 10px;
      isolation: isolate;
      position: relative;
      border-bottom: none;
      width: 702px;
      height: 107px;
      background: var(--color-white);
    }

    .skill-search__row--cabin {
      padding: 24px 30px 0;
      border-bottom: 0;
    }

    .skill-search__od {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      height: 60px;
    }

    .skill-search__city {
      flex: 1;
      font-size: 42px;
      font-weight: 500;
      line-height: 100%;
      color: var(--color-darkgray);
    }

    .skill-search__city--right {
      text-align: right;
    }

    .skill-search__flight-icon {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
    }

    .skill-search__od-divider {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0 30px;
      z-index: 1;
    }

    .skill-search__od-divider::after {
      content: '';
      display: block;
      border-top: 1px solid var(--color-bg);
    }

    /* Frame 523 */
    .skill-search__date {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 40px;
      width: 194px;
      height: 38px;
    }

    /* Frame 1312323435 */
    .skill-search__date-nums {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 2px;
      width: 102px;
      height: 38px;
    }

    /* Frame 1312323747 — "9" 的容器 */
    .skill-search__date-num {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      width: 27px;
      height: 38px;
    }

    /* "9" 文本 */
    .skill-search__date-num-text {
      width: 27px;
      height: 37px;
      font-family: "Fliggy Sans 102", "PingFang SC", "SimHei", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 48px;
      line-height: 90%;
      text-align: justify;
      color: var(--color-darkgray);
      align-self: stretch;
    }

    /* Frame 1312318162 — "月" 的容器 */
    .skill-search__date-unit {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      width: 26px;
      height: 38px;
    }

    /* "月" 文本 */
    .skill-search__date-unit-text {
      width: 26px;
      height: 26px;
      font-family: "PingFang SC", "SimHei", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 26px;
      line-height: 100%;
      text-align: justify;
      color: var(--color-darkgray);
    }

    /* Frame 1312323746 — "12" 的容器 */
    .skill-search__date-day {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-end;
      width: 45px;
      height: 38px;
    }

    /* "12" 文本 */
    .skill-search__date-day-text {
      width: 45px;
      height: 37px;
      font-family: "Fliggy Sans 102", "PingFang SC", "SimHei", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 48px;
      line-height: 90%;
      text-align: justify;
      color: var(--color-darkgray);
    }

    /* Frame 1312318160 — "周一" 的容器 */
    .skill-search__date-weekday {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      width: 52px;
      height: 38px;
    }

    /* "周一" 文本 */
    .skill-search__weekday {
      width: 52px;
      height: 26px;
      font-family: "PingFang SC", "SimHei", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 26px;
      line-height: 100%;
      text-align: justify;
      color: var(--color-darkgray);
    }

    /* 分割线 */
    .skill-search__date-divider {
      position: absolute;
      width: 702px;
      height: 1px;
      left: 0;
      bottom: 0;
      background: var(--color-white);
      display: flex;
      align-items: flex-start;
      padding: 0 30px;
      z-index: 1;
    }

    .skill-search__date-divider::after {
      content: '';
      display: block;
      flex: none;
      align-self: stretch;
      width: 642px;
      height: 1px;
      background: var(--color-bg);
    }

    .skill-search__pax-line {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 642px;
      height: 62px;
    }

    .skill-search__pax-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      flex: 1;
      height: 62px;
    }

    .skill-search__pax-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 7px;
    }

    .skill-search__pax-title {
      font-size: 30px;
      font-weight: 500;
      line-height: 100%;
      text-align: justify;
      color: var(--color-darkgray);
    }

    .skill-search__pax-tip {
      font-size: 25px;
      font-weight: 400;
      line-height: 100%;
      text-align: justify;
      color: var(--color-tip-green);
    }

    .skill-search__bubble {
      display: flex;
      flex-direction: row;
      align-items: center;
    }

    .skill-search__bubble-arrow {
      width: 8px;
      height: 18px;
      position: relative;
      flex-shrink: 0;
    }

    .skill-search__bubble-arrow::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-right: 8px solid var(--color-overlay-dark);
    }

    .skill-search__bubble-body {
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: center;
      padding: 12px;
      gap: 12px;
      height: 62px;
      background: var(--color-overlay-dark);
      border-radius: var(--radius-m);
    }

    .skill-search__bubble-text {
      font-size: 24px;
      font-weight: 400;
      line-height: 100%;
      text-align: justify;
      white-space: nowrap;
      color: var(--color-white);
    }

    .skill-search__bubble-close {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
    }

    .skill-search__pax-arrow {
      width: 14px;
      height: 32px;
      flex-shrink: 0;
    }

    .skill-search__pax-divider {
      position: absolute;
      width: 702px;
      height: 1px;
      left: 0;
      bottom: 0;
      background: var(--color-white);
      display: flex;
      align-items: flex-start;
      padding: 0 30px;
      z-index: 1;
    }

    .skill-search__pax-divider::after {
      content: '';
      display: block;
      flex: none;
      align-self: stretch;
      width: 642px;
      height: 1px;
      background: var(--color-bg);
    }

    .skill-search__cabin-wrap {
      display: flex;
      align-items: center;
      min-height: 64px;
    }

    .skill-search__cabin {
      width: 323px;
      background: var(--color-bg);
      border-radius: var(--radius-m);
      padding: 6px;
      display: flex;
      gap: 8px;
    }

    .skill-search__cabin-item {
      border: 0;
      border-radius: var(--radius-m);
      padding: 13px 14px;
      font-size: 26px;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      color: var(--color-darkgray);
      background: transparent;
      font-family: inherit;
      cursor: pointer;
    }

    .skill-search__cabin-item--active {
      background: var(--color-white);
      box-shadow: var(--shadow-pill);
      font-weight: 500;
    }

    .skill-search__cabin-item--normal {
      font-weight: 400;
    }

    .skill-search__footer {
      position: relative;
      padding: 24px;
      background: var(--color-white);
      border-top: 1px solid var(--color-bg);
    }

    .skill-search__search-btn {
      position: relative;
      border: 0;
      width: 100%;
      min-height: 84px;
      border-radius: var(--radius-search-pill);
      background: var(--color-search-yellow);
      font-size: 32px;
      font-weight: 500;
      color: var(--color-darkgray);
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
    }

    .skill-search__promo-btn {
      position: absolute;
      right: 0;
      top: -12px;
      height: 36px;
      padding: 2px 12px;
      border-radius: var(--radius-promo-left) var(--radius-promo-top) var(--radius-promo-top) var(--radius-promo-tail);
      display: flex;
      align-items: center;
      background: var(--gradient-promo);
      color: var(--color-white);
      font-size: 20px;
      font-weight: 500;
    }

    .skill-search__history {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--color-midgray);
      font-size: 22px;
      line-height: 1;
    }

    .skill-search__history-left {
      display: flex;
      gap: 36px;
    }

    .skill-search__clear {
      background: none;
      border: 0;
      color: var(--color-midgray);
      font-size: 22px;
      cursor: pointer;
      font-family: inherit;
    }

    .skill-search__icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: middle;
    }


    .icon-close__stroke {
      stroke: var(--color-white);
    }

    .icon-discount__circle {
      fill: var(--color-white-25);
    }

    .icon-discount__mark {
      fill: var(--color-white);
    }
  </style>
</head>
<body>
  <section class="skill-search" aria-label="航班搜索模块">
    <div class="skill-search__top">
      <div class="skill-search__primary">
        <div class="skill-search__primary-bg" aria-hidden="true"></div>
        <img class="skill-search__primary-selected" src="https://gw.alicdn.com/imgextra/i2/O1CN01fSg8571ID0xMS3Bje_!!6000000000858-55-tps-328-84.svg" width="328" height="84" alt="" aria-hidden="true" />
        <span class="skill-search__primary-bar" aria-hidden="true"></span>
        <div class="skill-search__primary-row">
          <div class="skill-search__brand">
            <img class="skill-search__tab-icon" src="https://img.alicdn.com/imgextra/i2/O1CN01GeN3Vc1Nu8K5ath9N_!!6000000001629-55-tps-72-34.svg" width="72" height="34" alt="机票" />
            <span class="skill-search__brand-sep" aria-hidden="true"></span>
            <img class="skill-search__tab-icon" src="https://img.alicdn.com/imgextra/i1/O1CN01IYNQyo1RJGuReBFiw_!!6000000002090-55-tps-136-34.svg" width="136" height="34" alt="特价机票" />
          </div>
          <img class="skill-search__nav-item skill-search__nav-item--train" src="https://img.alicdn.com/imgextra/i3/O1CN01KqaSW81eN19atGDKH_!!6000000003858-55-tps-78-27.svg" width="78" height="27" alt="火车票" />
          <img class="skill-search__nav-item skill-search__nav-item--bus" src="https://img.alicdn.com/imgextra/i1/O1CN01Q8YMLW279qccxvRHV_!!6000000007755-55-tps-80-27.svg" width="80" height="27" alt="汽车票" />
          <img class="skill-search__nav-item skill-search__nav-item--transfer" src="https://img.alicdn.com/imgextra/i4/O1CN01edEghQ1kEfd7FeMlV_!!6000000004652-55-tps-122-27.svg" width="122" height="27" alt="接送机" />
        </div>
      </div>

      <nav class="skill-search__subtabs" aria-label="二级行程类型">
        <div class="skill-search__subtab skill-search__subtab--active">
          <button class="skill-search__subtab-btn" type="button" aria-current="page">
            <span class="skill-search__subtab-label">国内</span>
            <span class="skill-search__subtab-indicator" aria-hidden="true"></span>
          </button>
        </div>
        <div class="skill-search__subtab">
          <button class="skill-search__subtab-btn" type="button">
            <span class="skill-search__subtab-label">国际</span>
            <span class="skill-search__subtab-indicator" aria-hidden="true"></span>
          </button>
        </div>
        <div class="skill-search__subtab">
          <button class="skill-search__subtab-btn" type="button">
            <span class="skill-search__subtab-label">港澳台</span>
            <span class="skill-search__subtab-indicator" aria-hidden="true"></span>
          </button>
        </div>
      </nav>
    </div>

    <div class="skill-search__body">
      <div class="skill-search__card">
        <div class="skill-search__row skill-search__row--od">
          <div class="skill-search__od">
            <p class="skill-search__city">杭州</p>
            <img class="skill-search__flight-icon" src="https://img.alicdn.com/imgextra/i3/O1CN01ZAzJFP1Ylqw56Qd9O_!!6000000003100-55-tps-68-68.svg" width="68" height="68" alt="" aria-hidden="true" />
            <p class="skill-search__city skill-search__city--right">北京</p>
          </div>
          <div class="skill-search__od-divider" aria-hidden="true"></div>
        </div>

        <div class="skill-search__row skill-search__row--date">
          <div class="skill-search__date">
            <div class="skill-search__date-nums">
              <span class="skill-search__date-num"><span class="skill-search__date-num-text">9</span></span>
              <span class="skill-search__date-unit"><span class="skill-search__date-unit-text">月</span></span>
              <span class="skill-search__date-day"><span class="skill-search__date-day-text">12</span></span>
            </div>
            <span class="skill-search__date-weekday"><span class="skill-search__weekday">周一</span></span>
          </div>
          <div class="skill-search__date-divider" aria-hidden="true"></div>
        </div>

        <div class="skill-search__row skill-search__row--pax">
          <div class="skill-search__pax-line">
            <div class="skill-search__pax-inner">
              <div class="skill-search__pax-left">
                <p class="skill-search__pax-title">选择乘机人</p>
                <p class="skill-search__pax-tip">快速找到低价票</p>
              </div>
              <div class="skill-search__bubble">
