<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>分割组件示例</title>
  <style>
    :root {
      --color-primary: #0E131B;
      --color-secondary: #5B5F67;
      --color-bg: #F2F3F5;
      --color-bg-light: #F7F8FA;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background-color: var(--color-bg-light);
      min-height: 100vh;
    }

    .section-divider {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      padding: 0;
      isolation: isolate;
      position: relative;
      width: 750px;
      height: 90px;
      background: var(--color-bg);
    }

    .section-divider-content {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      padding: 24px;
      gap: 24px;
      width: 750px;
      height: 90px;
      z-index: 0;
    }

    .section-divider-line-left {
      height: 0;
      opacity: 0.5;
      flex: 1;
    }

    .section-divider-line-left img {
      width: 100%;
      height: 1px;
      display: block;
    }

    .section-divider-text {
      max-width: 570px;
      height: 34px;
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 400;
      font-size: 24px;
      line-height: 140%;
      text-align: center;
      color: var(--color-secondary);
      flex: none;
    }

    .section-divider-line-right {
      height: 0;
      opacity: 0.5;
      flex: 1;
    }

    .section-divider-line-right img {
      width: 100%;
      height: 1px;
      display: block;
    }

    .section-divider-border-top {
      position: absolute;
      width: 750px;
      height: 0;
      left: 0;
      top: 0;
      border: 1px solid var(--color-bg);
      z-index: 1;
    }

    .section-divider-border-bottom {
      position: absolute;
      width: 750px;
      height: 0;
      left: 0;
      bottom: 0;
      border: 1px solid var(--color-bg);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="section-divider">
    <div class="section-divider-content">
      <div class="section-divider-line-left">
        <img src="https://gw.alicdn.com/imgextra/i1/O1CN012sISRA1g4MFUYzYtV_!!6000000004088-2-tps-220-1.png" alt="分割线">
      </div>
      <span class="section-divider-text">以下为其他中转航班</span>
      <div class="section-divider-line-right">
        <img src="https://gw.alicdn.com/imgextra/i2/O1CN01yVrJ6I1urHAlDG4uo_!!6000000006090-2-tps-220-1.png" alt="分割线">
      </div>
    </div>
    <div class="section-divider-border-top"></div>
    <div class="section-divider-border-bottom"></div>
  </div>
</body>
</html>
