<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>日历组件示例</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }

    :root {
      --color-primary: #0E131B;
      --color-secondary: #90949A;
      --color-white: #FFFFFF;
      --color-bg: #F2F3F5;
      --color-bg-light: #F7F8FA;
      --color-selected: #FFE747;
      --color-selected-border: #FFDF00;
      --radius-l: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background-color: var(--color-bg-light);
      min-height: 100vh;
    }

    /* 日历 - 外层容器 */
    .calendar-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0 0 6px;
      gap: 10px;
      width: 750px;
      height: 102px;
      background: #FFFFFF;
      position: relative;
      overflow: hidden;
    }

    /* 日期滚动容器 - 限制在650px内 */
    .date-scroll-container {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0;
      position: absolute;
      width: 650px;
      height: 96px;
      left: 0;
      top: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* 隐藏滚动条 */
    .date-scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* 单个日期项（普通态） */
    .date-item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      gap: 8px;
      width: 126px;
      height: 96px;
      background: #FFFFFF;
      flex: none;
      flex-shrink: 0;
    }

    /* 选中态日期项 - 外层有padding */
    .date-item.active {
      padding: 0 6px;
    }

    /* 选中态内层 */
    .date-item__inner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 0;
      gap: 8px;
      width: 114px;
      height: 96px;
      background: #FFE747;
      border-radius: 12px;
      flex: none;
      flex-grow: 1;
    }

    /* 星期文字行（普通态，无休标签） */
    .weekday-row {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      gap: 2px;
      height: 18px;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 星期文字 */
    .weekday {
      height: 18px;
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 400;
      font-size: 18px;
      line-height: 100%;
      text-align: center;
      color: #0E131B;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 节假日标识 "休" - inline在星期文字旁边 */
    .holiday-badge {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      width: 18px;
      height: 18px;
      background: #FFDF00;
      border-radius: 3.6px;
      flex: none;
      order: 1;
      flex-grow: 0;
    }

    .holiday-badge__text {
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 500;
      font-size: 14.4px;
      line-height: 100%;
      text-align: center;
      color: #0E131B;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 日期数字容器 */
    .date-number-wrapper {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      padding: 0;
      height: 24px;
      flex: none;
      order: 1;
      flex-grow: 0;
    }

    /* 日期数字 - 使用 Fliggy Sans 102 字体 */
    .date-number {
      height: 20px;
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-style: normal;
      font-weight: bold;
      font-size: 30px;
      line-height: 20px;
      color: #0E131B;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    /* 选中态节假日标识隐藏 */
    .date-item__inner .holiday-badge--inline {
      display: none;
    }

    /* 价格文字 */
    .price {
      height: 20px;
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 400;
      font-size: 20px;
      line-height: 100%;
      text-align: center;
      color: #0E131B;
      flex: none;
      order: 2;
      flex-grow: 0;
    }

    /* 选中态价格 order 调整 */
    .date-item__inner .price {
      order: 3;
    }

    /* 阴影遮罩 - radial-gradient */
    .shadow-mask {
      position: absolute;
      width: 100px;
      height: 96px;
      left: 596px;
      top: 0;
      background: radial-gradient(100% 100% at 100% 52.49%, #E0E0E0 0%, rgba(255, 255, 255, 0.0001) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* 日历展开按钮 */
    .calendar-expand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 41px 32px;
      gap: 6px;
      position: absolute;
      width: 100px;
      height: 96px;
      left: 650px;
      top: 0;
      background: #FFFFFF;
      cursor: pointer;
      z-index: 2;
    }

    .calendar-expand-icon {
      width: 36px;
      height: 36px;
      flex: none;
      order: 0;
      flex-grow: 0;
    }

    .calendar-expand-arrow {
      width: 14px;
      height: 10px;
      flex: none;
    }
  </style>
</head>
<body>
  <div class="calendar-container">
    <!-- 日期滚动区域（650px宽） -->
    <div class="date-scroll-container">
      <!-- 普通日期 -->
      <div class="date-item">
        <div class="weekday-row">
          <span class="weekday">周一</span>
        </div>
        <div class="date-number-wrapper">
          <span class="date-number">31</span>
        </div>
        <span class="price">¥990</span>
      </div>

      <!-- 普通日期 -->
      <div class="date-item">
        <div class="weekday-row">
          <span class="weekday">周二</span>
        </div>
        <div class="date-number-wrapper">
          <span class="date-number">01</span>
        </div>
        <span class="price">¥849</span>
      </div>

      <!-- 选中态日期（外层padding + 内层圆角） -->
      <div class="date-item active">
        <div class="date-item__inner">
          <div class="weekday-row">
            <span class="weekday">周三</span>
          </div>
          <div class="date-number-wrapper">
            <span class="date-number">04-02</span>
          </div>
          <span class="price">¥999</span>
        </div>
      </div>

      <!-- 普通日期 -->
      <div class="date-item">
        <div class="weekday-row">
          <span class="weekday">周四</span>
        </div>
        <div class="date-number-wrapper">
          <span class="date-number">03</span>
        </div>
        <span class="price">¥1539</span>
      </div>

      <!-- 带"休"标签的日期（休标签在星期文字旁边） -->
      <div class="date-item">
        <div class="weekday-row">
          <span class="weekday">清明节</span>
          <div class="holiday-badge">
            <span class="holiday-badge__text">休</span>
          </div>
        </div>
        <div class="date-number-wrapper">
          <span class="date-number">04</span>
        </div>
        <span class="price">¥1019</span>
      </div>

      <!-- 带"休"标签的日期（第二个） -->
      <div class="date-item">
        <div class="weekday-row">
          <span class="weekday">周六</span>
          <div class="holiday-badge">
            <span class="holiday-badge__text">休</span>
          </div>
        </div>
        <div class="date-number-wrapper">
          <span class="date-number">05</span>
        </div>
        <span class="price">¥1019</span>
      </div>
    </div>

    <!-- 阴影遮罩（radial-gradient，在日期区右侧） -->
    <div class="shadow-mask"></div>

    <!-- 日历展开按钮（在遮罩右侧） -->
    <div class="calendar-expand">
      <img class="calendar-expand-icon" src="https://gw.alicdn.com/imgextra/i1/O1CN01n46BJU1JInZenKstw_!!6000000001006-2-tps-36-36.png" alt="日历">
      <img class="calendar-expand-arrow" src="https://gw.alicdn.com/imgextra/i4/O1CN010GUEsm1pGZLnYT9L2_!!6000000005333-2-tps-14-10.png" alt="展开">
    </div>
  </div>
</body>
</html>
