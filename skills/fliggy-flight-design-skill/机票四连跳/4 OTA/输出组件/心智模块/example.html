<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>心智模块示例</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f2f3f5;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #212121;
    }

    img { display: block; }

    .module {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 750px;
      margin: 0 auto;
      padding: 42px 0 60px;
    }

    .brand {
      width: 282px;
      height: 41px;
    }

    .copy {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 24px;
      line-height: 32px;
    }

    .copy::before,
    .copy::after {
      content: "";
      width: 64px;
      height: 1px;
      background: rgba(33, 33, 33, 0.25);
    }
  </style>
</head>
<body>
  <div class="module">
    <img class="brand" src="https://gw.alicdn.com/imgextra/i2/O1CN01WkEORs1xqlZt4YvON_!!6000000006495-2-tps-282-41.png" alt="飞猪旅行·安心票">
    <div class="copy">出票安心 · 出行安心 · 服务安心</div>
  </div>
</body>
</html>
