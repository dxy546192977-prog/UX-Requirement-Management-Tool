<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>Fliggy Flight — Scaffold</title>
  <style>
    :root {
      --color-darkgray: #0f131a;
      --color-midgray: #5c5f66;
      --color-lightgray: #919499;
      --color-indigo-1: #6666ff;
      --color-indigo-4: #EBEBFF;
      --color-warning-1: #ff3333;
      --color-pay-1: #ff5533;
      --color-white: #ffffff;
      --color-label: #F7F8FA;
      --color-bg: #f2f3f5;
      --radius-xl: 36px;
      --radius-l: 24px;
      --radius-m: 12px;
      --radius-s: 6px;
    }
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background: var(--color-label);
      color: var(--color-darkgray);
    }
    .page {
      max-width: 750px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 30px 48px;
    }
  </style>
</head>
<body>
  <div class="page" id="root">
    <!-- 页面内容：按模块堆叠；AI 生成时删除本注释 -->
  </div>
</body>
</html>
