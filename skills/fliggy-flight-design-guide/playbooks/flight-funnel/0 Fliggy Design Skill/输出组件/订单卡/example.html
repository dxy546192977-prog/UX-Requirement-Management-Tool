<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>订单卡组件预览</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        @font-face {
            font-family: 'Fliggy Sans 102';
            src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ========================================
         == 订单卡 (Order Details Card) Skill 组件
         ========================================
         分区+标签模块化结构：订单金额 + 业务分区 + 费用明细 + 操作按钮
        */

        .order-details-wrapper {
            padding-top: 24px;
        }

        .order-details-card {
            width: 690px;
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: 0 24px 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* --- 订单金额头部 --- */
        .order-total-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 24px;
        }
        .order-total-header .label {
            font-size: 24px;
            color: var(--color-lightgray);
        }
        .order-total-header .currency {
            font-size: 20px;
            color: var(--color-pay-1);
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
        }
        .order-total-header .amount {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-pay-1);
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
        }

        /* --- 通用分区 --- */
        .card-section {
            display: flex;
            flex-direction: column;
            padding-top: 18px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 32px;
            background: var(--color-indigo-4);
            border-radius: var(--radius-s);
            font-size: 22px;
            font-weight: 500;
            color: var(--color-indigo-1);
            flex-shrink: 0;
        }

        .section-title {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
            line-height: 1.4;
        }

        /* --- 摘要信息行 --- */
        .summary-info-line {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            color: var(--color-darkgray);
            padding-top: 18px;
        }
        .summary-info-line .divider {
            width: 1px;
            height: 20px;
            background-color: #D2D4D9;
            flex-shrink: 0;
        }

        /* --- 日期区块 --- */
        .date-blocks {
            display: flex;
            gap: 18px;
            padding-top: 18px;
        }

        .date-block {
            flex: 1;
            background: var(--color-label);
            border-radius: var(--radius-l);
            padding: 18px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .date-block .date-text {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .date-block .time-text {
            font-size: 24px;
            color: var(--color-darkgray);
        }

        /* --- 费用明细 --- */
        .billing-details {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-top: 42px;
            font-size: 24px;
            color: var(--color-lightgray);
        }

        .billing-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .billing-item .item-label {
            flex-shrink: 0;
        }
        .billing-item .item-desc {
            flex-grow: 1;
            padding: 0 12px;
        }
        .billing-item .item-value {
            flex-shrink: 0;
            text-align: right;
        }

        /* --- 分割线 --- */
        .card-divider {
            border: none;
            border-top: 1px solid var(--color-bg);
            margin: 24px 0 0 0;
        }

        /* --- 退款/总计摘要 --- */
        .refund-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
        }
        .refund-summary .label {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .refund-summary .price-display {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        .refund-summary .currency {
            font-size: 22px;
            color: var(--color-pay-1);
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
            line-height: 1.2;
        }
        .refund-summary .amount {
            font-size: 32px;
            font-weight: 500;
            color: var(--color-pay-1);
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
            line-height: 1;
        }

        /* --- 操作按钮 --- */
        .action-buttons {
            display: flex;
            gap: 16px;
            padding-top: 24px;
        }
        .action-buttons button {
            flex: 1;
            height: 80px;
            border-radius: var(--radius-l);
            border: none;
            font-size: 26px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }
        .action-buttons .btn-secondary { background: var(--color-bg); color: var(--color-darkgray); }
        .action-buttons .btn-primary { background: var(--color-indigo-4); color: var(--color-indigo-1); }
    </style>
</head>
<body>

    <div class="order-details-wrapper">
        <div class="order-details-card">

            <!-- 1. 订单金额头部 -->
            <div class="order-total-header">
                <span class="label">订单金额</span>
                <span class="currency">¥</span>
                <span class="amount">898.00</span>
            </div>

            <!-- 2. 分区1：酒店信息 -->
            <section class="card-section">
                <div class="section-header">
                    <span class="section-tag">酒店</span>
                    <span class="section-title">杭州JW万豪酒店</span>
                </div>

                <!-- 摘要信息 -->
                <div class="summary-info-line">
                    <span>逍遥高级大床房</span>
                    <span class="divider"></span>
                    <span>1间</span>
                    <span class="divider"></span>
                    <span>1晚</span>
                </div>

                <!-- 日期区块 -->
                <div class="date-blocks">
                    <div class="date-block">
                        <span class="date-text">7月10日 周五</span>
                        <span class="time-text">12:00后入住</span>
                    </div>
                    <div class="date-block">
                        <span class="date-text">7月11日 周六</span>
                        <span class="time-text">12:00前离店</span>
                    </div>
                </div>
            </section>

            <!-- 3. 分区2：费用明细 -->
            <section class="card-section">
                <div class="section-header">
                    <span class="section-tag">明细</span>
                    <span class="section-title">费用明细</span>
                </div>

                <div class="billing-details">
                    <div class="billing-item">
                        <span class="item-label">房费</span>
                        <span class="item-desc">¥898 x 1间 x 1晚</span>
                        <span class="item-value">¥898.00</span>
                    </div>
                    <div class="billing-item">
                        <span class="item-label">优惠券</span>
                        <span class="item-desc">平台新客专享</span>
                        <span class="item-value">-¥20.00</span>
                    </div>
                </div>

                <hr class="card-divider">

                <div class="refund-summary">
                    <span class="label">预计退款</span>
                    <div class="price-display">
                        <span class="currency">¥</span>
                        <span class="amount">878.00</span>
                    </div>
                </div>
            </section>

            <!-- 4. 操作按钮 -->
            <div class="action-buttons">
                <button class="btn-secondary">返回修改</button>
                <button class="btn-primary">确认取消</button>
            </div>

        </div>
    </div>

</body>
</html>
