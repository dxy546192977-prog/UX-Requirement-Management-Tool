<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>下单卡组件预览</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        @font-face {
            font-family: 'Fliggy Sans 102';
            src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ========================================
         == 下单卡 (Order Card) Skill 组件
         ========================================
         可配置表单卡片：标题 + 摘要 + 可增删的表单单元 + 协议 + 按钮
        */

        .order-card-wrapper {
            padding-top: 24px;
        }

        .order-card {
            width: 690px;
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* --- 头部 --- */
        .order-card-header {
            padding-bottom: 18px;
        }
        
        .card-title {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
            line-height: 1.4;
            margin: 0;
        }
        
        /* --- 摘要信息 --- */
        .summary-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            color: var(--color-darkgray);
            line-height: 1.4;
            padding-bottom: 18px;
        }
        .summary-info .divider {
            width: 1px;
            height: 20px;
            background-color: #D2D4D9;
        }
        
        /* --- 表单主体 --- */
        .order-form-body {
            display: flex;
            flex-direction: column;
        }

        .form-cell {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid #EEEEEE;
            text-decoration: none;
            color: inherit;
        }
        .form-cell:last-child {
            border-bottom: none;
        }
        
        .cell-label {
            font-size: 28px;
            color: var(--color-lightgray);
            flex-shrink: 0;
            min-width: 140px;
            margin-right: 24px;
        }

        .cell-content {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-grow: 1;
            justify-content: flex-start;
            min-width: 0;
        }
        
        .cell-content-main {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
            text-align: left;
        }
        .cell-content-main.is-prompt {
            color: var(--color-pay-1);
            font-size: 24px;
            font-weight: 400;
        }
        
        /* 出行人复杂内容 */
        .traveler-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .traveler-info .name-line {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .traveler-info .name {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .traveler-info .tag {
            background: var(--color-bg);
            border-radius: var(--radius-s);
            padding: 2px 6px;
            font-size: 16px;
            color: var(--color-midgray);
        }
        .traveler-info .id-info {
            font-size: 24px;
            color: var(--color-lightgray);
        }
        
        /* 总价展示 */
        .total-price-display {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            color: var(--color-pay-1);
        }
        .total-price-display .currency { font-size: 22px; line-height: 1.2; }
        .total-price-display .amount { font-size: 32px; font-weight: 500; line-height: 1; font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif; }
        
        .cell-arrow-icon {
            flex-shrink: 0;
            margin-left: auto;
        }
        
        /* --- 页脚 --- */
        .order-card-footer {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-top: 18px;
        }

        .agreement-line {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .agreement-line .checkbox-icon { flex-shrink: 0; }
        .agreement-line .text {
            font-size: 22px;
            line-height: 1.45;
            color: var(--color-darkgray);
        }
        .agreement-line .text a {
            color: var(--color-indigo-1);
            text-decoration: none;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
        }
        .action-buttons button {
            flex: 1;
            height: 80px;
            border-radius: var(--radius-l);
            border: none;
            font-size: 26px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }
        .action-buttons .btn-secondary { background: var(--color-bg); color: var(--color-darkgray); }
        .action-buttons .btn-primary { background: var(--color-indigo-4); color: var(--color-indigo-1); }
    </style>
</head>
<body>

    <div class="order-card-wrapper">
        <div class="order-card">
            <!-- 1. 卡片标题 -->
            <header class="order-card-header">
                <h2 class="card-title">逍遥高级大床房</h2>
            </header>

            <!-- 2. 摘要信息 -->
            <section class="summary-info">
                <span>07-18入住-07-19离店</span>
                <span class="divider"></span>
                <span>共1晚</span>
            </section>

            <!-- 3. 表单主体 (可自由配置的单元) -->
            <main class="order-form-body">
                <!-- 出行人 Cell (复杂内容，可点击) -->
                <a href="#" class="form-cell">
                    <span class="cell-label">出行人</span>
                    <div class="cell-content">
                        <div class="traveler-info">
                            <div class="name-line">
                                <span class="name">LI/LEI (李雷)</span>
                                <span class="tag">成人</span>
                            </div>
                            <div class="id-info">身份证 3****************3</div>
                        </div>
                        <svg class="cell-arrow-icon" width="12" height="22" viewBox="0 0 12 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 1.75L10.25 11L1.5 20.25" stroke="#919499" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                </a>

                <!-- 联系手机 Cell (可点击) -->
                <a href="#" class="form-cell">
                    <span class="cell-label">联系手机</span>
                    <div class="cell-content">
                        <span class="cell-content-main">138****1234</span>
                        <svg class="cell-arrow-icon" width="12" height="22" viewBox="0 0 12 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 1.75L10.25 11L1.5 20.25" stroke="#919499" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                </a>
                
                <!-- 优惠 Cell (可点击，高亮提示文本) -->
                <a href="#" class="form-cell">
                    <span class="cell-label">优惠</span>
                    <div class="cell-content">
                        <span class="cell-content-main is-prompt">省20元 | 平台新客专享</span>
                        <svg class="cell-arrow-icon" width="12" height="22" viewBox="0 0 12 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 1.75L10.25 11L1.5 20.25" stroke="#919499" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                </a>

                <!-- 总价 Cell (不可点击，无箭头) -->
                <div class="form-cell">
                    <span class="cell-label">总价</span>
                    <div class="cell-content">
                        <div class="total-price-display">
                            <span class="currency">¥</span>
                            <span class="amount">36.9</span>
                        </div>
                    </div>
                </div>
            </main>

            <!-- 4. 页脚 (协议与按钮) -->
            <footer class="order-card-footer">
                <div class="agreement-line">
                    <svg class="checkbox-icon" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18.5" fill="#6666FF" stroke="#6666FF" stroke-width="3"></circle>
                        <path d="M12.4541 20.4545L17.8488 25.8492L28.6382 15.0598" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                    <span class="text">我已阅读并同意 <a href="#">国航空运输总条件</a>、<a href="#">国航购票协议</a></span>
                </div>
                <div class="action-buttons">
                    <button class="btn-secondary">返回修改</button>
                    <button class="btn-primary">去支付</button>
                </div>
            </footer>
        </div>
    </div>

</body>
</html>
