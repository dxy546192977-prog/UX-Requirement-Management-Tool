<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>选择器组件预览</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ========================================
         == 选择器 (Selector) Skill 组件
         ========================================
         2 列网格选项 + 确认按钮，无白色卡片包裹
        */

        /* --- 1. 组件主容器 --- */
        .selector-component {
            width: 690px;
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px; /* 选项网格和确认按钮之间的间距 */
        }
        
        /* --- 2. 选项网格 --- */
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        /* --- 3. 单个选项按钮 --- */
        .selector-option {
            height: 84px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;

            background-color: var(--color-white);
            border: 1px solid rgba(15, 19, 26, 0.12);
            border-radius: var(--radius-l);
            
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            font-size: 28px;
            font-weight: 500;
            color: #000000;
            
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        
        /* 选中状态 */
        .selector-option.is-active {
            background-color: var(--color-indigo-4);
        }
        
        /* --- 4. 确认按钮 --- */
        .confirm-button {
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--color-indigo-4);
            border-radius: var(--radius-l);
            border: none;
            
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            font-size: 26px;
            font-weight: 500;
            color: var(--color-indigo-1);
            
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .confirm-button:hover {
            background-color: #dcdbff;
        }
    </style>
</head>
<body>

    <div class="selector-component">
        <!-- 选项网格，可以自由增删 <button> -->
        <div class="selector-grid">
            <button class="selector-option">飞机</button>
            <button class="selector-option is-active">火车</button>
            <button class="selector-option">自驾</button>
            <button class="selector-option">不限</button>
            <button class="selector-option">步行</button>
            <button class="selector-option">骑行</button>
        </div>

        <!-- 确认按钮 -->
        <button class="confirm-button">确认</button>
    </div>

    <script>
        // 单选交互：点击切换选中状态
        const grid = document.querySelector('.selector-grid');
        const options = grid.querySelectorAll('.selector-option');

        grid.addEventListener('click', (event) => {
            const clickedOption = event.target.closest('.selector-option');
            if (!clickedOption) return;

            options.forEach(option => option.classList.remove('is-active'));
            clickedOption.classList.add('is-active');
        });
    </script>

</body>
</html>
