<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>商品卡_人群好价_左右</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f2f3f5;
      color: #0e131b;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    img { display: block; }
    .card {
      width: 714px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }
    .head {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 66px;
      padding: 20px 17px 12px;
    }
    .head img { width: 105px; height: 34px; flex: none; }
    .head-copy {
      padding-bottom: 2px;
      color: #5b5f67;
      font-size: 20px;
      line-height: 28px;
    }
    .tabs {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 679px;
      height: 72px;
      margin: 0 18px;
      border-radius: 12px;
      overflow: hidden;
    }
    .tab {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 226.33px;
      height: 72px;
      padding: 6px;
      background: #f2f3f5;
      flex: 1;
    }
    .tab-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 214.33px;
      height: 60px;
      border-radius: 9px;
    }
    .tab.active .tab-panel { background: #ffffff; }
    .tab-title {
      margin: -4px 0 0;
      font-size: 22px;
      line-height: 31px;
      text-align: center;
      color: #0e131b;
      font-weight: 400;
    }
    .tab.active .tab-title { font-weight: 500; }
    .tab-sub {
      font-size: 20px;
      line-height: 28px;
      text-align: center;
      color: #0e131b;
      font-weight: 400;
    }
    .tab.active .tab-sub { font-weight: 500; }
    .body {
      position: relative;
      display: flex;
      gap: 36px;
      padding: 30px 24px;
    }
    .buy {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 84px;
      height: 84px;
      border: 0;
      border-radius: 12px;
      background: #ff8400;
      color: #ffffff;
      font-size: 36px;
      line-height: 36px;
      font-weight: 500;
    }
    .price-col {
      width: 204px;
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .price-row {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      width: 204px;
      height: 40px;
    }
    .price-main {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      width: 140px;
      height: 45px;
    }
    .currency {
      color: #ff4119;
      font-size: 36px;
      line-height: 31px;
      font-weight: 700;
      font-family: "Alibaba Sans 102", "Fliggy Sans 102", "PingFang SC", sans-serif;
    }
    .amount {
      color: #ff4119;
      font-size: 54px;
      line-height: 45px;
      font-weight: 700;
      letter-spacing: -0.04em;
      font-family: "Alibaba Sans 102", "Fliggy Sans 102", "PingFang SC", sans-serif;
    }
    .price-note {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      min-height: 32px;
      padding: 0 6px;
      border-radius: 6px;
      background: linear-gradient(90deg, #ffe5df 0%, rgba(255, 229, 223, 0.0001) 100%);
      color: #ff4119;
      font-size: 22px;
      line-height: 26px;
      font-weight: 400;
    }
    .price-note img { width: 10px; height: 20px; }
    .info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 96px;
      font-size: 22px;
      line-height: 31px;
    }
    .limit-block {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      width: 426px;
      height: 54px;
      flex: none;
    }
    .limit-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 65, 25, 0.5);
      border-radius: 4px;
      color: #ff4119;
      font-size: 16px;
      line-height: 16px;
      font-weight: 500;
      flex: none;
    }
    .limit-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 396px;
      height: 54px;
      flex: none;
    }
    .limit-line {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 9px;
      width: 396px;
      height: 24px;
      flex: none;
    }
    .limit-text {
      font-size: 24px;
      line-height: 24px;
      font-weight: 400;
      color: #90949a;
      flex: none;
    }
    .limit-text-short { width: 120px; }
    .limit-text-long { width: 261px; }
    .limit-text-full { width: 375px; }
    .limit-divider {
      width: 1px;
      height: 19px;
      background: #e0e0e0;
      flex: none;
    }
    .rights-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      color: #90949a;
      font-size: 24px;
      line-height: 24px;
    }
    .rights-row img { width: 24px; height: 24px; flex: none; }
  </style>
</head>
<body>
  <article class="card">
    <div class="head">
      <img src="https://gw.alicdn.com/imgextra/i4/O1CN016gr1GI24Uy2R1ZzrI_!!6000000007395-2-tps-105-34.png" alt="人群好价">
      <div class="head-copy">特定人群更优惠</div>
    </div>
    <div class="tabs">
      <div class="tab active">
        <div class="tab-panel">
          <div class="tab-title">家庭出行</div>
          <div class="tab-sub">¥775</div>
        </div>
      </div>
      <div class="tab">
        <div class="tab-panel">
          <div class="tab-title">16-28周岁</div>
          <div class="tab-sub">¥780</div>
        </div>
      </div>
      <div class="tab">
        <div class="tab-panel">
          <div class="tab-title">60周岁以上</div>
          <div class="tab-sub">¥782</div>
        </div>
      </div>
    </div>
    <div class="body">
      <button class="buy" aria-label="预订">订</button>
      <div class="price-col">
        <div class="price-row">
          <div class="price-main">
            <span class="currency">¥</span>
            <span class="amount">1045</span>
          </div>
        </div>
        <div class="price-note">
          <span>至高减¥25</span>
          <img src="https://gw.alicdn.com/imgextra/i4/O1CN01sYLDJz1HEYfwleQxX_!!6000000000726-2-tps-10-20.png" alt="">
        </div>
      </div>
      <div class="info">
        <div>托运行李共20公斤</div>
        <div>退改¥41起</div>
        <div>经济舱2.6折</div>
        <div class="limit-block">
          <div class="limit-badge">限</div>
          <div class="limit-stack">
            <div class="limit-line">
              <span class="limit-text limit-text-short">同周同航次</span>
              <span class="limit-divider" aria-hidden="true"></span>
              <span class="limit-text limit-text-long">同3人以上成团</span>
            </div>
            <div class="limit-line">
              <span class="limit-text limit-text-full">五重券叠加更省</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </article>
</body>
</html>
