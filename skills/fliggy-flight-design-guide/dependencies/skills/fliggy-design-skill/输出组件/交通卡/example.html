<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>交通卡组件预览（机票 / 火车票 / 汽车票）</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        @font-face {
            font-family: 'Fliggy Sans 102';
            src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            gap: 48px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        .section-label {
            font-size: 24px;
            color: var(--color-lightgray);
            margin-bottom: -30px;
        }

        /* 
         ========================================
         == 交通卡共享基础样式
         ========================================
        */

        /* 外层容器 */
        .transport-card-container {
            width: 690px;
        }

        /* 卡片主体 */
        .transport-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 卡片头部：图标 + 标题 */
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header .icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .card-header .title {
            font-size: 24px;
            font-weight: 400;
            color: var(--color-darkgray);
            margin: 0;
            line-height: 1.7;
        }

        /* 卡片内容区 */
        .card-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* 左侧行程详情 */
        .travel-details {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 行程信息 */
        .itinerary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 24px;
        }

        .departure, .arrival {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .departure { align-items: flex-start; }
        .arrival { align-items: flex-end; }

        .itinerary .time {
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
            font-size: 42px;
            font-weight: 400;
            color: var(--color-darkgray);
            line-height: 26px;
            height: 32px;
            display: flex;
            align-items: flex-end;
        }

        .itinerary .station {
            font-size: 22px;
            color: var(--color-darkgray);
            line-height: 1;
        }

        /* 中间连线 */
        .duration-line {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0 8px;
        }

        .duration-line .duration-text {
            font-size: 22px;
            line-height: 24px;
            color: #999999;
        }

        .duration-line .line-svg-container {
            display: flex;
            align-items: flex-end;
            width: 100%;
            height: 24px;
            padding-bottom: 6px;
        }

        /* 辅助信息基础 */
        .aux-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .aux-info__row {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 32px;
        }

        .aux-info__row span {
            line-height: 32px;
        }

        .aux-info__separator {
            width: 1px;
            height: 18px;
            background: #D2D4D9;
        }

        .aux-info__row .info-text--dark {
            color: var(--color-darkgray);
        }

        .aux-info__row .airline-logo {
            width: 25px;
            height: 25px;
        }

        /* 右侧价格区基础 */
        .price-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-top: 24px;
        }

        .price-container {
            display: flex;
            align-items: flex-end;
            gap: 5px;
        }

        .price__current {
            display: flex;
            align-items: flex-end;
            color: var(--color-darkgray);
        }

        .price__currency {
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
            font-weight: 700;
            font-size: 24px;
            line-height: 24px;
        }

        .price__amount {
            font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
            font-size: 42px;
            line-height: 27px;
        }

        /* 预订按钮 */
        .book-button {
            width: 96px;
            height: 60px;
            background: var(--color-indigo-4);
            border-radius: var(--radius-l);
            border: none;
            cursor: pointer;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            font-weight: 600;
            font-size: 24px;
            line-height: 32px;
            color: var(--color-indigo-1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        /* 
         ========================================
         == 变体 A：机票卡专属样式
         ========================================
        */

        .transport-card--flight {
            gap: 12px;
        }

        .transport-card--flight .travel-details {
            width: 420px;
        }

        .transport-card--flight .aux-info__row {
            font-size: 22px;
            color: var(--color-lightgray);
        }

        .transport-card--flight .price-section {
            justify-content: space-between;
            padding-bottom: 12px;
            flex-grow: 1;
        }

        .transport-card--flight .price-group {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .price__original {
            font-size: 20px;
            line-height: 1;
            color: var(--color-lightgray);
            text-decoration: line-through;
        }

        .discount-tags {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 4px;
            height: 28px;
        }

        .discount-tags__item {
            font-size: 20px;
            line-height: 1.4;
            color: var(--color-pay-1);
        }

        .discount-tags__separator {
            width: 1px;
            height: 14px;
            border-left: 1px dashed #FFB2A3;
        }

        /* 
         ========================================
         == 变体 B/C：火车票卡 & 汽车票卡共享样式
         ========================================
        */

        .transport-card--train,
        .transport-card--bus {
            gap: 10px;
        }

        .transport-card--train .sub-info,
        .transport-card--bus .sub-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            color: var(--color-lightgray);
        }

        .transport-card--train .sub-info .separator,
        .transport-card--bus .sub-info .separator {
            width: 1px;
            height: 18px;
            background-color: #E0E0E0;
        }

        .transport-card--train .price-section,
        .transport-card--bus .price-section {
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>

    <!-- ============================== -->
    <!-- 变体 A：机票卡                  -->
    <!-- ============================== -->

    <div class="transport-card-container">

            <div class="card-body">
                <!-- 左侧信息 -->
                <div class="travel-details">
                    <div class="itinerary">
                        <div class="departure">
                            <span class="time">19:00</span>
                            <span class="station">杭州萧山</span>

                        </div>

                            <span class="time">05:09</span>
                            <span class="station">广州白云</span>
                        </div>
                    </div>
                    <!-- 辅助信息：2行 -->
                    <div class="aux-info">
                        <div class="aux-info__row">
                            <svg class="airline-logo" width="25" height="25" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12.5" cy="12.5" r="12.5" fill="#F0F0F0"/>
                                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">CA</text>
                            </svg>

                            <div class="aux-info__separator"></div>
                            <span>空客321(中)</span>

                        </div>
                    </div>
                </div>

                    <div class="price-group">
                        <div class="price-container">

                            <div class="price__current">
                                <span class="price__currency">¥</span>
                                <span class="price__amount">694</span>
                            </div>
                        </div>
                        <div class="discount-tags">
                            <span class="discount-tags__item">优惠名称</span>
                            <div class="discount-tags__separator"></div>
                            <span class="discount-tags__item">优惠¥80</span>
                        </div>
                    </div>
                    <button class="book-button">预订</button>
                </div>
            </div>
        </div>
    </div>

            </div>

            <!-- 内容区 -->
            <div class="card-body">
                <div class="travel-details">
                    <div class="itinerary">
                        <div class="departure">
                            <span class="time">07:30</span>
                            <span class="station">杭州东</span>
                        </div>
                        <div class="duration-line">
                            <span class="duration-text">总2h20m</span>
                            <div class="line-svg-container">

                </div>

            </div>

            <!-- 内容区 -->
            <div class="card-body">
                <div class="travel-details">
