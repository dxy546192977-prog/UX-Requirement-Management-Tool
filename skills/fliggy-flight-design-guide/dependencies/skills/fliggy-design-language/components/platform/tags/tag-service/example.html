<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — tag-service（服务类 / 信息标签）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 48px 24px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-tag-service-demo__title {
  margin: 32px 0 16px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-tag-service-demo__title:first-child {
  margin-top: 0;
}

.fdl-tag-service-demo__row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 16px;
}

/* ========== fdl-tag-service ========== */
.fdl-tag-service {
  --border-color: color-mix(in srgb, var(--color-midgray) 50%, transparent);
  --text-color: var(--color-midgray);
  --bg-color: transparent;

  display: inline-flex;
  justify-content: center;
  align-items: center;
  height: 28px;
  padding: 0 6px;
  border: 1px solid var(--border-color);
  background-color: var(--bg-color);
  color: var(--text-color);
  border-radius: 4px;
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  font-size: 20px;
  line-height: 1.4;
  white-space: nowrap;
}

.fdl-tag-service--primary {
  --border-color: color-mix(in srgb, var(--color-indigo-1) 50%, transparent);
  --text-color: var(--color-indigo-1);
  --bg-color: transparent;
}

.fdl-tag-service--positive {
  --border-color: color-mix(in srgb, var(--color-green-0) 50%, transparent);
  --text-color: var(--color-green-0);
  --bg-color: transparent;
}

.fdl-tag-service--guarantee {
  --border-color: color-mix(in srgb, var(--color-safeguard-5) 50%, transparent);
  --text-color: var(--color-safeguard-5);
  --bg-color: transparent;
}

.fdl-tag-service--with-description {
  border: none;
  background-color: transparent;
  padding: 0;
}

.fdl-tag-service--with-description .fdl-tag-service__main,
.fdl-tag-service--with-description .fdl-tag-service__description {
  display: flex;
  align-items: center;
  height: 100%;
  padding: 0 6px;
  border: 1px solid var(--border-color);
  color: var(--text-color);
  font-size: 20px;
  line-height: 1.4;
}

.fdl-tag-service--with-description .fdl-tag-service__main {
  border-radius: 4px 0 0 4px;
  border-right: none;
}

.fdl-tag-service--primary.fdl-tag-service--with-description .fdl-tag-service__main {
  background-color: color-mix(in srgb, var(--color-indigo-1) 8%, transparent);
}

.fdl-tag-service--positive.fdl-tag-service--with-description .fdl-tag-service__main {
  background-color: color-mix(in srgb, var(--color-green-0) 8%, transparent);
}

.fdl-tag-service--guarantee.fdl-tag-service--with-description .fdl-tag-service__main {
  background-color: color-mix(in srgb, var(--color-safeguard-5) 8%, transparent);
}

.fdl-tag-service--with-description .fdl-tag-service__description {
  background-color: var(--color-white);
  border-radius: 0 4px 4px 0;
  border-left: 1px dashed var(--color-indigo-4);
}
  </style>
</head>
<body>

  <h2 class="fdl-tag-service-demo__title">仅标签</h2>
  <div class="fdl-tag-service-demo__row">
    <span class="fdl-tag-service fdl-tag-service--neutral">无需换票</span>
    <span class="fdl-tag-service fdl-tag-service--primary">无需换票</span>
    <span class="fdl-tag-service fdl-tag-service--positive">无需换票</span>
    <span class="fdl-tag-service fdl-tag-service--guarantee">1小时内快速出票</span>
  </div>

  <h2 class="fdl-tag-service-demo__title">标签 + 描述</h2>
  <div class="fdl-tag-service-demo__row">
    <span class="fdl-tag-service fdl-tag-service--primary fdl-tag-service--with-description">
      <span class="fdl-tag-service__main">无需换票</span>
      <span class="fdl-tag-service__description">10秒出票·出票即用·无需取票</span>
    </span>
  </div>
  <div class="fdl-tag-service-demo__row">
    <span class="fdl-tag-service fdl-tag-service--positive fdl-tag-service--with-description">
      <span class="fdl-tag-service__main">官方直连</span>
      <span class="fdl-tag-service__description">官方授权，品质保障</span>
    </span>
  </div>

</body>
</html>
