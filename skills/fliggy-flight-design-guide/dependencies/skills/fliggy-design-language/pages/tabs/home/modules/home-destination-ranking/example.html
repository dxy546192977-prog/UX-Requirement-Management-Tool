<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 目的地榜单（home-destination-ranking）</title>
  <style>
@font-face {
  font-family: "Fliggy Fonts";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.31/fonts/FliggyFonts-MediumItalicVer0711.ttf") format("truetype");
  font-weight: 500;
  font-style: italic;
  font-display: swap;
}

@font-face {
  font-family: "Fliggy Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-white: #ffffff;
  --color-pay-1: #ff5533;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --radius-m: 12px;
  --radius-l: 24px;
  --color-indigo-1: #6666ff;
  --fdl-home-dest-rank-card-bg: color-mix(in srgb, var(--color-white) 97%, var(--color-bg));
  --fdl-home-dest-rank-h1: linear-gradient(180deg, #c7e4ff 0%, transparent 100%);
  --fdl-home-dest-rank-h2: linear-gradient(180deg, color-mix(in srgb, #d5ffdc 98%, transparent) 0%, transparent 100%);
  --fdl-home-dest-rank-h3: linear-gradient(180deg, #e2e2ff 0%, transparent 100%);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-home-dest-ranking {
  position: relative;
  width: 750px;
  min-height: 473px;
  margin: 0 auto;
  overflow: hidden;
  background: var(--color-white);
}

.fdl-home-dest-ranking__tabs {
  position: relative;
  z-index: 2;
  display: flex;
  height: 80px;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--color-white);
}

.fdl-home-dest-ranking__tab {
  position: relative;
  display: flex;
  width: 160px;
  height: 80px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-dest-ranking__tab:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-home-dest-ranking__tab-text {
  font-family: "Fliggy Fonts", "PingFang SC", sans-serif;
  font-size: 36px;
  font-style: italic;
  font-weight: 500;
  line-height: 1;
  color: var(--color-midgray);
}

.fdl-home-dest-ranking__tab[aria-selected="true"] .fdl-home-dest-ranking__tab-text {
  color: var(--color-darkgray);
}

.fdl-home-dest-ranking__tab[aria-selected="true"]::after {
  position: absolute;
  bottom: 6px;
  width: 54px;
  height: 6px;
  border-radius: 3px;
  background: var(--color-darkgray);
  content: "";
}

.fdl-home-dest-ranking__bubble {
  position: absolute;
  top: 1px;
  right: 58px;
  padding: 4px 6px;
  border-radius: 14px 14px 14px 2px;
  background: var(--color-pay-1);
  font-size: 20px;
  line-height: 1;
  color: var(--color-white);
}

.fdl-home-dest-ranking__scroller {
  display: flex;
  padding: 24px 0 24px 30px;
  gap: 18px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.fdl-home-dest-ranking__card {
  display: flex;
  width: 312px;
  flex-shrink: 0;
  flex-direction: column;
  border-radius: var(--radius-l);
  background: var(--fdl-home-dest-rank-card-bg);
  box-shadow: 0 0 40px color-mix(in srgb, var(--color-darkgray) 8%, transparent);
}

.fdl-home-dest-ranking__card--a .fdl-home-dest-ranking__card-head {
  background: var(--fdl-home-dest-rank-h1);
}

.fdl-home-dest-ranking__card--b .fdl-home-dest-ranking__card-head {
  background: var(--fdl-home-dest-rank-h2);
}

.fdl-home-dest-ranking__card--c .fdl-home-dest-ranking__card-head {
  background: var(--fdl-home-dest-rank-h3);
}

.fdl-home-dest-ranking__card-head {
  position: relative;
  display: flex;
  min-height: 75px;
  align-items: center;
  justify-content: flex-start;
  padding: 18px 36px 18px 18px;
  border-radius: var(--radius-l) var(--radius-l) 0 0;
}

.fdl-home-dest-ranking__card-head h3 {
  margin: 0;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  white-space: nowrap;
}

.fdl-home-dest-ranking__deco {
  width: 13px;
  height: 28px;
  flex-shrink: 0;
}

.fdl-home-dest-ranking__deco img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.fdl-home-dest-ranking__card-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.fdl-home-dest-ranking__chev {
  position: absolute;
  top: 50%;
  right: 18px;
  width: 7px;
  height: 12px;
  margin-top: -6px;
  color: var(--color-midgray);
}

.fdl-home-dest-ranking__card-body {
  padding: 0 18px 18px;
}

.fdl-home-dest-ranking__list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.fdl-home-dest-ranking__item {
  display: flex;
  gap: 12px;
  align-items: center;
  min-height: 84px;
}

.fdl-home-dest-ranking__thumb {
  position: relative;
  width: 84px;
  height: 84px;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: var(--radius-m);
}

.fdl-home-dest-ranking__thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fdl-home-dest-ranking__thumb--shade::after {
  position: absolute;
  inset: 0;
  border-radius: var(--radius-m);
  background: linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--color-darkgray) 40%, transparent) 100%);
  content: "";
  pointer-events: none;
}

.fdl-home-dest-ranking__badge {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  width: 36px;
  height: 44px;
}

.fdl-home-dest-ranking__badge img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.fdl-home-dest-ranking__date {
  position: absolute;
  bottom: 6px;
  left: 0;
  z-index: 3;
  width: 100%;
  font-size: 20px;
  line-height: 1;
  color: var(--color-white);
  text-align: center;
  text-shadow: 0 1px 2px color-mix(in srgb, var(--color-darkgray) 50%, transparent);
}

.fdl-home-dest-ranking__info {
  display: flex;
  min-width: 0;
  flex: 1;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
  overflow: hidden;
}

.fdl-home-dest-ranking__item-title {
  overflow: hidden;
  font-size: 24px;
  font-weight: 500;
  line-height: 1.17;
  color: var(--color-darkgray);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fdl-home-dest-ranking__row-tags {
  display: flex;
  align-items: center;
  gap: 6px;
}

.fdl-home-dest-ranking__pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  padding: 0 6px;
  border-radius: 4px;
  background: var(--color-bg);
  font-size: 20px;
  line-height: 1.4;
  color: var(--color-midgray);
  white-space: nowrap;
}

.fdl-home-dest-ranking__reviews {
  font-size: 20px;
  line-height: 1.4;
  color: var(--color-midgray);
}

.fdl-home-dest-ranking__price {
  display: flex;
  align-items: baseline;
  gap: 2px;
  color: var(--color-pay-1);
}

.fdl-home-dest-ranking__yen {
  font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
  font-size: 24px;
  font-weight: 700;
}

.fdl-home-dest-ranking__num {
  font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
  font-size: 36px;
  font-weight: 700;
  line-height: 0.85;
}

.fdl-home-dest-ranking__suffix {
  margin-left: 3px;
  font-size: 18px;
  line-height: 1.4;
}
  </style>

  var tabs = document.querySelectorAll(".fdl-home-dest-ranking__tab");
  tabs.forEach(function (t) {

      tabs.forEach(function (x) {
        x.setAttribute("aria-selected", "false");
      });
      t.setAttribute("aria-selected", "true");
    });
  });
})();
  </script>
