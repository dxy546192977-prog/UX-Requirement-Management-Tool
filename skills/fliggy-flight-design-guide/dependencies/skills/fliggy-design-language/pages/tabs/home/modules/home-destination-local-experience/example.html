<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 当地体验（home-destination-local-experience）</title>
  <style>
@font-face {
  font-family: "Fliggy Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-white: #ffffff;
  --color-pay-1: #ff5533;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-indigo-1: #6666ff;
  --radius-m: 12px;
  --radius-l: 24px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  padding: 20px 0;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-home-dest-local {
  position: relative;
  max-width: 750px;
  min-height: 920px;
  margin: 0 auto;
  overflow: hidden;
  border-radius: var(--radius-l);
  background: var(--color-white);
  box-shadow: 0 4px 12px color-mix(in srgb, var(--color-darkgray) 12%, transparent);
}

.fdl-home-dest-local__header {
  display: flex;
  height: 50px;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
}

.fdl-home-dest-local__title {
  font-size: 36px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-home-dest-local__more {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: inherit;
}

.fdl-home-dest-local__more-text {
  font-size: 24px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-home-dest-local__more:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-home-dest-local__nav-wrap {
  position: relative;
  margin-top: 2px;
}

.fdl-home-dest-local__nav-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.fdl-home-dest-local__nav-scroll::-webkit-scrollbar {
  display: none;
}

.fdl-home-dest-local__nav {
  display: flex;
  align-items: flex-end;
  padding: 0 0 8px 30px;
  gap: 18px;
}

.fdl-home-dest-local__cat {
  position: relative;
  display: flex;
  width: 140px;
  height: 140px;
  flex-shrink: 0;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  border-radius: var(--radius-m);
  background: var(--color-label) center / cover no-repeat;
  cursor: pointer;
}

.fdl-home-dest-local__cat::before {
  position: absolute;
  inset: 0;
  border-radius: var(--radius-m);
  background: linear-gradient(180deg, transparent 50%, color-mix(in srgb, var(--color-darkgray) 50%, transparent) 100%);
  content: "";
  pointer-events: none;
}

.fdl-home-dest-local__cat-label {
  position: relative;
  z-index: 1;
  padding-bottom: 10px;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-white);
  text-align: center;
}

.fdl-home-dest-local__cat--active {
  border: 3px solid var(--color-indigo-1);
}

.fdl-home-dest-local__cat--active .fdl-home-dest-local__cat-label-wrap {
  position: absolute;
  top: 84px;
  right: 3px;
  left: 3px;
  display: flex;
  height: 53px;
  align-items: center;
  justify-content: center;
  border-radius: 9px;
  background: var(--color-white);
}

.fdl-home-dest-local__cat--active .fdl-home-dest-local__cat-label {
  padding-bottom: 0;
  color: var(--color-indigo-1);
}

.fdl-home-dest-local__pointer {
  position: absolute;
  bottom: 0;
  left: 91px;
  width: 18px;
  height: 8px;
  background: var(--color-indigo-1);
  clip-path: polygon(50% 100%, 0 0, 100% 0);
}

.fdl-home-dest-local__list {
  margin-top: 12px;
  padding-bottom: 96px;
}

.fdl-home-dest-local__card {
  display: flex;
  padding: 12px 30px;
  gap: 12px;
}

.fdl-home-dest-local__img {
  position: relative;
  width: 160px;
  flex-shrink: 0;
  overflow: hidden;
  border-radius: var(--radius-m);
  background: var(--color-label) center / cover no-repeat;
}

.fdl-home-dest-local__img--tall {
  height: 210px;
}

.fdl-home-dest-local__img--short {
  height: 170px;
}

.fdl-home-dest-local__img-tag {
  position: absolute;
  top: 0;
  left: 0;
  padding: 6px;
  border-radius: var(--radius-m) 0 0 0;
  background: color-mix(in srgb, var(--color-darkgray) 70%, transparent);
  font-size: 20px;
  line-height: 24px;
  color: var(--color-white);
}

.fdl-home-dest-local__detail {
  display: flex;
  width: 518px;
  min-height: 204px;
  flex-direction: column;
  justify-content: space-between;
}

.fdl-home-dest-local__card--short .fdl-home-dest-local__detail {
  min-height: 164px;
}

.fdl-home-dest-local__ptitle {
  display: -webkit-box;
  max-height: 78px;
  overflow: hidden;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.fdl-home-dest-local__tags {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}

.fdl-home-dest-local__tag-ico {
  width: 42px;
  height: 28px;
  flex-shrink: 0;
  object-fit: contain;
}

.fdl-home-dest-local__tag-txt {
  flex: 1;
  overflow: hidden;
  font-size: 24px;
  line-height: 28px;
  color: var(--color-darkgray);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fdl-home-dest-local__card--short .fdl-home-dest-local__tags {
  display: none;
}

.fdl-home-dest-local__foot {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: auto;
}

.fdl-home-dest-local__sales {
  font-size: 24px;
  line-height: 1.4;
  color: var(--color-lightgray);
}

.fdl-home-dest-local__price-block {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

.fdl-home-dest-local__price {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  color: var(--color-pay-1);
}

.fdl-home-dest-local__yen {
  font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
  font-size: 24px;
  font-weight: 700;
  line-height: 28px;
}

.fdl-home-dest-local__amt {
  font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
  font-size: 42px;
  font-weight: 700;
  line-height: 42px;
}

.fdl-home-dest-local__suf {
  font-size: 24px;
  line-height: 28px;
}

.fdl-home-dest-local__discount {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 28px;
  padding: 0 6px;
  border-radius: 4px;
  background: linear-gradient(90deg, color-mix(in srgb, var(--color-pay-1) 4%, var(--color-white)) 0%, color-mix(in srgb, var(--color-pay-1) 4%, var(--color-white)) 100%);
  font-size: 20px;
  line-height: 1.4;
  color: var(--color-pay-1);
}

.fdl-home-dest-local__load {
  position: absolute;
  bottom: 0;
  left: 0;
  display: flex;
  width: 100%;
  height: 96px;
  align-items: center;
  justify-content: center;
  background: var(--color-white);
}

.fdl-home-dest-local__load-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 224px;
  height: 60px;
  padding: 12px 48px;
  border: none;
  border-radius: 30px;
  background: var(--color-label);
  font-family: inherit;
  font-size: 26px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-indigo-1);
  cursor: pointer;
}

.fdl-home-dest-local__load-btn:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}
  </style>
</head>
<body>
