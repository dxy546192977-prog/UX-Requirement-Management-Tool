<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 目的地金刚区（home-destination-kingkong）</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-white: #ffffff;
  --color-bg: #f2f3f5;
  --color-indigo-1: #6666ff;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-home-dest-kingkong {
  box-sizing: border-box;
  display: flex;
  max-width: 750px;
  flex-direction: column;
  align-items: center;
  margin: 0 auto;
  padding: 24px 30px;
  gap: 24px;
  background: var(--color-white);
}

.fdl-home-dest-kingkong__row {
  display: flex;
  width: 100%;
  flex-direction: row;
  justify-content: space-between;
}

.fdl-home-dest-kingkong__item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--color-darkgray);
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-dest-kingkong__item:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-home-dest-kingkong__icon-wrap {
  display: flex;
  width: 120px;
  height: 120px;
  align-items: center;
  justify-content: center;
}

.fdl-home-dest-kingkong__icon-wrap img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.fdl-home-dest-kingkong__label {
  font-size: 22px;
  font-weight: 400;
  line-height: 1.4;
  text-align: center;
  white-space: nowrap;
}
  </style>
</head>
<body>

document.querySelectorAll('.fdl-home-dest-kingkong a[href="#"]').forEach(function (a) {

</html>
