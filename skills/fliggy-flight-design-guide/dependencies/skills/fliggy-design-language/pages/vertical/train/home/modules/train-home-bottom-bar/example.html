<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车票首页 — 火车票底 bar</title>
    <style>
        /* 预览环境样式 */
        body {
            margin: 0;
            padding: 0;
            background-color: #F7F8FA;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 100vh;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ================================================
         == 火车票底bar组件 (Tab Bar)
         ================================================
         火车票首页底部固定导航栏，包含5个Tab项和底部安全区。
        */

        /* 底bar外容器 */
        .tab-bar-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 0px;
            position: relative;
            width: 750px;
            height: 150px;
            background: #FFFFFF;
        }

        /* Tab行 */
        .tab-bar {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            width: 750px;
            height: 86px;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 单个Tab项 */
        .tab-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 0px 0px;
            gap: 6px;
            isolation: isolate;
            width: 150px;
            max-width: 150px;
            height: 86px;
            flex: none;
            flex-grow: 0;
            box-sizing: border-box;
        }

        /* Tab图标 */
        .tab-icon {
            width: 48px;
            height: 48px;
            flex: none;
            order: 0;
            flex-grow: 0;
            flex-shrink: 0;
        }

        .tab-icon img {
            width: 48px;
            height: 48px;
            display: block;
        }

        /* Tab文字 */
        .tab-text {
            width: 150px;
            height: 20px;
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 20px;
            line-height: 100%;
            text-align: center;
            color: #0F131A;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }

        /* iPhone底部安全区 */
        .safe-area {
            width: 750px;
            height: 64px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Home Indicator */
        .home-indicator {
            width: 268px;
            height: 10px;
            background: #000000;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="tab-bar-container">
        <!-- Tab行 -->
        <div class="tab-bar">
            <!-- Tab1: 12306账号 -->
            <div class="tab-item">
                <div class="tab-icon">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01mO0AJo1t9w4sfDWcV_!!6000000005860-2-tps-96-96.png" alt="12306账号">
                </div>
                <span class="tab-text">12306账号</span>
            </div>
            <!-- Tab2: 抢票 -->
            <div class="tab-item">
                <div class="tab-icon">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01YDeizb1THYevF9IiT_!!6000000002357-2-tps-96-96.png" alt="抢票">
                </div>
                <span class="tab-text">抢票</span>
            </div>
            <!-- Tab3: 电子发票 -->
            <div class="tab-item">
                <div class="tab-icon">
                    <img src="https://gw.alicdn.com/imgextra/i4/O1CN01einTYH1NodZPwopCl_!!6000000001617-2-tps-96-96.png" alt="电子发票">
                </div>
                <span class="tab-text">电子发票</span>
            </div>
            <!-- Tab4: 车站大屏 -->
            <div class="tab-item">
                <div class="tab-icon">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01RXL9Ci1ZqGMhyFeNw_!!6000000003245-2-tps-96-96.png" alt="车站大屏">
                </div>
                <span class="tab-text">车站大屏</span>
            </div>
            <!-- Tab5: 我的订单 -->
            <div class="tab-item">
                <div class="tab-icon">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01BtI3AB1VCddVJuuCU_!!6000000002617-2-tps-96-96.png" alt="我的订单">
                </div>
                <span class="tab-text">我的订单</span>
            </div>
        </div>

        <!-- iPhone底部安全区 -->
        <div class="safe-area">
            <div class="home-indicator"></div>
        </div>
    </div>

</body>
</html>
