<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车票首页 — 优惠专区</title>
    <style>
        /* 预览环境样式 */
        body {
            margin: 0;
            padding: 50px 20px;
            background-color: #F7F8FA;
            display: flex;
            justify-content: center;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ================================================
         == 优惠专区组件
         ================================================
         火车票首页优惠信息展示区域。
         包含标题栏和横向排列的优惠模块图片。
         三个模块固定宽高尺寸，具体内容由配置规范决定，
         由多个图片组成，HTML 示例仅示意图片组合后的效果。
        */

        /* 组件容器 */
        .promotion-container {
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 18px 24px 24px;
            gap: 10px;
            isolation: isolate;
            position: relative;
            width: 702px;
            height: 267px;
            background: #FFFFFF;
            border: 2px solid #FFFFFF;
            border-radius: 18px;
        }

        /* 内容区 Frame 591 */
        .promotion-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            gap: 18px;
            width: 654px;
            height: 225px;
            flex: none;
            order: 0;
            flex-grow: 0;
            z-index: 0;
        }

        /* 标题行 Frame 593 */
        .promotion-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0px;
            width: 654px;
            height: 45px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 标题文字容器 Frame 1312318199 */
        .promotion-title-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 12px;
            width: 235px;
            height: 45px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 标题文字 */
        .promotion-title {
            width: 235px;
            height: 45px;
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 500;
            font-size: 32px;
            line-height: 140%;
            color: #0F131A;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 更多优惠（默认隐藏） Frame 579 */
        .promotion-more {
            display: none;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 6px;
            width: 109px;
            height: 24px;
            flex: none;
            order: 1;
            flex-grow: 0;
        }

        .promotion-more-text {
            width: 96px;
            height: 24px;
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 24px;
            line-height: 100%;
            color: #5C5F66;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        .promotion-more-arrow {
            width: 7px;
            height: 12px;
            flex: none;
            order: 1;
            flex-grow: 0;
        }

        .promotion-more-arrow svg {
            display: block;
            width: 7px;
            height: 12px;
        }

        /* 图片列表行 Frame 590 */
        .promotion-cards {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0px;
            gap: 12px;
            width: 654px;
            height: 162px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 优惠模块图片 - 第一张（大图） */
        .promotion-card-large {
            width: 270px;
            height: 162px;
            border-radius: 12px;
            flex: none;
            order: 0;
            flex-grow: 0;
            overflow: hidden;
        }

        .promotion-card-large img {
            width: 270px;
            height: 162px;
            display: block;
            object-fit: cover;
        }

        /* 优惠模块图片 - 小图 */
        .promotion-card-small {
            width: 180px;
            height: 160px;
            border-radius: 12px;
            flex: none;
            flex-grow: 0;
            overflow: hidden;
        }

        .promotion-card-small img {
            width: 180px;
            height: 160px;
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="promotion-container">
        <div class="promotion-inner">
            <!-- 标题行 -->
            <div class="promotion-header">
                <div class="promotion-title-wrapper">
                    <span class="promotion-title">找优惠 帮你省钱</span>
                </div>
                <!-- 更多优惠（默认隐藏） -->
                <div class="promotion-more">
                    <span class="promotion-more-text">更多优惠</span>
                    <div class="promotion-more-arrow">
                        <svg viewBox="0 0 7 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L6 6L1 11" stroke="#D2D4D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- 图片列表行 -->
            <div class="promotion-cards">
                <!-- 第一张大图 270×162 -->
                <div class="promotion-card-large">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01sdQ5U11m5Ae9pmXAn_!!6000000004902-2-tps-540-324.png" alt="优惠模块1">
                </div>
                <!-- 第二张小图 180×160 -->
                <div class="promotion-card-small">
                    <img src="https://gw.alicdn.com/imgextra/i1/O1CN012srpN71CDZkOjrXaX_!!6000000000047-2-tps-360-320.png" alt="优惠模块2">
                </div>
                <!-- 第三张小图 180×160 -->
                <div class="promotion-card-small">
                    <img src="https://gw.alicdn.com/imgextra/i3/O1CN01GP0Zbr29nM19L2qHL_!!6000000008112-2-tps-360-320.png" alt="优惠模块3">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
