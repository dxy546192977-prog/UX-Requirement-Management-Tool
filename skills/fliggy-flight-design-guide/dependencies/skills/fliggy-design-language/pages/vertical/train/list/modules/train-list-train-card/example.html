<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>火车票列表 — 车次卡片</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      min-height: 100vh;
    }
    .preview-label {
      font-size: 12px;
      color: #919499;
      margin-bottom: 8px;
      width: 375px;
    }
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-display: swap;
    }
  </style>
</head>
<body>
<p class="preview-label">含 train-tag / small-label / train-seat / train-price</p>
<!-- ==================== 子组件定义 ==================== -->
<script>
/* TrainTag - 原始组件 */
class TrainTag extends HTMLElement {
  static get observedAttributes() { return ['variant', 'text']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const variant = this.getAttribute('variant') || 'positive';
    const text = this.getAttribute('text') || '';
    const isPositive = variant === 'positive';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; }
        .tag { display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; height: 14px; border-radius: 2px; font-size: 10px; line-height: 14px; font-family: 'PingFang SC', sans-serif; white-space: nowrap; background: ${isPositive ? '#e7f5f6' : '#fff2ef'}; color: ${isPositive ? '#149aa8' : '#ff5533'}; }
      </style>
      <span class="tag">${text}</span>`;
  }
}
customElements.define('train-tag', TrainTag);

/* SmallLabel - 原始组件 */
class SmallLabel extends HTMLElement {
  static get observedAttributes() { return ['text']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const text = this.getAttribute('text') || '';
    const isLong = text.length > 1;
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; }
        .label { display: inline-flex; align-items: center; justify-content: center; height: 12px; padding: 0 ${isLong ? '2px' : '0'}; min-width: 12px; border: 0.5px solid rgba(145, 148, 153, 0.5); border-radius: 2px; font-size: 8px; line-height: 11px; color: #919499; font-family: 'PingFang SC', sans-serif; }
      </style>
      <span class="label">${text}</span>`;
  }
}
customElements.define('small-label', SmallLabel);

/* TrainSeat - 原始组件（横排：level + 有票/无票/抢） */
class TrainSeat extends HTMLElement {
  static get observedAttributes() { return ['level', 'status']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const level = this.getAttribute('level') || '二等';
    const status = this.getAttribute('status') || 'available';
    const statusConfig = {
      available: { text: '有票', color: '#149aa8' },
      unavailable: { text: '无票', color: '#919499' },
      grab: { text: '抢', color: '#ff5533' }
    };
    const config = statusConfig[status] || statusConfig.available;
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; align-items: baseline; white-space: nowrap; }
        .level { font-size: 11px; line-height: 15.5px; color: #5c5f66; font-family: 'PingFang SC', sans-serif; }
        .status { font-size: 11px; line-height: 15.5px; color: ${config.color}; font-family: 'PingFang SC', sans-serif; margin-left: 3px; }
      </style>
      <span class="level">${level}</span><span class="status">${config.text}</span>`;
  }
}
customElements.define('train-seat', TrainSeat);

/* TrainPrice - 原始组件（红色价格） */
class TrainPrice extends HTMLElement {
  static get observedAttributes() { return ['price']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const price = this.getAttribute('price') || '456';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .price-row { display: flex; align-items: baseline; line-height: 1; }
        .yen { font-family: 'Fliggy Sans 102', sans-serif; font-size: 12px; font-weight: 700; color: #ff5533; line-height: 12px; }
        .amount { font-family: 'Fliggy Sans 102', sans-serif; font-size: 21px; color: #ff5533; line-height: 13.5px; }
      </style>
      <div class="price-row"><span class="yen">¥</span><span class="amount">${price}</span></div>`;
  }
}
customElements.define('train-price', TrainPrice);
</script>

<!-- ==================== ListingTrainCard ==================== -->
<script>
class ListingTrainCard extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  getAttr(n, f='') { return this.getAttribute(n) || f; }
  hasAttr(n) { return this.hasAttribute(n); }

  calcDuration(dep, arr) {
    const [dh, dm] = dep.split(':').map(Number);
    const [ah, am] = arr.split(':').map(Number);
    let d = dh * 60 + dm, a = ah * 60 + am;
    if (a < d) a += 1440;
    const diff = a - d, h = Math.floor(diff / 60), m = diff % 60;
    if (h === 0) return `${m}分`;
    if (m === 0) return `${h}时`;
    return `${h}时${m}分`;
  }

  renderTrainInfoTags() {
    const tags = [];
    if (this.hasAttr('show-berth-tag')) tags.push('卧');
    if (this.hasAttr('show-fuxing-tag')) tags.push('复兴号');
    if (this.hasAttr('show-points-tag')) tags.push('积分');
    if (this.hasAttr('show-smart-tag')) tags.push('智能动车');
    return tags.map(t => `<small-label text="${t}"></small-label>`).join('');
  }

  render() {
    const depTime = this.getAttr('departure-time', '09:00');
    const arrTime = this.getAttr('arrival-time', '13:22');
    const depStation = this.getAttr('departure-station', '杭州东');
    const arrStation = this.getAttr('arrival-station', '北京南');
    const trainNum = this.getAttr('train-number', 'G1');
    const duration = this.calcDuration(depTime, arrTime);
    const showStart = this.hasAttr('show-start');
    const showEnd = this.hasAttr('show-end');
    const showTag1 = this.hasAttr('show-tag1');
    const showTag2 = this.hasAttr('show-tag2');
    const price = this.getAttr('price', '456');
    const hasTags = showTag1 || showTag2;
    const trainInfoTags = this.renderTrainInfoTags();

    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; width: 375px; font-family: 'PingFang SC', sans-serif; }
        .card { background: #fff; }
        .card-body { padding: 0 15px 15px; }
        .top-spacer { height: 15px; }
        .top-area { display: flex; align-items: flex-start; justify-content: space-between; padding-bottom: 9px; font-size: 0; line-height: 0; }
        .top-tags { display: flex; gap: 3px; align-items: flex-start; font-size: 0; line-height: 0; }
        .trip-price-row { display: flex; align-items: flex-start; justify-content: space-between; }
        .trip-section { display: flex; align-items: center; justify-content: space-between; width: 240px; flex-shrink: 0; }
        .od-item { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; width: 75px; gap: 4px; }
        .od-item.arrival { align-items: flex-end; }
        .od-time { font-family: 'Fliggy Sans 102', sans-serif; font-size: 21px; line-height: 16px; color: #0f131a; }
        .od-station-row { display: flex; align-items: center; gap: 3px; }
        .od-station { font-size: 12px; line-height: 17px; color: #0f131a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
        .train-info { display: flex; flex-direction: column; align-items: center; width: 78px; gap: 1px; flex-shrink: 0; }
        .train-duration { font-size: 10px; line-height: 14px; color: #5c5f66; text-align: center; }
        .train-arrow { width: 75px; height: 7px; }
        .train-number-row { display: flex; align-items: center; justify-content: center; gap: 2px; flex-wrap: wrap; max-width: 78px; }
        .train-number-text { font-size: 10px; line-height: 14px; color: #5c5f66; text-align: center; }
        .price-section { flex-shrink: 0; display: flex; align-items: flex-start; padding-top: 2px; }
        .seat-section { margin-top: 12px; }
        .seat-row { display: flex; align-items: baseline; }
        .seat-left-group { display: flex; width: 240px; flex-shrink: 0; gap: 6px; }
        .seat-slot-1 { width: 76px; flex: none; display: flex; justify-content: flex-start; }
        .seat-slot-2 { width: 76px; flex: none; display: flex; justify-content: center; }
        .seat-slot-3 { width: 76px; flex: none; display: flex; justify-content: flex-end; }
        .seat-slot-4 { margin-left: auto; display: flex; justify-content: flex-end; }
      </style>
      <div class="card">
        <div class="card-body">
          ${hasTags ? `<div class="top-area"><div class="top-tags">
            ${showTag1 ? `<train-tag variant="${this.getAttr('tag1-variant', 'positive')}" text="${this.getAttr('tag1-text', '')}"></train-tag>` : ''}
            ${showTag2 ? `<train-tag variant="${this.getAttr('tag2-variant', 'emphasis')}" text="${this.getAttr('tag2-text', '')}"></train-tag>` : ''}
          </div></div>` : '<div class="top-spacer"></div>'}
          <div class="trip-price-row">
            <div class="trip-section">
              <div class="od-item">
                <span class="od-time">${depTime}</span>
                <div class="od-station-row">
                  <span class="od-station">${depStation}</span>
                  ${showStart ? '<small-label text="始"></small-label>' : ''}
                </div>
              </div>
              <div class="train-info">
                <span class="train-duration">${duration}</span>
                <svg class="train-arrow" viewBox="0 0 150 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path opacity="0.1" d="M0 7C0 5.89543 0.895431 5 2 5H142V9H2C0.895432 9 0 8.10457 0 7Z" fill="#0F131A"/>
                  <g clip-path="url(#ac${trainNum})"><path opacity="0.1" d="M143.653 2.42344C143.004 1.86514 142 2.32565 142 3.18113V9H148.595C149.522 9 149.95 7.84743 149.247 7.24231L143.653 2.42344Z" fill="#0F131A"/></g>
                  <defs><clipPath id="ac${trainNum}"><rect width="8" height="8" fill="white" transform="translate(142 1)"/></clipPath></defs>
                </svg>
                <div class="train-number-row">
                  <span class="train-number-text">${trainNum}</span>
                  ${trainInfoTags}
                </div>
              </div>
              <div class="od-item arrival">
                <span class="od-time">${arrTime}</span>
                <div class="od-station-row">
                  ${showEnd ? '<small-label text="终"></small-label>' : ''}
                  <span class="od-station">${arrStation}</span>
                </div>
              </div>
            </div>
            <div class="price-section">
              <train-price price="${price}"></train-price>
            </div>
          </div>
          <div class="seat-section">
            <div class="seat-row">
              <div class="seat-left-group">
                <div class="seat-slot-1"><slot name="seat1"></slot></div>
                <div class="seat-slot-2"><slot name="seat2"></slot></div>
                <div class="seat-slot-3"><slot name="seat3"></slot></div>
              </div>
              <div class="seat-slot-4"><slot name="seat4"></slot></div>
            </div>
          </div>
        </div>
      </div>`;
  }
}
customElements.define('listing-train-card', ListingTrainCard);
</script>
<div style="width:375px;background:#fff;">
<listing-train-card departure-time="07:22" arrival-time="12:48" departure-station="郑州东" arrival-station="杭州东" train-number="G1965" price="538" show-fuxing-tag>
  <train-seat slot="seat1" level="二等" status="available"></train-seat>
  <train-seat slot="seat2" level="一等" status="available"></train-seat>
  <train-seat slot="seat3" level="商务" status="grab"></train-seat>
  <train-seat slot="seat4" level="无座" status="grab"></train-seat>
</listing-train-card>
</div>
</body>
</html>
