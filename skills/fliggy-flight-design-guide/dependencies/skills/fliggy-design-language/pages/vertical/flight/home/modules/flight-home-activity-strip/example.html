<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>机票首页 — 活动长图</title>
  <style>
    :root {
      --color-bg: #f2f3f5;
      --radius-card: 18px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "PingFang SC", "SimHei", sans-serif;
      background: var(--color-bg);
      width: 750px;
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    .fdl-flight-home-activity-strip {
      width: 702px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }
    .fdl-flight-home-activity-strip__img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius-card);
    }
  </style>
</head>
<body>
  <section class="fdl-flight-home-activity-strip" aria-label="活动长图">
    <img
      class="fdl-flight-home-activity-strip__img"
      src="https://gw.alicdn.com/imgextra/i2/O1CN01EiEEPH1WJL2pZ72RH_!!6000000002767-2-tps-1404-8804.png"
      alt="特价机票活动"
    />
    <img
      class="fdl-flight-home-activity-strip__img"
      src="https://gw.alicdn.com/imgextra/i4/O1CN01MJHsqJ27fRwzg28G7_!!6000000007824-2-tps-1500-320.png"
      alt="安心租"
    />
  </section>
</body>
</html>
