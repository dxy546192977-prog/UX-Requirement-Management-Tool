<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>头图画廊 · vacation-detail-hero-gallery</title>
  <style>
    body { margin: 0; background: #F2F3F5; display: flex; justify-content: center; font-family: -apple-system, 'PingFang SC', sans-serif; }
    .product-gallery {
      position: relative;
      width: 750px;
      height: 750px;
      overflow: hidden;
      background: #e0e0e0;
      user-select: none;
      -webkit-user-drag: none;
    }
    .slider-wrapper {
      display: flex;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }
    .slider-slide {
      width: 750px;
      height: 750px;
      flex-shrink: 0;
    }
    .slider-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gradient-overlay {
      position: absolute;
      width: 750px;
      height: 120px;
      left: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.15) 100%);
      z-index: 1;
      pointer-events: none;
    }
    .slider-counter {
      position: absolute;
      bottom: 20px;
      right: 24px;
      z-index: 2;
      padding: 5px 15px;
      background-color: rgba(0, 0, 0, 0.4);
      color: #FFFFFF;
      font-size: 24px;
      border-radius: 20px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="product-gallery" id="productGallery">
    <div class="slider-wrapper">
      <div class="slider-slide"><img src="https://picsum.photos/id/102/750/750" alt="1"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/103/750/750" alt="2"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/104/750/750" alt="3"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/105/750/750" alt="4"></div>
    </div>
    <div class="gradient-overlay"></div>
    <div class="slider-counter"><span id="currentSlide">1</span>/<span id="totalSlides">4</span></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var gallery = document.getElementById('productGallery');
      var wrapper = gallery.querySelector('.slider-wrapper');
      var slides = gallery.querySelectorAll('.slider-slide');
      var currentSlideEl = document.getElementById('currentSlide');
      var totalSlidesEl = document.getElementById('totalSlides');
      var currentIndex = 0;
      var totalSlides = slides.length;
      var slideWidth = 750;
      totalSlidesEl.textContent = totalSlides;
      wrapper.style.width = (totalSlides * slideWidth) + 'px';
      var startX = 0, isDragging = false, diffX = 0;
      function goToSlide(index) {
        if (index < 0) index = 0;
        if (index >= totalSlides) index = totalSlides - 1;
        wrapper.style.transition = 'transform 0.5s ease-in-out';
        wrapper.style.transform = 'translateX(-' + (index * slideWidth) + 'px)';
        currentIndex = index;
        currentSlideEl.textContent = String(currentIndex + 1);
      }
      gallery.addEventListener('touchstart', function (e) {
        isDragging = true;
        startX = e.touches[0].clientX;
        wrapper.style.transition = 'none';
      });
      gallery.addEventListener('touchmove', function (e) {
        if (!isDragging) return;
        diffX = e.touches[0].clientX - startX;
        wrapper.style.transform = 'translateX(-' + (currentIndex * slideWidth - diffX) + 'px)';
      });
      gallery.addEventListener('touchend', function () {
        if (!isDragging) return;
        isDragging = false;
        var threshold = 50;
        if (Math.abs(diffX) > threshold) {
          goToSlide(diffX > 0 ? currentIndex - 1 : currentIndex + 1);
        } else {
          goToSlide(currentIndex);
        }
        diffX = 0;
      });
    });
  </script>
</body>
</html>
