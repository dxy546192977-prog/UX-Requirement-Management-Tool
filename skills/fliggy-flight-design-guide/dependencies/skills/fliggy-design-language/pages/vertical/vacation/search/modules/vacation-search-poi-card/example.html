<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>POI 卡 · vacation-search-poi-card</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', sans-serif; background: #F2F3F5; padding: 24px 0; display: flex; justify-content: center; }
    .poi-card {
      box-sizing: border-box;
      display: flex;
      gap: 18px;
      width: 750px;
      padding: 9px 18px;
      background: #FFF;
    }
    .poi-card__image {
      flex-shrink: 0;
      width: 226px;
      height: 266px;
      background: url('https://picsum.photos/id/1018/226/266') center/cover no-repeat;
      border-radius: 12px;
    }
    .poi-card__info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 6px 0;
      min-width: 0;
    }
    .info-main { display: flex; flex-direction: column; gap: 8px; }
    .poi-card__title {
      margin: 0;
      font-size: 30px;
      font-weight: 500;
      line-height: 42px;
      color: #0F131A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .poi-card__meta { display: flex; align-items: center; gap: 12px; font-size: 24px; line-height: 32px; color: #0F131A; }
    .rating { display: flex; align-items: center; gap: 6px; }
    .rating__score {
      display: inline-block;
      padding: 0 6px;
      background: #6666FF;
      border-radius: 8px;
      font-family: 'Alibaba Sans 102', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: #FFF;
      line-height: 28px;
    }
    .rating__text { font-weight: 600; color: #6666FF; }
    .meta__separator { width: 1px; height: 24px; background: #D2D4D9; }
    .poi-card__subtitle { margin: 4px 0 0; font-size: 24px; line-height: 32px; color: #5C5F66; }
    .highlight-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .highlight-tag {
      display: flex;
      align-items: center;
      height: 28px;
      padding: 0 8px;
      background: #FEF5EC;
      border-radius: 4px;
      font-size: 20px;
      line-height: 28px;
      color: #805540;
    }
    .service-tags { display: flex; gap: 6px; margin-top: 4px; }
    .service-tag {
      box-sizing: border-box;
      padding: 4px 6px;
      height: 28px;
      border: 1px solid rgba(92, 95, 102, 0.5);
      border-radius: 4px;
      font-size: 20px;
      line-height: 20px;
      color: #5C5F66;
    }
    .info-footer { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .price { display: flex; align-items: baseline; gap: 2px; color: #FF5533; }
    .price__currency { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 24px; }
    .price__amount { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 42px; line-height: 1; }
    .price__suffix { font-size: 24px; color: #FF5533; }
    .discount-bar {
      display: flex;
      align-items: center;
      padding: 2px 6px;
      gap: 6px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, #FFE6E0 100%);
      border-radius: 4px;
      font-size: 20px;
      line-height: 24px;
      color: #FF5533;
    }
    .discount-bar__separator { width: 1px; height: 14px; border-left: 1px dashed #FFB2A3; }
  </style>
</head>
<body>
  <article class="poi-card">
    <div class="poi-card__image" role="img" aria-label="POI 配图"></div>
    <div class="poi-card__info">
      <div class="info-main">
        <h3 class="poi-card__title">北京环球度假区</h3>
        <div class="poi-card__meta">
          <div class="rating">
            <span class="rating__score">4.8</span>
            <span class="rating__text">很好</span>
            <span>314条点评</span>
          </div>
          <div class="meta__separator"></div>
          <span>距你3.7公里</span>
        </div>
        <p class="poi-card__subtitle">坐霸天虎过山车，体验魔法世界</p>
        <div class="highlight-tags">
          <div class="highlight-tag">🏆 北京网红打卡榜·第1名</div>
          <div class="highlight-tag">🔥 1.2万人感兴趣</div>
        </div>
        <div class="service-tags"><span class="service-tag">可订今日</span></div>
      </div>
      <div class="info-footer">
        <div class="price">
          <span class="price__currency">¥</span>
          <span class="price__amount">200</span>
          <span class="price__suffix">起</span>
        </div>
        <div class="discount-bar">
          <span>优惠¥50</span>
          <div class="discount-bar__separator"></div>
          <span>领券</span>
        </div>
      </div>
    </div>
  </article>
</body>
</html>
