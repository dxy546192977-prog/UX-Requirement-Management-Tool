<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>商详吸顶导航 · vacation-detail-sticky-nav</title>
  <style>
    :root {
      --nav-h: 176px;
      --status-h: 88px;
      --bar-h: 88px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'SF Pro', 'PingFang SC', sans-serif;
      min-height: 240vh;
      background: linear-gradient(180deg, #1a1a2e 0%, #4a4a6a 40%, #F2F3F5 40%);
    }
    .demo-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 714px;
      padding: 12px 18px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 22px;
      border-radius: 12px;
      z-index: 5;
      text-align: center;
    }
    .detail-top-nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 750px;
      height: var(--nav-h);
      z-index: 20;
      transition: background 0.2s ease;
    }
    .detail-top-nav::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    .detail-top-nav.is-scrolled {
      background: #FFFFFF;
      box-shadow: 0 1px 0 rgba(210,212,217,0.6);
    }
    .detail-top-nav.is-scrolled::before {
      opacity: 0;
    }
    .status-bar {
      position: relative;
      width: 750px;
      height: var(--status-h);
    }
    .status-bar__time {
      position: absolute;
      left: 48px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 590;
      font-size: 28px;
      color: #FFFFFF;
      transition: color 0.2s ease;
    }
    .detail-top-nav.is-scrolled .status-bar__time {
      color: #0F131A;
    }
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      width: 750px;
      height: var(--bar-h);
    }
    .nav-row__action {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      color: #FFFFFF;
      transition: color 0.2s ease;
    }
    .detail-top-nav.is-scrolled .nav-row__action {
      color: #0F131A;
    }
    .nav-row__actions-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }
    .nav-row__action svg path {
      fill: currentColor;
    }
  </style>
</head>

  <p class="demo-hint">向下滚动页面，滚过 180px 后顶栏变白、图标变深色</p>
  <script>
    (function () {
      var nav = document.getElementById('topNav');
      var TH = 180;
      function onScroll() {
        nav.classList.toggle('is-scrolled', window.scrollY >= TH);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
