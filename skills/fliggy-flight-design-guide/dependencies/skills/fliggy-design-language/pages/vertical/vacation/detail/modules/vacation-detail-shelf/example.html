<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>商详货架 · vacation-detail-shelf</title>
  <style>
    body { background: #F2F3F5; margin: 0; padding: 24px 18px; display: flex; justify-content: center; font-family: 'PingFang SC', 'Fliggy Sans 102', sans-serif; }
    a { text-decoration: none; color: inherit; }
    .package-list-module { box-sizing: border-box; width: 714px; background: #FFF; border-radius: 12px; display: flex; flex-direction: column; }
    .module-header { display: flex; justify-content: space-between; align-items: center; padding: 30px 24px; }
    .module-header__title { font-weight: 500; font-size: 36px; line-height: 44px; color: #0F131A; margin: 0; }
    .module-header__subtitle { display: flex; justify-content: space-between; align-items: center; padding: 0 24px 24px; font-size: 24px; line-height: 24px; border-bottom: 1px solid #F1F2F4; }
    .module-header__subtitle-text { color: #6666FF; }
    .module-header__subtitle-link { font-weight: 500; color: #0F131A; display: flex; align-items: center; gap: 4px; }
    .package-items { display: flex; flex-direction: column; }
    .package-item { display: flex; justify-content: space-between; padding: 24px; box-sizing: border-box; }
    .package-item:not(:last-child) { border-bottom: 1px solid #F1F2F4; }
    .item-info { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
    .item-info__title { font-weight: 500; font-size: 30px; line-height: 36px; color: #0F131A; margin: 0; }
    .item-info__description { font-size: 24px; line-height: 24px; color: #5C5F66; margin: 0; }
    .item-info__tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { padding: 2px 6px; border: 1px solid rgba(92,95,102,0.5); border-radius: 4px; font-size: 20px; line-height: 20px; color: #5C5F66; }
    .tag--blue { border-color: rgba(102,102,255,0.5); color: #6666FF; }
    .item-info__details-link { font-weight: 500; font-size: 22px; line-height: 34px; color: #0F131A; display: flex; align-items: center; gap: 4px; margin-top: 8px; }
    .item-actions { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
    .price { display: flex; align-items: baseline; color: #FF5533; }
    .price__currency { font-family: 'Fliggy Sans 102', sans-serif; font-size: 24px; margin-right: 2px; }
    .price__amount { font-family: 'Fliggy Sans 102', sans-serif; font-size: 42px; font-weight: 700; }
    .price__suffix { font-size: 24px; }
    .book-btn { width: 84px; height: 84px; background: #FF7300; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 36px; color: #FFF; }
  </style>
</head>
<body>
  <section class="package-list-module">
    <header class="module-header">
      <h2 class="module-header__title">1日票</h2>
    </header>
    <div class="module-header__subtitle">
      <span class="module-header__subtitle-text">门票级别日历说明</span>
      <a href="#" class="module-header__subtitle-link"><span>查看</span> ›</a>
    </div>
    <div class="package-items">
      <article class="package-item">
        <div class="item-info">
          <h3 class="item-info__title">成人票</h3>
          <p class="item-info__description">赠20周年SouvenEAR迷你排队帽</p>
          <div class="item-info__tags">
            <span class="tag tag--blue">立即可用</span>
            <span class="tag">有条件退</span>
            <span class="tag">无需取票</span>
          </div>
          <a href="#" class="item-info__details-link">预订须知 ›</a>
        </div>
        <div class="item-actions">
          <div class="price"><span class="price__currency">¥</span><strong class="price__amount">349</strong><span class="price__suffix">起</span></div>
          <button type="button" class="book-btn">订</button>
        </div>
      </article>
      <article class="package-item">
        <div class="item-info">
          <h3 class="item-info__title">儿童票</h3>
          <p class="item-info__description">赠20周年SouvenEAR迷你排队帽</p>
          <div class="item-info__tags">
            <span class="tag tag--blue">立即可用</span>
            <span class="tag">有条件退</span>
            <span class="tag">无需取票</span>
          </div>
          <a href="#" class="item-info__details-link">预订须知 ›</a>
        </div>
        <div class="item-actions">
          <div class="price"><span class="price__currency">¥</span><strong class="price__amount">268</strong><span class="price__suffix">起</span></div>
          <button type="button" class="book-btn">订</button>
        </div>
      </article>
    </div>
  </section>
</body>
</html>
