<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>类目导航 · vacation-search-category-nav</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'PingFang SC', sans-serif; background: linear-gradient(180deg, #889 0%, #abc 100%); min-height: 200px; }
    a { text-decoration: none; color: inherit; }
    .category-nav { position: relative; width: 750px; margin: 0 auto; height: 106px; }
    .category-nav__bg {
      position: absolute;
      width: 750px;
      height: 100px;
      top: 6px;
      left: 0;
      background: linear-gradient(180deg, rgba(242, 243, 245, 0.85) 50%, #FFFFFF 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px 24px 0 0;
    }
    .category-nav__list { position: relative; display: flex; width: 100%; height: 100%; list-style: none; padding: 0; margin: 0; z-index: 1; }
    .category-nav__list > li { position: relative; width: 188px; height: 100px; top: 6px; }
    .category-nav__list > li.is-active { height: 106px; top: 0; }
    .nav-item {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      width: 100%;
      height: 100%;
      cursor: pointer;
      transition: background 0.25s ease;
    }
    .is-active .nav-item { background: #FFF; border-radius: 24px 24px 0 0; }
    .nav-item__icon { width: 30px; height: 30px; }
    .nav-item__icon svg { width: 30px; height: 30px; display: block; }
    .nav-item__label {
      font-size: 30px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.06em;
      color: #5C5F66;
      line-height: 1;
      transition: font-size 0.25s ease, color 0.25s ease, font-weight 0.25s ease;
    }
    .is-active .nav-item__label { font-size: 36px; font-weight: 500; color: #0F131A; }
    .icon-default { display: block; }
    .icon-active { display: none; }
    .is-active .icon-default { display: none; }
    .is-active .icon-active { display: block; }
  </style>
</head>
<body>
  <nav class="category-nav" aria-label="类目">
    <div class="category-nav__bg"></div>
    <ul class="category-nav__list">
      <li class="is-active">
        <a href="#" class="nav-item">
          <span class="nav-item__icon" aria-hidden="true">
            <span class="icon-active"><svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 27.5c3.73 0 1.46-5.54 3.75-8.12 1.95-2.21 8.75-1.2 8.75-4.38C27.5 8.1 21.9 2.5 15 2.5S2.5 8.1 2.5 15 8.1 27.5 15 27.5z" fill="url(#ga)" stroke="#0F131A" stroke-width="3" stroke-linecap="round"/><path d="M17.5 10.625a2 2 0 100-3.75 2 2 0 000 3.75zM10 13.125a2 2 0 100-3.75 2 2 0 000 3.75zM10.625 21.25a2 2 0 100-3.75 2 2 0 000 3.75z" stroke="#0F131A" stroke-width="3" stroke-linejoin="round"/><defs><linearGradient id="ga" x1="15" y1="2.5" x2="15" y2="27.5" gradientUnits="userSpaceOnUse"><stop stop-color="#FFE033"/><stop offset="1" stop-color="#FFF7CC"/></linearGradient></defs></svg></span>
            <span class="icon-default"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="10" stroke="#5C5F66" stroke-width="3"/></svg></span>
          </span>
          <span class="nav-item__label">综合</span>
        </a>
      </li>
      <li>
        <a href="#" class="nav-item">
          <span class="nav-item__icon" aria-hidden="true">
            <span class="icon-active"><svg viewBox="0 0 30 30" fill="none"><path d="M6.875 3.75V26.25M6.875 5.625h8.75L20 7.5h4.375c.69 0 1.25.56 1.25 1.25v10.625c0 .69-.56 1.25-1.25 1.25H20l-4.375-1.875H6.875V5.625z" stroke="#0F131A" stroke-width="3" stroke-linejoin="round"/></svg></span>
            <span class="icon-default"><svg viewBox="0 0 30 30" fill="none"><path d="M6.875 3.75V26.25M6.875 5.625h8.75L20 7.5h4.375c.69 0 1.25.56 1.25 1.25v10.625c0 .69-.56 1.25-1.25 1.25H20l-4.375-1.875H6.875V5.625z" stroke="#5C5F66" stroke-width="3" stroke-linejoin="round"/></svg></span>
          </span>
          <span class="nav-item__label">跟团游</span>
        </a>
      </li>
      <li>
        <a href="#" class="nav-item">
          <span class="nav-item__icon" aria-hidden="true">
            <span class="icon-active"><svg viewBox="0 0 30 30" fill="none"><rect x="5" y="8.75" width="20" height="16.25" rx="1.25" stroke="#0F131A" stroke-width="3"/><path d="M12.5 14.375v5M9.375 25v2.5M20.625 25v2.5M17.5 14.375v5M11.875 2.5h6.25M15 2.5V8.75" stroke="#0F131A" stroke-width="3" stroke-linecap="round"/></svg></span>
            <span class="icon-default"><svg viewBox="0 0 30 30" fill="none"><rect x="5" y="8.75" width="20" height="16.25" rx="1.25" stroke="#5C5F66" stroke-width="3"/><path d="M12.5 14.375v5M9.375 25v2.5M20.625 25v2.5M17.5 14.375v5M11.875 2.5h6.25M15 2.5V8.75" stroke="#5C5F66" stroke-width="3" stroke-linecap="round"/></svg></span>
          </span>
          <span class="nav-item__label">自由行</span>
        </a>
      </li>
      <li>
        <a href="#" class="nav-item">
          <span class="nav-item__icon" aria-hidden="true">
            <span class="icon-active"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="12.5" stroke="#0F131A" stroke-width="3"/></svg></span>
            <span class="icon-default"><svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="12.5" stroke="#5C5F66" stroke-width="3"/></svg></span>
          </span>
          <span class="nav-item__label">出境必备</span>
        </a>
      </li>
    </ul>
  </nav>
  <script>
    document.querySelectorAll('.category-nav__list > li').forEach(function (li) {
      li.addEventListener('click', function (e) {
        e.preventDefault();
        document.querySelectorAll('.category-nav__list > li').forEach(function (x) { x.classList.remove('is-active'); });
        li.classList.add('is-active');
      });
    });
  </script>
</body>
</html>
