<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>下拉筛选 · vacation-search-dropdown-filter</title>
  <style>
    body { margin: 0; background: #F2F3F5; display: flex; justify-content: center; font-family: 'PingFang SC', sans-serif; }
    .filter-bar {
      display: flex;
      align-items: center;
      width: 750px;
      height: 72px;
      background: #FFF;
    }
    .filter-item {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex: 1;
      height: 100%;
      cursor: pointer;
    }
    .filter-item--wide { flex: 0 0 187.5px; }
    .filter-item__text { font-size: 26px; line-height: 42px; color: #0F131A; white-space: nowrap; }
    .filter-item__icon { width: 20px; height: 20px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="filter-bar" role="toolbar" aria-label="筛选">
    <div class="filter-item filter-item--wide"><span class="filter-item__text">杭州出发</span><svg class="filter-item__icon" viewBox="0 0 20 20" fill="none"><path d="M4 7.5L10 13.5L16 7.5" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="filter-item"><span class="filter-item__text">筛选</span><svg class="filter-item__icon" viewBox="0 0 20 20" fill="none"><path d="M4 7.5L10 13.5L16 7.5" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="filter-item"><span class="filter-item__text">日期/天数</span><svg class="filter-item__icon" viewBox="0 0 20 20" fill="none"><path d="M4 7.5L10 13.5L16 7.5" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="filter-item"><span class="filter-item__text">人数</span><svg class="filter-item__icon" viewBox="0 0 20 20" fill="none"><path d="M4 7.5L10 13.5L16 7.5" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="filter-item"><span class="filter-item__text">排序</span><svg class="filter-item__icon" viewBox="0 0 20 20" fill="none"><path d="M4 7.5L10 13.5L16 7.5" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg></div>
  </div>
</body>
</html>
