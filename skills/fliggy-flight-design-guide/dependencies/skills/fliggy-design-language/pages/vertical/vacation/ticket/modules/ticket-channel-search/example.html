<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>门票频道 — 搜索框</title>
  <style>
    body { margin: 0; background: #F2F3F5; display: flex; justify-content: center; padding: 24px 0; font-family: 'PingFang SC', sans-serif; }
    .search-bar {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 8px 0 20px;
      gap: 18px;
      width: 714px;
      height: 72px;
      background: #FFFFFF;
      border: 2px solid #FFE033;
      border-radius: 36px;
    }
    .search-bar__input-wrapper { flex-grow: 1; display: flex; align-items: center; gap: 6px; height: 36px; }
    .search-bar__icon { flex-shrink: 0; width: 32px; height: 32px; color: #0F131A; }
    .search-bar__input {
      flex-grow: 1; width: 100%; height: 100%; border: none; background: none; outline: none; padding: 0;
      font-family: 'PingFang SC', sans-serif; font-size: 26px; line-height: 1.4; color: #0F131A;
    }
    .search-bar__input::placeholder { color: #919499; font-weight: 400; }
    .search-bar__button {
      flex-shrink: 0; display: flex; justify-content: center; align-items: center;
      width: 116px; height: 56px; background: #FFE033; border-radius: 42px; border: none; cursor: pointer;
      font-family: 'PingFang SC', sans-serif; font-weight: 500; font-size: 28px; color: #0F131A;
    }
  </style>
</head>
<body>
  <form class="search-bar" onsubmit="return false;" role="search" aria-label="景点搜索">
    <div class="search-bar__input-wrapper">
      <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <input class="search-bar__input" type="search" placeholder="搜索景点、玩乐、演出">
    </div>
    <button class="search-bar__button" type="submit">搜索</button>
  </form>
</body>
</html>
