<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>度假订详 — 订单卡</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', 'Alibaba Sans 102', sans-serif; }
    a { text-decoration: none; color: inherit; }
    .order-details { box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; width: 750px; background: #FFFFFF; padding: 0 24px 24px; }
    .store-info { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; gap: 30px; width: 702px; }
    .store-info__left { display: flex; align-items: center; gap: 12px; }
    .store-info__avatar { width: 42px; height: 42px; border-radius: 6px; border: 1px solid #D2D4D9; object-fit: cover; }
    .store-info__name { font-weight: 500; font-size: 30px; line-height: 140%; color: #0F131A; }
    .store-info__link { display: flex; align-items: center; gap: 4px; font-weight: 500; font-size: 26px; line-height: 140%; color: #0F131A; }
    .product-item { display: flex; gap: 18px; width: 702px; margin-bottom: 16px; }
    .product-item__image { width: 160px; height: 160px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
    .product-item__details { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
    .product-item__row { display: flex; justify-content: space-between; align-items: flex-start; gap: 30px; }
    .product-item__name { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; }
    .product-item__price { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; text-align: right; flex-shrink: 0; }
    .product-item__spec { font-weight: 400; font-size: 24px; line-height: 140%; color: #919499; }
    .product-item__quantity { font-weight: 400; font-size: 24px; line-height: 140%; color: #0F131A; text-align: right; flex-shrink: 0; }
    .info-list { display: flex; flex-direction: column; width: 702px; }
    .info-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 0; gap: 30px; }
    .info-item--center { align-items: center; }
    .info-item__label { width: 160px; font-weight: 400; font-size: 26px; line-height: 140%; color: #919499; flex-shrink: 0; white-space: nowrap; }
    .info-item__value { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; flex: 1; word-break: break-all; }
    .info-item__value--price { display: flex; align-items: flex-end; color: #FF5533; flex: 1; }
    .info-item__value--price .currency { font-weight: 500; font-size: 24px; line-height: 34px; }
    .info-item__value--price .amount-integer { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 36px; line-height: 45px; }
    .info-item__value--price .amount-decimal { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 24px; line-height: 36px; }
    .info-item__action { display: flex; align-items: center; gap: 4px; flex-shrink: 0; white-space: nowrap; cursor: pointer; }
    .action-text { font-weight: 500; font-size: 26px; line-height: 140%; color: #0F131A; }
    .action-text--blue { color: #6666FF; }
    .action-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .highlight-purple { color: #6666FF; }
    .divider { width: 100%; height: 1px; background: #F2F3F5; margin: 0; border: none; }
    .toggle-button { display: flex; justify-content: center; align-items: center; gap: 12px; padding-top: 24px; width: 702px; cursor: pointer; }
    .toggle-button__text { font-weight: 500; font-size: 26px; line-height: 140%; color: #0F131A; }
  </style>
</head>
<body>
  <section class="order-details" aria-label="订单信息">
    <header class="store-info">
      <div class="store-info__left">
        <img src="https://picsum.photos/id/64/42/42" alt="" class="store-info__avatar">
        <span class="store-info__name">新好游旅行旗舰店</span>
      </div>
      <a href="#" class="store-info__link"><span>进店</span><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M17.2322 13.3627C17.5638 13.6895 17.5874 14.2049 17.3033 14.5587L17.2322 14.6373L12.0607 19.736C11.7036 20.088 11.1248 20.088 10.7678 19.736C10.4362 19.4092 10.4126 18.8937 10.6967 18.54L10.7678 18.4613L15.2929 14L10.7678 9.53866C10.4362 9.21181 10.4126 8.69639 10.6967 8.34261L10.7678 8.26399C11.0993 7.93714 11.6221 7.9138 11.9809 8.19395L12.0607 8.26399L17.2322 13.3627Z" fill="#0F131A"/></svg></a>
    </header>
    <div class="product-item">
      <img src="https://picsum.photos/id/1018/160/160" alt="" class="product-item__image">
      <div class="product-item__details">
        <div class="product-item__row">
          <span class="product-item__name">新加坡环球影城度假区-1日门票</span>
          <span class="product-item__price">¥230.00</span>
        </div>
        <div class="product-item__row">
          <span class="product-item__spec">快速通道</span>
          <span class="product-item__quantity">×2</span>
        </div>
      </div>
    </div>
    <div class="info-list">
      <div class="info-item info-item--center">
        <span class="info-item__label">实付金额</span>
        <div class="info-item__value--price"><span class="currency">¥</span><span class="amount-integer">9296</span><span class="amount-decimal">.76</span></div>
        <a href="#" class="info-item__action"><span class="action-text">明细</span><svg class="action-icon" viewBox="0 0 28 28" fill="none"><path d="M17.2322 13.3627C17.5638 13.6895 17.5874 14.2049 17.3033 14.5587L17.2322 14.6373L12.0607 19.736C11.7036 20.088 11.1248 20.088 10.7678 19.736C10.4362 19.4092 10.4126 18.8937 10.6967 18.54L10.7678 18.4613L15.2929 14L10.7678 9.53866C10.4362 9.21181 10.4126 8.69639 10.6967 8.34261L10.7678 8.26399C11.0993 7.93714 11.6221 7.9138 11.9809 8.19395L12.0607 8.26399L17.2322 13.3627Z" fill="#0F131A"/></svg></a>
      </div>
      <div class="info-item">
        <span class="info-item__label">服务保障</span>
        <span class="info-item__value">使用保障</span>
        <a href="#" class="info-item__action"><span class="action-text">保障中</span><svg class="action-icon" viewBox="0 0 28 28" fill="none"><path d="M17.2322 13.3627C17.5638 13.6895 17.5874 14.2049 17.3033 14.5587L17.2322 14.6373L12.0607 19.736C11.7036 20.088 11.1248 20.088 10.7678 19.736C10.4362 19.4092 10.4126 18.8937 10.6967 18.54L10.7678 18.4613L15.2929 14L10.7678 9.53866C10.4362 9.21181 10.4126 8.69639 10.6967 8.34261L10.7678 8.26399C11.0993 7.93714 11.6221 7.9138 11.9809 8.19395L12.0607 8.26399L17.2322 13.3627Z" fill="#0F131A"/></svg></a>
      </div>
      <hr class="divider">
      <div class="info-item">
        <span class="info-item__label">订单号</span>
        <span class="info-item__value">358244354930874727738</span>
        <a href="#" class="info-item__action"><span class="action-text action-text--blue">复制</span><svg class="action-icon" viewBox="0 0 28 28" fill="none"><path d="M20.002 9.49988C19.5877 9.49988 19.252 9.83566 19.252 10.2499C19.252 10.6641 19.5877 10.9999 20.002 10.9999H21.752C21.89 10.9999 22.002 11.1118 22.002 11.2499V21.7499C22.002 21.888 21.89 21.9999 21.752 21.9999H11.252C11.1139 21.9999 11.002 21.888 11.002 21.7499V19.9999C11.002 19.5857 10.6662 19.2499 10.252 19.2499C9.83774 19.2499 9.50195 19.5857 9.50195 19.9999V21.7499C9.50195 22.7164 10.2855 23.4999 11.252 23.4999H21.752C22.7185 23.4999 23.502 22.7164 23.502 21.7499V11.2499C23.502 10.2834 22.7185 9.49988 21.752 9.49988H20.002Z" fill="#6666FF"/></svg></a>
      </div>
      <div class="info-item">
        <span class="info-item__label">下单时间</span>
        <span class="info-item__value">2023年7月18日 17:45:33</span>
      </div>
    </div>
    <div class="toggle-button" role="button"><span class="toggle-button__text">收起</span><svg width="12" height="7" viewBox="0 0 12 7" fill="none"><path d="M6.63733 0.267767C6.31049 -0.063754 5.79507 -0.0874341 5.44128 0.196727L5.36267 0.267767L0.263992 5.43934C-0.0879976 5.79636 -0.0879976 6.37521 0.263992 6.73223C0.59084 7.06375 1.10626 7.08743 1.46005 6.80327L1.53866 6.73223L6 2.20711L10.4613 6.73223C10.7882 7.06375 11.3036 7.08743 11.6574 6.80327L11.736 6.73223C12.0629 6.40071 12.0862 5.87792 11.806 5.51908L11.736 5.43934L6.63733 0.267767Z" fill="#0F131A"/></svg></div>
  </section>
</body>
</html>
