<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>度假订详 — 黄头订单状态</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', sans-serif; }
    .order-result-header {
      box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      padding: 0; gap: 30px; width: 750px; height: 501px; background: #FFE033;
    }
    .main-content {
      display: flex; flex-direction: column; align-items: center; padding: 0; gap: 36px; width: 750px;
    }
    .content-wrapper { display: flex; flex-direction: column; align-items: center; padding: 0; gap: 24px; width: 702px; }
    .text-area {
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 0 12px; gap: 12px;
      width: 702px; box-sizing: border-box;
    }
    .status-title { font-weight: 500; font-size: 48px; line-height: 140%; color: #0F131A; margin: 0; }
    .guarantee-text { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; margin: 0; }
    .highlight-time { color: #FF5533; }
    .button-group {
      display: flex; flex-direction: row; align-items: center; padding: 0; gap: 18px; width: 702px; height: 72px;
    }
    .action-button {
      display: flex; justify-content: center; align-items: center; padding: 18px 0; gap: 10px;
      width: 222px; height: 72px; background: #FFFCEB; border-radius: 100px; border: none; cursor: pointer;
      flex-grow: 1; box-sizing: border-box; font-weight: 500; font-size: 30px; line-height: 36px; color: #0F131A; white-space: nowrap;
    }
    .white-transition { width: 750px; height: 24px; background: #FFFFFF; border-radius: 24px 24px 0 0; }
  </style>
</head>
<body>
  <header class="order-result-header" aria-label="订单状态">
    <div class="main-content">
      <div class="content-wrapper">
        <div class="text-area">
          <h1 class="status-title">已出票</h1>
          <p class="guarantee-text">请在当地时间 <span class="highlight-time">2025年08月06日23:56</span>后使用（北京时间08月07日00:56）</p>
        </div>
        <div class="button-group">
          <button type="button" class="action-button">申请退款</button>
          <button type="button" class="action-button">发票/报销</button>
          <button type="button" class="action-button">再次预订</button>
        </div>
      </div>
    </div>
    <div class="white-transition" aria-hidden="true"></div>
  </header>
</body>
</html>
