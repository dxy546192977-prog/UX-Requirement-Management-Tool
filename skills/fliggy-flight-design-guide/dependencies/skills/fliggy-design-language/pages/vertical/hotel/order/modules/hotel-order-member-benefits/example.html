<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>会员权益模块 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-l: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 会员权益模块 */
        .benefits-wrapper {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
            padding: 24px 30px;
            margin-top: 24px;
            position: relative;
        }
        .member-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #FDEBD7;
            border-radius: 0 var(--radius-l) 0 12px;
            padding: 8px 16px;
            font-size: 22px;
            font-weight: 500;
            color: #8D735A;
        }
        .benefit-title {
            font-size: 32px;
            font-weight: 500;
            color: var(--color-darkgray);
            margin: 0 0 18px 0;
        }
        .benefit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }
        .benefit-label {
            font-size: 24px;
            color: var(--color-lightgray);
        }
        .benefit-value {
            font-size: 24px;
            color: var(--color-darkgray);
        }
        .benefit-action {
            background: #FFE566;
            border-radius: 32px;
            padding: 12px 24px;
            font-size: 24px;
            color: var(--color-darkgray);
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .benefit-action.disabled {
            background: transparent;
            color: var(--color-lightgray);
            border: 1px solid var(--color-lightgray);
            cursor: not-allowed;
        }
        .benefit-card {
            background: var(--color-label);
            border-radius: var(--radius-l);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .section-divider {
            border: none;
            margin: 24px 0;
        }
        .coupon-title {
            font-size: 24px;
            color: var(--color-lightgray);
            margin: 0 0 18px 0;
        }
        .coupon-card {
            background: var(--color-label);
            border-radius: var(--radius-l);
            padding: 24px;
            margin-top: 12px;
        }
        .coupon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .coupon-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .coupon-name {
            font-size: 26px;
            color: var(--color-darkgray);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coupon-tip {
            width: 24px;
            height: 24px;
            color: var(--color-lightgray);
        }
        .coupon-desc {
            font-size: 22px;
            color: var(--color-lightgray);
        }
        .expand-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            font-size: 24px;
            color: var(--color-indigo-1);
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            font-family: inherit;
        }
        .expand-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="benefits-wrapper">
        <span class="member-badge">F4 会员</span>
        <h3 class="benefit-title">本单可享</h3>
        <div class="benefit-item">
            <span class="benefit-label">里程赠送权益</span>
        </div>
        <div class="benefit-card">
            <span class="benefit-value">订单已关闭，不累积飞猪里程</span>
            <button class="benefit-action">赚里程</button>
        </div>
        <hr class="section-divider">
        <p class="coupon-title">下单即送权益</p>
        <div class="coupon-card">
            <div class="coupon-item">
                <div class="coupon-info">
                    <span class="coupon-name">
                        封顶20元机票优惠券
                        <img class="coupon-tip" src="../../../assets/帮助.png" alt="">
                    </span>
                    <span class="coupon-desc">封顶20元机票优惠券</span>
                </div>
                <button class="benefit-action disabled">已取消</button>
            </div>
            <button class="expand-btn">
                展开
                <img class="expand-icon" src="../../../assets/下拉箭头.png" alt="">
            </button>
        </div>
    </div>
</body>
</html>
