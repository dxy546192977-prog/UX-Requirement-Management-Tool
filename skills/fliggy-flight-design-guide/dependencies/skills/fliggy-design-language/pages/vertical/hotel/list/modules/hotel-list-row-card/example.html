<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店列表 — 行卡</title>
    <style>
        @font-face {
            font-family: 'SF Pro Text';
            src: local('San Francisco'), local('Helvetica Neue'), local('Arial');
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
        }

        .product-card {
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 12px 18px;
            gap: 18px;
            width: 750px;
            height: 312px;
            background: #FFFFFF;
            position: relative;
        }

        .image-container {
            position: relative;
            width: 222px;
            height: 288px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
        }
        .image-container .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .official-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            font-size: 20px;
            color: #FFFCFA;
        }

        .video-icon {
            position: absolute;
            right: 12px;
            bottom: 46px;
            width: 24px;
            height: 24px;
        }

        .image-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 222px;
            height: 34px;
        }

        .info-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            height: 288px;
            padding: 2px 0;
        }

        .info-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .title-section h3 {
            margin: 0;
            font-size: 30px;
            font-weight: 500;
            color: #0F131A;
            line-height: 1.4;
            white-space: nowrap;
        }
        .title-section .luxury-tag {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 4px;
            height: 28px;
            background: #F7F8FA;
            border-radius: 4px;
            font-size: 20px;
            color: #919499;
        }
        .title-section .gold-medal-icon {
            width: 28px;
            height: 28px;
        }

        .rating-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rating-section .score {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3px 7px;
            background: #6666FF;
            border-radius: 8px;
            font-family: 'SF Pro Text', sans-serif;
            font-weight: 600;
            font-size: 22px;
            color: #FFFFFF;
        }
        .rating-section .review-text {
            font-size: 24px;
            color: #6666FF;
        }

        .location-text {
            font-size: 24px;
            color: #5C5F66;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tags-section {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag {
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 6px;
            height: 28px;
            border: 1px solid rgba(92, 95, 102, 0.5);
            border-radius: 4px;
            font-size: 20px;
            color: #5C5F66;
        }
        .tag.special {
            border-color: rgba(128, 85, 64, 0.5);
            color: #805540;
            gap: 0px;
        }
        .tag.special span {
            margin-left: 1px;
        }

        .realtime-status-text {
            font-size: 20px;
            color: #FF5533;
        }

        .info-bottom {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            margin-top: -24px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }

        .booking-count {
            font-size: 20px;
            color: #919499;
        }

        .price-details {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .price-details .strikethrough-price {
            font-size: 20px;
            color: #919499;
            text-decoration: line-through;
        }
        .price-details .main-price-wrapper {
            display: flex;
            align-items: flex-end;
            color: #FF5533;
            gap: 2px;
        }
        .main-price-wrapper .currency {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.1;
        }
        .main-price-wrapper .amount {
            font-family: 'SF Pro Text', sans-serif;
            font-size: 42px;
            font-weight: 700;
            line-height: 0.8;
        }
        .main-price-wrapper .unit {
            font-size: 20px;
            line-height: 1.1;
        }

        .discount-banner {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 6px;
            height: 28px;
            background: linear-gradient(90deg, rgba(255, 230, 224, 0) 0%, rgba(255, 230, 224, 0.9) 100%);
            border-radius: 4px;
        }
        .discount-content {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            color: #FF5533;
        }

        .bottom-divider {
            position: absolute;
            bottom: 0;
            right: 18px;
            width: 474px;
            height: 1px;
            background-color: #F2F3F5;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div class="image-container">
            <img class="main-image" src="https://gw.alicdn.com/imgextra/i3/O1CN019L60jw1FwrlD8Q4Nz_!!6000000000552-2-tps-444-576.png" alt="酒店外观">
            <div class="image-overlay">
                <div class="official-tag">君澜</div>

.01272 12.3747 5.98835C12.3674 5.96397 12.3551 5.94142 12.3384 5.92222C12.3217 5.90302 12.3012 5.8876 12.2781 5.87699C12.2549 5.86639 12.2298 5.86085 12.2044 5.86075H12.2036L12.204 5.86035Z" fill="#805540"/></svg>
                        <span>房型升级</span>
                    </div>
                    <div class="tag">早餐很棒</div>
                    <div class="tag">免费停车</div>
                    <div class="tag">近西溪湿地</div>
                </div>
                <div class="realtime-status-text">热卖！低价房仅剩1间</div>
            </div>

            <div class="info-bottom">
                <div class="price-row">
                    <span class="booking-count">5000+预订</span>
                    <div class="price-details">
                        <span class="strikethrough-price">¥1010</span>
                        <div class="main-price-wrapper">
                            <span class="currency">¥</span>
                            <span class="amount">694</span>
                            <span class="unit">起</span>

                    </div>
                </div>
                <div class="discount-banner">
                    <div class="discount-content">
                        <span>君澜会员</span>
                        <svg width="1" height="16" viewBox="0 0 1 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.5 0L0.500001 16" stroke="#FFB2A3" stroke-dasharray="2 2"/></svg>
                        <span>2项优惠¥45</span>

                </div>
            </div>
        </div>

        <div class="bottom-divider"></div>
    </div>

</body>
</html>
