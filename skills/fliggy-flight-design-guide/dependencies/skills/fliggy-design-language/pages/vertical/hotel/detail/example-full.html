<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=750, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" href="data:," />
    <title>酒店详情 — 整页串联（iframe 编排）</title>
    <style>
      :root {
        --page-bg: #f2f3f5;
        --page-max-width: 750px;
        --page-scale: 1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--page-bg);
        overscroll-behavior-y: none;
      }

      body {
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }

      .page {
        width: min(100%, var(--page-max-width));
        margin: 0 auto;
        isolation: isolate;
      }

      .block {
        position: relative;
        width: 100%;
        margin-top: calc(var(--block-gap, 0) * 1px * var(--page-scale));
      }

      .block[data-block="filter"] {
        z-index: 2;
      }

      .block[data-block="sticky-rate"] {
        z-index: 3;
      }

      .embed-frame {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        overflow: hidden;
      }

      .sticky-filter-layer {
        position: fixed;
        top: 0;
        left: 50%;
        z-index: 60;
        width: min(100vw, var(--page-max-width));
        transform: translateX(-50%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 160ms ease;
      }

      .sticky-filter-layer.is-visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="sticky-filter-layer" aria-hidden="true">
      <iframe
        class="embed-frame"
        data-component="filter-sticky"
        title="04 筛选吸顶态"
        src="./modules/hotel-detail-filter/example.html?embed=1&component=filter-sticky&mode=sticky&rev=202604040230"
        scrolling="no"
      ></iframe>
    </div>

    <main class="page">
      <section class="block" data-gap="0">
        <iframe
          class="embed-frame"
          data-component="media"
          title="01 媒体容器"
          src="./modules/hotel-detail-media/example.html?embed=1&component=media&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="-24">
        <iframe
          class="embed-frame"
          data-component="info"
          title="02 信息区结构"
          src="./modules/hotel-detail-info/example.html?embed=1&component=info&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="member"
          title="03 二官会员卡"
          src="./modules/hotel-detail-member-card/example.html?embed=1&component=member&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18" data-block="filter">
        <iframe
          class="embed-frame"
          data-component="filter"
          title="04 筛选"
          src="./modules/hotel-detail-filter/example.html?embed=1&component=filter&mode=regular&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="-6" data-block="sticky-rate">
        <iframe
          class="embed-frame"
          data-component="sticky-rate"
          title="05 置顶Rate"
          src="./modules/hotel-detail-sticky-rate/example.html?embed=1&component=sticky-rate&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18" data-block="rate-list">
        <iframe
          class="embed-frame"
          data-component="rate-list"
          title="05 Rate卡片"
          src="./modules/hotel-detail-rate-cards/example.html?embed=1&component=rate-list&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="store"
          title="06 店铺"
          src="./modules/hotel-detail-store/example.html?embed=1&component=store&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="review"
          title="07 评价"
          src="./modules/hotel-detail-reviews/example.html?embed=1&component=review&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="highlight"
          title="08 酒店亮点"
          src="./modules/hotel-detail-highlights/example.html?embed=1&component=highlight&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="facility"
          title="09 酒店设施"
          src="./modules/hotel-detail-facilities/example.html?embed=1&component=facility&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="surrounding"
          title="10 酒店周边"
          src="./modules/hotel-detail-surroundings/example.html?embed=1&component=surrounding&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="policy"
          title="11 说明"
          src="./modules/hotel-detail-policy/example.html?embed=1&component=policy&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="18">
        <iframe
          class="embed-frame"
          data-component="recommend-room"
          title="12 推荐酒店（含房型）"
          src="./modules/hotel-detail-recommend-rooms/example.html?embed=1&component=recommend-room&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>

      <section class="block" data-gap="0">
        <iframe
          class="embed-frame"
          data-component="recommend"
          title="13 推荐酒店"
          src="./modules/hotel-detail-recommend-list/example.html?embed=1&component=recommend&rev=202604040230"
          scrolling="no"
        ></iframe>
      </section>
    </main>

    <script>
      (function () {
        const frames = Array.from(document.querySelectorAll(".embed-frame"));
        const page = document.querySelector(".page");
        const blocks = Array.from(document.querySelectorAll(".block"));
        const filterBlock = document.querySelector('[data-block="filter"]');
        const stickyRateBlock = document.querySelector('[data-block="sticky-rate"]');
        const rateListBlock = document.querySelector('[data-block="rate-list"]');
        const stickyFilterLayer = document.querySelector(".sticky-filter-layer");
        const params = new URLSearchParams(window.location.search);
        let touchStartY = 0;

        blocks.forEach((block) => {
          const gap = Number(block.dataset.gap || 0);
          block.style.setProperty("--block-gap", String(gap));
        });

        function syncPageScale() {
          if (!page) {
            return;
          }

          const designWidth = 750;
          const scale = Math.min(page.getBoundingClientRect().width / designWidth, 1);
          document.documentElement.style.setProperty("--page-scale", String(scale));
        }

        function getMeasuredElement(doc) {
          if (doc.body && doc.body.firstElementChild) {
            return doc.body.firstElementChild;
          }

          return doc.documentElement;
        }

        function getFrameHeight(frame) {
          try {
            const doc = frame.contentDocument;
            if (!doc) {
              return 0;
            }

            const measuredElement = getMeasuredElement(doc);
            return Math.max(
              measuredElement ? measuredElement.getBoundingClientRect().height : 0,
              measuredElement ? measuredElement.scrollHeight : 0,
              measuredElement ? measuredElement.offsetHeight : 0,
              measuredElement ? measuredElement.clientHeight : 0
            );
          } catch (error) {
            return 0;
          }
        }

        function syncFramePresentation(frame) {
          try {
            const doc = frame.contentDocument;
            if (!doc || !doc.documentElement || !doc.body) {
              return;
            }

            if (frame.dataset.component === "filter") {
              doc.documentElement.style.setProperty("background", "transparent");
              doc.body.style.setProperty("background", "transparent");
            }

            if (frame.dataset.component === "sticky-rate") {
              doc.documentElement.style.setProperty("background", "transparent");
              doc.body.style.setProperty("background", "transparent");
            }
          } catch (error) {
            return;
          }
        }

        function syncFrameHeight(frame) {
          const height = getFrameHeight(frame);
          if (height > 0) {
            frame.style.height = String(Math.ceil(height)) + "px";
          }
        }

        window.addEventListener("message", (event) => {
          const payload = event.data;
          if (!payload || payload.type !== "component-height" || !payload.key) {
            return;
          }

          const frame = document.querySelector(
            '[data-component="' + payload.key + '"]'
          );
          if (!frame || typeof payload.height !== "number") {
            return;
          }

          frame.style.height = String(payload.height) + "px";
          syncStickyFilter();
        });

        function syncStickyFilter() {
          if (
            !filterBlock ||
            !rateListBlock ||
            !stickyFilterLayer
          ) {
            return;
          }

          const stickyFilterHeight = stickyFilterLayer.getBoundingClientRect().height;
          const layoutReady =
            stickyFilterHeight > 24 &&
            [filterBlock, rateListBlock].every(
              (block) => block.getBoundingClientRect().height > 24
            );

          if (!layoutReady) {
            stickyFilterLayer.classList.remove("is-visible");
            stickyFilterLayer.setAttribute("aria-hidden", "true");
            return;
          }

          const filterRect = filterBlock.getBoundingClientRect();
          const rateListRect = rateListBlock.getBoundingClientRect();
          const stickyFilterBottom = stickyFilterLayer.getBoundingClientRect().bottom;
          const shouldStick =
            filterRect.bottom <= 0 &&
            rateListRect.bottom > stickyFilterBottom;

          stickyFilterLayer.classList.toggle("is-visible", shouldStick);
          stickyFilterLayer.setAttribute(
            "aria-hidden",
            shouldStick ? "false" : "true"
          );
        }

        frames.forEach((frame) => {
          frame.style.height = "1px";
          frame.addEventListener("load", function () {
            syncFramePresentation(frame);
            syncFrameHeight(frame);
            syncStickyFilter();
            setTimeout(function () {
              syncFramePresentation(frame);
              syncFrameHeight(frame);
              syncStickyFilter();
            }, 0);
            setTimeout(function () {
              syncFramePresentation(frame);
              syncFrameHeight(frame);
              syncStickyFilter();
            }, 200);
            setTimeout(function () {
              syncFramePresentation(frame);
              syncFrameHeight(frame);
              syncStickyFilter();
            }, 800);
          });
        });

        window.addEventListener(
          "resize",
          function () {
            syncPageScale();
            frames.forEach(syncFramePresentation);
            frames.forEach(syncFrameHeight);
            syncStickyFilter();
          },
          { passive: true }
        );

        syncPageScale();
        frames.forEach(syncFramePresentation);
        window.addEventListener("scroll", syncStickyFilter, { passive: true });
        syncStickyFilter();
        requestAnimationFrame(syncStickyFilter);
        setTimeout(syncStickyFilter, 0);
        setTimeout(syncStickyFilter, 200);
        setTimeout(syncStickyFilter, 800);

        window.addEventListener(
          "touchstart",
          function (event) {
            if (!event.touches || event.touches.length === 0) {
              return;
            }

            touchStartY = event.touches[0].clientY;
          },
          { passive: true }
        );

        window.addEventListener(
          "touchmove",
          function (event) {
            if (!event.touches || event.touches.length === 0) {
              return;
            }

            const currentY = event.touches[0].clientY;
            const deltaY = currentY - touchStartY;
            const scrollTop =
              window.pageYOffset || document.documentElement.scrollTop || 0;
            const maxScrollTop = Math.max(
              0,
              document.documentElement.scrollHeight - window.innerHeight
            );
            const atTop = scrollTop <= 0;
            const atBottom = scrollTop >= maxScrollTop;
            const pullingDown = deltaY > 0;
            const pullingUp = deltaY < 0;

            if ((atTop && pullingDown) || (atBottom && pullingUp)) {
              event.preventDefault();
            }
          },
          { passive: false }
        );

        const scrollY = Number(params.get("scrollY") || 0);
        if (Number.isFinite(scrollY) && scrollY > 0) {
          window.addEventListener("load", function () {
            setTimeout(function () {
              window.scrollTo(0, scrollY);
              syncStickyFilter();
            }, 120);
          });
        }
      })();
    </script>
  </body>
</html>
