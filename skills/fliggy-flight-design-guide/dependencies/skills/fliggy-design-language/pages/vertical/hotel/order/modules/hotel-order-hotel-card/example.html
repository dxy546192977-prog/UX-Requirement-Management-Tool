<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店信息卡 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
            --radius-l: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 酒店信息卡 */
        .hotel-info-wrapper {
            width: 750px;
            margin-left: -24px;
            margin-top: 24px;
        }
        .hotel-info-card {
            background: var(--color-white);
            padding: 24px 30px;
        }
        .shop-name {
            font-size: 24px;
            color: var(--color-lightgray);
            margin: 0 0 18px 0;
        }
        .hotel-main {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }
        .hotel-image {
            width: 140px;
            height: 140px;
            border-radius: var(--radius-l);
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            background-color: #E0E0E0;
        }
        .hotel-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: 140px;
            min-width: 0;
            justify-content: space-between;
        }
        .hotel-name {
            font-size: 30px;
            font-weight: 500;
            color: var(--color-darkgray);
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hotel-name-arrow {
            width: 24px;
            height: 24px;
            color: var(--color-lightgray);
            flex-shrink: 0;
        }
        .facility-link {
            font-size: 24px;
            color: var(--color-indigo-1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            align-self: flex-end;
        }
        .address-section {
            margin-top: 18px;
        }
        .address-card {
            background: #E8F4FC;
            border-radius: var(--radius-l);
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .address-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
        }
        .address-text {
            font-size: 26px;
            color: var(--color-midgray);
            line-height: 1.4;
            flex: 1;
        }
        .quick-links {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        .quick-btn {
            background: var(--color-white);
            border-radius: 32px;
            padding: 12px 24px;
            font-size: 24px;
            color: var(--color-darkgray);
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="hotel-info-wrapper">
        <div class="hotel-info-card">
            <p class="shop-name">海南赶海旅游专营店</p>
            <div class="hotel-main">
                <div class="hotel-image" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=280&h=280&fit=crop');"></div>
                <div class="hotel-content">
                    <h3 class="hotel-name">
                        杭州翡丽大酒店
                        <svg class="hotel-name-arrow" viewBox="0 0 24 24" fill="none">
                            <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </h3>
                    <a href="#" class="facility-link">
                        设施服务
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                </div>
            </div>
            <div class="address-section">
                <div class="address-card">
                    <div class="address-content">
                        <p class="address-text">文二西路706号，近紫金港路。</p>
                        <div class="quick-links">
                            <button class="quick-btn">问路卡</button>
                            <button class="quick-btn">地图/周边</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
