<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>

    <style>
      :root {
        --design-width: 750;
        --frame-height: 929;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --text-light: #919499;
        --text-pay: #ff5533;
        --text-teal: #149aa8;
        --text-brown: #805540;
        --line: #eceef2;
        --shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      button {
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        color: inherit;
        appearance: none;
        -webkit-appearance: none;
      }

      img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--frame-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        height: calc(var(--frame-height) * 1px);
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .rate-card {
        width: 714px;
        margin: 0 auto;
      }

      .summary-card {
        position: relative;
        display: flex;
        gap: 18px;
        align-items: flex-start;
        width: 714px;
        height: 204px;
        padding: 18px;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: var(--shadow);
        overflow: hidden;
        z-index: 2;
      }

      .room-media {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        width: 168px;
        height: 168px;
        padding: 0 12px 12px;
        border-radius: 12px;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .room-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .room-photo-mask {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 47%,
          rgba(0, 0, 0, 0.2) 100%
        );
      }

      .media-meta {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 6px;
        align-items: flex-end;
      }

      .media-play {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
      }

      .media-count {
        height: 24px;
        padding: 0 12px;
        border-radius: 18.898px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(24.465px);
        color: #ffffff;
        font-size: 19.8px;
        font-weight: 500;
        line-height: 24px;
      }

      .summary-main {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 492px;
        height: 168px;
        flex: 0 0 auto;
      }

      .summary-top {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .summary-title-row {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 444px;
      }

      .summary-title {
        max-width: 420px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 30px;
        font-weight: 500;
        line-height: 42px;
      }

      .chevron-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 12px;
        height: 12px;
        color: var(--text-light);
        flex: 0 0 auto;
      }

      .summary-features {
        display: flex;
        align-items: center;
        gap: 18px;
        width: 492px;
        color: var(--text-mid);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
        white-space: nowrap;
      }

      .summary-price-wrap {
        display: flex;
        justify-content: flex-end;
      }

      .price-line {
        display: flex;
        align-items: baseline;
        gap: 5px;
        white-space: nowrap;
      }

      .price-old {
        color: var(--text-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 20px;
        text-decoration: line-through;
      }

      .price-current {
        display: flex;
        align-items: baseline;
        color: var(--text-pay);
      }

      .price-currency {
        font-family: "Alibaba Sans", "Helvetica Neue", Arial, sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 24px;
      }

      .price-value {
        font-family: "Fliggy Sans 102", "DIN Alternate", "Helvetica Neue",
          Arial, sans-serif;
        font-size: 42px;
        font-weight: 700;
        line-height: 27px;
      }

      .price-suffix {
        font-size: 20px;
        font-weight: 400;
        line-height: 1;
      }

      .toggle-button {
        position: absolute;
        top: 24px;
        right: 18px;
        width: 30px;
        height: 30px;
        cursor: pointer;
      }

      .toggle-button img {
        width: 30px;
        height: 30px;
      }

      .details-shell {
        position: relative;
        width: 714px;
        margin-top: -9px;
        overflow: hidden;
        border-radius: 0 0 12px 12px;
        transform-origin: top center;
        transition: max-height 0.28s ease, opacity 0.22s ease;
      }

      .rate-card[data-expanded="true"] .details-shell {
        max-height: 734px;
        opacity: 1;
      }

      .rate-card[data-expanded="false"] .details-shell {
        max-height: 0;
        opacity: 0;
      }

      .member-panel {
        width: 714px;
        height: 184px;
        padding: 18px;
        background: #ffffff;
      }

      .member-tabs {
        display: flex;
        height: 66px;
        border-radius: 12px;
        background: #f2f3f5;
        overflow: hidden;
      }

      .member-tab {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 339px;
        padding: 6px;
      }

      .member-tab-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 54px;
        border-radius: 9px;
      }

      .member-tab.active .member-tab-inner {
        background: linear-gradient(131.33deg, #6e5a4f 0%, #564131 95.149%);
      }

      .member-tab.active .member-tab-text {
        color: #ffffff;
      }

      .member-tab-text {
        font-size: 24px;
        font-weight: 500;
        line-height: 24px;
        color: var(--text-mid);
      }

      .member-tab-badge {
        margin-left: 12px;
        padding: 0 6px;
        border-radius: 6px;
        background: #ff8c1a;
        color: #ffffff;
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
      }

      .member-benefits {
        position: relative;
        display: flex;
        align-items: center;
        width: 678px;
        height: 82px;
        margin-top: 18px;
        padding: 24px 18px;
        border: 1px solid rgba(128, 85, 64, 0.1);
        border-radius: 12px;
        background: #fff9f2;
        overflow: hidden;
      }

      .benefit-list {
        display: flex;
        align-items: center;
        gap: 24px;
        width: 612px;
        color: var(--text-brown);
      }

      .benefit-item {
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }

      .benefit-item img {
        width: 28px;
        height: 28px;
      }

      .benefit-item span {
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .benefit-fade {
        position: absolute;
        top: 0;
        right: -1px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        width: 90px;
        height: 82px;
        padding: 24px 18px 24px 36px;
        background: linear-gradient(
          90deg,
          rgba(255, 249, 242, 0) 0%,
          #fff9f2 30%,
          #fff9f2 100%
        );
      }

      .benefit-fade svg {
        width: 7px;
        height: 12px;
        color: var(--text-brown);
      }

      .rate-item {
        position: relative;
        width: 714px;
        background: #ffffff;
      }

      .rate-item.featured {
        height: 275px;
        padding: 30px 18px 0;
      }

      .rate-item.simple {
        height: 275px;
        padding: 30px 18px 0;
      }

      .rate-head {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 40px;
      }

      .rate-title {
        color: var(--text-teal);
        font-size: 28px;
        font-weight: 500;
        line-height: 40px;
      }

      .rate-head-dot {
        font-size: 28px;
        font-weight: 500;
        line-height: 40px;
      }

      .rate-head-extra {
        font-size: 28px;
        font-weight: 500;
        line-height: 40px;
      }

      .policy-row {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 34px;
        margin-top: 12px;
      }

      .policy-row svg {
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
      }

      .policy-row span {
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .policy-row.danger {
        color: var(--text-dark);
      }

      .policy-row.safe {
        color: var(--text-teal);
      }

      .tag-row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 12px;
        overflow: hidden;
      }

      .tag {
        height: 28px;
        padding: 0 6px;
        border: 1px solid rgba(92, 95, 102, 0.5);
        border-radius: 4px;
        color: var(--text-mid);
        font-size: 20px;
        font-weight: 400;
        line-height: 26px;
        white-space: nowrap;
      }

      .tag.highlight {
        border-color: rgba(128, 85, 64, 0.5);
        color: var(--text-brown);
      }

      .bottom-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-top: 16px;
      }

      .vendor-row {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 24px;
        color: var(--text-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
      }

      .brand-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 24px;
      }

      .brand-pill img {
        width: 69px;
        height: 24px;
      }

      .price-area {
        display: flex;
        gap: 12px;
        align-items: flex-end;
      }

      .price-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: flex-end;
      }

      .promo-pill {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        height: 28px;
        padding: 0 6px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(
          90deg,
          rgba(255, 230, 224, 0) 0%,
          rgba(255, 230, 224, 0.9) 100%
        );
        color: var(--text-pay);
        white-space: nowrap;
      }

      .promo-main {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .promo-main img {
        width: 70px;
        height: 19px;
      }

      .promo-text {
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
      }

      .promo-pill svg {
        width: 5px;
        height: 9px;
        color: var(--text-pay);
      }

      .book-button {
        width: 78px;
        height: 78px;
        border: 2px solid #ff8c1a;
        border-radius: 12px;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .book-top {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 50px;
        background: linear-gradient(180deg, #ffa130 0%, #ff8c1a 100%);
        color: #ffffff;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
      }

      .book-bottom {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        background: #ffffff;
        color: #ff8c1a;
        font-size: 18px;
        font-weight: 300;
        line-height: 28px;
        padding-bottom: 2px;
      }

      .divider {
        position: absolute;
        bottom: 0;
        left: 18px;
        width: 678px;
        height: 1px;
        background: var(--line);
      }

      .select-none {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>

    <script>
      const embedded = Boolean(window.__EMBEDDED__);
      const toggleIconExpanded =
        "https://gw.alicdn.com/imgextra/i1/O1CN01RNTsyx1wKPzR56Kor_!!6000000006289-2-tps-60-60.png";
      const toggleIconCollapsed =
        "https://gw.alicdn.com/imgextra/i3/O1CN01D4yifo1WDNtfocilz_!!6000000002754-2-tps-60-60.png";
      const card = document.getElementById("rateCard");
      const toggleButton = document.getElementById("toggleButton");
      const toggleIcon = document.getElementById("toggleIcon");
      const bedText = document.getElementById("bedText");

      function syncScale() {
        const scale = Math.min(window.innerWidth / 750, 1);
        document.documentElement.style.setProperty("--scale", scale);
      }

      function syncHeight(expanded) {
        document.documentElement.style.setProperty(
          "--frame-height",
          expanded ? 929 : 204
        );
      }

      function syncEmbeddedHeight() {
        if (!embedded || window.parent === window) {
          return;
        }

        window.parent.postMessage(
          {
            type: "component-height",
            key: "rate-list",
            height: document.documentElement.scrollHeight,
          },
          "*"
        );
      }

      function setExpanded(expanded) {
        card.dataset.expanded = expanded ? "true" : "false";
        toggleButton.setAttribute("aria-expanded", expanded ? "true" : "false");
        toggleIcon.src = expanded ? toggleIconExpanded : toggleIconCollapsed;
        bedText.textContent = "1张1.8m大床";
        syncHeight(expanded);
        syncEmbeddedHeight();
      }

      toggleButton.addEventListener("click", function () {
        setExpanded(card.dataset.expanded !== "true");
      });

      window.addEventListener("resize", syncScale);
      window.addEventListener("resize", syncEmbeddedHeight);

      syncScale();
      setExpanded(true);
    </script>
