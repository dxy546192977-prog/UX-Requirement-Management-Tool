<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店列表 — 地图模式场景</title>
    <style>
        @font-face {
            font-family: 'SF Pro Text';
            src: local('San Francisco'), local('Helvetica Neue'), local('Arial');
        }
        @font-face {
            font-family: 'Alibaba Sans 102';
            src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/AlibabaSans102-Bold.ttf") format("truetype");
            font-weight: 700;
            font-display: swap;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .skill-component-wrapper {
            position: relative;
            width: 750px;
            height: 1304px;
            background-image: url('https://gw.alicdn.com/imgextra/i1/O1CN01n3VbU91u8OMIE3b7Y_!!6000000005992-0-tps-1125-1956.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .info-card {
            position: absolute;
            width: 686px;
            height: 316px;
            left: 32px;
            top: 908px;
            background: #FFFFFF;
            border-radius: 24px;
            display: flex;
            padding: 3px 18px 3px 3px;
            gap: 18px;
            box-sizing: border-box;
        }

        .image-container {
            position: relative;
            width: 222px;
            height: 310px;
            border-radius: 22px;
            background-image: url('https://gw.alicdn.com/imgextra/i3/O1CN01LWeecx1iTfMnbDixF_!!6000000004414-2-tps-444-620.png');
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .official-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 52px;
            height: 32px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 4px;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FFFCFA;
            font-size: 20px;
            line-height: 1.4;
        }

        .video-icon {
            position: absolute;
            right: 12px;
            bottom: 46px;
            width: 24px;
            height: 24px;
        }

        .image-overlay-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 222px;
            height: 34px;
        }

        .content-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 0;
        }

        .title-section {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .hotel-name {
            font-weight: 500;
            font-size: 30px;
            line-height: 1.4;
            color: #0F131A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
            margin-right: 8px;
        }
        .deluxe-tag {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 4px;
            height: 28px;
            background: #F7F8FA;
            border-radius: 4px;
            font-size: 20px;
            color: #919499;
            white-space: nowrap;
            flex-shrink: 0;
            margin-right: 6px;
        }
        .gold-brand-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .rating-section {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .score-box {
            padding: 3px 6px;
            background: #6666FF;
            border-radius: 8px;
            color: #FFFFFF;
            font-family: 'SF Pro Text', sans-serif;
            font-weight: 600;
            font-size: 22px;
            line-height: 1;
        }
        .rating-text {
            font-size: 24px;
            color: #6666FF;
        }

        .poi-text {
            font-size: 24px;
            line-height: 1.4;
            color: #5C5F66;
            margin-bottom: 10px;
        }

        .tags-section {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .tag {
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding: 0 6px;
            height: 28px;
            border: 1px solid rgba(92, 95, 102, 0.5);
            border-radius: 4px;
            font-size: 20px;
            color: #5C5F66;
            gap: 4px;
        }
        .tag.special {
             border-color: rgba(128, 85, 64, 0.5);
             color: #805540;
             gap: 0;
        }
        .tag.special svg {
            width: 28px;
            height: 28px;
        }

        .hot-sale-text {
            font-size: 20px;
            line-height: 1.4;
            color: #FF5533;
            margin-bottom: 6px;
        }

        .price-section {
            margin-top: auto;
            position: relative;
            bottom: 30px;
        }
        .price-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: relative;
            bottom: 6px;
        }
        .booking-count {
            font-size: 20px;
            color: #919499;
        }
        .price-main {
            display: flex;
            align-items: flex-end;
            gap: 2px;
        }
        .price-strikethrough {
            font-size: 20px;
            color: #919499;
            text-decoration: line-through;
            margin-right: 6px;
        }
        .price-currency {
            font-family: 'Alibaba Sans 102', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: #FF5533;
            line-height: 1;
            margin-bottom: 2px;
        }
        .price-amount {
            font-family: 'SF Pro Text', sans-serif;
            font-weight: 700;
            font-size: 42px;
            line-height: 0.81;
            color: #FF5533;
        }
        .price-suffix {
            font-size: 20px;
            color: #FF5533;
            line-height: 1.1;
        }

        .discount-banner {
            position: absolute;
            right: 0;
            bottom: -32px;
            display: flex;
            align-items: center;
            padding: 0 6px;
            height: 28px;
            background: linear-gradient(90deg, rgba(255, 230, 224, 0) 0%, rgba(255, 230, 224, 0.9) 100%);
            border-radius: 4px;
            gap: 6px;
        }

        .discount-group {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .discount-text {
            font-size: 20px;
            color: #FF5533;
            white-space: nowrap;
        }
        .discount-divider-svg {
            height: 16px;
            flex-shrink: 0;
        }
        .discount-arrow-svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .location-bar {
            position: absolute;
            width: 686px;
            height: 84px;
            left: 32px;
            top: 850px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px 24px 0px 0px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 18px;
            box-sizing: border-box;
        }
        .location-bar-content {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            bottom: 12px;
        }
        .location-bar-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }
        .location-bar-text {
            font-size: 24px;
            line-height: 1.4;
            color: #FFFFFF;
        }

        .map-button {
            position: absolute;
            width: 86px;
            height: 86px;
            left: 32px;
            top: 734px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .map-button svg {
            transform: scale(calc(126 / 86));
            width: 100%;
            height: 100%;
        }
    </style>
</head>
