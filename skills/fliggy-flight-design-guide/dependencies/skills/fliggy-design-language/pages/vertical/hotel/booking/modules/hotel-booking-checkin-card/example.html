<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>入住信息卡组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        /* 预订标签提示 */
        .booking-tip {
            width: 714px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: linear-gradient(to bottom, #FFF5EB 0%, #FFFFFF 100%);
            border-radius: var(--radius-l) var(--radius-l) 0 0;
            box-sizing: border-box;
        }

        .booking-tip-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .booking-tip-text {
            font-size: 24px;
            color: #FF8C00;
        }

        /* 入住信息卡片 */
        .checkin-card {
            width: 714px;
            background: var(--color-white);
            border-radius: 0 0 var(--radius-l) var(--radius-l);
            padding: 0 24px;
            box-sizing: border-box;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
            margin-bottom: 0;
        }

        .card-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-darkgray);
            margin: 0;
        }

        /* 房间数量控制 */
        .room-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .room-stepper {
            display: flex;
            align-items: center;
            gap: auto;
            width: 190px;
            padding: 5px;
            background: #F7F8FA;
            border-radius: 100px;
            justify-content: space-between;
        }

        .room-btn {
            width: 42px;
            height: 42px;
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            flex-shrink: 0;
        }

        .room-btn img {
            width: 42px;
            height: 42px;
        }

        .room-count {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-darkgray);
            text-align: center;
        }

        .cell-sub {
            font-size: 24px;
            color: var(--color-lightgray);
        }

        /* 表单单元样式 */
        .form-cell {
            display: flex;
            align-items: center;
            height: 90px;
            padding: 0;
            text-decoration: none;
            color: inherit;
        }

        .cell-label {
            display: flex;
            align-items: center;
            font-size: 28px;
            color: var(--color-lightgray);
            flex-shrink: 0;
            width: 180px;
        }

        .cell-value-area {
            flex: 1;
            display: flex;
            align-items: center;
            height: 100%;
            border-bottom: 1px solid #EEEEEE;
        }

        .form-cell:last-child .cell-value-area {
            border-bottom: none;
        }

        .cell-value {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }

        .cell-placeholder {
            font-size: 28px;
            color: #D2D4D9;
        }

        .cell-action {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
            padding-left: 12px;
        }

        .cell-tag {
            padding: 12px 24px;
            background: #F5F5F7;
            border-radius: 100px;
            font-size: 24px;
            color: var(--color-lightgray);
        }

        .cell-icon {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
        }

        .info-icon {
            width: 24px;
            height: 24px;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <!-- 预订标签提示 -->
    <div class="booking-tip">
        <img src="../../../assets/like.png" class="booking-tip-icon" alt="">
        <p class="booking-tip-text">预订后可快速确认订单，无需等待</p>
    </div>

    <!-- 入住信息 -->
    <section class="checkin-card">
        <div class="card-header">
            <h2 class="card-title">入住信息</h2>
            <div class="room-control">
                <span class="cell-sub">每间最多住2人</span>
                <div class="room-stepper">
                    <button class="room-btn">
                        <img src="../../../assets/reduce.png" alt="">
                    </button>
                    <span class="room-count">1间</span>
                    <button class="room-btn">
                        <img src="../../../assets/add.png" alt="">
                    </button>
                </div>
            </div>
        </div>
        <div class="form-cell">
            <span class="cell-label">入住人
                <img src="../../../assets/提示.png" class="info-icon" alt="">
            </span>
            <div class="cell-value-area">
                <span class="cell-value">薯格</span>
                <div class="cell-action">
                    <span class="cell-tag">帮人代订</span>
                    <img src="../../../assets/guest.png" class="cell-icon" alt="">
                </div>
            </div>
        </div>
        <div class="form-cell">
            <span class="cell-label">联系方式</span>
            <div class="cell-value-area">
                <span class="cell-value">15388666688</span>
                <div class="cell-action">
                    <img src="../../../assets/phone.png" class="cell-icon" alt="">
                </div>
            </div>
        </div>
        <div class="form-cell">
            <span class="cell-label">电子邮箱</span>
            <div class="cell-value-area">
                <span class="cell-placeholder">接收行程单，用于办理入住</span>
            </div>
        </div>
    </section>

</body>
</html>
