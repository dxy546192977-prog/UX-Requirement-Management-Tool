    <style>
      :root {
        --design-width: 750;
        --canvas-height: 0;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --badge-charge: #ff5533;
        --badge-free: #149aa8;
        --button-bg: #f7f8fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--canvas-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .facilities-panel {
        position: relative;
        width: 750px;
        padding: 24px 18px 30px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
      }

      .panel-title {
        margin: 0;
        color: var(--text-dark);
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        white-space: nowrap;
      }

      .gallery-row {
        display: flex;
        gap: 12px;
        margin-top: 18px;
        width: 840px;
        height: 153px;
      }

      .gallery-card {
        position: relative;
        width: 272px;
        height: 153px;
        overflow: hidden;
        border-radius: 12px;
        flex: 0 0 auto;
      }

      .gallery-card::after {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 46%,
          rgba(0, 0, 0, 0.34) 100%
        );
      }

      .gallery-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery-title {
        position: absolute;
        left: 12px;
        bottom: 6px;
        z-index: 1;
        margin: 0;
        color: #ffffff;
        font-size: 22px;
        font-weight: 500;
        line-height: 31px;
        white-space: nowrap;
      }

      .facilities-grid {
        display: flex;
        justify-content: space-between;
        margin-top: 24px;
        width: 714px;
      }

      .facilities-column {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 357px;
      }

      .facility-item {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 357px;
        min-height: 39px;
      }

      .facility-icon {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .facility-text {
        margin: 0;
        color: var(--text-dark);
        font-size: 28px;
        font-weight: 400;
        line-height: 39px;
        white-space: nowrap;
      }

      .facility-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        height: 28px;
        padding: 0 6px;
        border: 1px solid currentColor;
        border-radius: 4px;
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .facility-badge.charge {
        color: var(--badge-charge);
      }

      .facility-badge.free {
        color: var(--badge-free);
      }

      .view-all {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 30px auto 0;
        width: 240px;
        height: 60px;
        border-radius: 42px;
        background: var(--button-bg);
      }

      .view-all-text {
        margin: 0;
        color: var(--text-mid);
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        white-space: nowrap;
      }
    </style>
  </head>

    <script>
      (function () {
        const designWidth = 750;
        const sidePadding = 0;
        const canvas = document.querySelector(".canvas");

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth - sidePadding);
          const scale = Math.min(1, availableWidth / designWidth);
          document.documentElement.style.setProperty("--scale", scale.toFixed(4));
          document.documentElement.style.setProperty(
            "--canvas-height",
            String(canvas.offsetHeight)
          );
        }

        updateScale();
        window.addEventListener("resize", updateScale, { passive: true });
        window.addEventListener("load", updateScale, { passive: true });
      })();
    </script>
