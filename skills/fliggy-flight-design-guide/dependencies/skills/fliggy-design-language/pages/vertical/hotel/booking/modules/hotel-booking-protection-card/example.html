<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>出行保障卡组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        .card {
            width: 714px;
            background: var(--color-white);
            border-radius: 12px;
            padding: 24px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-darkgray);
            margin: 0 0 18px 0;
        }

        .protection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #EEEEEE;
        }

        .protection-item:last-child {
            border-bottom: none;
        }

        .protection-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .protection-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 28px;
            color: var(--color-darkgray);
        }

        .protection-desc {
            font-size: 24px;
            color: var(--color-lightgray);
        }

        .protection-price {
            font-size: 26px;
            color: var(--color-darkgray);
            margin-right: 18px;
        }

        .radio-btn {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .radio-btn svg {
            width: 44px;
            height: 44px;
        }

        .info-icon {
            width: 28px;
            height: 28px;
        }

        .expand-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }

        .more-protection {
            font-size: 22px;
            color: var(--color-lightgray);
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <section class="card">
        <h2 class="card-title">出行保障</h2>
        <div class="protection-item">
            <div class="protection-left">
                <span class="protection-title">
                    酒店无理由取消险
                    <img src="../../../assets/帮助.png" class="info-icon" alt="">
                </span>
                <span class="protection-desc">未入住可获损房费损失的100%</span>
            </div>
            <span class="protection-price">¥41/份</span>
            <div class="radio-btn">
                <img src="../../../assets/未勾选.png" alt="">
            </div>
        </div>
        <p class="more-protection">还有3项出行保障，最高可赔付120万元 
            <img src="../../../assets/下拉箭头.png" class="expand-icon" alt="">
        </p>
    </section>

</body>
</html>
