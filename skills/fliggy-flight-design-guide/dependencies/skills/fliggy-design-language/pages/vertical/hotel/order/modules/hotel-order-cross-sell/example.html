<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>交叉销售模块 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
            --radius-l: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            min-height: 400px;
        }

        /* 交叉销售模块 */
        .cross-sell-wrapper {
            position: fixed;
            bottom: 134px;
            left: 0;
            width: 750px;
            background: transparent;
            padding: 24px 30px;
            z-index: 998;
        }
        .cross-sell-card {
            background: var(--color-white);
            border-radius: var(--radius-l);
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .close-btn {
            position: absolute;
            top: 24px;
            left: 30px;
            width: 24px;
            height: 24px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: var(--color-lightgray);
            z-index: 1;
        }
        .cross-sell-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex: 1;
            margin-left: 24px;
        }
        .sell-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sell-title {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .sell-title .highlight {
            color: var(--color-indigo-1);
        }
        .sell-desc {
            font-size: 22px;
            color: var(--color-lightgray);
        }
        .expand-arrow {
            width: 32px;
            height: 32px;
            color: var(--color-lightgray);
        }
    </style>
</head>
<body>
    <div class="cross-sell-wrapper">
        <div class="cross-sell-card">
            <button class="close-btn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="cross-sell-content">
                <div class="sell-info">
                    <h4 class="sell-title">02月13日前往 <span class="highlight">杭州</span> ·订交通</h4>
                    <p class="sell-desc">一起订单单立减</p>
                </div>
                <svg class="expand-arrow" viewBox="0 0 32 32" fill="none">
                    <path d="M12 8L20 16L12 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
