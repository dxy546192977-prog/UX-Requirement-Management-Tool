<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>订单状态头部 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: #FFE566;
            padding: 176px 24px 50px;
        }

        /* 订单状态头部 */
        .order-status-wrapper {
            padding-top: 30px;
            padding-bottom: 0;
        }
        .status-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-text {
            font-size: 42px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .status-arrow {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        .status-desc {
            font-size: 28px;
            font-weight: 400;
            color: var(--color-midgray);
            line-height: 1.4;
            margin-top: 24px;
        }
        .action-btn-group {
            display: flex;
            gap: 18px;
            margin-top: 30px;
        }
        .action-btn {
            flex: 1;
            height: 64px;
            padding: 0;
            background: var(--color-white);
            border: none;
            border-radius: 32px;
            font-size: 26px;
            font-weight: 400;
            color: var(--color-darkgray);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="order-status-wrapper">
        <div class="status-title">
            <span class="status-text">已确认</span>
            <img class="status-arrow" src="../../../assets/arrow.png" alt="">
        </div>
        <p class="status-desc">房间将为您整晚保留</p>
        <div class="action-btn-group">
            <button class="action-btn">修改订单</button>
            <button class="action-btn">取消订单</button>
            <button class="action-btn">发票报销</button>
            <button class="action-btn">再次预订</button>
        </div>
    </div>
</body>
</html>
