<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 1400;
        --scale: 1;
        --text-dark: #0f131a;
        --text-white: #ffffff;
        --text-white-soft: rgba(255, 255, 255, 0.85);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 750px;
        height: 1400px;
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .highlights-panel {
        position: relative;
        width: 750px;
        height: 1400px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
      }

      .panel-title {
        position: absolute;
        top: 24px;
        left: 18px;
        margin: 0;
        color: #0f131a;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        white-space: nowrap;
      }

      .highlights-list {
        position: absolute;
        top: 98px;
        left: 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 714px;
      }

      .highlight-card {
        position: relative;
        width: 714px;
        height: 170px;
        overflow: hidden;
        border-radius: 12px;
        background: #b5b5b5;
      }

      .highlight-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .highlight-overlay {
        position: absolute;
        inset: 0;
      }

      .highlight-card.is-1 .highlight-overlay {
        background: linear-gradient(
          90deg,
          rgba(85, 70, 39, 0.94) 0%,
          rgba(85, 70, 39, 0.88) 40%,
          rgba(85, 70, 39, 0.22) 72%,
          rgba(85, 70, 39, 0) 100%
        );
      }

      .highlight-card.is-2 .highlight-overlay {
        background: linear-gradient(
          90deg,
          rgba(48, 125, 112, 0.94) 0%,
          rgba(48, 125, 112, 0.88) 40%,
          rgba(48, 125, 112, 0.22) 72%,
          rgba(48, 125, 112, 0) 100%
        );
      }

      .highlight-card.is-3 .highlight-overlay {
        background: linear-gradient(
          90deg,
          rgba(53, 93, 123, 0.94) 0%,
          rgba(53, 93, 123, 0.88) 40%,
          rgba(53, 93, 123, 0.22) 72%,
          rgba(53, 93, 123, 0) 100%
        );
      }

      .highlight-copy {
        position: relative;
        z-index: 1;
        padding: 24px 18px 0;
      }

      .highlight-title {
        margin: 0;
        color: var(--text-white);
        font-size: 30px;
        font-weight: 500;
        line-height: 42px;
        white-space: nowrap;
      }

      .highlight-desc {
        width: 460px;
        margin: 18px 0 0;
        color: var(--text-white-soft);
        font-size: 22px;
        font-weight: 400;
        line-height: 31px;
      }

      .hero-media {
        position: relative;
        width: 714px;
        height: 714px;
        overflow: hidden;
        border-radius: 12px;
        background: #dfe6e1;
      }

      .hero-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .fade-overlay {
        position: absolute;
        top: 1160px;
        left: 0;
        width: 750px;
        height: 240px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          #ffffff 50%,
          #ffffff 100%
        );
        pointer-events: none;
      }

      .expand-link {
        position: absolute;
        top: 1319px;
        left: 335px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      .expand-text {
        margin: 0;
        color: #0f131a;
        font-size: 30px;
        font-weight: 500;
        line-height: 51px;
        white-space: nowrap;
      }

      .expand-icon {
        width: 18px;
        height: 18px;
        object-fit: contain;
        flex: 0 0 auto;
      }
    </style>
  </head>

                data-node-id="8590:50292"
              />
              <div class="highlight-overlay"></div>
              <div class="highlight-copy">
                <p class="highlight-title" data-node-id="8590:50293">
                  焕新乐园嬉水天地

        </section>
      </div>

      (function () {
        const designWidth = 750;
        const sidePadding = 0;

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth - sidePadding);
