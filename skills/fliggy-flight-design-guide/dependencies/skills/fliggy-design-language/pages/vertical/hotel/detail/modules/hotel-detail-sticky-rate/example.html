<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 349;
        --scale: 1;
        --color-dark: #0f131a;
        --color-mid: #5c5f66;
        --color-light: #919499;
        --color-teal: #149aa8;
        --color-brown: #805540;
        --color-red: #ff5533;
        --color-red-light: #ffaa99;
        --color-orange: #ff8c1a;
        --color-orange-top: #ffa130;
        --line: rgba(15, 19, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
      }

      body {
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--color-dark);
      }

      img,
      svg {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        height: 349px;
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .sticky-rate {
        position: absolute;
        top: 0;
        left: 18px;
        width: 714px;
        height: 349px;
        padding: 18px;
        border-radius: 12px;
        background: #ffffff;
        overflow: hidden;
      }

      .content {
        display: flex;
        justify-content: space-between;
        width: 678px;
        height: 313px;
      }

      .photo-wrap {
        position: relative;
        width: 168px;
        height: 224px;
        border-radius: 12px;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .photo {
        width: 168px;
        height: 224px;
        object-fit: cover;
      }

      .top-badge {
        position: absolute;
        top: 0;
        left: 0;
        width: 168px;
        height: 50px;
      }

      .count-pill {
        position: absolute;
        right: 12px;
        bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        padding: 0 12px;
        border-radius: 18.898px;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(24.465px);
        color: #ffffff;
        font-size: 19.8px;
        font-weight: 500;
        line-height: 24px;
      }

      .info {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 492px;
        height: 313px;
        flex: 0 0 auto;
      }

      .top-info {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 492px;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 492px;
        min-height: 42px;
      }

      .room-title {
        max-width: 474px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 30px;
        font-weight: 500;
        line-height: 42px;
      }

      .arrow-gray {
        width: 7px;
        height: 12px;
        flex: 0 0 auto;
      }

      .meta-block {
        display: flex;
        flex-direction: column;
        gap: 9px;
        width: 492px;
      }

      .base-info {
        display: flex;
        align-items: center;
        gap: 18px;
        width: 492px;
        color: var(--color-mid);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
        white-space: nowrap;
      }

      .policy {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 492px;
        color: var(--color-teal);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .policy-icon {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
      }

      .tags {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 492px;
        height: 28px;
        overflow: hidden;
      }

      .member-tag {
        display: flex;
        align-items: center;
        min-width: 142px;
        height: 28px;
        padding: 0 8px 0 0;
        border: 1px solid rgba(128, 85, 64, 0.5);
        border-radius: 4px;
        white-space: nowrap;
        flex: 0 0 auto;
        overflow: hidden;
      }

      .member-tag-inner {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 100%;
        white-space: nowrap;
      }

      .member-brand {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 52px;
        width: 52px;
        height: 100%;
        border-radius: 3px 0 0 3px;
        background: linear-gradient(106.198deg, #6e5a4f 0%, #564131 95.149%);
        color: #fef5ec;
        font-size: 20px;
        font-weight: 400;
        line-height: 20px;
      }

      .member-text {
        color: var(--color-brown);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
        flex: 0 0 auto;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 6px;
        border: 1px solid rgba(92, 95, 102, 0.5);
        border-radius: 4px;
        color: var(--color-mid);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .tag.credit {
        width: 72px;
      }

      .tag.confirm {
        width: 92px;
      }

      .tag.insurance {
        width: 112px;
      }

      .vendor {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 255px;
        color: var(--color-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .brand-pill {
        width: 69px;
        height: 24px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .bottom-info {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        gap: 12px;
        width: 492px;
      }

      .price-side {
        display: inline-flex;
        flex-direction: column;
        gap: 12px;
        align-items: flex-end;
        min-width: 301px;
        height: auto;
      }

      .price-line {
        display: flex;
        align-items: flex-end;
        gap: 5px;
        width: 100%;
        height: 36px;
        justify-content: flex-end;
        white-space: nowrap;
      }

      .price-old {
        color: var(--color-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 20px;
        text-decoration: line-through;
      }

      .member-price-text {
        color: var(--color-red);
        font-size: 20px;
        font-weight: 400;
        line-height: 20px;
      }

      .current-price {
        display: flex;
        align-items: flex-end;
        color: var(--color-red);
      }

      .price-currency {
        font-family: "Alibaba Sans", "Helvetica Neue", Arial, sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 24px;
      }

      .price-value {
        font-family: "Fliggy Sans 102", "DIN Alternate", "Helvetica Neue",
          Arial, sans-serif;
        font-size: 42px;
        font-weight: 700;
        line-height: 27px;
      }

      .price-gap {
        width: 8px;
        height: 18px;
        flex: 0 0 auto;
      }

      .price-suffix {
        font-size: 20px;
        font-weight: 400;
        line-height: 20px;
      }

      .promo {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        height: 28px;
        padding: 0 6px;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(
          90deg,
          rgba(255, 230, 224, 0) 0%,
          rgba(255, 230, 224, 0.9) 100%
        );
      }

      .subsidy {
        width: 70px;
        height: 19px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .promo-sep {
        width: 1px;
        height: 16px;
        flex: 0 0 auto;
      }

      .promo-text {
        color: var(--color-red);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .promo-arrow {
        width: 5.25px;
        height: 9px;
        flex: 0 0 auto;
      }

      .book-button {
        width: 78px;
        height: 78px;
        border: 2px solid var(--color-orange);
        border-radius: 12px;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .book-top {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 50px;
        background: var(--color-orange);
        color: #ffffff;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
      }

      .book-bottom {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding-bottom: 2px;
        background: #ffffff;
        color: var(--color-orange);
        font-size: 18px;
        font-weight: 300;
        line-height: 28px;
      }

      .select-none {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
