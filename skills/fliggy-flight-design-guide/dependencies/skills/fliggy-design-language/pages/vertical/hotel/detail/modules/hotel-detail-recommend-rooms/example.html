<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 557;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --text-light: #919499;
        --text-blue: #6666ff;
        --text-brand: #ff5533;
        --line: #f0f2f5;
        --card-bg: #ffffff;
        --tag-bg: #f7f8fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      img,
      svg {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        height: calc(var(--design-height) * 1px);
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .panel {
        position: relative;
        width: 750px;
        min-height: 557px;
        overflow: hidden;
        border-radius: 24px 24px 0 0;
        background: var(--card-bg);
      }

      .header {
        position: relative;
        width: 750px;
        height: 98px;
        border-radius: 24px 24px 0 0;
        background: #ffffff;
      }

      .header-title {
        position: absolute;
        top: 24px;
        left: 18px;
        margin: 0;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        color: var(--text-dark);
        white-space: nowrap;
      }

      .content {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 18px;
        row-gap: 11px;
        width: 750px;
        min-height: 459px;
        padding: 12px 18px 0;
        background: #ffffff;
      }

      .hero-card {
        position: relative;
        width: 222px;
        height: 435px;
        overflow: hidden;
        border-radius: 12px;
      }

      .hero-image,
      .room-image,
      .hero-banner {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand-label {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 6px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(5px);
        color: #fffaf5;
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .hero-banner-wrap {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 222px;
        height: 34px;
      }

      .hero-banner {
        width: 222px;
        height: 34px;
      }

      .info {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 474px;
        min-height: 435px;
        padding: 2px 0;
      }

      .top-info {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 474px;
        min-height: 172px;
      }

      .title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        width: 474px;
        min-height: 42px;
      }

      .hotel-title {
        width: 330px;
        margin: 0;
        font-size: 30px;
        font-weight: 500;
        line-height: 42px;
        color: var(--text-dark);
        white-space: nowrap;
      }

      .level-tag {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 28px;
        margin-top: 7px;
        border-radius: 4px;
        background: var(--tag-bg);
        color: var(--text-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
      }

      .member-badge {
        display: block;
        width: 28px;
        height: 28px;
        margin-top: 7px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .rating-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 320px;
        height: 34px;
      }

      .rating-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 28px;
        border-radius: 8px;
        background: #6666ff;
        color: #ffffff;
        font-family: "Fliggy Sans 102", "Fliggy Sans", "Alibaba Sans",
          "Helvetica Neue", Arial, sans-serif;
        font-size: 26px;
        font-weight: 700;
        line-height: 26px;
      }

      .rating-copy {
        margin: 0;
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
        color: var(--text-blue);
        white-space: nowrap;
      }

      .location-copy {
        margin: 0;
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
        color: rgba(92, 95, 102, 0.9);
        white-space: nowrap;
      }

      .service-tags {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        width: 474px;
        height: 32px;
        overflow: hidden;
        padding: 2px 0;
      }

      .service-tag {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 6px;
        border: 1px solid rgba(92, 95, 102, 0.5);
        border-radius: 4px;
        color: #5c5f66;
        font-size: 20px;
        font-weight: 400;
        line-height: 28px;
        white-space: nowrap;
      }

      .room-strip {
        display: flex;
        gap: 12px;
        width: 474px;
        overflow: hidden;
      }

      .room-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 168px;
        flex: 0 0 auto;
      }

      .room-image-wrap {
        width: 168px;
        height: 166px;
        overflow: hidden;
        border-radius: 12px;
      }

      .room-copy {
        display: flex;
        flex-direction: column;
        gap: 6px;
        width: 168px;
      }

      .room-name {
        width: 168px;
        margin: 0;
        color: rgba(92, 95, 102, 0.9);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .price {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        color: var(--text-brand);
        font-family: "Fliggy Sans 102", "Fliggy Sans", "Alibaba Sans",
          "Helvetica Neue", Arial, sans-serif;
        white-space: nowrap;
      }

      .price-currency {
        font-size: 24px;
        font-weight: 700;
        line-height: 1;
        padding-bottom: 1px;
      }

      .price-number {
        font-size: 36px;
        font-weight: 700;
        line-height: 0.9;
      }

      .price-suffix {
        font-family: "Fliggy Sans 102", "Fliggy Sans", "Alibaba Sans",
          "Helvetica Neue", Arial, sans-serif;
        font-size: 18px;
        font-weight: 400;
        line-height: 1;
        padding-bottom: 2px;
      }

      .bottom-line {
        position: relative;
        width: 474px;
        height: 1px;
        margin-left: 240px;
        background: var(--line);
        transform: scaleY(0.5);
        transform-origin: center;
      }
    </style>
  </head>

        const media = document.querySelectorAll("[data-src]");
        const panel = document.querySelector(".panel");

        function syncPanelHeight() {
          root.style.setProperty("--design-height", String(panel.offsetHeight));
        }

        media.forEach((img) => {
          img.src = images[img.dataset.src];
          if (!img.complete) {
            img.addEventListener("load", syncPanelHeight, { once: true });
          }
        });

        const designWidth = 750;
        const sidePadding = 0;

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth - sidePadding);
          const scale = availableWidth / designWidth;
          root.style.setProperty("--scale", scale.toFixed(4));
          syncPanelHeight();
        }

        updateScale();
        window.addEventListener("resize", updateScale, { passive: true });
        window.addEventListener("load", syncPanelHeight, { passive: true });
      })();
