<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 160;
        --scale: 1;
        --color-dark: #0f131a;
        --color-mid: #5c5f66;
        --color-line: #d2d4d9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
        min-height: 0;
        background: #f2f3f5;
        overflow: hidden;
      }

      body {
        display: block;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        height: 160px;
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .store-card {
        position: relative;
        width: 750px;
        height: 160px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
      }

      .store-main {
        position: absolute;
        top: 18px;
        left: 18px;
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .store-logo-frame {
        width: 124px;
        height: 124px;
        overflow: hidden;
        border: 1px solid var(--color-line);
        border-radius: 12px;
        background: #ffffff;
        flex: 0 0 auto;
      }

      .store-logo {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .store-copy {
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 272px;
      }

      .store-title {
        margin: 0;
        color: var(--color-dark);
        font-size: 30px;
        font-weight: 600;
        line-height: 1.4;
        letter-spacing: 0.1909px;
        white-space: nowrap;
      }

      .store-meta {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .store-badge {
        width: 84px;
        height: 28px;
        object-fit: cover;
        flex: 0 0 auto;
      }

      .store-fans {
        margin: 0;
        color: var(--color-mid);
        font-size: 20px;
        font-weight: 400;
        line-height: 1.4;
        white-space: nowrap;
      }

      .store-link {
        position: absolute;
        top: 40px;
        right: 18px;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .store-link-text {
        margin: 0;
        color: var(--color-dark);
        font-size: 24px;
        font-weight: 500;
        line-height: 1.4;
        white-space: nowrap;
      }

      .store-link-icon {
        width: 12px;
        height: 12px;
        object-fit: contain;
        flex: 0 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <div class="canvas">
        <section class="store-card" data-node-id="8584:46152">
          <div class="store-main" data-node-id="8585:46591">
            <div class="store-logo-frame" data-node-id="8584:46153">
              <img
                class="store-logo"
                alt=""
                src="https://gw.alicdn.com/imgextra/i3/O1CN011xfqQF1VUV5AsDEyI_!!6000000002656-0-tps-248-248.jpg"
                data-node-id="8584:46153"
              />
            </div>
            <div class="store-copy" data-node-id="8585:46590">
              <p class="store-title" data-node-id="8584:46154">万豪国际集团旗舰店</p>
              <div class="store-meta" data-node-id="8585:46588">
                <img
                  class="store-badge"
                  alt=""
                  src="https://gw.alicdn.com/imgextra/i1/O1CN01RQq9y31Dy7cA62FSe_!!6000000000284-2-tps-168-56.png"
                  data-node-id="8585:46589"
                />
                <p class="store-fans" data-node-id="8584:46157">粉丝数 616.5万</p>
              </div>
            </div>
          </div>
          <div class="store-link" data-node-id="8585:46592">
            <p class="store-link-text" data-node-id="8585:46593">进店逛逛</p>
            <img
              class="store-link-icon"
              alt=""
              src="https://gw.alicdn.com/imgextra/i2/O1CN01JSx9Ff1a1iGcTxgqJ_!!6000000003270-2-tps-24-24.png"
              data-node-id="8585:46596"
            />
          </div>
        </section>
      </div>
    </div>

    <script>
      (function () {
        const designWidth = 750;
        const sidePadding = 0;

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth - sidePadding);
          const scale = Math.min(1, availableWidth / designWidth);
          document.documentElement.style.setProperty("--scale", scale.toFixed(4));
        }

        updateScale();
        window.addEventListener("resize", updateScale, { passive: true });
      })();
    </script>
  </body>
</html>
