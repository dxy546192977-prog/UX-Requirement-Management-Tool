<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>订单信息模块 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 订单信息模块 */
        .order-info-wrapper {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
            padding: 0 30px;
            margin-top: 24px;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 96px;
            padding: 0;
            border-bottom: 1px solid var(--color-bg);
        }
        .order-row:last-child { border-bottom: none; }
        .row-label {
            font-size: 24px;
            color: var(--color-lightgray);
        }
        .row-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .row-value {
            font-size: 24px;
            color: var(--color-darkgray);
        }
        .copy-btn {
            font-size: 24px;
            color: var(--color-indigo-1);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }
        .wangwang-icon {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>
    <div class="order-info-wrapper">
        <div class="order-row">
            <span class="row-label">订单号</span>
            <div class="row-content">
                <span class="row-value">247357632139390788</span>
                <button class="copy-btn">复制</button>
            </div>
        </div>
        <div class="order-row">
            <span class="row-label">卖家</span>
            <div class="row-content">
                <span class="row-value">海南赶海旅游专营店</span>
                <img class="wangwang-icon" src="../../../assets/wangwang.png" alt="">
            </div>
        </div>
    </div>
</body>
</html>
