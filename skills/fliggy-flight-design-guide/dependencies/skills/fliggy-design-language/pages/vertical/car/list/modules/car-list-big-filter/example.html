<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>租车 LIST · 大筛选</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F2F3F5; font-family: 'PingFang SC', sans-serif; }
    .container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 0 12px 18px;
      gap: 12px;
      position: relative;
      width: 750px;
      height: 113px;
      background: #FFFFFF;
      overflow: hidden;
    }
    .card-wrapper {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      width: 914px;
      height: 89px;
      flex: none;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 24px;
      gap: 3px;
      width: 215px;
      height: 89px;
      background: radial-gradient(100% 100% at 100% 0%, #FFFFFF 0%, #F7F8FA 100%);
      border-radius: 12px;
      flex: none;
    }
    .card-title {
      font-weight: 500;
      font-size: 24px;
      line-height: 140%;
      color: #0F131A;
    }
    .card-desc {
      font-weight: 400;
      font-size: 20px;
      line-height: 140%;
      color: #919499;
    }
    .icon {
      position: absolute;
      width: 90px;
      height: 60px;
      top: 0;
      pointer-events: none;
    }
    .icon-1 { left: 143px; z-index: 3; }
    .icon-2 { left: 376px; z-index: 1; }
    .icon-3 { left: 609px; z-index: 2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card-wrapper">
      <div class="card">
        <div class="card-title">小伤免赔</div>
        <div class="card-desc">小剐小蹭 免赔付</div>
      </div>
      <div class="card">
        <div class="card-title">新能源</div>
        <div class="card-desc">低碳环保 经济省油</div>
      </div>
      <div class="card">
        <div class="card-title">新车尝鲜</div>
        <div class="card-desc">新车上市 深度试驾</div>
      </div>
    </div>
    <img class="icon icon-1" src="https://img.alicdn.com/imgextra/i4/O1CN01MML30h1Qcg4jk2JmU_!!6000000001997-55-tps-90-60.svg" alt="">
    <img class="icon icon-2" src="https://img.alicdn.com/imgextra/i1/O1CN01DU7HgB26WSYnlXsNo_!!6000000007669-55-tps-90-60.svg" alt="">
    <img class="icon icon-3" src="https://img.alicdn.com/imgextra/i2/O1CN01guoJ6P1cfDf869ijd_!!6000000003627-55-tps-90-60.svg" alt="">
  </div>
</body>
</html>
