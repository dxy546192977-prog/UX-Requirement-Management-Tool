<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>租车 LIST · 二级导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', sans-serif; background: #F2F3F5; }
    .frame-149 {
      width: 750px;
      height: 88px;
      background: #FFFFFF;
      position: relative;
    }
    .back-btn {
      position: absolute;
      width: 48px;
      height: 48px;
      left: 24px;
      top: calc(50% - 24px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .frame-144 {
      position: absolute;
      width: 48px;
      height: 48px;
      right: 24px;
      top: calc(50% - 24px);
    }
    .frame-144 img { width: 100%; height: 100%; }
    .frame-14 {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 6px 12px;
      gap: 12px;
      position: absolute;
      width: 370px;
      height: 72px;
      left: 84px;
      top: 8px;
      border-radius: 12px;
    }
    .frame-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 310px;
      height: 50px;
    }
    .station-name {
      font-weight: 400;
      font-size: 18px;
      line-height: 140%;
      color: #0F131A;
    }
    .frame-529 {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      height: 25px;
    }
    .time-text {
      font-weight: 400;
      font-size: 18px;
      line-height: 140%;
      color: #0F131A;
    }
    .group-526 img { width: 18px; height: 8px; display: block; }
    .edit-btn { width: 24px; height: 24px; flex-shrink: 0; }
    .edit-btn img { width: 100%; height: 100%; }
    .search-box {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 20px;
      gap: 6px;
      position: absolute;
      width: 182px;
      height: 72px;
      right: 96px;
      top: 8px;
      background: #FFFFFF;
      border: 2px solid #FFE033;
      border-radius: 36px;
    }
    .icon-search { width: 32px; height: 32px; }
    .icon-search img { width: 100%; height: 100%; }
    .search-placeholder {
      font-weight: 400;
      font-size: 26px;
      line-height: 140%;
      color: #919499;
    }
  </style>
</head>
<body>
  <div class="frame-149">
    <div class="back-btn" aria-label="返回">
      <svg viewBox="0 0 19 35" width="19" height="35" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 2L3 17.5L17 33" stroke="#0F131A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="frame-14">
      <div class="frame-info">
        <span class="station-name">乌鲁木齐天山国际机场站</span>
        <div class="frame-529">
          <span class="time-text">5月10日 10:00</span>
          <div class="group-526">
            <img src="https://img.alicdn.com/imgextra/i1/O1CN01KFlAYH28gCDAsTQdl_!!6000000007961-55-tps-20-9.svg" alt="">
          </div>
          <span class="time-text">5月10日 10:00</span>
        </div>
      </div>
      <div class="edit-btn">
        <img src="https://img.alicdn.com/imgextra/i2/O1CN01zxNhuq1NDXUNU1bgS_!!6000000001536-55-tps-24-24.svg" alt="编辑">
      </div>
    </div>
    <div class="search-box">
      <div class="icon-search">
        <img src="https://img.alicdn.com/imgextra/i3/O1CN013SapFp1FD49by4D5I_!!6000000000452-55-tps-32-32.svg" alt="">
      </div>
      <span class="search-placeholder">搜车型</span>
    </div>
    <div class="frame-144">
      <img src="https://img.alicdn.com/imgextra/i4/O1CN01eb3WQf1RStE7bXHc6_!!6000000002111-55-tps-48-48.svg" alt="更多">
    </div>
  </div>
</body>
</html>
