<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>租车 LIST · 快筛栏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F2F3F5; font-family: 'PingFang SC', sans-serif; }
    .filter-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px 18px;
      gap: 12px;
      width: 750px;
      height: 84px;
      background: #FFFFFF;
      overflow-x: auto;
    }
    .filter-item {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      padding: 10px 18px;
      gap: 6px;
      height: 60px;
      background: #F7F8FA;
      border-radius: 6px;
      flex: none;
      cursor: pointer;
    }
    .filter-item:hover { background: #EBEDF0; }
    .filter-item.shaixuan { width: 120px; }
    .filter-item.paixu { width: 110px; }
    .filter-item.youhui { width: 146px; }
    .filter-item.normal { width: 132px; }
    .filter-text {
      font-weight: 400;
      font-size: 24px;
      line-height: 140%;
      color: #0F131A;
      white-space: nowrap;
    }
    .filter-icon { width: 30px; height: 30px; flex: none; }
    .arrow-icon { width: 20px; height: 20px; flex: none; }
  </style>
</head>
<body>
  <div class="filter-bar">
    <div class="filter-item shaixuan">
      <span class="filter-text">筛选</span>
      <img class="filter-icon" src="https://img.alicdn.com/imgextra/i4/O1CN01bNE8iO1BtsiTA2a4U_!!6000000000004-55-tps-30-30.svg" alt="">
    </div>
    <div class="filter-item paixu">
      <span class="filter-text">排序</span>
      <img class="arrow-icon" src="https://img.alicdn.com/imgextra/i3/O1CN01fn5rqU1IYXZV398VS_!!6000000000905-55-tps-20-20.svg" alt="">
    </div>
    <div class="filter-item youhui">
      <img class="filter-icon" src="https://img.alicdn.com/imgextra/i2/O1CN01c2JLTq1JJFy8NObql_!!6000000001007-55-tps-30-30.svg" alt="">
      <span class="filter-text">优惠</span>
      <img class="arrow-icon" src="https://img.alicdn.com/imgextra/i3/O1CN01fn5rqU1IYXZV398VS_!!6000000000905-55-tps-20-20.svg" alt="">
    </div>
    <div class="filter-item normal"><span class="filter-text">送车上门</span></div>
    <div class="filter-item normal"><span class="filter-text">倒车影像</span></div>
  </div>
</body>
</html>
