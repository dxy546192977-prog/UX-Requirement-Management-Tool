<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>飞猪机票首页</title>
  <style>
    :root {
      --color-indigo-1: #FF6600;
      --color-blue: #1677FF;
      --color-bg: #F7F8FA;
      --color-card: #FFFFFF;
      --color-price: #FF4D00;
      --color-success: #00B578;
      --color-text-1: #1A1A1A;
      --color-text-2: #333333;
      --color-text-3: #666666;
      --color-text-4: #999999;
      --color-border: #E5E5E5;
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --shadow-card: 0 4px 12px rgba(0,0,0,0.05);
      --spacing-xs: 6px;
      --spacing-sm: 12px;
      --spacing-md: 18px;
      --spacing-lg: 24px;
      --spacing-xl: 30px;
      --font-h1: 36px;
      --font-h2: 28px;
      --font-body: 26px;
      --font-sub: 22px;
      --font-note: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text-1);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .fdl-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 140px;
    }

    .fdl-header {
      background-color: var(--color-card);
      padding: var(--spacing-lg) var(--spacing-xl) var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
    }

    .fdl-search-wrapper {
      display: flex;
      align-items: center;
      background-color: var(--color-bg);
      border-radius: var(--radius-lg);
      padding: var(--spacing-sm) var(--spacing-md);
      margin-bottom: var(--spacing-sm);
    }

    .fdl-search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: var(--font-body);
      color: var(--color-text-2);
      outline: none;
      padding: var(--spacing-xs) 0;
    }

    .fdl-tags-container {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .fdl-tag {
      padding: var(--spacing-xs) var(--spacing-sm);
      background-color: var(--color-bg);
      border-radius: var(--radius-sm);
      font-size: var(--font-sub);
      color: var(--color-text-3);
      cursor: pointer;
      transition: all 0.2s;
    }

    .fdl-tag.active {
      background-color: #FFF0E5;
      color: var(--color-indigo-1);
    }

    .fdl-clear-btn {
      margin-left: auto;
      background: none;
      border: none;
      font-size: var(--font-sub);
      color: var(--color-text-4);
      cursor: pointer;
      padding: var(--spacing-xs) var(--spacing-sm);
    }

    .fdl-nav {
      display: flex;
      justify-content: space-around;
      background-color: var(--color-card);
      padding: var(--spacing-md) 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--color-border);
    }

    .fdl-nav-item {
      font-size: var(--font-body);
      color: var(--color-text-3);
      padding: var(--spacing-xs) var(--spacing-sm);
      cursor: pointer;
      position: relative;
    }

    .fdl-nav-item.active {
      color: var(--color-text-1);
      font-weight: 600;
    }

    .fdl-nav-item.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 4px;
      background-color: var(--color-indigo-1);
      border-radius: 2px;
    }

    .fdl-waterfall {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
      padding: var(--spacing-md) var(--spacing-xl);
    }

    .fdl-card {
      background-color: var(--color-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
    }

    .fdl-card-img {
      width: 100%;
      height: auto;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }

    .fdl-card-body {
      padding: var(--spacing-md);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .fdl-card-title {
      font-size: var(--font-body);
      font-weight: 600;
      color: var(--color-text-1);
      margin-bottom: var(--spacing-xs);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fdl-card-route {
      font-size: var(--font-sub);
      color: var(--color-text-3);
      margin-bottom: var(--spacing-sm);
    }

    .fdl-card-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .fdl-price {
      font-size: var(--font-body);
      font-weight: 700;
      color: var(--color-price);
    }

    .fdl-price span {
      font-size: var(--font-sub);
      font-weight: 400;
    }

    .fdl-btn {
      padding: var(--spacing-xs) var(--spacing-sm);
      background-color: transparent;
      color: var(--color-indigo-1);
      border: 1px solid var(--color-indigo-1);
      border-radius: var(--radius-sm);
      font-size: var(--font-sub);
      cursor: pointer;
      font-weight: 600;
    }

    .fdl-trigger-area {
      margin: var(--spacing-md) var(--spacing-xl);
      padding: var(--spacing-md);
      background-color: var(--color-card);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      text-align: center;
      color: var(--color-text-4);
      font-size: var(--font-sub);
      cursor: pointer;
    }

    .fdl-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: var(--color-card);
      padding: var(--spacing-md) var(--spacing-xl);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid var(--color-border);
      z-index: 100;
    }

    .fdl-bottom-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: var(--font
