<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>机票首页 — 省钱模块</title>
  <style>
    :root {
      --color-darkgray: #0f131a;
      --color-midgray: #5c5f66;
      --color-white: #ffffff;
      --color-bg-page: #f2f3f5;
      --color-separator: #d2d4d9;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "PingFang SC", "SimHei", sans-serif;
      background: var(--color-bg-page);
      color: var(--color-darkgray);
      width: 750px;
      margin: 0 auto;
      padding: 24px 0;
    }
    .fdl-flight-home-savings.save-money {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 20px 24px 24px;
      gap: 10px;
      width: 702px;
      margin: 0 auto;
      min-height: 256px;
      background: var(--color-white);
      border-radius: 18px;
    }
    .save-money__inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0;
      gap: 20px;
      width: 654px;
    }
    .save-money__header {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 0;
      width: 654px;
      min-height: 32px;
    }
    .save-money__title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      font-size: 32px;
      line-height: 100%;
      color: var(--color-darkgray);
    }
    .save-money__more {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      cursor: pointer;
    }
    .save-money__more-text {
      font-weight: 400;
      font-size: 24px;
      line-height: 100%;
      color: var(--color-midgray);
    }
    .save-money__more-icon svg {
      display: block;
      width: 8.47px;
      height: 14.52px;
    }
    .save-money__cards {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0;
      gap: 12px;
      width: 654px;
      height: 160px;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 16px;
      height: 160px;
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .card__info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .card__title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card__title {
      font-weight: 500;
      font-size: 26px;
      line-height: 100%;
      color: var(--color-darkgray);
    }
    .card__subtitle {
      font-weight: 400;
      font-size: 22px;
      line-height: 100%;
      color: var(--color-midgray);
    }
    .card--discount {
      width: 256px;
      background-image: url("https://gw.alicdn.com/imgextra/i4/O1CN01awtbsf1MntJE7vx8U_!!6000000001480-2-tps-512-320.png");
    }
    .card__btn--red {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px 14px;
      width: 108px;
      height: 42px;
      background: #ff6666;
      border-radius: 24px;
      border: none;
      font-family: "PingFang SC", sans-serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 100%;
      color: var(--color-white);
      cursor: pointer;
    }
    .card--promo-mid {
      width: 242px;
      background-image: url("https://gw.alicdn.com/imgextra/i2/O1CN01ucCwHq1oxn6zs4Wuh_!!6000000005292-2-tps-484-320.png");
    }
    .card--promo-sm {
      width: 156px;
      background-image: url("https://gw.alicdn.com/imgextra/i4/O1CN01YVP5mc1I4lpLCFKL2_!!6000000000840-2-tps-312-320.png");
    }
    .card__tag {
      display: block;
      width: 34px;
      height: 24px;
      flex-shrink: 0;
    }
    .card__tag img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .card__btn--gold {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 5px 14px;
      width: 108px;
      height: 42px;
      border: 1px solid rgba(178, 95, 36, 0.32);
      border-radius: 22px;
      background: transparent;
      font-family: "PingFang SC", sans-serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 28px;
      color: #b25f24;
      cursor: pointer;
    }
  </style>
</head>
<body>

<section class="fdl-flight-home-savings save-money" aria-label="出行省钱">
  <div class="save-money__inner">
    <div class="save-money__header">
      <span class="save-money__title">出行省钱</span>
      <div class="save-money__more" role="button" tabindex="0">
        <span class="save-money__more-text">更多优惠</span>
        <span class="save-money__more-icon">
          <svg viewBox="0 0 9 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L7.5 7.5L1 14" stroke="#D2D4D9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="save-money__cards">
      <div class="card card--discount">
        <div class="card__info">
          <div class="card__title-row">
            <span class="card__title">机票优惠券</span>
          </div>
          <span class="card__subtitle">领券立减出行省</span>
        </div>
        <button class="card__btn--red" type="button">立即领取</button>
      </div>

      <div class="card card--promo-mid">
        <div class="card__info">
          <div class="card__title-row">
            <span class="card__tag">
              <img src="https://gw.alicdn.com/imgextra/i1/O1CN01ckRuPS233eo0NPAco_!!6000000007200-2-tps-68-48.png" alt="F1" />
            </span>
            <span class="card__title">低价机票日历</span>
          </div>
          <span class="card__subtitle">看看哪天飞最便宜</span>
        </div>
        <button class="card__btn--gold" type="button">去看看</button>
      </div>

      <div class="card card--promo-sm">
        <div class="card__info">
          <div class="card__title-row">
            <span class="card__title">特价机票</span>
          </div>
          <span class="card__subtitle">低至1折起</span>
        </div>
        <button class="card__btn--gold" type="button">去看看</button>
      </div>
    </div>
  </div>
</section>

</body>
</html>
