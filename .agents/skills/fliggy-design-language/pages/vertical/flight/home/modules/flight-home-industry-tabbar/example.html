<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>机票首页 — 行业底栏</title>
  <style>
    :root {
      --color-darkgray: #0f131a;
      --color-white: #ffffff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "PingFang SC", "SimHei", sans-serif;
      background: #f2f3f5;
      min-height: 120vh;
      width: 750px;
      margin: 0 auto;
      padding-bottom: 180px;
    }
    .fdl-flight-home-industry-tabbar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 750px;
      background: var(--color-white);
      z-index: 1000;
    }
    .industry-tabbar__tabs {
      display: flex;
      width: 750px;
      height: 86px;
      align-items: center;
    }
    .industry-tabbar__item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 0;
      padding: 0 4px;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      color: var(--color-darkgray);
    }
    .industry-tabbar__icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      display: block;
    }
    .industry-tabbar__label {
      font-size: 20px;
      font-weight: 400;
      line-height: 1;
      color: var(--color-darkgray);
      white-space: nowrap;
    }
    .industry-tabbar__safe {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .industry-tabbar__home-indicator {
      width: 268px;
      height: 10px;
      border-radius: 20px;
      background: #000000;
    }
  </style>
</head>
<body>
  <p style="padding:24px;font-size:26px;color:#5c5f66;">向下滚动可见底栏固定在视口底部（示例页留白）。</p>

  <nav class="fdl-flight-home-industry-tabbar industry-tabbar" aria-label="机票快捷入口">
    <div class="industry-tabbar__tabs">
      <button class="industry-tabbar__item" type="button">
        <img class="industry-tabbar__icon" src="https://gw.alicdn.com/imgextra/i4/O1CN01ix7Jl11pvKbIZMwKv_!!6000000005422-2-tps-96-96.png" alt="" />
        <span class="industry-tabbar__label">值机选座</span>
      </button>
      <button class="industry-tabbar__item" type="button">
        <img class="industry-tabbar__icon" src="https://gw.alicdn.com/imgextra/i3/O1CN01oLZyyI1peNwjCQ3TR_!!6000000005385-2-tps-96-96.png" alt="" />
        <span class="industry-tabbar__label">我的收藏</span>
      </button>
      <button class="industry-tabbar__item" type="button">
        <img class="industry-tabbar__icon" src="https://gw.alicdn.com/imgextra/i1/O1CN01AHJrWd1vfCLN81V3n_!!6000000006199-2-tps-96-96.png" alt="" />
        <span class="industry-tabbar__label">发票报销</span>
      </button>
      <button class="industry-tabbar__item" type="button">
        <img class="industry-tabbar__icon" src="https://gw.alicdn.com/imgextra/i2/O1CN01ddy2N51UAyaCmJWTd_!!6000000002478-2-tps-96-96.png" alt="" />
        <span class="industry-tabbar__label">航班动态</span>
      </button>
      <button class="industry-tabbar__item" type="button">
        <img class="industry-tabbar__icon" src="https://gw.alicdn.com/imgextra/i1/O1CN01f5AF411vUCq1gfv7q_!!6000000006175-2-tps-96-96.png" alt="" />
        <span class="industry-tabbar__label">我的订单</span>
      </button>
    </div>
    <div class="industry-tabbar__safe" aria-hidden="true">
      <div class="industry-tabbar__home-indicator"></div>
    </div>
  </nav>
</body>
</html>
