<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>火车票列表 — 顶栏（状态栏 + titlebar）</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      min-height: 100vh;
    }
    .preview-label {
      font-size: 12px;
      color: #919499;
      margin-bottom: 8px;
      width: 375px;
    }
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-display: swap;
    }
  </style>
</head>
<body>
<p class="preview-label">与 listing-page 一致：44 + 44</p>
<style>/* Status Bar */
  #status-bar {
    height: 44px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .sb-left { display: flex; align-items: center; }
  .sb-time { font-size: 15px; font-weight: 600; color: #0f131a; }
  .sb-notch {
    width: 120px; height: 28px;
    background: #0f131a;
    border-radius: 0 0 18px 18px;
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
  }
  .sb-right { display: flex; align-items: center; gap: 6px; }
  .sb-right svg { fill: #0f131a; }
  .sb-right path, .sb-right rect, .sb-right circle { fill: #0f131a; }
  .sb-battery { width: 24px; height: 12px; border: 1.5px solid #0f131a; border-radius: 3px; position: relative; padding: 1.5px; }
  .sb-battery::after { content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 2px; height: 5px; background: #0f131a; border-radius: 0 1px 1px 0; }
  .sb-battery-inner { width: 100%; height: 100%; background: #0f131a; border-radius: 1px; }</style>
  <div id="status-bar" style="width:375px;height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:relative;">
    <div class="sb-left"><span class="sb-time" style="font-size:15px;font-weight:600;color:#0f131a;">9:41</span></div>
    <div class="sb-notch" style="width:120px;height:28px;background:#0f131a;border-radius:0 0 18px 18px;position:absolute;top:0;left:50%;transform:translateX(-50%);"></div>
    <div class="sb-right" style="display:flex;align-items:center;gap:6px;"><span style="font-size:12px;color:#0f131a;">■■■</span></div>
  </div>
<!-- ==================== ListingTitlebar ==================== -->
<script>
class ListingTitlebar extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  static get observedAttributes() { return ['departure-city', 'arrival-city']; }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { if (this.shadowRoot) this.render(); }
  getAttr(n, f='') { return this.getAttribute(n) || f; }
  truncate(name) { return name.length <= 5 ? name : name.substring(0, 5) + '...'; }
  render() {
    const dep = this.truncate(this.getAttr('departure-city', '杭州市'));
    const arr = this.truncate(this.getAttr('arrival-city', '北京市'));
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; width: 375px; height: 44px; background: #fff; }
        .tb { display: flex; align-items: center; justify-content: space-between; height: 100%; padding: 0 16px; }
        .ib { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ib svg { width: 24px; height: 24px; }
        .cc { display: flex; align-items: center; gap: 8px; font-size: 15px; line-height: 21px; color: #0f131a; font-weight: 500; }
        .cn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .si { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; top: -1px; }
        .si svg { width: 16px; height: 16px; }
      </style>
      <div class="tb">
        <div class="ib"><svg viewBox="0 0 24 24" fill="none"><path d="M15.5 19L8.5 12L15.5 5" stroke="#0f131a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cc">
          <span class="cn">${dep}</span>
          <div class="si"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11.9715 1.5C16.6905 1.5 20.7982 4.6005 22.104 9.03C22.3942 10.0125 21.489 10.9298 20.4945 10.6635L20.0827 10.551C19.0815 10.2682 17.7997 9.861 16.233 9.32625C16.0693 9.27095 15.9182 9.18393 15.7882 9.07017C15.6582 8.9564 15.552 8.81813 15.4755 8.66325C15.3993 8.50865 15.3546 8.34048 15.344 8.16849C15.3333 7.99649 15.3568 7.82408 15.4132 7.66125C15.651 6.978 16.233 6.4485 16.7932 5.745C15.4621 4.73085 13.8447 4.16309 12.1717 4.12275L11.9715 4.11975C8.47198 4.11825 5.38573 6.40125 4.38148 9.73575C4.27863 10.068 4.04884 10.3463 3.74201 10.5102C3.43519 10.6741 3.0761 10.7103 2.74273 10.611C2.40974 10.5133 2.12902 10.2877 1.96202 9.98353C1.79502 9.67933 1.75537 9.32137 1.85173 8.988C3.17248 4.5795 7.26748 1.5 11.9715 1.5ZM11.9842 22.5C7.26448 22.5 3.15823 19.3995 1.85023 14.97C1.56148 13.9875 2.46523 13.0702 3.46048 13.3365L3.87223 13.449C4.87273 13.7317 6.15448 14.139 7.72198 14.6737C8.05273 14.7863 8.32498 15.0247 8.47948 15.3368C8.63248 15.6495 8.65498 16.0095 8.54098 16.3387C8.30473 17.022 7.72198 17.5515 7.16098 18.255C8.49241 19.2697 10.1104 19.8378 11.784 19.878L11.9835 19.8802C15.51 19.8802 18.5835 17.5702 19.5735 14.265C19.679 13.9361 19.9092 13.6616 20.2147 13.5004C20.5201 13.3391 20.8766 13.304 21.2077 13.4025C21.5385 13.4992 21.8179 13.7221 21.9856 14.0232C22.1533 14.3242 22.1958 14.6791 22.104 15.0112C20.784 19.4205 16.6875 22.5 11.9842 22.5Z" fill="#0F131A"/></svg></div>
          <span class="cn">${arr}</span>
        </div>
        <div class="ib"><svg viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="2" fill="#0f131a"/><circle cx="12" cy="12" r="2" fill="#0f131a"/><circle cx="19" cy="12" r="2" fill="#0f131a"/></svg></div>
      </div>`;
  }
}
customElements.define('listing-titlebar', ListingTitlebar);
</script>
<listing-titlebar departure-city="杭州市" arrival-city="北京市"></listing-titlebar>
</body>
</html>
