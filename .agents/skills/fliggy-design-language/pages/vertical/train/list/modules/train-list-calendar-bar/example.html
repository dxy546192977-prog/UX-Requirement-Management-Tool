<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>火车票列表 — 日历条</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      min-height: 100vh;
    }
    .preview-label {
      font-size: 12px;
      color: #919499;
      margin-bottom: 8px;
      width: 375px;
    }
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-display: swap;
    }
  </style>
</head>
<body>
<p class="preview-label">listing-calendar-bar · 30 天横滑 + 日历入口</p>
<!-- ==================== ListingCalendarBar ==================== -->
<script>
class ListingCalendarBar extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); this._selectedIndex = 0; }
  connectedCallback() { this._dates = this.generateDates(30); this.render(); this.bindEvents(); }
  getHolidayData() { return { festivals: { '4-5': '清明节' }, rest: ['4-4', '4-5', '4-6'], work: [] }; }
  generateDates(count) {
    const today = new Date(), holidays = this.getHolidayData();
    const weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
    const dates = [];
    for (let i = 0; i < count; i++) {
      const date = new Date(today); date.setDate(today.getDate() + i);
      const month = date.getMonth() + 1, day = date.getDate(), key = `${month}-${day}`;
      const pad = n => String(n).padStart(2, '0');
      let topLabel = i === 0 ? '今天' : i === 1 ? '明天' : weekDays[date.getDay()];
      const festival = holidays.festivals[key] || '';
      let tag = ''; if (holidays.rest.includes(key)) tag = '休'; else if (holidays.work.includes(key)) tag = '班';
      dates.push({ month, day, topLabel, festival, tag, dayStr: pad(day), selectedStr: `${pad(month)}-${pad(day)}`, fullDate: `${date.getFullYear()}-${pad(month)}-${pad(day)}` });
    }
    return dates;
  }
  getSelectedDate() { return this._dates[this._selectedIndex].fullDate; }
  render() {
    const itemsHtml = this._dates.map((d, i) => {
      const sel = i === this._selectedIndex;
      const tagHtml = d.tag ? `<span class="tag ${sel ? 'tag-sel' : ''} ${d.tag === '休' ? 'tag-rest' : 'tag-work'}">${d.tag}</span>` : '';
      const secondLine = d.festival ? d.festival : (sel ? d.selectedStr : d.dayStr);
      const isFestival = !!d.festival;
      return `<div class="item${sel ? ' sel' : ''}" data-i="${i}"><div class="row1">${d.topLabel}${tagHtml}</div><div class="row2${isFestival ? ' festival' : ''}">${secondLine}</div></div>`;
    }).join('');
    this.shadowRoot.innerHTML = `
      <style>
        @font-face { font-family: 'Fliggy Sans 102'; src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype'); }
        :host { display: block; width: 375px; background: #fff; }
        .bar { display: flex; height: 56px; position: relative; }
        .scroll { display: flex; flex: 1; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 6px 0 6px 8px; gap: 0; align-items: center; }
        .scroll::-webkit-scrollbar { display: none; }
        .item { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 56px; height: 44px; border-radius: 8px; cursor: pointer; flex-shrink: 0; padding: 4px 8px; gap: 2px; }
        .item.sel { background: #FFE866; }
        .row1 { display: flex; align-items: center; gap: 2px; font-size: 11px; line-height: 15px; color: #919499; white-space: nowrap; }
        .item.sel .row1 { color: #0f131a; }
        .row2 { font-family: 'Fliggy Sans 102', sans-serif; font-size: 15px; line-height: 20px; color: #0f131a; font-weight: 600; white-space: nowrap; }
        .item.sel .row2 { font-size: 15px; line-height: 20px; font-weight: 600; }
        .row2.festival { font-family: 'PingFang SC', sans-serif; font-size: 12px; line-height: 17px; color: #0f131a; font-weight: 500; }
        .item.sel .row2.festival { font-family: 'PingFang SC', sans-serif; font-size: 12px; line-height: 17px; color: #0f131a; font-weight: 500; }
        .tag { font-size: 9px; width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; border-radius: 2px; font-weight: 500; flex-shrink: 0; }
        .tag-rest { color: #0f131a; background: #FFE866; }
        .tag-work { color: #fff; background: #919499; }
        .tag-sel.tag-rest { color: #0f131a; background: #ffffff; }
        .tag-sel.tag-work { color: #fff; background: #919499; }
        .cal-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; height: 56px; flex-shrink: 0; cursor: pointer; background: #fff; position: relative; z-index: 2; gap: 2px; box-shadow: -4px 0 8px rgba(0,0,0,0.08); }
        .cal-btn svg { width: 20px; height: 20px; }
        .cal-arrow { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid #919499; }
      </style>
      <div class="bar">
        <div class="scroll">${itemsHtml}</div>
        <div class="cal-btn">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M10.5 5.625H25.5C29.0208 5.625 31.875 8.47918 31.875 12V24C31.875 27.5208 29.0208 30.375 25.5 30.375H10.5C6.97919 30.375 4.125 27.5208 4.125 24V12C4.125 8.47919 6.97919 5.625 10.5 5.625Z" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M11.25 3.75V7.5" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M24.75 3.75V7.5" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M8.25 13.5H27.75" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/></svg>
          <div class="cal-arrow"></div>
        </div>
      </div>`;
  }
  bindEvents() {
    const scrollEl = this.shadowRoot.querySelector('.scroll');
    this.shadowRoot.querySelectorAll('.item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.i, 10);
        if (idx !== this._selectedIndex) {
          this._selectedIndex = idx;
          const sl = scrollEl.scrollLeft;
          this.render();
          this.shadowRoot.querySelector('.scroll').scrollLeft = sl;
          this.bindEvents();
          this.dispatchEvent(new CustomEvent('date-change', { detail: { date: this.getSelectedDate() }, bubbles: true }));
        }
      });
    });
  }
}
customElements.define('listing-calendar-bar', ListingCalendarBar);
</script>
<listing-calendar-bar></listing-calendar-bar>
</body>
</html>
