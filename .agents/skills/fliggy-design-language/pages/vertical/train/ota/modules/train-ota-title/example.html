<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车 OTA — title</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #F5F5F5;
        }
        .title-container {
            width: 750px;
            height: 176px;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            width: 750px;
            height: 88px;
        }
        .status-bar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nav-bar {
            width: 750px;
            height: 88px;
            position: relative;
        }
        .back-button {
            width: 48px;
            height: 48px;
            position: absolute;
            left: 24px;
            top: calc(50% - 24px);
        }
        .back-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .date-picker {
            width: 260px;
            height: 34px;
            position: absolute;
            left: calc(50% - 130px);
            top: calc(50% - 17px);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 9px;
        }
        .date-text {
            width: 231px;
            height: 34px;
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 500;
            font-size: 34px;
            line-height: 100%;
            color: #0F131A;
            text-align: center;
        }
        .dropdown-arrow {
            width: 20px;
            height: 20px;
        }
        .dropdown-arrow img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .right-buttons {
            width: 120px;
            height: 48px;
            position: absolute;
            right: 24px;
            top: calc(50% - 24px);
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 24px;
        }
        .action-button {
            width: 48px;
            height: 48px;
        }
        .action-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .favorite-button {
            display: none;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <div class="status-bar">
            <img src="https://gw.alicdn.com/imgextra/i1/O1CN01deGvLF1vPATvevmnO_!!6000000006164-2-tps-1500-176.png" alt="状态栏">
        </div>
        <div class="nav-bar">
            <div class="back-button">
                <img src="https://gw.alicdn.com/imgextra/i3/O1CN01dBwqei1JXSFT4il24_!!6000000001038-2-tps-96-96.png" alt="返回">
            </div>
            <div class="date-picker">
                <span class="date-text">07月12日 周四</span>
                <div class="dropdown-arrow">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN01FWYB3a1Y0g8p5xZwe_!!6000000002997-2-tps-40-40.png" alt="下拉">
                </div>
            </div>
            <div class="right-buttons">
                <div class="action-button favorite-button"><img src="" alt="收藏"></div>
                <div class="action-button share-button">
                    <img src="https://gw.alicdn.com/imgextra/i3/O1CN01l8Tobu1SZ8EzkiMqw_!!6000000002260-2-tps-96-96.png" alt="分享">
                </div>
                <div class="action-button more-button">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN0149F4C520yxVlAJypo_!!6000000006919-2-tps-96-96.png" alt="更多">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
