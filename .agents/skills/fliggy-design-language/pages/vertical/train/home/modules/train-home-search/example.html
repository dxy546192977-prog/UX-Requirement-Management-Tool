<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车票首页 — 搜索模块</title>
    <style>
        @font-face {
            font-family: "Fliggy Sans 102";
            src:
                local("Fliggy Sans 102"),
                local("FliggySans102-Md"),
                url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
            font-display: swap;
        }
        /* 预览环境样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 50px 0;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ================================================
         == 搜索模块组件
         ================================================
         火车票首页核心搜索区域。
         整体 750×702px：上半部分一级 Tab+二级 Tab+优惠条 260px；
         下半部分搜索卡片 442px。
        */

        /* 搜索模块整体容器 */
        .search-module {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0;
            position: relative;
            width: 750px;
            height: 702px;
        }

        /* ===== 上半部分：一级tab + 二级tab + 优惠条 260px ===== */
        .tab-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 24px;
            width: 750px;
            height: 260px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        .tab-section-inner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            width: 702px;
            height: 260px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 一级tab区域 84px */
        .primary-tab-area {
            width: 750px;
            height: 84px;
            position: relative;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 一级tab渐变背景 */
        .primary-tab-gradient {
            position: absolute;
            width: 750px;
            height: 84px;
            right: 0;
            top: 0;
            background: linear-gradient(180deg, rgba(242, 243, 245, 0) 0%, #F2F3F5 100%);
        }

        /* 一级tab毛玻璃背景 */
        .primary-tab-glass {
            box-sizing: border-box;
            position: absolute;
            left: 3.2%;
            right: 3.2%;
            top: 9.52%;
            bottom: 0%;
            background: linear-gradient(180deg, rgba(242, 243, 245, 0.6) -48.68%, #F2F3F5 62.83%);
            border-width: 2px 2px 0 2px;
            border-style: solid;
            border-color: #FFFFFF;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px 24px 0 0;
        }

        /* 选中tab白色背景（已用切图替代，保留占位） */

        /* 选中条（黄色渐变） */
        .primary-tab-indicator {
            position: absolute;
            width: 124px;
            height: 24px;
            left: 288px;
            top: 48px;
            background: linear-gradient(90deg, #FFE033 4.35%, rgba(255, 224, 51, 0) 97.28%);
            border-radius: 24px;
        }

        /* 一级tab左侧文字组 */
        .primary-tab-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 12px;
            position: absolute;
            width: 190px;
            height: 27px;
            left: 48px;
            top: 33px;
        }

        .primary-tab-left .tab-divider {
            width: 2px;
            height: 22px;
            background: #D2D4D9;
            flex: none;
        }

        /* 一级tab右侧 */
        .primary-tab-right {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            padding: 0;
            gap: 32px;
            position: absolute;
            width: 240px;
            height: 27px;
            right: 48px;
            top: 32px;
        }

        /* 一级tab切图样式 */
        .primary-tab-left img,
        .primary-tab-right img {
            display: block;
            height: 27px;
            flex: none;
            flex-grow: 0;
        }

        /* 火车票选中态切图（更大） */
        .primary-tab-selected-icon {
            position: absolute;
            width: 100px;
            height: 34px;
            left: 300px;
            top: 26px;
        }

        .primary-tab-selected-icon img {
            width: 100px;
            height: 34px;
            display: block;
        }

        /* 选中tab白色背景切图 */
        .primary-tab-selected-bg-img {
            position: absolute;
            left: 31.73%;
            right: 38.4%;
            top: 0%;
            bottom: 0%;
        }

        .primary-tab-selected-bg-img img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ===== 优惠条模块 78px ===== */
        .promo-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 6px 24px 0;
            gap: 10px;
            width: 702px;
            height: 78px;
            background: #FFFFFF;
            flex: none;
            order: 2;
            align-self: stretch;
            flex-grow: 0;
        }

        .promo-bar {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 19px 18px;
            gap: 129px;
            isolation: isolate;
            width: 654px;
            height: 72px;
            background: #FFF0F0;
            border-radius: 12px;
            flex: none;
            order: 0;
            flex-grow: 0;
            position: relative;
        }

        .promo-bar-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 12px;
            width: 471px;
            height: 34px;
            flex: none;
            order: 0;
            flex-grow: 0;
            z-index: 0;
        }

        .promo-bar-left .promo-icon {
            width: 199px;
            height: 30px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        .promo-bar-left .promo-icon img {
            width: 199px;
            height: 30px;
            display: block;
        }

        .promo-bar-left .promo-text {
            height: 34px;
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 24px;
            line-height: 140%;
            color: #0F131A;
            flex: none;
            order: 1;
            flex-grow: 0;
            white-space: nowrap;
        }

        .promo-text-highlight {
            color: #FF5533;
            font-family: 'PingFang SC';
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 140%;
        }

        .promo-bar-arrow {
            position: absolute;
            width: 12px;
            height: 12px;
            left: 606px;
            top: 30px;
            z-index: 1;
        }

        .promo-bar-arrow img {
            width: 12px;
            height: 12px;
            display: block;
        }


        .secondary-tab-wrapper {
            width: 702px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }
        /* 二级tab区域 98px */
        .secondary-tab {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 18px;
            width: 702px;
            height: 98px;
            background: #FFFFFF;
            border-radius: 0px 26px 0px 0px;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 二级tab项 */
        .secondary-tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            gap: 12px;
            width: 351px;
            height: 80px;
            flex-shrink: 0;
        }

        .secondary-tab-item.hidden-tab {
            display: none;
        }

        /* 容器3795：气泡 + 文字 */
        .tab-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            gap: 4px;
            width: 60px;
            height: 62px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 容器3853：气泡占位行 */
        .tab-bubble-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 0;
            width: 60px;
            height: 28px;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 气泡占位（默认隐藏） */
        .tab-bubble-placeholder {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 4px 6px;
            gap: 10px;
            width: 60px;
            height: 28px;
            flex: none;
            order: 0;
            flex-grow: 1;
        }

        /* 气泡标签（红色角标，默认隐藏） */
        .tab-bubble-tag {
            display: none;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 4px 6px;
            gap: 10px;
            position: absolute;
            width: 92px;
            height: 28px;
            left: 0;
            top: 0;
            background: #FF5533;
            border-radius: 14px 14px 14px 2px;
        }

        .tab-bubble-tag.visible {
            display: flex;
        }

        .tab-bubble-tag-text {
            width: 80px;
            height: 20px;
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 20px;
            line-height: 100%;
            text-align: center;
            color: #FFFFFF;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        .secondary-tab-item .tab-label {
            font-family: 'PingFang SC';
            font-weight: 500;
            font-size: 30px;
            line-height: 100%;
            text-align: justify;
            width: 60px;
            height: 30px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }

        .secondary-tab-item .tab-label.active {
            color: #0F131A;
        }

        .secondary-tab-item .tab-label.inactive {
            color: #919499;
        }

        .secondary-tab-item .tab-underline {
            width: 46px;
            height: 6px;
            background: #0F131A;
            border-radius: 3px;
            flex: none;
            order: 1;
            flex-grow: 0;
        }

        .secondary-tab-item .tab-underline.hidden {
            display: none;
        }

        /* ===== 下半部分：搜索卡片 442px ===== */
        .search-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0;
            width: 750px;
            height: 442px;
            filter: drop-shadow(0px 6px 20px rgba(0, 0, 0, 0.03));
            flex: none;
            order: 1;
            flex-grow: 0;
        }

        /* OD + 日期 + 筛选 容器 258px */
        .od-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0 24px;
            width: 750px;
            height: 258px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* OD 城市选择行 100px */
        .od-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            padding: 20px 30px;
            gap: 10px;
            isolation: isolate;
            width: 702px;
            height: 100px;
            background: #FFFFFF;
            flex: none;
            order: 0;
            flex-grow: 0;
            position: relative;
        }

        /* OD 内容行 (Flight Info) */
        .od-content {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0;
            flex: 1 0 0;
            min-height: 1px;
            min-width: 1px;
            height: 60px;
            z-index: 0;
        }

        /* 出发城市容器 Frame 2117131652 */
        .departure-city-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            width: 280px;
            flex-shrink: 0;
        }

        /* 到达城市容器 Frame 2117131653 */
        .arrival-city-container {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            padding: 0;
            width: 280px;
            flex-shrink: 0;
        }

        /* 城市名文字 */
        .city-name {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 500;
            font-size: 42px;
            line-height: 100%;
            color: #0F131A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .city-name.departure {
            text-align: justify;
        }

        .city-name.arrival {
            text-align: right;
        }

        /* 切换OD按钮 */
        .od-switch {
            width: 68px;
            height: 68px;
            flex-shrink: 0;
            position: relative;
        }

        .od-switch img {
            width: 68px;
            height: 68px;
            display: block;
        }

        /* OD 分割线 */
        .od-divider {
            position: absolute;
            width: 642px;
            height: 0;
            left: 30px;
            bottom: 0;
            border: 1px solid #F2F3F5;
            z-index: 1;
        }

        /* 日期选择行 100px */
        .date-row {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 30px;
            gap: 10px;
            isolation: isolate;
            width: 702px;
            height: 100px;
            background: #FFFFFF;
            flex: none;
            order: 1;
            flex-grow: 0;
            position: relative;
        }

        /* 日期内容 */
        .date-content {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            padding: 0;
            gap: 12px;
            width: 642px;
            height: 38px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 日期数字组 */
        .date-group {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            padding: 0;
            gap: 2px;
            height: 38px;
            flex: none;
            flex-grow: 0;
        }

        /* 日期数字（月份） */
        .date-number {
            font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 48px;
            line-height: 90%;
            text-align: center;
            color: #0F131A;
            flex: none;
            flex-grow: 0;
        }

        /* 日期单位（月/日） */
        .date-unit {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 26px;
            line-height: 100%;
            text-align: center;
            color: #0F131A;
            flex: none;
            flex-grow: 0;
        }

        /* 星期 */
        .date-weekday {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 26px;
            line-height: 100%;
            text-align: center;
            color: #0F131A;
            flex: none;
            flex-grow: 0;
        }

        /* 日期分割线 */
        .date-divider {
            position: absolute;
            width: 642px;
            height: 0;
            left: 30px;
            bottom: 0;
            border: 1px solid #F2F3F5;
            z-index: 1;
        }

        /* 筛选条件行 58px */
        .filter-row {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 30px 30px 0;
            gap: 10px;
            width: 702px;
            height: 58px;
            background: #FFFFFF;
            flex: none;
            order: 2;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 筛选内容 */
        .filter-content {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 0;
            width: 642px;
            height: 28px;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
        }

        /* 筛选项 */
        .filter-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 8px;
            height: 28px;
            flex: none;
            flex-grow: 0;
        }

        /* 复选框 */
        .filter-checkbox {
            box-sizing: border-box;
            width: 28px;
            height: 28px;
            border: 2px solid #D2D4D9;
            border-radius: 50%;
            flex: none;
            flex-grow: 0;
        }

        /* 筛选文字 */
        .filter-text {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 26px;
            line-height: 100%;
            color: #5C5F66;
            flex: none;
            flex-grow: 0;
        }

        /* ===== 底部容器 184px ===== */
        .footer-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0 24px;
            gap: 10px;
            isolation: isolate;
            width: 750px;
            height: 184px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
            position: relative;
        }

        /* 搜索按钮区域 */
        .search-button-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 30px 24px;
            gap: 24px;
            width: 702px;
            height: 184px;
            background: #FFFFFF;
            border-radius: 0 0 26px 26px;
            flex: none;
            order: 1;
            flex-grow: 0;
            z-index: 1;
        }

        /* 搜索按钮 */
        .search-button {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0 90px;
            gap: 10px;
            isolation: isolate;
            width: 642px;
            height: 84px;
            background: #FFE033;
            border-radius: 42px;
            flex: none;
            order: 0;
            align-self: stretch;
            flex-grow: 0;
            position: relative;
        }

        /* 搜索按钮文字 */
        .search-button-text {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 500;
            font-size: 32px;
            line-height: 140%;
            text-align: center;
            color: #0F131A;
            flex: none;
            order: 0;
            flex-grow: 0;
            z-index: 0;
            margin: auto;
        }

        /* 促销标签（搜索按钮上） */
        .promo-tag {
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 2px 12px;
            gap: 10px;
            position: absolute;
            width: 180px;
            height: 36px;
            right: 0;
            top: -10px;
            background: linear-gradient(91.13deg, #FF4B6C -3.42%, #FF1835 74.28%, #FF4A6C 100.65%);
            border-radius: 16px 19px 19px 2px;
            flex: none;
            order: 1;
            flex-grow: 0;
            z-index: 1;
        }

        .promo-tag-text {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 500;
            font-size: 20px;
            line-height: 140%;
            text-align: center;
            color: #FFFFFF;
            white-space: nowrap;
            flex: none;
            order: 0;
            flex-grow: 0;
        }

        /* 搜索历史行 */
        .search-history {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            width: 642px;
            height: 22px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }

        .history-items {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 36px;
            height: 22px;
            flex: none;
            order: 0;
            flex-grow: 1;
        }

        .history-text {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 22px;
            line-height: 100%;
            color: #919499;
            flex: none;
            flex-grow: 0;
            white-space: nowrap;
        }

        .history-clear {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 22px;
            line-height: 100%;
            text-align: right;
            color: #919499;
            width: 44px;
            flex: none;
            order: 1;
            flex-grow: 0;
        }
    </style>
</head>
<body>

    <!-- ====== 搜索模块组件 开始 ====== -->
    <div class="search-module">

        <!-- 上半部分：一级tab + 二级tab 182px -->
        <div class="tab-section">
            <div class="tab-section-inner">

                <!-- 一级tab区域 84px -->
                <div class="primary-tab-area">
                    <div class="primary-tab-gradient"></div>
                    <div class="primary-tab-glass"></div>
                    <!-- 选中tab白色背景（切图） -->
                    <div class="primary-tab-selected-bg-img">
                        <img src="https://gw.alicdn.com/imgextra/i4/O1CN01s25gxe1C6FPTnb1cT_!!6000000000031-2-tps-448-168.png" alt="选中背景">
                    </div>
                    <div class="primary-tab-indicator"></div>

                    <!-- 左侧tab切图：机票 | 特价机票 -->
                    <div class="primary-tab-left">
                        <img src="https://gw.alicdn.com/imgextra/i4/O1CN01fNSknD21Te30C56PG_!!6000000006986-2-tps-112-54.png" alt="机票" style="width: 56px;">
                        <span class="tab-divider"></span>
                        <img src="https://gw.alicdn.com/imgextra/i1/O1CN01Vxt6qK1OiyHoeN1mP_!!6000000001740-2-tps-216-54.png" alt="特价机票" style="width: 108px;">
                    </div>

                    <!-- 火车票选中态切图（居中） -->
                    <div class="primary-tab-selected-icon">
                        <img src="https://gw.alicdn.com/imgextra/i4/O1CN01JMvbNA1lfWSznIYj4_!!6000000004846-2-tps-200-68.png" alt="火车票">
                    </div>

                    <!-- 右侧tab切图：汽车票 | 租车 -->
                    <div class="primary-tab-right">
                        <img src="https://gw.alicdn.com/imgextra/i4/O1CN01dhh6HC1zO1xdIhwth_!!6000000006703-2-tps-164-54.png" alt="汽车票" style="width: 82px;">
                        <img src="https://gw.alicdn.com/imgextra/i1/O1CN01tTLJeS1zEs2VzScFr_!!6000000006683-2-tps-252-54.png" alt="租车" style="width: 126px;">
                    </div>
                </div>

                <!-- 二级tab区域 98px：单程/往返（外层容器） -->
                <div class="secondary-tab-wrapper">
                    <div class="secondary-tab">
                    <!-- Tab 1: 单程（选中） -->
                    <div class="secondary-tab-item">
                        <div class="tab-inner">
                            <div class="tab-bubble-row">
                                <div class="tab-bubble-placeholder"></div>
                            </div>
                            <span class="tab-label active">单程</span>
                        </div>
                        <div class="tab-underline"></div>
                    </div>
                    <!-- Tab 2: 往返（未选中） -->
                    <div class="secondary-tab-item">
                        <div class="tab-inner">
                            <div class="tab-bubble-row">
                                <div class="tab-bubble-placeholder"></div>
                            </div>
                            <span class="tab-label inactive">往返</span>
                        </div>
                        <div class="tab-underline hidden"></div>
                    </div>
                    <!-- Tab 3: 备用tab（隐藏） -->
                    <div class="secondary-tab-item hidden-tab">
                        <div class="tab-inner">
                            <div class="tab-bubble-row">
                                <div class="tab-bubble-placeholder"></div>
                            </div>
                            <span class="tab-label inactive">国内</span>
                        </div>
                        <div class="tab-underline hidden"></div>
                    </div>
                    </div>
                </div>

                <!-- 优惠条模块 78px -->
                <div class="promo-bar-wrapper">
                    <div class="promo-bar">
                        <div class="promo-bar-left">
                            <div class="promo-icon">
                                <img src="https://gw.alicdn.com/imgextra/i3/O1CN01mNC3ib1YqtICgVRG9_!!6000000003111-2-tps-398-60.png" alt="88VIP">
                            </div>
                            <span class="promo-text">火车票券最高膨胀<span class="promo-text-highlight">至¥68</span></span>
                        </div>
                        <div class="promo-bar-arrow">
                            <img src="https://gw.alicdn.com/imgextra/i2/O1CN01zhdQfl1pNtfVtACvY_!!6000000005349-2-tps-24-24.png" alt="箭头">
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- 下半部分：搜索卡片 442px -->
        <div class="search-card">

            <!-- OD + 日期 + 筛选 258px -->
            <div class="od-section">

                <!-- OD 城市选择行 100px -->
                <div class="od-row">
                    <div class="od-content">
                        <div class="departure-city-container">
                            <span class="city-name departure">杭州</span>
                        </div>
                        <div class="od-switch">
                            <img src="https://gw.alicdn.com/imgextra/i1/O1CN01PgqhIz1lJXSIXB8HP_!!6000000004798-2-tps-136-136.png" alt="切换OD">
                        </div>
                        <div class="arrival-city-container">
                            <span class="city-name arrival">北京</span>
                        </div>
                    </div>
                    <div class="od-divider"></div>
                </div>

                <!-- 日期选择行 100px -->
                <div class="date-row">
                    <div class="date-content">
                        <!-- 日期数字组 -->
                        <div class="date-group">
                            <span class="date-number" style="width: 27px;">9</span>
                            <span class="date-unit">月</span>
                            <span class="date-number" style="width: 45px;">12</span>
                            <span class="date-unit">日</span>
                        </div>
                        <!-- 星期 -->
                        <span class="date-weekday">周一</span>
                    </div>
                    <div class="date-divider"></div>
                </div>

                <!-- 筛选条件行 58px -->
                <div class="filter-row">
                    <div class="filter-content">
                        <!-- 学生票 -->
                        <div class="filter-item">
                            <div class="filter-checkbox"></div>
                            <span class="filter-text">学生票</span>
                        </div>
                        <!-- 高铁动车 -->
                        <div class="filter-item">
                            <div class="filter-checkbox"></div>
                            <span class="filter-text">高铁动车</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 底部容器 184px -->
            <div class="footer-container">

                <!-- 搜索按钮区域 -->
                <div class="search-button-area">
                    <!-- 搜索按钮 -->
                    <div class="search-button">
                        <span class="search-button-text">搜索火车票</span>
                        <!-- 促销标签 -->
                        <div class="promo-tag">
                            <span class="promo-tag-text">今日购票立减¥30</span>
                        </div>
                    </div>

                    <!-- 搜索历史 -->
                    <div class="search-history">
                        <div class="history-items">
                            <span class="history-text">杭州-北京 07-01</span>
                            <span class="history-text">杭州-北京 07-02</span>
                        </div>
                        <span class="history-clear">清除</span>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <!-- ====== 搜索模块组件 结束 ====== -->

</body>
