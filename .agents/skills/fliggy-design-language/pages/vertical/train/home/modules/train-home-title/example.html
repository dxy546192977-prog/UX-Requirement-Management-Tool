<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车票首页 — 首页 title</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            background: #F5F5F5;
            font-family: "PingFang SC", sans-serif;
        }

        .page-title {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0;
            gap: 18px;
            position: relative;
            width: 750px;
            height: 194px;
        }

        .status-bar {
            width: 750px;
            height: 88px;
            flex: none;
            order: 0;
            flex-grow: 0;
        }
        .status-bar img {
            width: 750px;
            height: 88px;
            display: block;
        }

        .nav-bar {
            position: relative;
            width: 750px;
            height: 88px;
            flex: none;
            order: 1;
            align-self: stretch;
            flex-grow: 0;
        }

        .nav-back {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 24px;
            top: calc(50% - 30px);
            cursor: pointer;
        }
        .nav-back img {
            width: 60px;
            height: 60px;
            display: block;
        }

        .nav-right {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 12px;
            position: absolute;
            height: 60px;
            right: 24px;
            top: calc(50% - 30px);
        }

        .nav-icon-btn {
            width: 60px;
            height: 60px;
            flex: none;
            flex-grow: 0;
            cursor: pointer;
        }
        .nav-icon-btn img {
            width: 60px;
            height: 60px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="page-title">
        <div class="status-bar">
            <img src="https://gw.alicdn.com/imgextra/i1/O1CN01deGvLF1vPATvevmnO_!!6000000006164-2-tps-1500-176.png" alt="status-bar">
        </div>
        <div class="nav-bar">
            <div class="nav-back">
                <img src="https://gw.alicdn.com/imgextra/i4/O1CN01ztEKP31b5fIhOt4tF_!!6000000003414-2-tps-120-120.png" alt="back">
            </div>
            <div class="nav-right">
                <div class="nav-icon-btn">
                    <img src="https://gw.alicdn.com/imgextra/i1/O1CN01TsYXl71WaHhUE1J5Y_!!6000000002804-2-tps-120-120.png" alt="share">
                </div>
                <div class="nav-icon-btn">
                    <img src="https://gw.alicdn.com/imgextra/i2/O1CN013hYTF326JdTEM4xBh_!!6000000007641-2-tps-120-120.png" alt="more">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
