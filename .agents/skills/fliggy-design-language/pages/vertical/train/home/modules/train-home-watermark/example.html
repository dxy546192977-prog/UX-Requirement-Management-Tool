<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>火车票首页 — 火车票水印</title>
    <style>
        /* 预览环境样式 */
        body {
            background-color: #F7F8FA;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ================================================
         == 火车票水印组件
         ================================================
         页面底部品牌水印，离页面可滑动部分最下方距离60px。
         固定组件，整体为一张图片。
        */

        .watermark {
            position: relative;
            width: 702px;
            height: 116px;
            background: #FFFFFF;
        }

        .watermark img {
            position: absolute;
            width: 750px;
            height: 116px;
            left: calc(50% - 750px/2);
            top: 0px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="watermark">
        <img src="https://gw.alicdn.com/imgextra/i3/O1CN01dA4l2P1wMFWuJLxsf_!!6000000006293-2-tps-1500-232.png" alt="火车票水印">
    </div>

</body>
</html>
