<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 1027;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --line: #f0f2f5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        display: block;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      img {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: 100vw;
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 750px;
        height: 1027px;
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .panel {
        position: relative;
        width: 750px;
        height: 1027px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
      }

      .panel-title,
      .section-title,
      .policy-heading,
      .expand-text {
        margin: 0;
        color: var(--text-dark);
      }

      .panel-title {
        position: absolute;
        top: 24px;
        left: 18px;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        white-space: nowrap;
      }

      .section-title {
        position: absolute;
        top: 447px;
        left: 18px;
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        white-space: nowrap;
      }

      .notice-title {
        position: absolute;
        top: 92px;
        left: 18px;
        margin: 0;
        color: var(--text-dark);
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        white-space: nowrap;
      }

      .notice-copy {
        position: absolute;
        top: 149px;
        left: 18px;
        width: 714px;
        margin: 0;
        color: var(--text-mid);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .notice-copy p,
      .policy-copy p {
        margin: 0;
      }

      .divider {
        position: absolute;
        top: 417px;
        left: 18px;
        width: 714px;
        height: 1px;
        background: var(--line);
      }

      .policy-block {
        position: absolute;
        left: 18px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .policy-block.checkin {
        top: 515px;
      }

      .policy-block.child {
        top: 630px;
      }

      .policy-block.breakfast {
        top: 745px;
      }

      .policy-icon {
        width: 32px;
        height: 32px;
        margin-top: 3.5px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .policy-content {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .policy-heading {
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        white-space: nowrap;
      }

      .policy-copy {
        color: var(--text-mid);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .policy-grid {
        display: grid;
        grid-template-columns: 204px 204px;
        column-gap: 109px;
        width: 517px;
      }

      .expand-trigger {
        position: absolute;
        top: 946px;
        left: 335px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 90px;
        height: 51px;
      }

      .expand-text {
        font-size: 30px;
        font-weight: 500;
        line-height: 51px;
        white-space: nowrap;
      }

      .expand-arrow {
        width: 12px;
        height: 12px;
        border-right: 3px solid var(--text-dark);
        border-bottom: 3px solid var(--text-dark);
        transform: translateY(-2px) rotate(45deg);
        flex: 0 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <div class="canvas">
        <section class="panel" data-node-id="8587:50222">
          <h2 class="panel-title" data-node-id="8587:50223">订房必读</h2>
          <h2 class="section-title" data-node-id="8587:50224">酒店政策</h2>

          <p class="notice-title" data-node-id="8587:50226">重要通知</p>
          <div class="notice-copy" data-node-id="8587:50227">
            <p>1.从2021年7月15日起，酒店不能安排吸烟房，并禁止在酒店室内区域吸烟。</p>
            <p>
              2. 为了积极配合雅高集团推行的“21世纪地球”承诺，以及顺应政府颁布的一次性塑料禁令，酒店将从2021年8月1日起，将不主动提供牙刷、浴擦、剃须刀、针线包等一次性日用品。我们诚邀您践行绿色出行理念，推进可持续发展。如您需要使用上述个人日用品，请联系酒店宾客服务中心。
            </p>
          </div>

          <div class="divider" data-node-id="8587:50234"></div>

          <div class="policy-block checkin" data-node-id="8587:50235">
            <img
              class="policy-icon"
              alt=""
              src="https://gw.alicdn.com/imgextra/i2/O1CN01E90zCZ1F19r7hmFx5_!!6000000000426-2-tps-64-64.png"
              data-node-id="8587:50236"
            />
            <div class="policy-content">
              <p class="policy-heading" data-node-id="8587:50237">入离政策</p>
              <div class="policy-copy policy-grid">
                <p data-node-id="8587:50228">入住时间：15:00后</p>
                <p data-node-id="8587:50229">退房时间：12:00前</p>
              </div>
            </div>
          </div>

          <div class="policy-block child" data-node-id="8587:50238">
            <img
              class="policy-icon"
              alt=""
              src="https://gw.alicdn.com/imgextra/i2/O1CN01Dg7dfk1oYbKPotD1r_!!6000000005237-2-tps-64-64.png"
              data-node-id="8587:50239"
            />
            <div class="policy-content">
              <p class="policy-heading" data-node-id="8587:50240">儿童政策</p>
              <div class="policy-copy">
                <p data-node-id="8587:50230">欢迎携带儿童入住</p>
              </div>
            </div>
          </div>

          <div class="policy-block breakfast" data-node-id="8587:50241">
            <img
              class="policy-icon"
              alt=""
              src="https://gw.alicdn.com/imgextra/i3/O1CN01df1xeP1OYRB1iv8P9_!!6000000001717-2-tps-64-64.png"
              data-node-id="8587:50242"
            />
            <div class="policy-content">
              <p class="policy-heading" data-node-id="8587:50243">早餐政策</p>
              <div class="policy-copy">
                <p data-node-id="8587:50231">类型：中餐、西餐、素食</p>
                <p data-node-id="8587:50232">形式：自助餐￥239</p>
                <p data-node-id="8587:50233">开放时间：每天06:30–11:00</p>
              </div>
            </div>
          </div>

          <div class="expand-trigger" data-node-id="8587:50244">
            <p class="expand-text">展开</p>
            <span class="expand-arrow" aria-hidden="true"></span>
          </div>
        </section>
      </div>
    </div>

    <script>
      (function () {
        const designWidth = 750;

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth);
          const scale = availableWidth / designWidth;
          document.documentElement.style.setProperty("--scale", scale.toFixed(4));
        }

        updateScale();
        window.addEventListener("resize", updateScale, { passive: true });
      })();
    </script>
  </body>
</html>
