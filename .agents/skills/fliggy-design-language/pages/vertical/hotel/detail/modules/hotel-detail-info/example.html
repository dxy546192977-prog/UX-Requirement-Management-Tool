    <title>02 信息区结构</title>
    <style>
      :root {
        --design-width: 750;
        --design-height: 408;
        --scale: 1;
        --facility-trailing-space: 120px;
        --color-card: #ffffff;
        --color-dark: #0f131a;
        --color-mid: #5c5f66;
        --color-light: #d2d4d9;
        --color-tag-bg: #f2f3f5;
        --color-tag-accent-bg: #feebd8;
        --color-tag-accent-text: #805540;
        --color-label-bg: #f7f8fa;
        --color-indigo: #6666ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: #f2f3f5;
      }

      html.embedded,
      html.embedded body {
        background: transparent !important;
      }

      body {
        display: flex;
        justify-content: center;
        overflow-x: hidden;
        font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        color: var(--color-dark);
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: calc(var(--design-width) * 1px);
        height: calc(var(--design-height) * 1px);
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .card {
        position: relative;
        width: 750px;
        height: 408px;
        padding: 24px 18px 18px;
        border-radius: 24px;
        background: var(--color-card);
        box-shadow: none;
        overflow: hidden;
      }

      .title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        width: 714px;
      }

      .title {
        margin: 0;
        padding-right: 6px;
        font-size: 36px;
        font-weight: 500;
        line-height: 1.4;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 6px;
        border-radius: 4px;
        font-size: 20px;
        line-height: 1.4;
        white-space: nowrap;
      }

      .tag-default {
        color: var(--color-mid);
        background: var(--color-tag-bg);
      }

      .tag-accent {
        color: var(--color-tag-accent-text);
        background: var(--color-tag-accent-bg);
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 714px;
        margin-top: 24px;
      }

      .facility-row {
        position: relative;
        width: 714px;
        height: 109px;
        overflow: hidden;
      }

      .facility-scroll {
        width: 100%;
        height: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        overscroll-behavior-x: contain;
        scrollbar-width: none;
        -ms-overflow-style: none;
        touch-action: pan-x;
        cursor: grab;
      }

      .facility-scroll::-webkit-scrollbar {
        display: none;
      }

      .facility-scroll.is-dragging {
        cursor: grabbing;
      }

      .facility-track {
        display: flex;
        align-items: center;
        gap: 36px;
        width: max-content;
        min-width: 100%;
        height: 109px;
        padding-right: var(--facility-trailing-space);
      }

      .facility {
        width: max-content;
        min-width: 72px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        pointer-events: none;
      }

      .facility-icon {
        width: 72px;
        height: 72px;
        padding: 14px;
        border-radius: 36px;
        background: var(--color-label-bg);
        display: grid;
        place-items: center;
      }

      .facility-icon img {
        display: block;
        width: 42px;
        height: 42px;
        object-fit: contain;
        -webkit-user-drag: none;
        user-select: none;
        pointer-events: none;
      }

      .facility-text {
        margin: 0;
        font-size: 22px;
        line-height: 1.4;
        text-align: center;
        white-space: nowrap;
        pointer-events: none;
      }

      .policy {
        position: absolute;
        top: 0;
        right: 0;
        width: 113px;
        height: 107px;
        z-index: 2;
        pointer-events: none;
      }

      .policy::before {
        content: "";
        position: absolute;
        left: 0;
        top: 11px;
        width: 30px;
        height: 84px;
        background: rgba(0, 0, 0, 0.06);
        filter: blur(10px);
      }

      .policy-inner {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 107px;
        height: 107px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #ffffff;
        box-shadow: -18px 0 24px rgba(255, 255, 255, 0.92);
      }

      .policy-text {
        width: 48px;
        margin: 0;
        font-size: 24px;
        line-height: 1.4;
      }

      .policy-arrow {
        width: 10.5px;
        height: 18px;
      }

      .policy-arrow img {
        width: 100%;
        height: 100%;
        display: block;
      }

      .bottom {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .review-card {
        width: 274px;
        height: 154px;
        padding: 18px;
        border-radius: 12px;
        background: linear-gradient(240deg, #fafaff 4.26%, #f5f5ff 98.62%);
      }

      .review-top {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .score {
        width: 58px;
        height: 36px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: var(--color-indigo);
        color: #ffffff;
        font-size: 30px;
        font-weight: 700;
        line-height: 1;
        font-family:
          "DIN Alternate",
          "Arial Rounded MT Bold",
          "Arial Black",
          "Helvetica Neue",
          Arial,
          sans-serif;
      }

      .level {
        color: var(--color-indigo);
        font-size: 26px;
        font-weight: 500;
        line-height: 1.4;
        white-space: nowrap;
      }

      .count {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        font-size: 24px;
        line-height: 1.4;
        white-space: nowrap;
      }

      .count img {
        width: 7px;
        height: 12px;
        display: block;
      }

      .quote {
        margin: 6px 0 0;
        height: 76px;
        font-size: 24px;
        font-weight: 500;
        line-height: 1.6;
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .address-card {
        position: relative;
        width: 428px;
        height: 154px;
        padding: 18px 24px;
        border-radius: 12px;
        overflow: hidden;
        background: #fafaff;
      }

    <script>
      function updateScale() {
        const designWidth = 750;
        const availableWidth = Math.max(320, window.innerWidth);
        const scale = availableWidth / designWidth;
        document.documentElement.style.setProperty("--scale", scale.toFixed(4));
      }

      const facilityScroll = document.querySelector(".facility-scroll");
      let isDragging = false;
      let dragStartX = 0;
      let dragStartScrollLeft = 0;

      function syncFacilityScrollPosition() {
        if (!facilityScroll) {
          return;
        }

        facilityScroll.scrollLeft = 0;
      }

      function bindFacilityScroll() {
        if (!facilityScroll) {
          return;
        }

        facilityScroll.addEventListener(
          "wheel",
          (event) => {
            if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) {
              return;
            }

            facilityScroll.scrollLeft += event.deltaY;
            event.preventDefault();
          },
          { passive: false }
        );

        facilityScroll.addEventListener("pointerdown", (event) => {
          isDragging = true;
          dragStartX = event.clientX;
          dragStartScrollLeft = facilityScroll.scrollLeft;
          facilityScroll.classList.add("is-dragging");
          facilityScroll.setPointerCapture(event.pointerId);
          document.body.style.userSelect = "none";
        });

        facilityScroll.addEventListener("pointermove", (event) => {
          if (!isDragging) {
            return;
          }

          const deltaX = event.clientX - dragStartX;
          facilityScroll.scrollLeft = dragStartScrollLeft - deltaX;
        });

        const stopDragging = () => {
          isDragging = false;
          facilityScroll.classList.remove("is-dragging");
          document.body.style.userSelect = "";
        };

        facilityScroll.addEventListener("pointerup", stopDragging);
        facilityScroll.addEventListener("pointercancel", stopDragging);
        facilityScroll.addEventListener("lostpointercapture", stopDragging);
      }

      window.addEventListener("resize", updateScale, { passive: true });
      window.addEventListener("resize", syncFacilityScrollPosition, {
        passive: true,
      });
      updateScale();
      bindFacilityScroll();
      syncFacilityScrollPosition();
    </script>
