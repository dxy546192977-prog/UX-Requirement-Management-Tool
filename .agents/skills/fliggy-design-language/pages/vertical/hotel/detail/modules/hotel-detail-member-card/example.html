<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 270;
        --scale: 1;
        --color-brown-1: #5d3521;
        --color-brown-2: #805540;
        --color-mid: #5c5f66;
        --color-dark: #0f131a;
        --color-line: #f2f3f5;
        --color-pay: #ff5533;
        --color-pay-2: #ff9200;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: flex;
        justify-content: center;
        padding: 0;
        overflow-x: hidden;
        background: #F2F3F5;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--color-dark);
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 50%;
        width: 750px;
        height: 270px;
        transform: translateX(-50%) scale(var(--scale));
        transform-origin: top center;
      }

      .member-card {
        position: relative;
        width: 750px;
        height: 270px;
        padding-top: 18px;
        border: 1px solid #ffffff;
        border-radius: 24px;
        overflow: hidden;
        background:
          radial-gradient(circle at -7% -13%, rgba(255, 225, 195, 1) 0, rgba(255, 225, 195, 0.12) 34%, rgba(255, 225, 195, 0) 60%),
          radial-gradient(circle at 91.7% -11.5%, rgba(255, 229, 204, 1) 0, rgba(254, 245, 236, 0) 36%, rgba(254, 245, 236, 0) 61%),
          linear-gradient(165.52deg, #fef5ec 13.11%, #feebd8 74.47%);
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 36px;
        padding: 0 18px;
      }

      .member-brand {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .member-brand img {
        display: block;
        flex: 0 0 auto;
        user-select: none;
        -webkit-user-drag: none;
      }

      .brand-icon {
        width: 36px;
        height: 36px;
      }

      .brand-wordmark {
        width: 32px;
        height: 20px;
        object-fit: contain;
      }

      .member-title {
        margin: 0;
        color: var(--color-brown-1);
        font-size: 26px;
        font-weight: 500;
        line-height: 1.4;
        white-space: nowrap;
      }

      .progress-group {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--color-brown-2);
        font-size: 24px;
        font-weight: 400;
        line-height: 1.4;
        white-space: nowrap;
      }

      .progress-copy {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .progress-pill {
        width: 100px;
        height: 24px;
        padding: 2.5px 3px;
        border: 1px solid #fcdaba;
        border-radius: 24px;
        background: #f6ddc5;
      }

      .progress-fill {
        width: 80px;
        height: 18px;
        border-radius: 24px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 243, 206, 0.5), rgba(255, 243, 206, 0) 62%),
          linear-gradient(90deg, #ff4d2a 0%, #ff9200 100%);
      }

      .upgrade-tag {
        display: flex;
        align-items: center;
      }

      .upgrade-tag svg {
        display: block;
        flex: 0 0 auto;
      }

      .upgrade-tag .notch {
        width: 10.5px;
        height: 13.86px;
        margin-right: -3px;
        transform: rotate(-90deg);
        transform-origin: center;
      }

      .upgrade-tag .label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 6px;
        border-radius: 19px;
        background: var(--color-pay);
        color: #ffffff;
        font-size: 20px;
        font-weight: 400;
        line-height: 1.4;
      }

      .card-body {
        width: 100%;
        height: 198px;
        margin-top: 18px;
        padding: 24px 0;
        border: 2px solid rgba(255, 255, 255, 0.92);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0%, #ffffff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .benefits-top {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .benefits-list {
        display: flex;
        align-items: center;
        width: 624px;
      }

      .benefit {
        position: relative;
        width: 156px;
        height: 74px;
        padding: 0 9px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }

      .benefit::after {
        content: "";
        position: absolute;
        top: 13px;
        right: 0;
        width: 1px;
        height: 48px;
        background: var(--color-line);
      }

      .benefit:last-child::after {
        content: none;
      }

      .benefit-label,
      .benefit-value {
        margin: 0;
        font-size: 24px;
        line-height: 1.4;
        white-space: nowrap;
      }

      .benefit-label {
        color: var(--color-mid);
        font-weight: 400;
      }

      .benefit-value {
        color: var(--color-dark);
        font-weight: 500;
      }

      .more-link {
        display: flex;
        align-items: center;
        gap: 6px;
        padding-right: 18px;
        color: #000000;
        font-size: 24px;
        font-weight: 400;
        line-height: 1.4;
        white-space: nowrap;
      }

      .more-link svg,
      .promo-arrow svg {
        display: block;
        width: 7px;
        height: 12px;
        flex: 0 0 auto;
      }

      .promo-section {
        width: 750px;
        padding: 0 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .promo-divider {
        width: 100%;
        height: 1px;
        background: var(--color-line);
      }

      .promo-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .promo-copy {
        display: flex;
        align-items: center;
        gap: 24px;
        min-width: 0;
      }

      .promo-badge-image {
        display: block;
        width: 100px;
        height: 28px;
        object-fit: contain;
        flex: 0 0 auto;
        user-select: none;
        -webkit-user-drag: none;
      }

      .promo-text {
        margin: 0;
        color: var(--color-dark);
        font-size: 24px;
        font-weight: 400;
        line-height: 1.4;
        white-space: nowrap;
      }

      .promo-text .highlight {
        color: var(--color-pay);
      }

      .promo-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 12px;
        height: 12px;
      }
    </style>
  </head>
