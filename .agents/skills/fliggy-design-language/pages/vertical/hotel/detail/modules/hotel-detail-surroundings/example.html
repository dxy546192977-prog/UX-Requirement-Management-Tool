<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 940;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --text-light: #919499;
        --line: #f0f2f5;
        --button-bg: #f7f8fa;
        --brand: #ff5533;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        width: 100%;
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      img,
      svg {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: 100vw;
        height: calc(var(--design-height) * 1px * var(--scale));
        overflow: hidden;
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 750px;
        height: 940px;
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .surroundings-panel {
        position: relative;
        width: 750px;
        height: 940px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
      }

      .panel-title {
        position: absolute;
        top: 24px;
        left: 18px;
        margin: 0;
        color: var(--text-dark);
        font-size: 36px;
        font-weight: 500;
        line-height: 50px;
        white-space: nowrap;
      }

      .map-card {
        position: absolute;
        top: 92px;
        left: 18px;
        width: 714px;
        height: 238px;
        overflow: hidden;
        border-radius: 12px;
      }

      .map-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .map-label {
        position: absolute;
        top: 53px;
        left: 259px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 196px;
      }

      .map-pin {
        width: 48px;
        height: 48px;
      }

      .hotel-name {
        width: 196px;
        margin: 0;
        color: var(--text-dark);
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        text-align: center;
      }

      .block-label {
        flex: 0 0 56px;
        margin: 0;
        color: var(--text-dark);
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        white-space: nowrap;
      }

      .section-row {
        position: absolute;
        left: 18px;
        display: flex;
        align-items: flex-start;
        gap: 30px;
        width: 714px;
      }

      .transport-row {
        top: 360px;
        height: 79px;
      }

      .spots-row {
        top: 499px;
        height: 182px;
      }

      .food-row {
        top: 741px;
        height: 79px;
      }

      .transport-list,
      .food-list {
        display: flex;
        gap: 24px;
        width: 628px;
      }

      .spots-list {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 628px;
      }

      .transport-item,
      .food-item,
      .spot-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .transport-item,
      .food-item {
        width: 302px;
      }

      .spot-item {
        width: 628px;
      }

      .transport-head {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 302px;
        height: 39px;
      }

      .transport-icon {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        object-fit: cover;
      }

      .primary-text {
        margin: 0;
        color: var(--text-dark);
        font-size: 28px;
        font-weight: 400;
        line-height: 39px;
      }

      .transport-name {
        width: 264px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .secondary-text {
        margin: 0;
        color: var(--text-light);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .spot-name {
        width: fit-content;
        max-width: 628px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .divider {
        position: absolute;
        left: 18px;
        width: 714px;
        height: 1px;
        background: var(--line);
      }

      .divider.is-1 {
        top: 469px;
      }

      .divider.is-2 {
        top: 711px;
      }

      .map-button {
        position: absolute;
        top: 850px;
        left: 237px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 240px;
        height: 60px;
        border-radius: 42px;
        background: var(--button-bg);
      }

      .map-button-text {
        margin: 0;
        color: var(--text-mid);
        font-size: 28px;
        font-weight: 500;
        line-height: 39px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>

          <div class="map-button" data-node-id="8587:50206">

    <script>
      (function () {
        const designWidth = 750;

        function updateScale() {
          const availableWidth = Math.max(320, window.innerWidth);
          const scale = Math.min(1, availableWidth / designWidth);
          document.documentElement.style.setProperty("--scale", scale.toFixed(4));
        }

        updateScale();
        window.addEventListener("resize", updateScale, { passive: true });
      })();
    </script>
