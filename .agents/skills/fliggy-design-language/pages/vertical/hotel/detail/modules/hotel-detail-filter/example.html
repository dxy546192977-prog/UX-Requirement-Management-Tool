    <link rel="icon" href="data:," />
    <script defer src="../../embed-autosize.js"></script>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const mode = params.get("mode") || "both";
        const root = document.documentElement;

        root.dataset.mode = mode;

        if (mode === "regular") {
          root.style.setProperty("--design-height", "222");
        } else if (mode === "sticky") {
          root.style.setProperty("--design-height", "210");
        }
      })();
    </script>
    <style>
      :root {
        --design-width: 750;
        --design-height: 482;
        --scale: 1;
        --color-white: #ffffff;
        --color-dark: #0f131a;
        --color-light: #919499;
        --color-filter-bg: #f7f8fa;
        --color-low-price-text: #805540;
        --color-low-price-top: #fef5ec;
        --color-low-price-bottom: #feebd8;
        --color-line: #e9edf2;
      }

      * {
        box-sizing: border-box;
      }

      button {
        padding: 0;
        border: 0;
        background: transparent;
        font: inherit;
        color: inherit;
        appearance: none;
        -webkit-appearance: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #f2f3f5;
      }

      body {
        overflow-x: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      .viewport {
        position: relative;
        width: 100vw;
        height: calc(var(--design-height) * 1px * var(--scale));
      }

      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: calc(var(--design-width) * 1px);
        height: calc(var(--design-height) * 1px);
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .panel {
        position: absolute;
        left: 0;
        width: 750px;
        overflow: hidden;
      }

      .panel-regular {
        top: 0;
        height: 222px;
        padding: 18px 18px 42px;
        border-radius: 24px 24px 0 0;
        background: linear-gradient(
          180deg,
          #ffffff 0%,
          #ffffff 73%,
          rgba(255, 255, 255, 0.96) 87%,
          rgba(255, 255, 255, 0) 100%
        );
      }

      .panel-sticky {
        top: 272px;
        height: 210px;
        padding: 18px 18px 30px;
        background: #ffffff;
      }

      .panel-sticky::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: 1px;
        background: rgba(15, 19, 26, 0.12);
      }

      html[data-mode="regular"] .panel-sticky {
        display: none;
      }

      html[data-mode="sticky"] .panel-regular {
        display: none;
      }

      html[data-mode="sticky"] .panel-sticky {
        top: 0;
      }

      .panel-inner {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 714px;
      }

      .header {
        display: flex;
        flex-direction: column;
        width: 714px;
      }

      .day-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 266px;
        color: var(--color-light);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 714px;
      }

      .booking-meta {
        display: flex;
        align-items: center;
        gap: 9px;
        width: 446px;
      }

      .calendar-pair {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .date {
        display: flex;
        align-items: flex-start;
        gap: 3px;
        margin-top: 16px;
        color: var(--color-dark);
      }

      .date-number,

      .date-number {

        line-height: 56px;
      }

      .date-unit {
        padding-top: 11px;
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
      }

      .stay-pill {
        position: relative;
        width: 65px;
        height: 32px;
        margin-top: 12px;
      }

      .stay-pill::before,
      .stay-pill::after {
        content: "";
        position: absolute;
        top: 15px;
        width: 6px;
        height: 1px;
        background: var(--color-dark);
      }

      .stay-pill::before {
        left: 0;
      }

      .stay-pill::after {
        right: 0;
      }

      .stay-pill-label {
        position: absolute;
        top: 0;
        left: 5px;
        width: 55px;
        height: 32px;
        border: 1px solid var(--color-dark);
        border-radius: 24px;
        color: var(--color-dark);
        font-size: 22px;
        font-weight: 400;
        line-height: 30px;
        text-align: center;
      }

      .low-price {
        position: relative;
        display: inline-flex;
        align-items: center;
        height: 32px;
        width: 84px;
        margin-top: 12px;
      }

      .low-price-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .low-price-bg path {
        fill: var(--color-low-price-top);
      }

      .low-price-text {
        position: relative;
        z-index: 1;
        width: 100%;
        padding-left: 12px;
        color: var(--color-low-price-text);
        font-size: 22px;
        font-weight: 400;
        line-height: 31px;
        white-space: nowrap;
      }

      .guest-stats {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        width: 188px;
      }

      .guest-stat {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--color-dark);
      }

      .guest-stat:nth-child(1) {
        width: 50px;
      }

      .guest-stat:nth-child(n + 2) {
        width: 55px;
      }

      .count-number {
        min-width: 12px;
        font-size: 32px;
        line-height: 32px;
        text-align: right;
      }

      .guest-stat img {
        display: block;
        width: 32px;
        height: 32px;
        object-fit: cover;
        user-select: none;
        -webkit-user-drag: none;
      }

      .filters {
        position: relative;
        width: 714px;
        height: 60px;
      }

      .filters-track {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 708px;
        height: 60px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .filters-track::-webkit-scrollbar {
        display: none;
      }

      .filter-chip {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 108px;
        height: 60px;
        border-radius: 6px;
        background: var(--color-filter-bg);
        color: var(--color-dark);
        font-size: 24px;
        font-weight: 400;
        line-height: 34px;
        cursor: default;
      }

      .filter-chip::selection,
      .filter-action-text::selection,
      .day-row span::selection,
      .date span::selection,
      .low-price::selection,
      .count-number::selection {
        background: transparent;
      }

      .filter-action {
        position: absolute;
        top: 0;
        right: 0;
        display: flex;
        align-items: center;
        gap: 3px;
        width: 120px;
        height: 60px;
        padding-left: 45px;
        background: linear-gradient(

        justify-content: center;
        width: 24px;
        height: 24px;
        color: var(--color-dark);
        flex: 0 0 auto;
      }

        display: block;
        width: 12.1073px;
        height: 6.80388px;
      }
    </style>

        }

        updateScale();
        window.addEventListener("resize", updateScale);
      })();
