      :root {
        --design-width: 750;
        --design-height: 354;
        --scale: 1;
        --text-dark: #0f131a;
        --text-mid: #5c5f66;
        --text-light: #919499;
        --price: #ff5533;
        --indigo: #6666ff;
        --label: #f7f8fa;
        --member-border: #bfaa9f;
        --member-dark-1: #6e5a4f;
        --member-dark-2: #564131;
        --member-text: #805540;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: fit-content;
        min-height: 0;
        background: #f2f3f5;
      }

      body {
        overflow: hidden;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
        color: var(--text-dark);
      }

      img,
      svg {
        display: block;
        user-select: none;
        -webkit-user-drag: none;
      }

      .viewport {
        position: relative;
        width: calc(var(--design-width) * 1px * var(--scale));
        height: calc(var(--design-height) * 1px * var(--scale));
        overflow: hidden;
      }

      .canvas {
        position: relative;
        top: 0;
        left: 0;
        width: 750px;
        height: 354px;
        transform: scale(var(--scale));
        transform-origin: top left;
      }

      .hotel-card {
        position: relative;
        display: flex;
        gap: 18px;
        width: 750px;
        height: 354px;
        padding: 12px 18px;
        background: #ffffff;
        overflow: hidden;
      }

      .cover {
        position: relative;
        width: 222px;
        height: 330px;
        flex: 0 0 auto;
        overflow: hidden;
        border-radius: 12px;
        background: #c6d8e8;
      }

      .cover-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .brand-chip {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 32px;
        padding: 0 6px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(5px);
        color: #fffcfa;
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .quality-ribbon {
        display: none;
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 34px;
        overflow: hidden;
      }

      .quality-ribbon::before {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(135deg, #6e5a4f 0%, #564131 100%);
      }

      .quality-ribbon::after {
        position: absolute;
        right: -48px;
        bottom: -38px;
        width: 120px;
        height: 120px;
        content: "";
        background: radial-gradient(
          circle,
          rgba(255, 214, 173, 0.46) 0%,
          rgba(255, 214, 173, 0) 72%
        );
        opacity: 0.72;
        mix-blend-mode: screen;
      }

      .ribbon-content {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 100%;
      }

      .ribbon-wheat {
        width: 10px;
        height: 16px;
        opacity: 0.78;
        flex: 0 0 auto;
      }

      .ribbon-title {
        margin: 0;
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        line-height: 31px;
        letter-spacing: 2.64px;
        white-space: nowrap;
      }

      .detail {
        display: flex;
        flex-direction: column;
        width: 474px;
        height: 330px;
        padding-top: 2px;
      }

      .detail-main {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 474px;
      }

      .title-row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 42px;
      }

      .hotel-title {
        margin: 0;
        color: var(--text-dark);
        font-size: 30px;
        font-weight: 500;
        line-height: 42px;
        white-space: nowrap;
      }

      .hotel-level {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 4px;
        border-radius: 4px;
        background: var(--label);
        color: var(--text-light);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .rating-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
      }

      .score-pill {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 28px;
        border-radius: 8px;
        background: var(--indigo);
        color: #ffffff;
        font-family: "Alibaba Sans", "DIN Alternate", "Arial Narrow",
          sans-serif;
        font-size: 26px;
        font-weight: 700;
        line-height: 26px;
      }

      .review-copy {
        max-width: 264px;
        margin: 0;
        overflow: hidden;
        color: var(--indigo);
        font-size: 24px;
        line-height: 34px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .location-copy {
        margin: 0;
        color: var(--text-mid);
        font-size: 24px;
        line-height: 34px;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-height: 28px;
      }

      .outline-tag {
        display: flex;
        align-items: center;
        height: 28px;
        padding: 0 6px;
        border: 1px solid rgba(92, 95, 102, 0.5);
        border-radius: 4px;
        color: var(--text-mid);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .member-row {
        display: flex;
        align-items: center;
        width: fit-content;
        height: 28px;
      }

      .member-main {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 28px;
        padding: 0 6px;
        border: 1px solid var(--member-border);
        border-right: none;
        border-radius: 4px 0 0 4px;
        background: linear-gradient(
          90deg,
          var(--member-dark-1) 0%,
          var(--member-dark-2) 100%
        );
      }

      .member-f4 {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .member-link {
        width: 18px;
        height: 12px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .member-main-text {
        color: #fef5ec;
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .member-sub {
        display: flex;
        align-items: center;
        height: 28px;
        margin-left: -1px;
        padding: 0 6px;
        border: 1px solid var(--member-border);
        border-radius: 0 4px 4px 0;
        background: #ffffff;
        color: var(--member-text);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .heat-copy {
        margin: 0;
        color: var(--price);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .price-area {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        margin-top: auto;
      }

      .price-top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        width: 474px;
        min-height: 48px;
      }

      .bookings {
        margin: 0;
        color: var(--text-light);
        font-size: 20px;
        line-height: 28px;
      }

      .price-wrap {
        display: flex;
        align-items: flex-end;
        gap: 6px;
      }

      .compare-wrap {
        display: flex;
        align-items: flex-end;
        gap: 0;
        color: var(--text-light);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .compare-wrap > span {
        line-height: 28px;
      }

      .compare-price {
        text-decoration: line-through;
        text-decoration-thickness: 1px;
        text-decoration-skip-ink: none;
      }

      .sale-price {
        display: flex;
        align-items: flex-end;
        gap: 0;
        color: var(--price);
        white-space: nowrap;
      }

      .sale-currency {
        font-family: "Alibaba Sans", "DIN Alternate", "Arial Narrow",
          sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 30px;
      }

      .sale-digits {
        font-family: "Fliggy Sans 102", "Fliggy Sans", "Alibaba Sans",
          sans-serif;
        font-size: 42px;
        font-weight: 700;
        line-height: 34px;
      }

      .sale-suffix {
        font-size: 20px;
        line-height: 28px;
      }

      .benefit-row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        height: 28px;
        padding: 0 6px;
        border-radius: 4px;
        overflow: hidden;
        background: linear-gradient(
          90deg,
          rgba(255, 230, 224, 0) 0%,
          rgba(255, 230, 224, 0.9) 100%
        );
      }

      .benefit-text {
        margin: 0;
        color: var(--price);
        font-size: 20px;
        line-height: 28px;
        white-space: nowrap;
      }

      .benefit-divider {
        width: 0;
        height: 16px;
        border-left: 1px dashed #ffb2a3;
      }

      .benefit-arrow {
        position: relative;
        width: 10px;
        height: 20px;
        flex: 0 0 auto;
      }

      .benefit-arrow::before {
        position: absolute;
        top: 50%;
        left: 0;
        width: 8px;
        height: 8px;
        content: "";
        border-top: 2px solid #ff8066;
        border-right: 2px solid #ff8066;
        transform: translateY(-50%) rotate(45deg);
      }
    </style>
  </head>

          <div class="cover" data-node-id="8597:23388">
            <img
              class="cover-image"
