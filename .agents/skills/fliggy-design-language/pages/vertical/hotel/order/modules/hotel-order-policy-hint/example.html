<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>政策提示模块 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 通栏容器 */
        .price-policy-card {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
        }
        .module-divider {
            height: 1px;
            background: var(--color-bg);
            margin: 0 30px;
        }
        .policy-wrapper {
            padding: 0 30px 0;
        }
        .policy-item {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 96px;
            padding: 0 24px;
            margin: 0 -24px;
            border-bottom: 1px solid var(--color-bg);
        }
        .policy-item:last-child {
            border-bottom: none;
        }
        .policy-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        .policy-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 0;
            gap: 12px;
        }
        .policy-text {
            flex: 1;
            font-size: 26px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--color-darkgray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .policy-text .highlight {
            color: var(--color-pay-1);
        }
        .policy-title {
            flex: 1;
            font-size: 26px;
            font-weight: 400;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .policy-title.warning { color: var(--color-pay-1); }
        .policy-title.normal { color: var(--color-midgray); }
        .policy-arrow {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="price-policy-card">
        <div class="module-divider"></div>
        <div class="policy-wrapper">
            <div class="policy-item">
                <div class="policy-content">
                    <p class="policy-text"><span class="highlight">限时取消</span> 2025年01月03日 18:00前，可免费取消</p>
                    <img class="policy-arrow" src="../../../assets/支付组件进入箭头.png" alt="">
                </div>
            </div>
            <div class="policy-item">
                <img class="policy-icon" src="../../../assets/提示.png" alt="">
                <div class="policy-content">
                    <p class="policy-title normal">不允许携带宠物；当地14:00以后入住 12:00以后离...</p>
                    <img class="policy-arrow" src="../../../assets/支付组件进入箭头.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
