<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>入住人信息 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 模拟房型卡片容器 */
        .room-date-wrapper {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
            padding: 24px 30px;
        }

        /* 入住人信息 */
        .guest-info-section {
            padding-top: 24px;
            margin-top: 24px;
        }
        .info-row {
            display: flex;
            gap: 24px;
            font-size: 24px;
            margin-bottom: 18px;
        }
        .info-row:last-of-type { margin-bottom: 0; }
        .info-label {
            width: 120px;
            color: var(--color-lightgray);
            flex-shrink: 0;
        }
        .info-value {
            color: var(--color-darkgray);
            flex-grow: 1;
        }
        .info-note {
            font-size: 22px;
            color: var(--color-lightgray);
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .note-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="room-date-wrapper">
        <div class="guest-info-section">
            <div class="info-row">
                <span class="info-label">入住人</span>
                <span class="info-value">薯格</span>
            </div>
            <div class="info-row">
                <span class="info-label">联系手机</span>
                <span class="info-value">153****5217</span>
            </div>
            <div class="info-row">
                <span class="info-label">特殊要求</span>
                <span class="info-value">无要求</span>
            </div>
            <div class="info-note">
                <img class="note-icon" src="../../../assets/提示.png" alt="">
                <span>房型偏好和特殊要求酒店会尽量安排，以实际到店为准</span>
            </div>
        </div>
    </div>
</body>
</html>
