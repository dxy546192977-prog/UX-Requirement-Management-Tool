<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>房型日期信息 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-l: 6px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 房型日期信息 */
        .room-date-wrapper {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
            padding: 24px 30px;
            margin-top: 24px;
        }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .room-name {
            font-size: 30px;
            font-weight: 500;
            color: var(--color-darkgray);
            line-height: 1.4;
        }
        .room-detail-link {
            font-size: 24px;
            color: var(--color-indigo-1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .room-specs {
            font-size: 24px;
            color: var(--color-lightgray);
            margin: 12px 0 0 0;
        }
        .date-row {
            display: flex;
            align-items: center;
            margin-top: 24px;
        }
        .date-item {
            flex: 1;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .date-text {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .time-text {
            font-size: 28px;
            color: var(--color-lightgray);
        }
        .breakfast-card {
            background: var(--color-label);
            border-radius: var(--radius-l);
            padding: 24px;
            margin-top: 24px;
        }
        .breakfast-row {
            display: flex;
            gap: 24px;
            font-size: 26px;
            color: var(--color-darkgray);
            margin-bottom: 12px;
        }
        .breakfast-row:last-child { margin-bottom: 0; }
        .breakfast-label {
            color: var(--color-lightgray);
            width: 100px;
            flex-shrink: 0;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="room-date-wrapper">
        <div class="room-header">
            <h3 class="room-name">特惠大床房 · 1间 · 1晚</h3>
            <a href="#" class="room-detail-link">
                房型详情
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M9 5L16 12L9 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </div>
        <p class="room-specs">大床 | 可住2人 | 30-35㎡ | 禁烟 | 有窗</p>
        <div class="date-row">
            <div class="date-item">
                <span class="date-text">03月06日 周四</span>
                <span class="time-text">入住</span>
            </div>
            <div class="date-item">
                <span class="date-text">03月07日 周五</span>
                <span class="time-text">离店</span>
            </div>
        </div>
        <div class="breakfast-card">
            <div class="breakfast-row">
                <span class="breakfast-label">早餐信息</span>
                <span>03-06  无早餐 × 1间</span>
            </div>
            <div class="breakfast-row">
                <span class="breakfast-label"></span>
                <span>03-07  无早餐 × 1间</span>
            </div>
        </div>
    </div>
</body>
</html>
