<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>常见问题标签 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-indigo-1: #6666ff;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            padding: 24px;
        }

        /* 常见问题标签 */
        .faq-wrapper {
            width: 750px;
            margin-left: -24px;
            background: var(--color-white);
            padding: 24px 30px 36px;
            margin-top: 24px;
        }
        .faq-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .faq-title {
            font-size: 28px;
            font-weight: 500;
            color: var(--color-darkgray);
        }
        .faq-more {
            font-size: 24px;
            color: var(--color-indigo-1);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .faq-more-arrow {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .faq-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }
        .faq-tag {
            background: var(--color-label);
            border-radius: 32px;
            padding: 18px 24px;
            font-size: 24px;
            color: var(--color-darkgray);
            border: none;
            cursor: pointer;
            font-family: inherit;
            flex: 1;
            min-width: 180px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="faq-wrapper">
        <div class="faq-header">
            <h3 class="faq-title">您可能遇到的问题</h3>
            <a href="#" class="faq-more">更多<img class="faq-more-arrow" src="../../../assets/支付组件进入箭头.png" alt=""></a>
        </div>
        <div class="faq-tags">
            <button class="faq-tag">预订信息错误</button>
            <button class="faq-tag">拦截取消订单</button>
            <button class="faq-tag">如何联系酒店</button>
            <button class="faq-tag">订单确认失败</button>
            <button class="faq-tag">退款到账进度</button>
            <button class="faq-tag">删除酒店订单</button>
        </div>
    </div>
</body>
</html>
