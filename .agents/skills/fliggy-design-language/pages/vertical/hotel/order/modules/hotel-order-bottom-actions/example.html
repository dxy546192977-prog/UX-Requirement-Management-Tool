<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>底部操作栏 - 组件示例</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-white: #ffffff;
            --color-bg: #f2f3f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'PingFang SC', sans-serif;
            width: 750px;
            background: var(--color-bg);
            min-height: 300px;
        }

        /* 底部操作栏 */
        .bottom-bar-wrapper {
            width: 750px;
            background: var(--color-white);
            border-top: 1px solid rgba(15, 19, 26, 0.06);
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 999;
        }
        .bar-content {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100px;
            padding: 0 30px;
        }
        .bar-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        .btn-text {
            font-size: 22px;
            color: var(--color-darkgray);
        }
        .safe-area {
            height: 34px;
            background: var(--color-white);
        }
    </style>
</head>
<body>
    <div class="bottom-bar-wrapper">
        <div class="bar-content">
            <button class="bar-btn">
                <img class="btn-icon" src="../../../assets/jiudian.png" alt="">
                <span class="btn-text">联系酒店</span>
            </button>
            <button class="bar-btn">
                <img class="btn-icon" src="../../../assets/kefu 1.png" alt="">
                <span class="btn-text">联系客服</span>
            </button>
            <button class="bar-btn">
                <img class="btn-icon" src="../../../assets/shexiangji.png" alt="">
                <span class="btn-text">直播客服</span>
            </button>
        </div>
        <div class="safe-area"></div>
    </div>
</body>
</html>
