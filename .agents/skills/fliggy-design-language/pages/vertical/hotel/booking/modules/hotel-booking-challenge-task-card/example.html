<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>挑战任务卡组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-lightgray: #919499;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        .card {
            width: 714px;
            background: var(--color-white);
            border-radius: 12px;
            padding: 24px;
            box-sizing: border-box;
        }

        .card-title {
            font-size: 32px;
            font-weight: 500;
            color: var(--color-darkgray);
            margin-bottom: 24px;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-name span {
            font-size: 28px;
            color: var(--color-lightgray);
        }

        .task-reward {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .task-reward span {
            font-size: 28px;
            color: var(--color-darkgray);
        }

        .info-icon {
            width: 28px;
            height: 28px;
        }

        .radio-btn {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .radio-btn svg {
            width: 44px;
            height: 44px;
        }
    </style>
</head>
<body>

    <section class="card">
        <div class="card-title">挑战任务</div>
        <div class="task-row">
            <div class="task-name">
                <span>住五送一</span>
                <img src="../../../assets/帮助.png" class="info-icon" alt="">
            </div>
            <div class="task-reward">
                <span>住5晚领100元酒店券</span>
                <div class="radio-btn">
                    <img src="../../../assets/未勾选.png" alt="">
                </div>
            </div>
        </div>
    </section>

</body>
</html>
