<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>重要提醒卡组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        .notice-card {
            width: 714px;
            background: var(--color-white);
            border-radius: 12px;
            padding: 24px;
            box-sizing: border-box;
        }

        .notice-header {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .notice-icon {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .notice-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-darkgray);
            line-height: 1;
            margin: 0;
        }

        .notice-text {
            font-size: 24px;
            color: var(--color-darkgray);
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <section class="notice-card">
        <div class="notice-header">
            <svg class="notice-icon" viewBox="0 0 32 32" fill="none">
                <circle cx="16" cy="16" r="14" stroke="#FF5533" stroke-width="2"/>
                <path d="M16 8V18" stroke="#FF5533" stroke-width="2" stroke-linecap="round"/>
                <circle cx="16" cy="23" r="1.5" fill="#FF5533"/>
            </svg>
            <p class="notice-title">重要提醒</p>
        </div>
        <p class="notice-text">· 仅可提交一次，提交成功后不支持修改。</p>
    </section>

</body>
</html>
