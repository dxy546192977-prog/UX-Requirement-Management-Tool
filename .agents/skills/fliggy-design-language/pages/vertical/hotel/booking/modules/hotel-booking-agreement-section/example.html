<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>协议信息区组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-indigo-1: #6666ff;
            --color-label: #F7F8FA;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        .agreement-section {
            width: 714px;
            padding: 24px 0;
            text-align: left;
        }

        .agreement-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .agreement-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .agreement-text {
            font-size: 24px;
            color: var(--color-midgray);
            line-height: 1.6;
            text-align: left;
            margin: 0;
        }

        .agreement-link {
            color: var(--color-indigo-1);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <section class="agreement-section">
        <div class="agreement-item">
            <img src="../../../assets/信用授权须知.png" class="agreement-icon" alt="">
            <p class="agreement-text">
                <strong>信用授权须知</strong><br>
                信用住订单，仅需下单时信用授权即，无需提前支付或冻结任何费用。
            </p>
        </div>
        <div class="agreement-item">
            <img src="../../../assets/入离时间.png" class="agreement-icon" alt="">
            <p class="agreement-text">
                <strong>入离时间</strong><br>
                14:00后办理入住：早到店可能需要等待<br>
                12:00前办理退房：续住及行李寄请联系酒店前台
            </p>
        </div>
        <div class="agreement-item">
            <img src="../../../assets/订房必读.png" class="agreement-icon" alt="">
            <p class="agreement-text">
                <strong>订房必读</strong><br>
                酒店提供有偿接送机、接送站服务，查看 <a href="#" class="agreement-link">订房必读</a>。
            </p>
        </div>
        <p class="agreement-text">导码隐私保护 <a href="#" class="agreement-link">服务说明</a></p>
    </section>

</body>
</html>
