<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店预订信息卡组件</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        body {
            background-color: var(--color-label);
            display: flex;
            justify-content: center;
            padding: 50px 18px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
            margin: 0;
        }

        /* 酒店预订信息卡 */
        .booking-info-card {
            width: 714px;
            background: var(--color-white);
            border-radius: 12px;
            padding: 24px;
            box-sizing: border-box;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .booking-summary {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0;
            font-size: 30px;
            font-weight: 500;
            color: var(--color-darkgray);
        }

        .booking-summary-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .booking-summary .date-divider {
            display: inline-block;
            width: 20px;
            height: 2px;
            background: var(--color-lightgray);
            margin: 0 8px;
        }

        .booking-summary .night-divider {
            display: inline-block;
            width: 2px;
            height: 30px;
            background: var(--color-lightgray);
            margin: 0 8px;
            vertical-align: middle;
        }

        .card-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 24px;
            color: var(--color-darkgray);
            text-decoration: none;
        }

        .card-link .arrow-icon {
            width: 12px;
            height: 20px;
            object-fit: contain;
        }

        .booking-detail-list {
            font-size: 26px;
            color: var(--color-darkgray);
            line-height: 1.7;
            margin-bottom: 18px;
            max-width: 540px;
        }

        .booking-detail-list p {
            margin: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .booking-detail-list .divider {
            display: inline-block;
            width: 2px;
            height: 28px;
            margin: 0 12px;
            background: var(--color-lightgray);
        }

        .booking-tags {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .booking-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            background: transparent;
            border: 1px solid #14A883;
            border-radius: 6px;
            font-size: 20px;
            color: #14A883;
        }

        .booking-tag-confirm {
            display: inline-flex;
            align-items: center;
            padding: 2px 6px;
            background: transparent;
            border: 1px solid #D2D4D9;
            border-radius: 6px;
            font-size: 20px;
            color: var(--color-midgray);
        }

        .booking-notice {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .booking-notice-text {
            display: flex;
            align-items: center;
            font-size: 26px;
            color: #919499;
            flex: 1;
            overflow: hidden;
            margin-right: 12px;
        }

        .booking-notice-text .desc {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .booking-notice-text .count {
            color: #0F131A;
            flex-shrink: 0;
        }

        .booking-notice-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 24px;
            color: var(--color-darkgray);
            text-decoration: none;
            flex-shrink: 0;
        }

        .booking-notice-link .arrow-icon {
            width: 12px;
            height: 20px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <section class="booking-info-card">
        <div class="card-header">
            <h2 class="booking-summary">
                <span class="booking-summary-item">6月29日今天<span class="date-divider"></span>6月30日明天</span>
                <span class="night-divider"></span>
                <span class="booking-summary-item">1晚</span>
            </h2>
            <a href="#" class="card-link">房型详情 
                <img src="../../../assets/arrow.png" class="arrow-icon" alt="">
            </a>
        </div>
        <div class="booking-detail-list">
            <p>豪华大床房<span class="divider"></span>1张1.5m大床<span class="divider"></span>无早餐<span class="divider"></span>48㎡<span class="divider"></span>有窗</p>
        </div>
        <div class="booking-tags">
            <span class="booking-tag">4月1日0点前可免费取消</span>
            <span class="booking-tag-confirm">立即确认</span>
        </div>
        <div class="booking-notice">
            <span class="booking-notice-text"><span class="desc">酒店提供有偿接送机、接送站服务，需要…</span><span class="count">共3项</span></span>
            <a href="#" class="booking-notice-link">
                订房必读
                <img src="../../../assets/arrow.png" class="arrow-icon" alt="">
            </a>
        </div>
    </section>

</body>
</html>
