<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店首页 — 促销三卡（布局 B：中大特价酒店底图）</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .promo-module {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 18px;
            width: 750px;
            height: 116px;
            padding: 0 18px;
            box-sizing: border-box;
        }

        .promo-card {
            position: relative;
            height: 100%;
            background-color: #FFFFFF;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            text-decoration: none;
            color: #0F131A;
            flex-shrink: 0;
        }

        .promo-card--large {
            width: 274px;
        }

        .promo-card--small {
            width: 202px;
            padding-left: 24px;
        }

        .card__content {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }

        .card__title {
            font-weight: 500;
            font-size: 30px;
            line-height: 1.4;
            margin: 0;
        }

        .card__subtitle {
            font-weight: 400;
            font-size: 24px;
            line-height: 1.4;
            color: #919499;
            margin: 0;
        }

        .card__decoration {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 80px;
            height: 80px;
            pointer-events: none;
        }

        .promo-card--full-bg {
            background-size: cover;
            background-position: center;
            padding-left: 24px;
        }
    </style>
</head>
<body>

    <div class="promo-module">

        <a href="#" class="promo-card promo-card--small">
            <div class="card__content">
                <h3 class="card__title">品牌闪促</h3>
                <p class="card__subtitle">加赠积分</p>
            </div>
            <img class="card__decoration" src="https://gw.alicdn.com/imgextra/i1/O1CN01QCUN3E1tP39Ch8hst_!!6000000005893-2-tps-160-160.png" alt="">
        </a>

        <a href="#" class="promo-card promo-card--large promo-card--full-bg" style="background-image: url('https://gw.alicdn.com/imgextra/i4/O1CN01FCJGSE1ZHSGSQ1f1a_!!6000000003169-2-tps-548-232.png')">
            <div class="card__content">
                <h3 class="card__title">特价酒店</h3>
                <p class="card__subtitle">都是低价</p>
            </div>
        </a>

        <a href="#" class="promo-card promo-card--small">
            <div class="card__content">
                <h3 class="card__title">爆款直播</h3>
                <p class="card__subtitle">周周低价</p>
            </div>
            <img class="card__decoration" src="https://gw.alicdn.com/imgextra/i1/O1CN0157L8wy1Gy4Pr1dNtP_!!6000000000690-2-tps-160-160.png" alt="">
        </a>

    </div>

</body>
</html>
