<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>酒店列表 — 权益条</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'PingFang SC', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        * {
            box-sizing: border-box;
        }

        .benefit-component {
            position: relative;
            width: 750px;
            height: 96px;
            background-color: #FFFFFF;
        }

        .benefit-bar {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 19px 18px;
            position: absolute;
            width: 714px;
            height: 72px;
            left: 18px;
            top: 12px;
            background: #F7F8FA;
            border-radius: 12px;
            isolation: isolate;
            box-sizing: border-box;
        }

        .benefit-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 24px;
        }

        .benefit-logo {
            width: 105px;
            height: 26px;
            display: block;
        }

        .benefit-text-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 18px;
        }

        .benefit-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
        }

        .benefit-dot {
            width: 4px;
            height: 4px;
            background: #0F131A;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .benefit-text {
            font-style: normal;
            font-weight: 500;
            font-size: 24px;
            line-height: 140%;
            color: #0F131A;
            white-space: nowrap;
        }

        .benefit-arrow {
            flex-shrink: 0;
        }

        .benefit-arrow svg {
            display: block;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="benefit-component">
        <div class="benefit-bar">
            <div class="benefit-content">
                <img class="benefit-logo" src="https://gw.alicdn.com/imgextra/i3/O1CN01Q239Kv22N3yIoEO8d_!!6000000007107-2-tps-210-52.png" alt="权益Logo">

                <div class="benefit-text-wrapper">
                    <div class="benefit-item">
                        <span class="benefit-dot"></span>
                        <span class="benefit-text">里程10倍抵房费</span>
                    </div>
                    <div class="benefit-item">
                        <span class="benefit-dot"></span>
                        <span class="benefit-text">优住会酒店9折起</span>
                    </div>
                </div>
            </div>

            <div class="benefit-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7.46968 19.4698C7.3372 19.612 7.26508 19.8001 7.26851 19.9944C7.27194 20.1887 7.35065 20.3741 7.48806 20.5115C7.62547 20.6489 7.81086 20.7276 8.00516 20.731C8.19946 20.7344 8.38751 20.6623 8.52968 20.5298L16.5297 12.5298C16.6701 12.3892 16.749 12.1986 16.749 11.9998C16.749 11.8011 16.6701 11.6105 16.5297 11.4698L8.52968 3.46985C8.38751 3.33737 8.19946 3.26524 8.00516 3.26867C7.81086 3.2721 7.62547 3.35081 7.48806 3.48822C7.35065 3.62564 7.27194 3.81102 7.26851 4.00532C7.26508 4.19963 7.3372 4.38767 7.46968 4.52985L14.9387 11.9998L7.46868 19.4698H7.46968Z" fill="#0F131A"/>
                </svg>
            </div>
        </div>
    </div>

</body>
</html>
