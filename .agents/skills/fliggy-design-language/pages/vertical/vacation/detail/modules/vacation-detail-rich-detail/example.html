<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>图文详情 · vacation-detail-rich-detail</title>
  <style>
    body { margin: 0; background: #F2F3F5; display: flex; justify-content: center; padding: 24px 18px; font-family: 'PingFang SC', sans-serif; }
    .details-section { width: 714px; background: #FFF; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .details-header { padding: 30px; }
    .details-header h2 { margin: 0; font-weight: 500; font-size: 36px; line-height: 44px; color: #0F131A; }
    .details-content { position: relative; max-height: 788px; overflow: hidden; }
    .details-content img { width: 100%; height: auto; display: block; }
    .expand-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 86px;
      background: linear-gradient(to top, #fff 60%, rgba(255,255,255,0.8));
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .expand-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      font-weight: 500;
      font-size: 26px;
      color: #292C33;
    }
  </style>
</head>
<body>
  <section class="details-section">
    <header class="details-header"><h2>图文详情</h2></header>
    <div class="details-content">
      <img src="https://picsum.photos/714/1200" alt="详情长图">
      <div class="expand-footer">
        <button type="button" class="expand-button">
          <span>展开全部</span>
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M17.51.34a1 1 0 00-1.87-.9l-6.64 7.28L2.36.44A1 1 0 00.38 2.46l7.51 8.23a1.5 1.5 0 002.21 0l7.52-8.23a1 1 0 00-.11-1.12z" fill="#0F131A"/></svg>
        </button>
      </div>
    </div>
  </section>
</body>
</html>
