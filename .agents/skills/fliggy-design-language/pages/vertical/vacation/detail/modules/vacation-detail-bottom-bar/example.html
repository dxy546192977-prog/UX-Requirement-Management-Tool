<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>商详底栏 · vacation-detail-bottom-bar</title>
  <style>
    body { background: #F2F3F5; margin: 0; display: flex; justify-content: center; align-items: flex-end; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    .bottom-bar { width: 750px; background: #FFF; display: flex; flex-direction: column; }
    .bottom-bar__divider { width: 750px; height: 1px; background: #D2D4D9; }
    .bottom-bar__main {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px 24px 12px 36px;
      gap: 36px;
      width: 750px;
      height: 108px;
    }
    .icon-nav { display: flex; flex-direction: row; justify-content: space-between; align-items: center; gap: 42px; flex-grow: 1; }
    .icon-nav__item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .icon-nav__icon { width: 42px; height: 42px; }
    .icon-nav__label { font-size: 20px; line-height: 20px; color: #5C5F66; white-space: nowrap; }
    .action-buttons { display: flex; width: 400px; height: 84px; }
    .action-buttons__button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 200px;
      height: 84px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 30px;
      line-height: 36px;
      color: #FFF;
    }
    .action-buttons__button--add-to-cart { background: #FFB300; border-radius: 42px 0 0 42px; }
    .action-buttons__button--buy-now { background: #FF6200; border-radius: 0 42px 42px 0; }
    .bottom-bar__safe-area {
      width: 750px;
      height: 64px;
      background: #FFF;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 12px;
      box-sizing: border-box;
    }
    .bottom-bar__home-indicator { width: 268px; height: 10px; background: #000; border-radius: 20px; }
  </style>
</head>
