<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>门票商详 — 整页串联 · vertical.vacation.detail</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #F2F3F5; font-family: 'PingFang SC', 'Alibaba Sans 102', sans-serif; padding-bottom: 200px; }
    a { text-decoration: none; color: inherit; }
    .vd-shell { width: 750px; max-width: 100%; margin: 0 auto; position: relative; }
    /* fixed top nav — 176px, scroll ≥180 → 白底 */
    .vd-nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      width: 750px;
      max-width: 100%;
      height: 176px;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .vd-nav::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.2s ease;
    }
    .vd-nav.is-scrolled { background: #FFF; box-shadow: 0 1px 0 rgba(210,212,217,0.8); }
    .vd-nav.is-scrolled::before { opacity: 0; }
    .vd-nav__status { height: 88px; position: relative; }
    .vd-nav__time {
      position: absolute;
      left: 48px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      font-weight: 600;
      color: #FFF;
      transition: color 0.2s ease;
    }
    .vd-nav.is-scrolled .vd-nav__time { color: #0F131A; }
    .vd-nav__row {
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    .vd-nav__ico {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFF;
      transition: color 0.2s ease;
    }
    .vd-nav.is-scrolled .vd-nav__ico { color: #0F131A; }
    .vd-nav__ico svg { width: 48px; height: 48px; fill: currentColor; }
    .vd-nav__right { display: flex; gap: 30px; }
    /* hero */
    .vd-hero { width: 750px; max-width: 100%; height: 750px; background: #ddd; }
    .vd-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* stack */
    .vd-stack { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 0 18px 24px; }
    .vd-ind-wrap { width: 100%; display: flex; justify-content: center; padding: 6px 0; }
    .vd-tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0,0,0,0.35);
      border-radius: 24px;
      max-width: 714px;
    }
    .vd-tabs button {
      border: none;
      height: 40px;
      padding: 0 14px;
      border-radius: 20px;
      font-size: 22px;
      font-weight: 500;
      background: transparent;
      color: #FFF;
      cursor: pointer;
    }
    .vd-tabs button.is-on { background: #FFE033; color: #0F131A; }
    /* cards */
    .vd-card714 {
      width: 714px;
      max-width: 100%;
      background: #FFF;
      border-radius: 12px;
      overflow: hidden;
    }
    .vd-bi { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .vd-bi-price { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px; color: #FF5533; }
    .vd-bi-price .n { font-size: 42px; font-weight: 700; font-family: 'Alibaba Sans 102', sans-serif; }
    .vd-bi-title { font-size: 32px; font-weight: 600; line-height: 44px; color: #0F131A; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vd-shelf-h { padding: 24px 24px 0; font-size: 36px; font-weight: 500; margin: 0; color: #0F131A; }
    .vd-shelf-row { display: flex; justify-content: space-between; padding: 24px; border-top: 1px solid #F1F2F4; }
    .vd-shelf-row:first-of-type { border-top: none; }
    .vd-book { width: 84px; height: 84px; background: #FF7300; border: none; border-radius: 12px; color: #FFF; font-size: 36px; font-weight: 600; }
    .vd-poi-h { padding: 24px; font-size: 36px; font-weight: 500; margin: 0; }
    .vd-poi-sub { padding: 0 24px 24px; font-size: 24px; color: #5C5F66; }
    .vd-rich-h { padding: 24px; font-size: 36px; font-weight: 500; margin: 0; }
    .vd-rich-body { position: relative; max-height: 400px; overflow: hidden; }
    .vd-rich-body img { width: 100%; display: block; vertical-align: middle; }
    .vd-rich-fade {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 72px;
      background: linear-gradient(to top, #fff 55%, rgba(255,255,255,0));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vd-rich-fade button { border: none; background: none; font-size: 26px; font-weight: 500; color: #292C33; cursor: pointer; }
    /* bottom bar */
    .vd-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      width: 750px;
      max-width: 100%;
      background: #FFF;
      border-top: 1px solid #D2D4D9;
    }
    .vd-bottom__main { display: flex; align-items: center; padding: 12px 24px 12px 36px; gap: 24px; height: 108px; }
    .vd-bottom__icons { display: flex; flex: 1; justify-content: space-around; gap: 12px; }
    .vd-bottom__icons a { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 18px; color: #5C5F66; }
    .vd-bottom__cta { display: flex; height: 84px; width: 380px; }
    .vd-bottom__cta button { flex: 1; border: none; font-size: 28px; font-weight: 500; color: #FFF; }
    .vd-bottom__cta .a { background: #FFB300; border-radius: 42px 0 0 42px; }
    .vd-bottom__cta .b { background: #FF6200; border-radius: 0 42px 42px 0; }
    .vd-bottom__safe { height: 56px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
    .vd-bottom__home { width: 268px; height: 10px; background: #000; border-radius: 20px; opacity: 0.25; }
  </style>
</head>
<body>
  <div class="vd-shell">

          <a href="#" class="vd-nav__ico" aria-label="购物车"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.29-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.94-2.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0019 4H5.21L4.27 2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg></a>
          <a href="#" class="vd-nav__ico" aria-label="更多"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></a>
        </div>
      </div>
    </header>

    <div class="vd-hero">
      <img src="https://picsum.photos/id/102/750/750" alt="商品头图">
    </div>

    <div class="vd-stack">
      <div class="vd-ind-wrap">
        <div class="vd-tabs" role="tablist">
          <button type="button" class="is-on">图片</button>
          <button type="button">VR全景</button>
          <button type="button">视频</button>

      </div>

      </section>

      <section class="vd-card714" aria-label="图文详情">
        <h2 class="vd-rich-h">图文详情</h2>
        <div class="vd-rich-body">
          <img src="https://picsum.photos/714/900" alt="">
          <div class="vd-rich-fade"><button type="button">展开全部 ˅</button></div>
        </div>
      </section>
    </div>
  </div>

  <footer class="vd-bottom">
    <div class="vd-bottom__main">
      <div class="vd-bottom__icons">
        <a href="#">💬<span>咨询</span></a>
        <a href="#">🏪<span>店铺</span></a>
        <a href="#">☆<span>收藏</span></a>
      </div>
      <div class="vd-bottom__cta">
        <button type="button" class="a">加入购物车</button>
        <button type="button" class="b">立即购买</button>
      </div>
    </div>
    <div class="vd-bottom__safe"><div class="vd-bottom__home"></div></div>
  </footer>

  <script>
    (function () {
      var nav = document.getElementById('vdNav');
      var TH = 180;
      function onScroll() {
        nav.classList.toggle('is-scrolled', (window.scrollY || document.documentElement.scrollTop) >= TH);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
