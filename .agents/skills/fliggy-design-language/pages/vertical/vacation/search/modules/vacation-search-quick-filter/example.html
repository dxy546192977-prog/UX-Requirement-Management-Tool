<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>快筛 · vacation-search-quick-filter</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', sans-serif; }
    .filter-bar {
      box-sizing: border-box;
      width: 750px;
      height: 72px;
      background: #FFF;
      padding: 6px 0 6px 18px;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar { -ms-overflow-style: none; scrollbar-width: none; }
    .filter-bar__list { display: flex; align-items: center; gap: 12px; list-style: none; padding: 0; margin: 0; }
    .filter-button {
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 18px;
      height: 60px;
      background: #F7F8FA;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      font-size: 24px;
      line-height: 32px;
      color: #0F131A;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .filter-button.is-active { background-color: #FFF2F0; color: #FF5533; }
  </style>
</head>
<body>
  <nav class="filter-bar" aria-label="快筛">
    <ul class="filter-bar__list">
      <li><button type="button" class="filter-button is-active">只看目的地参团</button></li>
      <li><button type="button" class="filter-button">私家团</button></li>
      <li><button type="button" class="filter-button">精品小团</button></li>
      <li><button type="button" class="filter-button">一日游</button></li>
      <li><button type="button" class="filter-button">15人及以下</button></li>
    </ul>
  </nav>
  <script>
    document.querySelectorAll('.filter-button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-button').forEach(function (b) { b.classList.remove('is-active'); });
        btn.classList.add('is-active');
      });
    });
  </script>
</body>
</html>
