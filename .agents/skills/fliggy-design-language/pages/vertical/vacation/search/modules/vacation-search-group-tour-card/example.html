<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>跟团游卡 · vacation-search-group-tour-card</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }
    body { margin: 0; font-family: 'PingFang SC', 'Fliggy Sans 102', sans-serif; background: #F2F3F5; }
    a { text-decoration: none; color: inherit; }
    .product-card-large {
      box-sizing: border-box;
      display: flex;
      align-items: center;
      padding: 12px 18px;
      gap: 18px;
      width: 750px;
      background: #FFF;
    }
    .card-image {
      position: relative;
      width: 226px;
      height: 330px;
      background: url('https://picsum.photos/id/1015/226/330') center/cover no-repeat;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .card-image__badge {
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6px;
      width: 176px;
      height: 36px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 12px 0;
      box-sizing: border-box;
      font-size: 20px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }
    .card-image__caption {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 38px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 0 0 12px 12px;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.8);
    }
    .card-info { display: flex; flex-direction: column; width: 470px; height: 330px; }
    .info-title {
      font-size: 30px;
      font-weight: 500;
      line-height: 42px;
      color: #0F131A;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rating { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .rating__badge {
      padding: 2px 5px;
      background: #6666FF;
      border-radius: 8px;
      font-family: 'Fliggy Sans 102', sans-serif;
      font-size: 26px;
      color: #FFF;
    }
    .rating__text { font-size: 24px; font-weight: 500; color: #6666FF; }
    .rating__comment { font-size: 24px; color: #6666FF; }
    .highlights { display: flex; flex-direction: column; gap: 12px; padding: 14px 0 4px; }
    .highlight-item { display: flex; align-items: center; gap: 12px; }
    .highlight-item__label {
      font-weight: 500;
      font-size: 26px;
      line-height: 28px;
      color: #0F131A;
      width: 44px;
      flex-shrink: 0;
    }
    .highlight-item__text {
      font-size: 24px;
      line-height: 28px;
      color: #0F131A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    .tag {
      box-sizing: border-box;
      display: flex;
      align-items: center;
      padding: 0 6px;
      height: 28px;
      border: 1px solid rgba(92, 95, 102, 0.5);
      border-radius: 4px;
      font-size: 20px;
      color: #5C5F66;
    }
    .tag--composite { padding: 0; display: flex; }
    .tag--composite span { padding: 0 6px; display: flex; align-items: center; }
    .tag--composite .divider { width: 1px; height: 24px; border-left: 1px dashed #979797; }
    .tag--composite .highlight { background: #FFEFD7; }
    .store { margin-top: auto; padding-top: 10px; font-size: 24px; line-height: 28px; color: #919499; }
    .pricing { display: flex; justify-content: space-between; align-items: flex-end; }
    .pricing__sales { font-size: 24px; color: #919499; }
    .pricing__main { text-align: right; }
    .price { display: flex; justify-content: flex-end; align-items: flex-end; color: #FF5533; }
    .price .currency { font-size: 24px; line-height: 28px; }
    .price .amount { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 42px; line-height: 42px; }
    .price .suffix { font-size: 24px; line-height: 28px; }
    .discount-banner {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 2px 6px;
      gap: 6px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.0001) 0%, #FFE6E0 100%);
      border-radius: 4px;
      margin-top: 6px;
    }
    .discount-banner__text { font-size: 20px; color: #FF5533; }
    .discount-banner__divider { width: 1px; height: 20px; border-left: 1px dashed #FFB2A3; }
  </style>
</head>
<body>
  <article class="product-card-large">
    <div class="card-image">
      <div class="card-image__badge">多日游 · 独立成团</div>
      <div class="card-image__caption">杭州出发</div>
    </div>
    <div class="card-info">
      <h3 class="info-title">日本东京4天3晚私家团</h3>
      <div class="rating">
        <span class="rating__badge">4.8</span>
        <strong class="rating__text">很好</strong>
        <span class="rating__comment">“整个旅程安排的特别棒”</span>
      </div>
      <div class="highlights">
        <div class="highlight-item">
          <span class="highlight-item__label">游玩</span>
          <span class="highlight-item__text">富士山·箱根·镰仓·银座·山间寻风</span>
        </div>
        <div class="highlight-item">
          <span class="highlight-item__label">住行</span>
          <span class="highlight-item__text">24小时接机·全程陆地头等舱·5晚高...</span>
        </div>
      </div>
      <div class="tags">
        <div class="tag tag--composite"><span>飞猪小团</span><div class="divider"></div><span class="highlight">私家团</span></div>
        <div class="tag">纯玩无购物</div>
        <div class="tag">提前1天全额退</div>
      </div>
      <div class="store">重庆嗨游记旅游专营店</div>
      <div class="pricing">
        <div class="pricing__sales">已售1000+</div>
        <div class="pricing__main">
          <div class="price">
            <span class="currency">¥</span>
            <strong class="amount">8888</strong>
            <span class="suffix">起</span>
          </div>
          <div class="discount-banner">
            <span class="discount-banner__text">度假补贴</span>
            <div class="discount-banner__divider"></div>
            <span class="discount-banner__text">优惠¥5</span>
            <svg width="7" height="13" viewBox="0 0 7 13" fill="none" aria-hidden="true"><path d="M1 1L6 6.5L1 12" stroke="#FF5533" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
        </div>
      </div>
    </div>
  </article>
</body>
</html>
