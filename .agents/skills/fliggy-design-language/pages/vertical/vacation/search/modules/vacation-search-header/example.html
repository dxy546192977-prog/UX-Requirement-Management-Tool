<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>顶搜 · vacation-search-header</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'PingFang SC', sans-serif; background: #F2F3F5; }
    .search-page-header { width: 750px; margin: 0 auto; background: transparent; }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 88px;
      padding: 12px 24px;
    }
    .status-bar__time { font-size: 28px; font-weight: 600; color: #0F131A; }
    .status-bar__icons { display: flex; gap: 10px; align-items: center; }
    .status-bar__icons svg { height: 22px; width: auto; }
    .secondary-nav {
      display: flex;
      align-items: center;
      padding: 0 24px 12px;
      gap: 12px;
      height: 100px;
    }
    .nav-button { flex-shrink: 0; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; color: #0F131A; }
    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      height: 72px;
      padding: 0 20px;
      gap: 8px;
      background: #FFF;
      border: 3px solid #FFE033;
      border-radius: 36px;
    }
    .search-box__icon { width: 32px; height: 32px; flex-shrink: 0; }
    .search-box__text { font-size: 24px; font-weight: 400; color: #0F131A; }
  </style>
</head>
<body>
  <header class="search-page-header">
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-bar__icons" aria-hidden="true">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M0 11V10.5h4V6H0V5h4V1h4v4H4v1h4v4h4V6h4v1h-4v4h-4V7H8v1H4v3H0z" fill="#0F131A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5c2 0 3.5 1.2 4.5 3L8 9 3.5 5.5C4.5 3.7 6 2.5 8 2.5z" stroke="#0F131A" stroke-width="1.2"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="2" width="20" height="8" rx="2" stroke="#0F131A"/><rect x="3" y="4" width="14" height="4" fill="#0F131A"/></svg>
      </div>
    </div>
    <div class="secondary-nav">
      <a href="#" class="nav-button" aria-label="返回">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M28 38L14 24l14-14 2.8 2.8L19.7 24l11.1 11.2L28 38z" fill="#0F131A"/></svg>
      </a>
      <div class="search-box" role="search">
        <svg class="search-box__icon" viewBox="0 0 32 32" fill="none" aria-hidden="true"><circle cx="14" cy="14" r="8" stroke="#0F131A" stroke-width="2"/><path d="M20 20l8 8" stroke="#0F131A" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="search-box__text">云南</span>
      </div>
      <a href="#" class="nav-button" aria-label="更多">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M24 20a4 4 0 110 8 4 4 0 010-8zm10-1a4 4 0 110 8 4 4 0 010-8zM14 19a4 4 0 110 8 4 4 0 010-8z" fill="#0F131A"/></svg>
      </a>
    </div>
  </header>
</body>
</html>
