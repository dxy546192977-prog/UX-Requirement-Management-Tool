<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>门票频道 — 快筛</title>
  <style>
    body { margin: 0; background: #F2F3F5; padding: 24px 0; font-family: 'PingFang SC', sans-serif; display: flex; justify-content: center; }
    .quick-filters {
      box-sizing: border-box; display: flex; align-items: center; gap: 12px; width: 750px; padding: 9px 18px;
      background: #FFFFFF; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
    }
    .quick-filters::-webkit-scrollbar { display: none; }
    .quick-filters__tag {
      flex-shrink: 0; display: flex; justify-content: center; align-items: center; gap: 6px;
      height: 60px; padding: 10px 18px; border: none; border-radius: 6px; background: #F7F8FA; cursor: pointer;
      font-size: 24px; line-height: 1.4; font-weight: 400; color: #0F131A; white-space: nowrap;
      transition: background-color 0.2s, color 0.2s;
    }
    .quick-filters__tag.is-active { background: #FFF2F0; color: #FF5533; font-weight: 500; }
    .check-icon { font-weight: bold; }
  </style>
</head>
<body>
  <div class="quick-filters" role="toolbar" aria-label="快筛">
    <button type="button" class="quick-filters__tag is-active">
      <span class="check-icon" aria-hidden="true">✓</span>
      <span>门票膨胀神券</span>
    </button>
    <button type="button" class="quick-filters__tag"><span>热门必打卡</span></button>
    <button type="button" class="quick-filters__tag"><span>大牌乐园</span></button>
    <button type="button" class="quick-filters__tag"><span>亲子/家庭</span></button>
    <button type="button" class="quick-filters__tag"><span>演出</span></button>
    <button type="button" class="quick-filters__tag"><span>展览</span></button>
  </div>
</body>
</html>
