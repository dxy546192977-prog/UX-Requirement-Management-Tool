<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>门票频道 — 沉浸式吸顶导航</title>
  <style>
    body {
      height: 220vh;
      background: linear-gradient(180deg, #2d2d44 0%, #F2F3F5 45%);
      margin: 0;
      font-family: 'SF Pro Text', 'PingFang SC', sans-serif;
    }
    .main-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 750px;
      margin: 0 auto;
      height: 176px;
      background-color: rgba(255, 255, 255, 0);
      transition: background-color 0.3s ease-in-out, box-shadow 0.3s ease;
    }
    .main-header.is-scrolled {
      background-color: #FFFFFF;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 88px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      box-sizing: border-box;
      color: #FFFFFF;
      transition: color 0.3s ease-in-out;
    }
    .main-header.is-scrolled .status-bar { color: #0F131A; }
    .status-bar__time { font-size: 28px; font-weight: 700; }
    .status-bar__icons { display: flex; align-items: center; gap: 10px; }
    .status-bar__icon { height: 22px; fill: currentColor; }
    .nav-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 88px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      box-sizing: border-box;
    }
    .nav-bar__icon {
      width: 48px;
      height: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #FFFFFF;
      transition: color 0.3s ease-in-out;
    }
    .main-header.is-scrolled .nav-bar__icon { color: #0F131A; }
    .nav-bar__icon svg { width: 48px; height: 48px; fill: currentColor; }
    .nav-bar__title {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      color: #0F131A;
      transition: opacity 0.3s ease-in-out;
    }
    .main-header.is-scrolled .nav-bar__title { opacity: 1; }
    .nav-bar__actions { display: flex; align-items: center; gap: 24px; }
    .demo-hint { max-width: 750px; margin: 24px auto; padding: 0 24px; color: #5C5F66; font-size: 24px; }
  </style>
</head>
<body>
  <header class="main-header" id="mainHeader">
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-bar__icons">
        <svg class="status-bar__icon" viewBox="0 0 17 11" aria-hidden="true"><path d="M0 10.6667H0.1V10.6667H0ZM3.4 10.6667V5.5H3.46667V10.6667H3.4ZM6.8 10.6667V2.93333H6.86667V10.6667H6.8ZM10.2 10.6667V0.366667H10.2667V10.6667H10.2ZM13.6 10.6667H13.7V10.6667H13.6ZM17 10.6667H17.1V10.6667H17Z" fill="currentColor"/></svg>
        <svg class="status-bar__icon" viewBox="0 0 16 11" aria-hidden="true"><path d="M15.3999 1.63337L14.5666 2.53337C12.6333 0.766708 9.93325 0.766708 7.99992 2.53337L7.16659 1.63337C9.53325 -0.533292 13.0666 -0.533292 15.3999 1.63337ZM12.9333 3.96671L13.6666 3.23337C11.8666 1.56671 9.53325 1.56671 7.76659 3.23337L7.99992 3.50004L8.23325 3.23337C6.46659 1.56671 4.13325 1.56671 2.33325 3.23337L3.13325 3.96671C4.53325 2.66671 6.06659 2.66671 7.43325 3.96671L7.99992 4.70004L8.63325 3.96671C9.96659 2.66671 11.5333 2.66671 12.9333 3.96671ZM10.5 6.20004L7.99992 8.83337L0.599918 0.466708C3.13325 -1.53329 7.03325 -1.53329 9.53325 0.466708L7.99992 2.06671L6.46659 0.466708C4.73325 -0.966625 2.83325 -0.966625 1.13325 0.466708L10.5 6.20004Z" fill="currentColor"/></svg>
        <svg class="status-bar__icon" viewBox="0 0 25 12" aria-hidden="true"><path d="M22.0001 3.33334H20.6667V1.8C20.6667 1.33334 20.2667 0.966675 19.8001 0.966675H0.866748C0.400082 0.966675 0.0000816601 1.33334 0.0000816601 1.8V9.86667C0.0000816601 10.3333 0.400082 10.7 0.866748 10.7H19.8001C20.2667 10.7 20.6667 10.3333 20.6667 9.86667V8.33334H22.0001C22.6334 8.33334 23.1334 7.83334 23.1334 7.2V4.46667C23.1334 3.83334 22.6334 3.33334 22.0001 3.33334ZM1.33341 9.4V2.26667H19.3334V9.4H1.33341Z" fill="currentColor" fill-opacity="0.4"/><path d="M2.66675 8.13333H18.0001V3.53333H2.66675V8.13333Z" fill="currentColor"/></svg>
      </div>
    </div>
    <nav class="nav-bar" aria-label="页面导航">
      <a href="#" class="nav-bar__icon" aria-label="返回">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6L8 12L14 18L15.41 16.59L10.83 12L15.41 7.41Z"/></svg>
      </a>
      <h1 class="nav-bar__title">门票·玩乐</h1>
      <div class="nav-bar__actions">
        <a href="#" class="nav-bar__icon" aria-label="更多">
          <svg viewBox="0 0 24 24"><path d="M12 8C13.1 8 14 7.1 14 6C14 4.9 13.1 4 12 4C10.9 4 10 4.9 10 6C10 7.1 10.9 8 12 8ZM12 10C10.9 10 10 10.9 10 12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12C14 10.9 13.1 10 12 10ZM12 16C10.9 16 10 16.9 10 18C10 19.1 10.9 20 12 20C13.1 20 14 19.1 14 18C14 16.9 13.1 16 12 16Z"/></svg>
        </a>
      </div>
    </nav>
  </header>
  <p class="demo-hint">向下滚动以查看导航变白底、标题浮现。</p>
  <script>
    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => {
      header.classList.toggle('is-scrolled', window.scrollY > 180);
    });
  </script>
</body>
</html>
