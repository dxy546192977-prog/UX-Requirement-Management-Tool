<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>度假订详 — POI 信息</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', sans-serif; }
    a { text-decoration: none; color: inherit; }
    .poi-card {
      box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; padding: 24px 0 0; width: 750px; min-height: 192px; background: #FFFFFF;
    }
    .poi-card__header {
      box-sizing: border-box; display: flex; flex-direction: row; align-items: center; padding: 0 24px 24px; gap: 6px; width: 750px; background: #FFFFFF;
    }
    .poi-card__title { font-weight: 500; font-size: 30px; line-height: 140%; color: #0F131A; margin: 0; flex-grow: 1; }
    .poi-card__header-link { display: flex; flex-direction: row; align-items: center; width: 80px; height: 36px; cursor: pointer; }
    .poi-card__header-link-text { font-weight: 500; font-size: 26px; line-height: 140%; color: #0F131A; width: 52px; }
    .poi-card__icon { width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; }
    .poi-card__details {
      box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 0 24px 18px; gap: 12px; width: 750px;
    }
    .poi-card__row { display: flex; flex-direction: row; align-items: flex-start; gap: 18px; width: 702px; min-height: 36px; }
    .poi-card__row-text { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; flex-grow: 1; }
    .poi-card__phone-link { display: flex; flex-direction: row; justify-content: flex-end; align-items: center; width: 80px; height: 36px; cursor: pointer; }
    .poi-card__phone-text { font-weight: 500; font-size: 26px; line-height: 140%; text-align: right; color: #6666FF; width: 52px; }
    .poi-card__address { font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; width: 702px; }
  </style>
</head>
<body>
  <section class="poi-card" aria-label="景区信息">
    <header class="poi-card__header">
      <h3 class="poi-card__title">新加坡环球影城</h3>
      <a href="#" class="poi-card__header-link">
        <span class="poi-card__header-link-text">景点</span>
        <div class="poi-card__icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M17.2322 13.3627C17.5638 13.6895 17.5874 14.2049 17.3033 14.5587L17.2322 14.6373L12.0607 19.736C11.7036 20.088 11.1248 20.088 10.7678 19.736C10.4362 19.4092 10.4126 18.8937 10.6967 18.54L10.7678 18.4613L15.2929 14L10.7678 9.53866C10.4362 9.21181 10.4126 8.69639 10.6967 8.34261L10.7678 8.26399C11.0993 7.93714 11.6221 7.9138 11.9809 8.19395L12.0607 8.26399L17.2322 13.3627Z" fill="#0F131A"/></svg></div>
      </a>
    </header>
    <div class="poi-card__details">
      <div class="poi-card__row">
        <span class="poi-card__row-text">04月01日-4月20日 全天：08:30-21:30</span>
        <a href="tel:" class="poi-card__phone-link">
          <span class="poi-card__phone-text">电话</span>
          <div class="poi-card__icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M20.7 19.1c-.4.4-.9.8-1.4 1.1-.4.3-.9.4-1.4.4h-.3c-.8 0-1.7-.2-2.7-.7-1.3-.6-2.7-1.6-4.2-3.1-1.5-1.5-2.5-2.9-3.1-4.2-.5-1-.7-1.9-.7-2.7v-.3c0-.5.1-1 .4-1.4.3-.5.7-1 1.1-1.4.4-.4.7-.7 1-.9.3-.2.6-.3.8-.3.1 0 .2 0 .3.1.2.1.5.5.9 1.2l1.2 2.3c.2.4.1.8-.1 1.1l-1.1 1.6c0 .2.4.8 1.2 1.6.6.6 1.1 1 1.5 1.2l.4.2 1.4-1c.3-.2.7-.2 1.1-.1l2.3 1c.7.4 1.1.7 1.2.9.1.1.1.2.1.3 0 .2-.1.5-.3.8-.2.3-.5.6-.9 1z" fill="#6666FF"/></svg></div>
        </a>
      </div>
      <div class="poi-card__address">新加坡环球影城浦东新区川沙镇黄赵律310号</div>
    </div>
  </section>
</body>
</html>
