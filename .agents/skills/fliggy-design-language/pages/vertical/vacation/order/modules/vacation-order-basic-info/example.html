<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>度假订详 — 基础信息</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500; font-display: swap;
    }
    body { margin: 0; font-family: 'PingFang SC', sans-serif; }
    .card-wrapper { display: flex; flex-direction: column; align-items: flex-start; padding: 0 24px 24px; width: 750px; background: #FFFFFF; box-sizing: border-box; }
    .product-card {
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start; width: 702px;
      background: #F7F8FA; border-radius: 12px; padding: 18px 24px 24px; box-sizing: border-box;
    }
    .itinerary { display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; align-content: flex-start; gap: 12px; width: 654px; color: #0F131A; }
    .itinerary__number { font-family: 'Fliggy Sans 102', sans-serif; font-size: 42px; font-weight: 400; line-height: 140%; }
    .itinerary__unit-month { font-size: 26px; font-weight: 500; line-height: 56px; }
    .itinerary__unit-day { font-size: 26px; font-weight: 400; line-height: 56px; }
    .itinerary__day, .itinerary__session { font-size: 26px; font-weight: 500; line-height: 140%; }
    .itinerary__separator { width: 12px; height: 1px; background: #0F131A; }
    .itinerary__note { font-size: 24px; font-weight: 400; line-height: 140%; color: #919499; }
    .title-section {
      display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 12px 0 0; gap: 10px; width: 654px;
    }
    .title-section__text { font-size: 30px; font-weight: 500; line-height: 140%; color: #0F131A; margin: 0; }
    .title-section__quantity { color: #3865F6; margin-left: 4px; }
    .info-list { display: flex; flex-direction: column; width: 654px; }
    .info-row { display: flex; flex-direction: row; align-items: flex-start; padding: 12px 0 0; gap: 18px; width: 654px; font-size: 26px; line-height: 140%; }
    .info-row__label { flex-shrink: 0; width: 142px; color: #919499; font-weight: 400; }
    .info-row__value { color: #0F131A; font-weight: 400; min-width: 0; flex-grow: 1; }
    .info-row--collapsible .info-row__value { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-link { display: flex; align-items: center; gap: 4px; text-decoration: none; color: #0F131A; font-size: 26px; font-weight: 500; line-height: 140%; white-space: nowrap; }
    .card-link__icon { width: 28px; height: 28px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="product-card">
      <div class="itinerary">
        <span class="itinerary__number">8</span><span class="itinerary__unit-month">月</span><span class="itinerary__number">7</span><span class="itinerary__unit-day">日</span>
        <span class="itinerary__day">周六入园</span>
        <span class="itinerary__number">19:00</span><span class="itinerary__separator"></span><span class="itinerary__number">23:59</span>
        <span class="itinerary__session">场次</span>
        <span class="itinerary__note">当地时间</span>
      </div>
      <div class="title-section">
        <h3 class="title-section__text">新加坡环球影城-1日门票成人票<span class="title-section__quantity">×2张</span></h3>
        <a href="#" class="card-link">须知<svg class="card-link__icon" viewBox="0 0 28 28" fill="none" aria-hidden="true"><path d="M17.2322 13.3627C17.5638 13.6895 17.5874 14.2049 17.3033 14.5587L17.2322 14.6373L12.0607 19.736C11.7036 20.088 11.1248 20.088 10.7678 19.736C10.4362 19.4092 10.4126 18.8937 10.6967 18.54L10.7678 18.4613L15.2929 14L10.7678 9.53866C10.4362 9.21181 10.4126 8.69639 10.6967 8.34261L10.7678 8.26399C11.0993 7.93714 11.6221 7.9138 11.9809 8.19395L12.0607 8.26399L17.2322 13.3627Z" fill="#0F131A"/></svg></a>
      </div>
      <div class="info-list">
        <div class="info-row"><span class="info-row__label">入园区域</span><span class="info-row__value">区域在这里</span></div>
        <div class="info-row"><span class="info-row__label">门票套餐</span><span class="info-row__value">快速通道</span></div>
        <div class="info-row"><span class="info-row__label">入园地址</span><span class="info-row__value">北京环球城市大道前往北京环球影城主入口</span></div>
        <div class="info-row info-row--collapsible">
          <span class="info-row__label">费用包含</span>
          <span class="info-row__value">门票为指定单标准票，仅限购票人本人使用，不可转赠、转售</span>
          <a href="#" class="card-link">详情<svg class="card-link__icon" viewBox="0 0 28 28" fill="none"><path d="M14.6373 17.2322C14.3105 17.5638 13.7951 17.5874 13.4413 17.3033L13.3627 17.2322L8.26399 12.0607C7.912 11.7036 7.912 11.1248 8.26399 10.7678C8.59084 10.4362 9.10626 10.4126 9.46005 10.6967L9.53866 10.7678L14 15.2929L18.4613 10.7678C18.7882 10.4362 19.3036 10.4126 19.6574 10.6967L19.736 10.7678C20.0629 11.0993 20.0862 11.6221 19.806 11.9809L19.736 12.0607L14.6373 17.2322Z" fill="#0F131A"/></svg></a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
