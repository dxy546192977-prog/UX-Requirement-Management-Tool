<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>度假订详 — 二销推荐</title>
  <style>
    body { margin: 0; font-family: 'PingFang SC', 'Alibaba Sans 102', sans-serif; }
    a { text-decoration: none; color: inherit; }
    .recommendations { box-sizing: border-box; display: flex; flex-direction: column; width: 750px; background: #FFFFFF; padding-top: 24px; }
    .recommendations__header { padding: 0 24px 24px; }
    .recommendations__title { font-weight: 500; font-size: 30px; line-height: 140%; color: #0F131A; margin: 0; }
    .recommendations__scroll-container { overflow-x: auto; padding-bottom: 24px; scrollbar-width: none; -ms-overflow-style: none; }
    .recommendations__scroll-container::-webkit-scrollbar { display: none; }
    .recommendations__list { display: flex; flex-direction: row; gap: 12px; padding: 0 18px; margin: 0; list-style: none; }
    .product-card-small { display: flex; flex-direction: column; width: 230px; flex-shrink: 0; }
    .card__image { position: relative; width: 230px; height: 230px; border-radius: 6px; overflow: hidden; }
    .card__image img { width: 100%; height: 100%; object-fit: cover; }
    .card__image-badge { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.7); border-radius: 6px 0; padding: 6px; font-weight: 500; font-size: 20px; color: #FFF; line-height: 1; }
    .card__info { display: flex; flex-direction: column; padding-top: 6px; }
    .card__name { font-weight: 500; font-size: 28px; line-height: 39px; color: #0F131A; margin: 0; height: 78px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card__tags { display: flex; gap: 6px; padding: 12px 0 0; }
    .tag { box-sizing: border-box; display: flex; justify-content: center; align-items: center; padding: 0 6px; height: 28px; border: 1px solid rgba(102,102,255,0.5); border-radius: 4px; font-size: 20px; color: #6666FF; }
    .card__pricing { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 12px; }
    .price { display: flex; align-items: flex-end; gap: 2px; color: #FF5533; }
    .price .currency { font-weight: 500; font-size: 24px; transform: translateY(-2px); }
    .price .amount-integer { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 36px; line-height: 1; }
    .price .amount-decimal { font-family: 'Alibaba Sans 102', sans-serif; font-weight: 700; font-size: 24px; line-height: 1; }
    .sales-count { font-size: 20px; line-height: 140%; color: #919499; }
  </style>
</head>
<body>
  <section class="recommendations" aria-label="园内好玩">
    <header class="recommendations__header"><h2 class="recommendations__title">园内好玩</h2></header>
    <div class="recommendations__scroll-container">
      <ul class="recommendations__list">
        <li>
          <article class="product-card-small">
            <a href="#">
              <div class="card__image">
                <img src="https://picsum.photos/id/103/230/230" alt="">
                <span class="card__image-badge">省心套餐</span>
              </div>
              <div class="card__info">
                <h3 class="card__name">新加坡环球影城动物园</h3>
                <div class="card__tags"><span class="tag">可订今日</span><span class="tag">全额退</span></div>
                <div class="card__pricing">
                  <div class="price"><span class="currency">¥</span><span class="amount-integer">296</span><span class="amount-decimal">.00</span></div>
                  <span class="sales-count">已售300+</span>
                </div>
              </div>
            </a>
          </article>
        </li>
        <li>
          <article class="product-card-small">
            <a href="#">
              <div class="card__image"><img src="https://picsum.photos/id/237/230/230" alt=""><span class="card__image-badge">省心套餐</span></div>
              <div class="card__info">
                <h3 class="card__name">新加坡环球影城动物园</h3>
                <div class="card__tags"><span class="tag">可订今日</span></div>
                <div class="card__pricing">
                  <div class="price"><span class="currency">¥</span><span class="amount-integer">199</span><span class="amount-decimal">.00</span></div>
                  <span class="sales-count">已售300+</span>
                </div>
              </div>
            </a>
          </article>
        </li>
        <li>
          <article class="product-card-small">
            <a href="#">
              <div class="card__image"><img src="https://picsum.photos/id/239/230/230" alt=""><span class="card__image-badge">省心套餐</span></div>
              <div class="card__info">
                <h3 class="card__name">新加坡环球影城动物园</h3>
                <div class="card__tags"><span class="tag">全额退</span></div>
                <div class="card__pricing">
                  <div class="price"><span class="currency">¥</span><span class="amount-integer">429</span><span class="amount-decimal">.00</span></div>
                  <span class="sales-count">已售300+</span>
                </div>
              </div>
            </a>
          </article>
        </li>
      </ul>
    </div>
  </section>
</body>
</html>
