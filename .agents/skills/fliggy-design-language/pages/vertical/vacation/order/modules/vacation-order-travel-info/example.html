<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    body { margin: 0; font-family: 'PingFang SC', sans-serif; }
    .info-card {
      box-sizing: border-box; width: 750px; min-height: 234px; background: #FFFFFF; padding: 24px 0 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .card-header-wrap { display: flex; flex-direction: row; align-items: center; padding: 0 24px 24px; gap: 6px; width: 750px; box-sizing: border-box; background: #FFFFFF; }

      display: flex; flex-direction: row; justify-content: space-between; align-items: flex-start; padding: 16px 0; gap: 30px; width: 702px; box-sizing: border-box; min-height: 72px;

    .info-row__label { width: 160px; flex-shrink: 0; font-weight: 400; font-size: 26px; line-height: 140%; color: #919499; }
    .info-row__value { flex: 1; font-weight: 400; font-size: 26px; line-height: 140%; color: #0F131A; }
    .card-link { display: flex; align-items: center; gap: 4px; text-decoration: none; font-weight: 500; font-size: 26px; line-height: 140%; color: #0F131A; flex-shrink: 0; }
    .card-link__text { width: 52px; text-align: center; }
    .card-link__icon { width: 28px; height: 28px; }
  </style>
