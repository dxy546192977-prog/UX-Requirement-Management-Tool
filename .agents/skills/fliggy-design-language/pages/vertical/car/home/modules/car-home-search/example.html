<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>搜索模块 · 预览</title>
  <link rel="stylesheet" href="az-search-module.css">
  <style>
@font-face {
  font-family: "Fliggy Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
  font-display: swap;
}
:root {
  --az-black: #0F131A;
  --az-gray-1: #5C5F66;
  --az-gray-2: #919499;
  --az-gray-3: #D2D4D9;
  --az-line: #F2F3F5;
  --az-page-bg: #F2F3F5;
  --az-white: #FFFFFF;
  --az-yellow: #FFE033;
  --az-yellow-soft: #FFF5EB;
  --az-yellow-card: #FFFCEB;
  --az-red: #FF3333;
  --az-pay: #FF5533;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 24px 0;
  background: var(--az-page-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  color: var(--az-black);
}
  </style>
</head>
<body>
      <div class="az-search-module">
        <div class="az-search-switch">
          <div class="az-search-switch-bar"></div>
          <div class="az-switch-unselected">
            <div class="az-switch-flight">
              <span>机票</span><span class="az-switch-divider"></span><span>特价机票</span>
            </div>
            <span>火车票</span>
            <span>汽车票</span>
          </div>
          <div class="az-switch-selected">
            <div class="az-switch-selected-line"></div>
            <div class="az-switch-selected-label">租车/接送</div>
          </div>
        </div>
        <div class="az-rent-tab-wrap">
          <div class="az-rent-tab-bar">
            <div class="az-rent-tab active small has-bubble">
              <div class="az-rent-tab-top">
                <div class="az-rent-tab-bubble">限时特惠</div>
                <div class="az-rent-tab-label">租车</div>
              </div>
              <div class="az-rent-tab-line"></div>
            </div>
            <div class="az-rent-tab medium"><div class="az-rent-tab-top"><div class="az-rent-tab-bubble">气泡</div><div class="az-rent-tab-label">接送机</div></div><div class="az-rent-tab-line"></div></div>
            <div class="az-rent-tab"><div class="az-rent-tab-top"><div class="az-rent-tab-bubble">气泡</div><div class="az-rent-tab-label">接送火车</div></div><div class="az-rent-tab-line"></div></div>
            <div class="az-rent-tab small"><div class="az-rent-tab-top"><div class="az-rent-tab-bubble">气泡</div><div class="az-rent-tab-label">打车</div></div><div class="az-rent-tab-line"></div></div>
          </div>
        </div>
        <div class="az-search-panel">
          <div class="az-scene-tabs">
            <div class="az-scene-tab active"><div class="az-scene-tab-inner">国内(含港澳台)</div></div>
            <div class="az-scene-tab"><div class="az-scene-tab-inner">国际</div></div>
          </div>
          <div class="az-search-notice"><img src="https://gw.alicdn.com/imgextra/i4/O1CN012dQlxH1Pw5F0iatfa_!!6000000001904-2-tps-1284-144.png" alt="营销条"></div>
          <div class="az-location-block">
            <div class="az-location-head">
              <span>取车城市</span>
              <div class="az-location-switch-wrap">
                <span class="az-location-switch-text">异地还车</span>
                <div class="az-location-switch"></div>
              </div>
            </div>
            <div class="az-location-values">
              <div class="az-location-value">上海<img class="az-location-arrow" src="https://gw.alicdn.com/imgextra/i4/O1CN01z3MQMx1o8Ukj6MD6Z_!!6000000005180-2-tps-60-84.png" alt=""></div>
              <div class="az-location-value placeholder">选择地点<img class="az-location-arrow" src="https://gw.alicdn.com/imgextra/i4/O1CN01z3MQMx1o8Ukj6MD6Z_!!6000000005180-2-tps-60-84.png" alt=""></div>
            </div>
          </div>
          <div class="az-divider"></div>
          <div class="az-time-block">
            <div class="az-time-card">
              <div class="az-time-col">
                <span class="az-time-caption">周四</span>
                <div class="az-time-main">
                  <span class="num">7</span><span class="txt">月</span><span class="num">17</span><span class="txt">日</span><span class="txt">10:00</span>
                </div>
              </div>
              <div class="az-time-gap">2天</div>
              <div class="az-time-col end">
                <span class="az-time-caption">周六</span>
                <div class="az-time-main">
                  <span class="num">7</span><span class="txt">月</span><span class="num">19</span><span class="txt">日</span><span class="txt">10:00</span>
                </div>
              </div>
            </div>
          </div>
          <div class="az-divider"></div>
          <div class="az-filter-row">
            <div class="az-filter-chip">送车上门</div>
            <div class="az-filter-chip active"><span>小伤免赔</span><img src="https://gw.alicdn.com/imgextra/i3/O1CN017TpZFm1uY2XOzksdd_!!6000000006048-2-tps-48-42.png" alt=""></div>
          </div>
          <div class="az-search-cta-wrap">
            <div class="az-search-cta">
              <div class="az-search-cta-badge">今日下单立减¥30</div>
              <div class="az-search-cta-title">搜索租车</div>
            </div>
            <div class="az-benefits-row">
              <span class="az-benefits-main">租车安心</span>
              <span class="az-benefits-dot"></span>
              <span class="az-benefits-sub">出行安心</span>
              <span class="az-benefits-dot"></span>
              <span class="az-benefits-sub">服务安心</span>
              <span class="az-benefits-dot"></span>
              <span class="az-benefits-sub">洗车交付</span>
              <span class="az-benefits-arrow"></span>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
