<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>列表模块 · 预览</title>
  <link rel="stylesheet" href="az-list-module.css">
  <style>
@font-face {
  font-family: "Fliggy Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
  font-display: swap;
}
@font-face {
  font-family: "Alibaba Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/AlibabaSans102-Bold.ttf") format("truetype");
  font-weight: 700;
  font-display: swap;
}
:root {
  --az-black: #0F131A;
  --az-gray-2: #919499;
  --az-page-bg: #F2F3F5;
  --az-white: #FFFFFF;
  --az-pay: #FF5533;
}
body { margin: 0; padding: 24px 0; background: var(--az-page-bg); font-family: 'PingFang SC', sans-serif; }
  </style>
</head>
<body>
  <div class="az-list-module">
    <div class="az-list-header">
      <h2>飞猪带你自驾 尽览秋日风光</h2>
      <div class="az-more">更多<span aria-hidden="true">&gt;</span></div>
    </div>
    <div class="az-list-inner">
      <div class="az-list-top-tabs">
        <div class="az-list-tab is-active">昆明</div>
        <div class="az-list-tab">大理</div>
        <div class="az-list-tab">丽江</div>
        <div class="az-list-tab">腾冲</div>
        <div class="az-list-tab">香格里拉</div>
      </div>
      <div class="az-guide-rail">
        <img src="https://gw.alicdn.com/imgextra/i2/O1CN01Wmf6F21ZRzNEuHUkC_!!6000000003192-2-tps-1482-636.png" alt="视频组">
      </div>
      <div class="az-car-list">
        <div class="az-car-card">
          <div class="az-car-badge">
            <img src="https://gw.alicdn.com/imgextra/i2/O1CN01CYwdNC1gOy4W80MeX_!!6000000004133-2-tps-240-72.png" alt="">
          </div>
          <div class="az-car-figure">
            <img src="https://gw.alicdn.com/imgextra/i1/O1CN01MXrfTJ1tw1fF1UxPQ_!!6000000005965-2-tps-380-254.png" alt="">
          </div>
          <div class="az-car-content">
            <div class="az-car-top">
              <h3>特斯拉Model3</h3>
              <div class="az-car-price">
                <div class="az-car-price-current">
                  <span class="currency">¥</span><span class="major">150</span><span class="suffix">/天起</span>
                </div>
              </div>
            </div>
            <div class="az-car-bottom">
              <span class="az-car-sell">经济实用，卓越驾控</span>
              <div class="az-car-action">马上抢</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
