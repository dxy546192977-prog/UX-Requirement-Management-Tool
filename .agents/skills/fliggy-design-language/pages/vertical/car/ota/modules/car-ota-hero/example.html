<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>租车 OTA · 头图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang SC', sans-serif; background: #F2F3F5; padding: 0; }
    .demo-wrap { width: 750px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="demo-wrap">
    <div style="position: relative; width: 750px; height: 524px; font-family: 'PingFang SC', sans-serif;">
      <img src="https://img.alicdn.com/imgextra/i1/O1CN017o1Hyp21jDVpTQmof_!!6000000007020-55-tps-750-524.svg" alt="" style="position: absolute; width: 750px; height: 524px; left: 0; top: 0; object-fit: cover;" />
      <div style="display: flex; flex-direction: column; align-items: flex-start; padding: 0; position: absolute; width: 750px; height: 88px; left: calc(50% - 375px); top: 88px;">
        <div style="width: 750px; height: 88px; position: relative;">
          <img src="https://img.alicdn.com/imgextra/i3/O1CN01wFYuzI1T9lvT0y85w_!!6000000002340-55-tps-60-60.svg" alt="返回" style="position: absolute; width: 60px; height: 60px; left: 18px; top: calc(50% - 30px);" />
          <div style="display: flex; flex-direction: row; align-items: center; gap: 12px; position: absolute; width: 60px; height: 60px; right: 18px; top: calc(50% - 30px);">
            <img src="https://img.alicdn.com/imgextra/i4/O1CN014qW13l1HnpAguN8Rk_!!6000000000803-55-tps-60-60.svg" alt="更多" style="width: 60px; height: 60px;" />
          </div>
        </div>
      </div>
      <img src="https://img.alicdn.com/imgextra/i1/O1CN01LK1P9o1a0nTVKQo03_!!6000000003268-55-tps-90-90.svg" alt="播放" style="position: absolute; width: 90px; height: 90px; left: calc(50% - 45px); top: 236px;" />
      <div style="display: flex; flex-direction: row; align-items: center; padding: 6px 18px 6px 6px; gap: 24px; position: absolute; width: 420px; height: 40px; left: 24px; top: 424px; background: rgba(0, 0, 0, 0.6); border-radius: 36px; box-sizing: border-box;">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 12px; width: 103px; height: 28px;">
          <div style="display: flex; justify-content: center; align-items: center; padding: 0 12px; width: 64px; height: 28px; background: #FFFFFF; border-radius: 24px; box-sizing: border-box;">
            <span style="font-weight: 500; font-size: 20px; line-height: 140%; color: #0F131A;">视频</span>
          </div>
          <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">VR</span>
        </div>
        <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">外观</span>
        <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">前排</span>
        <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">后排</span>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 18px; width: 77px; height: 28px;">
          <div style="width: 1px; height: 20px; background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, #FFFFFF 52.86%, rgba(216, 216, 216, 0) 100%);"></div>
          <div style="display: flex; flex-direction: row; align-items: center; gap: 6px; width: 58px; height: 28px;">
            <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">相册</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4.5 2L8.5 6L4.5 10" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
      </div>
      <div style="display: flex; flex-direction: row; align-items: center; padding: 6px 18px; gap: 18px; position: absolute; width: 246px; height: 40px; left: 480px; top: 424px; background: rgba(0, 0, 0, 0.6); border-radius: 36px; box-sizing: border-box;">
        <span style="font-weight: 400; font-size: 20px; line-height: 140%; color: #FFFFFF;">年款/颜色等以门店为准</span>
      </div>
      <div style="position: absolute; width: 702px; height: 6px; left: 24px; top: 476px; background: rgba(0, 0, 0, 0.6); border-radius: 12px;"></div>
    </div>
  </div>
</body>
</html>
