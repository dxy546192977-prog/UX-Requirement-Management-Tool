<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>租车 OTA · 展开收起</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F2F3F5; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'PingFang SC', sans-serif; }
    .expand-collapse-btn {
      display: flex; flex-direction: row; justify-content: center; align-items: center;
      padding: 12px 48px; gap: 12px; width: 714px; height: 60px;
      background: #FFFFFF; border-radius: 12px; cursor: pointer; border: none;
    }
    .expand-collapse-btn:hover { background: #F8F8F8; }
    .expand-collapse-text {
      font-weight: 500; font-size: 26px; line-height: 140%; text-align: center; color: #5C5F66;
    }
    .expand-collapse-icon { width: 12px; height: 12px; transform: rotate(90deg); }
  </style>
</head>
<body>
  <button type="button" class="expand-collapse-btn">
    <span class="expand-collapse-text">查看更多1个报价</span>
    <img class="expand-collapse-icon" src="https://img.alicdn.com/imgextra/i1/O1CN01aKQD5T1ui7FdOOnA8_!!6000000006070-55-tps-12-12.svg" alt="">
  </button>
</body>
</html>
