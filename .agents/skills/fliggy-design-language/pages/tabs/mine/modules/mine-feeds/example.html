<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>个人中心 Feeds — mine-feeds</title>
  <style>
    @font-face {
      font-family: "Fliggy Sans 102";
      src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
      font-weight: 500;
      font-display: swap;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 20px 0 200px;
      display: flex;
      justify-content: center;
      background: #f2f3f5;
      font-family: "PingFang SC", "SimHei", sans-serif;
    }
    .fdl-mine-feeds {
      width: 750px;
      background: #f2f3f5;
    }
    .fdl-mine-feeds__top-fade {
      height: 60px;
      width: 100%;
      background: linear-gradient(180deg, #ffffff 0%, #f2f3f5 100%);
    }
    .fdl-mine-feeds__grid {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 18px;
      padding: 0 30px 18px;
      align-items: flex-start;
    }
    .fdl-mine-feeds__col {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 336px;
    }
    .fdl-mine-feeds__carousel {
      width: 336px;
      height: 440px;
      border-radius: 12px;
      background: url("https://gw.alicdn.com/imgextra/i2/O1CN01Yl3Pso1M3dIzhT31p_!!6000000001379-2-tps-444-544.png") center/cover;
      position: relative;
      flex-shrink: 0;
    }
    .fdl-mine-feeds__carousel-dots {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    .fdl-mine-feeds__carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
    }
    .fdl-mine-feeds__carousel-dot.is-active {
      background: #fff;
      width: 20px;
      border-radius: 4px;
    }
    .fdl-mine-feeds__card {
      width: 336px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .fdl-mine-feeds__card-img {
      width: 336px;
      height: 336px;
      background-size: cover;
      background-position: center;
      border-radius: 12px 12px 0 0;
    }
    .fdl-mine-feeds__card-body {
      padding: 12px 12px 18px;
      background: #fff;
      border-radius: 0 0 12px 12px;
    }
    .fdl-mine-feeds__card-title {
      font-weight: 500;
      font-size: 28px;
      line-height: 1.4;
      color: #0f131a;
      margin-bottom: 6px;
    }
    .fdl-mine-feeds__card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .fdl-mine-feeds__tag {
      font-size: 20px;
      line-height: 1.4;
      color: #5c5f66;
      background: #f7f8fa;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .fdl-mine-feeds__card-meta {
      font-size: 22px;
      line-height: 1.4;
      color: #919499;
      margin-bottom: 8px;
    }
    .fdl-mine-feeds__price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .fdl-mine-feeds__price {
      display: flex;
      align-items: baseline;
      color: #ff5533;
    }
    .fdl-mine-feeds__price-y {
      font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
      font-weight: 700;
      font-size: 24px;
    }
    .fdl-mine-feeds__price-n {
      font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
      font-size: 42px;
      line-height: 1;
      font-weight: 400;
    }
    .fdl-mine-feeds__price-suf {
      font-size: 20px;
      margin-left: 4px;
    }
    .fdl-mine-feeds__sales {
      font-size: 20px;
      color: #919499;
    }
  </style>
</head>
<body>
  <section class="fdl-mine-feeds" aria-label="猜你喜欢">

    <div class="fdl-mine-feeds__grid">
      <div class="fdl-mine-feeds__col">

            </div>
            <p class="fdl-mine-feeds__card-meta">4.9 分 · 超棒</p>
            <div class="fdl-mine-feeds__price-row">
              <div class="fdl-mine-feeds__price">
                <span class="fdl-mine-feeds__price-y">¥</span>
                <span class="fdl-mine-feeds__price-n">35</span>

              </div>
              <span class="fdl-mine-feeds__sales">月销 2000+</span>
            </div>
          </div>
        </article>
        <article class="fdl-mine-feeds__card">
          <div class="fdl-mine-feeds__card-img" style="background-image: url('https://gw.alicdn.com/imgextra/i2/O1CN01Yl3Pso1M3dIzhT31p_!!6000000001379-2-tps-444-544.png')"></div>
          <div class="fdl-mine-feeds__card-body">

            <div class="fdl-mine-feeds__card-tags">

            <div class="fdl-mine-feeds__price-row">

                <span class="fdl-mine-feeds__price-y">¥</span>
                <span class="fdl-mine-feeds__price-n">420</span>
                <span class="fdl-mine-feeds__price-suf">起</span>
              </div>
              <span class="fdl-mine-feeds__sales">月销 800+</span>
            </div>
          </div>
        </article>
      </div>
      <div class="fdl-mine-feeds__col">
        <article class="fdl-mine-feeds__card">
          <div class="fdl-mine-feeds__card-img" style="background-image: url('https://gw.alicdn.com/imgextra/i2/O1CN01Yl3Pso1M3dIzhT31p_!!6000000001379-2-tps-444-544.png')"></div>
          <div class="fdl-mine-feeds__card-body">
            <h3 class="fdl-mine-feeds__card-title">灵隐寺祈福之旅</h3>
            <div class="fdl-mine-feeds__card-tags">
              <span class="fdl-mine-feeds__tag">随时退</span>
            </div>
            <p class="fdl-mine-feeds__card-meta">4.9 分 · 超棒</p>
            <div class="fdl-mine-feeds__price-row">
              <div class="fdl-mine-feeds__price">
                <span class="fdl-mine-feeds__price-y">¥</span>
                <span class="fdl-mine-feeds__price-n">58</span>
                <span class="fdl-mine-feeds__price-suf">起</span>
              </div>
              <span class="fdl-mine-feeds__sales">月销 5000+</span>
            </div>
          </div>
        </article>
        <article class="fdl-mine-feeds__card">
          <div class="fdl-mine-feeds__card-img" style="background-image: url('https://gw.alicdn.com/imgextra/i2/O1CN01Yl3Pso1M3dIzhT31p_!!6000000001379-2-tps-444-544.png')"></div>
          <div class="fdl-mine-feeds__card-body">
            <h3 class="fdl-mine-feeds__card-title">千岛湖环湖骑行</h3>
            <div class="fdl-mine-feeds__card-tags">
              <span class="fdl-mine-feeds__tag">免押金</span>
            </div>
            <p class="fdl-mine-feeds__card-meta">4.7 分 · 很好</p>
            <div class="fdl-mine-feeds__price-row">
              <div class="fdl-mine-feeds__price">
                <span class="fdl-mine-feeds__price-y">¥</span>
                <span class="fdl-mine-feeds__price-n">89</span>
                <span class="fdl-mine-feeds__price-suf">起</span>
              </div>
              <span class="fdl-mine-feeds__sales">月销 1200+</span>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>
</body>
</html>
