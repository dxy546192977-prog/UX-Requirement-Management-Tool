<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 首页顶标题栏（home-titlebar）</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-bg: #f2f3f5;
  --color-white: #ffffff;
  --color-indigo-1: #6666ff;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 24px 0;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-home-titlebar-demo {
  max-width: 750px;
  margin: 0 auto;
}

.fdl-home-titlebar {
  display: flex;
  width: 100%;
  height: 88px;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  gap: 12px;
  background: var(--color-white);
}

.fdl-home-titlebar__logo {
  display: flex;
  width: 86px;
  height: 68px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-titlebar__logo img {
  width: 86px;
  height: 68px;
  object-fit: contain;
}

.fdl-home-titlebar__logo:focus-visible,
.fdl-home-titlebar__tab:focus-visible,
.fdl-home-titlebar__action:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-home-titlebar__nav {
  display: flex;
  min-width: 0;
  flex: 1;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.fdl-home-titlebar__tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0 0 6px;
  border: none;
  background: none;
  cursor: pointer;
  gap: 3px;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-titlebar__tab--brand {
  flex-direction: row;
  justify-content: center;
  width: 153px;
  height: 55px;
  padding-bottom: 6px;
}

.fdl-home-titlebar__tab--brand .fdl-home-titlebar__tab-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.fdl-home-titlebar__tab-icon {
  width: 30px;
  height: 30px;
  margin-top: 6px;
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

.fdl-home-titlebar__tab-icon--ai {
  background-image: url("https://gw.alicdn.com/imgextra/i3/O1CN017NbP6X1gRiRqp8DEh_!!6000000004139-2-tps-30-30.png");
}

.fdl-home-titlebar__tab-icon--city {
  border-radius: 4px;
  background-image: url("https://gw.alicdn.com/imgextra/i2/O1CN01oul7RF20OJpGGOkoO_!!6000000006839-2-tps-30-30.png");
}

.fdl-home-titlebar__tab-label {
  font-size: 30px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  text-align: center;
}

.fdl-home-titlebar__tab--icon .fdl-home-titlebar__tab-row {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  justify-content: center;
  gap: 3px;
}

.fdl-home-titlebar__indicator {
  width: 36px;
  height: 4px;
  border-radius: 3px;
  background: transparent;
}

.fdl-home-titlebar__indicator--active {
  background: var(--color-darkgray);
}

.fdl-home-titlebar__action {
  display: flex;
  width: 86px;
  height: 68px;
  flex-shrink: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-titlebar__action img {
  width: 42px;
  height: 42px;
  object-fit: contain;
}

.fdl-home-titlebar__action-text {
  margin-top: 2px;
  font-size: 20px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  text-align: center;
}
  </style>
</head>
<body>
  <div class="fdl-home-titlebar-demo">
    <header class="fdl-home-titlebar" role="banner">
      <button type="button" class="fdl-home-titlebar__logo" aria-label="飞猪首页">
        <img
          src="https://gw.alicdn.com/imgextra/i3/O1CN01HtEL5R1uIvT3FxIzk_!!6000000006015-2-tps-86-68.png"
          alt=""
          width="86"
          height="68"
        />
      </button>

      <nav class="fdl-home-titlebar__nav" role="tablist" aria-label="首页频道">
        <button
          type="button"
          class="fdl-home-titlebar__tab fdl-home-titlebar__tab--brand"
          role="tab"
          aria-selected="false"
        >
          <span class="fdl-home-titlebar__tab-icon fdl-home-titlebar__tab-icon--ai" aria-hidden="true"></span>
          <span class="fdl-home-titlebar__tab-main">
            <span class="fdl-home-titlebar__tab-label">飞猪千问</span>
            <span class="fdl-home-titlebar__indicator" aria-hidden="true"></span>
          </span>
        </button>

        <button
          type="button"
          class="fdl-home-titlebar__tab"
          role="tab"
          aria-selected="true"
        >
          <span class="fdl-home-titlebar__tab-label">推荐</span>
          <span class="fdl-home-titlebar__indicator fdl-home-titlebar__indicator--active" aria-hidden="true"></span>
        </button>

        <button
          type="button"
          class="fdl-home-titlebar__tab fdl-home-titlebar__tab--icon"
          role="tab"
          aria-selected="false"
        >
          <span class="fdl-home-titlebar__tab-row">
            <span class="fdl-home-titlebar__tab-icon fdl-home-titlebar__tab-icon--city" aria-hidden="true"></span>
            <span class="fdl-home-titlebar__tab-label">杭州</span>
          </span>
          <span class="fdl-home-titlebar__indicator" aria-hidden="true"></span>
        </button>
      </nav>

      <a class="fdl-home-titlebar__action" href="#" aria-label="我的收藏">
        <img
          src="https://gw.alicdn.com/imgextra/i4/O1CN01Z3V9c31CVtadtADoT_!!6000000000087-2-tps-42-42.png"
          alt=""
          width="42"
          height="42"
        />
        <span class="fdl-home-titlebar__action-text">我的收藏</span>
      </a>
    </header>
  </div>

  <script>
document.querySelector('.fdl-home-titlebar__action[href="#"]').addEventListener("click", function (e) {
  e.preventDefault();
});
  </script>
</body>
</html>
