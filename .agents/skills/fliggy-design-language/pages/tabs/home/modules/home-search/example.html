<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 首页搜索框（home-search）</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-white: #ffffff;
  --color-indigo-1: #6666ff;
  --color-bg: #f2f3f5;
  --radius-m: 12px;
  --radius-l: 24px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 24px;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-home-search-demo {
  width: 702px;
  margin: 0 auto;
}

.fdl-home-search {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding-top: 12px;
  gap: 18px;
}

.fdl-home-search__field {
  display: flex;
  height: 80px;
  align-items: center;
  padding: 0 8px 0 24px;
  gap: 18px;
  border: 3px solid var(--color-indigo-1);
  border-radius: var(--radius-l);
  background: var(--color-white);
}

.fdl-home-search__input-row {
  display: flex;
  min-width: 0;
  flex: 1;
  align-items: center;
  gap: 12px;
}

.fdl-home-search__scan {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  padding: 0;
  border: none;
  background: url("https://gw.alicdn.com/imgextra/i3/O1CN01XenpkQ1F6ebo5r2Xw_!!6000000000438-2-tps-36-36.png") center / contain no-repeat;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-search__scan:focus-visible,
.fdl-home-search__submit:focus-visible,
.fdl-home-search__tag:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-home-search__query {
  min-width: 0;
  flex: 1;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  text-align: left;
}

.fdl-home-search__submit {
  display: flex;
  width: 104px;
  height: 63px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  border: none;
  border-radius: 18px;
  background: var(--color-indigo-1);
  font-family: inherit;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-white);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-home-search__tags {
  display: flex;
  flex-direction: row;
  gap: 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.fdl-home-search__tag {
  display: inline-flex;
  height: 48px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: color-mix(in srgb, var(--color-darkgray) 6%, transparent);
  font-family: inherit;
  font-size: 24px;
  font-weight: 400;
  line-height: 1.4;
  color: var(--color-midgray);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
  </style>
</head>
<body>
  <div class="fdl-home-search-demo">
    <section class="fdl-home-search" aria-label="搜索与快捷词">
      <div class="fdl-home-search__field">
        <div class="fdl-home-search__input-row">
          <button type="button" class="fdl-home-search__scan" aria-label="扫一扫"></button>
          <div class="fdl-home-search__query">杭州野生动物世界</div>
        </div>
        <button type="button" class="fdl-home-search__submit">搜索</button>
      </div>

      <div class="fdl-home-search__tags" role="list">
        <button type="button" class="fdl-home-search__tag" role="listitem">迪士尼</button>
        <button type="button" class="fdl-home-search__tag" role="listitem">签证</button>
        <button type="button" class="fdl-home-search__tag" role="listitem">出境游</button>
        <button type="button" class="fdl-home-search__tag" role="listitem">跟团游</button>
        <button type="button" class="fdl-home-search__tag" role="listitem">一元秒杀</button>
      </div>
    </section>
  </div>
</body>
</html>
