<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — carousel-bar（轮播条）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 32px;
  padding: 40px 24px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-carousel-bar-demo {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
  max-width: 600px;
}

.fdl-carousel-bar-demo__caption {
  font-size: 24px;
  line-height: 1.4;
  color: var(--color-midgray);
}

/* 深底示意：叠在轮播图 / 遮罩上，与供稿一致 */
.fdl-carousel-bar-demo__stage {
  width: 100%;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--color-darkgray);
  border-radius: var(--radius-s);
}

.fdl-carousel-bar-demo__stage--light {
  background: var(--color-white);
}

/* ========== fdl-carousel-bar ========== */
.fdl-carousel-bar {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: var(--radius-s);
  padding: 0;
  height: 6px;
}

.fdl-carousel-bar__segment {
  flex: none;
  border-radius: 3px 0 3px 0;
  background: color-mix(in srgb, var(--color-white) 80%, transparent);
}

.fdl-carousel-bar__segment--bar {
  width: 24px;
  height: 6px;
}

.fdl-carousel-bar__segment--dot {
  width: 6px;
  height: 6px;
}

.fdl-carousel-bar__segment--active {
  background: var(--color-brand-1);
}

.fdl-carousel-bar--on-light .fdl-carousel-bar__segment:not(.fdl-carousel-bar__segment--active) {
  background: color-mix(in srgb, var(--color-darkgray) 22%, transparent);
}
  </style>
</head>
<body>

  <div class="fdl-carousel-bar-demo">
    <div class="fdl-carousel-bar-demo__caption">轮播条 · 2 页</div>
    <div class="fdl-carousel-bar-demo__stage">
      <div class="fdl-carousel-bar" role="group" aria-label="轮播分页，共 2 页，当前第 1 页">
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar fdl-carousel-bar__segment--active" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar" aria-hidden="true"></span>
      </div>
    </div>
  </div>

  <div class="fdl-carousel-bar-demo">
    <div class="fdl-carousel-bar-demo__caption">轮播条 · 3 页</div>
    <div class="fdl-carousel-bar-demo__stage">
      <div class="fdl-carousel-bar" role="group" aria-label="轮播分页，共 3 页，当前第 1 页">
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar fdl-carousel-bar__segment--active" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar" aria-hidden="true"></span>
      </div>
    </div>
  </div>

  <div class="fdl-carousel-bar-demo">
    <div class="fdl-carousel-bar-demo__caption">轮播条 · 大于 3 页</div>
    <div class="fdl-carousel-bar-demo__stage">
      <div class="fdl-carousel-bar" role="group" aria-label="轮播分页，多页，当前第 1 页">
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar fdl-carousel-bar__segment--active" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--dot" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--dot" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--dot" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--dot" aria-hidden="true"></span>
      </div>
    </div>
  </div>

  <div class="fdl-carousel-bar-demo">
    <div class="fdl-carousel-bar-demo__caption">浅色底（容器加 fdl-carousel-bar--on-light）</div>
    <div class="fdl-carousel-bar-demo__stage fdl-carousel-bar-demo__stage--light">
      <div class="fdl-carousel-bar fdl-carousel-bar--on-light" role="group" aria-label="轮播分页，共 3 页，当前第 2 页">
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar fdl-carousel-bar__segment--active" aria-hidden="true"></span>
        <span class="fdl-carousel-bar__segment fdl-carousel-bar__segment--bar" aria-hidden="true"></span>
      </div>
    </div>
  </div>

</body>
</html>
