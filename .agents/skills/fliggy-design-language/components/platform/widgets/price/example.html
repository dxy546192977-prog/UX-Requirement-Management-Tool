<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — price（价格展示）示例</title>
  <style>
@font-face {
  font-family: 'Fliggy Sans 102';
  src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 40px;
  padding: 48px 36px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-price-demo {
  display: flex;
  align-items: flex-end;
  gap: 18px;
}

.fdl-price-demo__label {
  flex: 0 0 200px;
  font-size: 24px;
  line-height: 1.4;
  color: var(--color-midgray);
}

.fdl-price-demo__rule {
  width: 100%;
  max-width: 640px;
  margin: 8px 0;
  border: none;
  border-top: 1px solid var(--color-auxiliary);
}

/* ========== fdl-price ========== */
.fdl-price {
  display: inline-flex;
  flex-direction: row;
  align-items: flex-end;
  color: var(--color-pay-1);
  white-space: nowrap;
}

.fdl-price__currency,
.fdl-price__integer,
.fdl-price__decimal,
.fdl-price__suffix {
  padding: 0 1px;
}

.fdl-price__currency {
  font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 700;
}

.fdl-price__integer,
.fdl-price__decimal {
  font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 500;
}

.fdl-price__suffix {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
}

.fdl-price__label {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  color: var(--color-pay-1);
  margin-right: 5px;
}

.fdl-price__original {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  color: var(--color-lightgray);
  text-decoration-line: line-through;
  margin-right: 12px;
}

.fdl-price__sales {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  color: var(--color-midgray);
  margin-left: 12px;
}

/* --- large --- */
.fdl-price--large .fdl-price__currency { font-size: 24px; line-height: 24px; }
.fdl-price--large .fdl-price__integer { font-size: 48px; line-height: 31px; }
.fdl-price--large .fdl-price__decimal { font-size: 32px; line-height: 21px; }
.fdl-price--large .fdl-price__suffix { font-size: 24px; line-height: 24px; }
.fdl-price--large .fdl-price__label,
.fdl-price--large .fdl-price__original,
.fdl-price--large .fdl-price__sales { font-size: 24px; line-height: 24px; }

/* --- medium --- */
.fdl-price--medium .fdl-price__currency { font-size: 24px; line-height: 24px; }
.fdl-price--medium .fdl-price__integer { font-size: 42px; line-height: 27px; }
.fdl-price--medium .fdl-price__decimal { font-size: 28px; line-height: 18px; }
.fdl-price--medium .fdl-price__suffix { font-size: 20px; line-height: 20px; }
.fdl-price--medium .fdl-price__label,
.fdl-price--medium .fdl-price__original,
.fdl-price--medium .fdl-price__sales { font-size: 20px; line-height: 20px; }

/* --- small --- */
.fdl-price--small .fdl-price__currency { font-size: 24px; line-height: 24px; }
.fdl-price--small .fdl-price__integer { font-size: 36px; line-height: 23px; }
.fdl-price--small .fdl-price__decimal { font-size: 24px; line-height: 16px; }
.fdl-price--small .fdl-price__suffix { font-size: 18px; line-height: 18px; }
.fdl-price--small .fdl-price__label,
.fdl-price--small .fdl-price__original,
.fdl-price--small .fdl-price__sales { font-size: 20px; line-height: 20px; }
  </style>
</head>
<body>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">Large / 基础</div>
    <span class="fdl-price fdl-price--large">
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">694</span>
      <span class="fdl-price__decimal">.95</span>
    </span>
  </div>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">Large / 带「起」</div>
    <span class="fdl-price fdl-price--large">
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">694</span>
      <span class="fdl-price__suffix">起</span>
    </span>
  </div>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">Medium / 基础</div>
    <span class="fdl-price fdl-price--medium">
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">1280</span>
      <span class="fdl-price__decimal">.50</span>
    </span>
  </div>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">Small / 基础</div>
    <span class="fdl-price fdl-price--small">
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">99</span>
    </span>
  </div>

  <hr class="fdl-price-demo__rule" aria-hidden="true" />

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">组合 / 带原价</div>
    <span class="fdl-price fdl-price--medium">
      <span class="fdl-price__original">¥1010</span>
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">694</span>
    </span>
  </div>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">组合 / 带销量</div>
    <span class="fdl-price fdl-price--medium">
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">694</span>
      <span class="fdl-price__sales">月销23笔</span>
    </span>
  </div>

  <div class="fdl-price-demo">
    <div class="fdl-price-demo__label">组合 / 特殊标签</div>
    <span class="fdl-price fdl-price--medium">
      <span class="fdl-price__label">会员价</span>
      <span class="fdl-price__currency">¥</span>
      <span class="fdl-price__integer">694</span>
    </span>
  </div>

</body>
</html>
