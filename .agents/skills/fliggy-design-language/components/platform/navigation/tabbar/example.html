<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — tabbar（一级底部导航）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 150vh;
  padding-bottom: calc(166px + env(safe-area-inset-bottom, 0px));
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-tabbar-demo__hint {
  margin: 0;
  padding: 48px 24px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.5;
  text-align: center;
  color: var(--color-lightgray);
}

/* ========== fdl-tabbar ========== */
.fdl-tabbar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
}

.fdl-tabbar__nav {
  height: 102px;
  background: var(--color-white);
  box-shadow: 0 -1px 0 var(--color-bg);
}

.fdl-tabbar__list {
  display: flex;
  justify-content: space-around;
  align-items: stretch;
  list-style: none;
  padding: 0;
  margin: 0;
  height: 100%;
}

.fdl-tabbar__item {
  flex: 1;
  position: relative;
}

.fdl-tabbar__link {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  gap: 6px;
  text-decoration: none;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}

.fdl-tabbar__link:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-tabbar__icon {
  width: 48px;
  height: 48px;
  position: relative;
  transition: width 0.2s ease, height 0.2s ease;
}

.fdl-tabbar__icon img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.fdl-tabbar__icon-img--active {
  display: none;
}

.fdl-tabbar__icon-img--inactive {
  display: block;
}

.fdl-tabbar__item--active .fdl-tabbar__icon-img--active {
  display: block;
}

.fdl-tabbar__item--active .fdl-tabbar__icon-img--inactive {
  display: none;
}

.fdl-tabbar__label {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  font-size: 22px;
  line-height: 1;
  text-align: center;
  color: var(--color-darkgray);
  transition: font-weight 0.2s ease;
}

.fdl-tabbar__item--active .fdl-tabbar__label {
  font-weight: 500;
}

.fdl-tabbar__item--fliggy.fdl-tabbar__item--active .fdl-tabbar__icon {
  width: 102px;
  height: 102px;
}

.fdl-tabbar__item--fliggy.fdl-tabbar__item--active::before {
  content: "";
  position: absolute;
  width: 35px;
  height: 25px;
  background: var(--color-brand-1);
  filter: blur(12.5px);
  border-radius: 50%;
  left: 50%;
  bottom: 15%;
  transform: translateX(-50%);
  z-index: -1;
}

.fdl-tabbar__item--fliggy.fdl-tabbar__item--active .fdl-tabbar__label {
  display: none;
}

.fdl-tabbar__safe-area {
  min-height: 64px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  background: var(--color-white);
}
  </style>
</head>
<body>

  <p class="fdl-tabbar-demo__hint">向下滚动页面…<br />底部为固定一级 Tabbar（示例可点击切换选中）</p>

  <div class="fdl-tabbar">
    <nav class="fdl-tabbar__nav" aria-label="底部主导航">
      <ul class="fdl-tabbar__list">
        <li class="fdl-tabbar__item fdl-tabbar__item--fliggy fdl-tabbar__item--active">
          <a class="fdl-tabbar__link" href="#" aria-label="首页" aria-current="page">
            <div class="fdl-tabbar__icon">
              <img class="fdl-tabbar__icon-img--inactive" src="https://gw.alicdn.com/imgextra/i4/O1CN01C1KZp61fkfDbhqDGb_!!6000000004045-2-tps-96-96.png" width="96" height="96" alt="" />
              <img class="fdl-tabbar__icon-img--active" src="https://gw.alicdn.com/imgextra/i4/O1CN01eNqqfN2803m2U1a3R_!!6000000007869-2-tps-204-214.png" width="204" height="214" alt="" />
            </div>
            <span class="fdl-tabbar__label">首页</span>
          </a>
        </li>

        <li class="fdl-tabbar__item">
          <a class="fdl-tabbar__link" href="#">
            <div class="fdl-tabbar__icon">
              <img class="fdl-tabbar__icon-img--inactive" src="https://gw.alicdn.com/imgextra/i3/O1CN018WSOmF1geXXRCSdee_!!6000000004167-2-tps-96-96.png" width="96" height="96" alt="" />
              <img class="fdl-tabbar__icon-img--active" src="https://gw.alicdn.com/imgextra/i4/O1CN010oGY6j1iNiDYeKlL0_!!6000000004401-2-tps-96-96.png" width="96" height="96" alt="" />
            </div>
            <span class="fdl-tabbar__label">会员</span>
          </a>
        </li>

        <li class="fdl-tabbar__item">
          <a class="fdl-tabbar__link" href="#">
            <div class="fdl-tabbar__icon">
              <img class="fdl-tabbar__icon-img--inactive" src="https://gw.alicdn.com/imgextra/i4/O1CN01Hn4QVN1MnQuj2rkYr_!!6000000001479-2-tps-96-96.png" width="96" height="96" alt="" />
              <img class="fdl-tabbar__icon-img--active" src="https://gw.alicdn.com/imgextra/i2/O1CN012vS02w1kkGxVWS4hE_!!6000000004721-2-tps-96-96.png" width="96" height="96" alt="" />
            </div>
            <span class="fdl-tabbar__label">消息</span>
          </a>
        </li>

        <li class="fdl-tabbar__item">
          <a class="fdl-tabbar__link" href="#">
            <div class="fdl-tabbar__icon">
              <img class="fdl-tabbar__icon-img--inactive" src="https://gw.alicdn.com/imgextra/i2/O1CN01x0SUcY1O2NS7urI3g_!!6000000001647-2-tps-96-96.png" width="96" height="96" alt="" />
              <img class="fdl-tabbar__icon-img--active" src="https://gw.alicdn.com/imgextra/i4/O1CN01P27V8t1uN324l68EU_!!6000000006024-2-tps-96-96.png" width="96" height="96" alt="" />
            </div>
            <span class="fdl-tabbar__label">行程</span>
          </a>
        </li>

        <li class="fdl-tabbar__item">
          <a class="fdl-tabbar__link" href="#">
            <div class="fdl-tabbar__icon">
              <img class="fdl-tabbar__icon-img--inactive" src="https://gw.alicdn.com/imgextra/i1/O1CN01VLEq8s1CUWOysFWgi_!!6000000000084-2-tps-96-96.png" width="96" height="96" alt="" />
              <img class="fdl-tabbar__icon-img--active" src="https://gw.alicdn.com/imgextra/i1/O1CN01u12TM81hqHIyW5bc4_!!6000000004328-2-tps-96-96.png" width="96" height="96" alt="" />
            </div>
            <span class="fdl-tabbar__label">我的</span>
          </a>
        </li>
      </ul>
    </nav>
    <div class="fdl-tabbar__safe-area" aria-hidden="true"></div>
  </div>

  <script>
(function () {
  var items = document.querySelectorAll(".fdl-tabbar__item");
  items.forEach(function (item) {
    item.addEventListener("click", function (e) {
      e.preventDefault();
      items.forEach(function (i) {
        i.classList.remove("fdl-tabbar__item--active");
        var link = i.querySelector(".fdl-tabbar__link");
        if (link) link.removeAttribute("aria-current");
      });
      item.classList.add("fdl-tabbar__item--active");
      var activeLink = item.querySelector(".fdl-tabbar__link");
      if (activeLink) activeLink.setAttribute("aria-current", "page");
    });
  });
})();
  </script>

</body>
</html>
