<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — 空页面异常反馈（Empty State）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-pay-2: #ff8c1a;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --color-notice-tint: #fff6ee;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 48px 24px 64px;
  background: var(--color-label);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-empty-state-demo-page {
  max-width: 750px;
  margin: 0 auto;
}

.fdl-empty-state-demo__grid {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.fdl-empty-state-demo__card {
  border: 1px solid var(--color-auxiliary);
  border-radius: var(--radius-m);
  overflow: hidden;
  background: var(--color-white);
  box-shadow: 0 4px 12px color-mix(in srgb, var(--color-darkgray) 5%, transparent);
}

.fdl-empty-state-demo__card-title {
  margin: 0;
  padding: 12px 20px;
  font-size: 24px;
  font-weight: 500;
  color: var(--color-midgray);
  background: var(--color-label);
  border-bottom: 1px solid var(--color-auxiliary);
}

/* ========== fdl-empty-state ========== */
.fdl-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 60px 20px;
  text-align: center;
}

.fdl-empty-state__image {
  width: 476px;
  height: 372px;
  max-width: 100%;
  object-fit: contain;
}

.fdl-empty-state__content {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.fdl-empty-state__title {
  margin: 0;
  font-weight: 500;
  font-size: 30px;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-empty-state__description {
  margin: 0;
  font-weight: 400;
  font-size: 24px;
  line-height: 1.4;
  color: var(--color-midgray);
}

.fdl-empty-state__actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  margin-top: 12px;
}

.fdl-empty-state__btn {
  display: flex;
  justify-content: center;
  align-items: center;
  min-width: 180px;
  height: 60px;
  padding: 0 40px;
  border-radius: 9999px;
  font-family: inherit;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  white-space: nowrap;
  cursor: pointer;
  transition: opacity 0.2s ease, filter 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.fdl-empty-state__btn:hover {
  opacity: 0.92;
}

.fdl-empty-state__btn:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
  opacity: 1;
}

.fdl-empty-state__btn--primary {
  border: 2px solid transparent;
  background-color: var(--color-brand-1);
  color: var(--color-darkgray);
}

.fdl-empty-state__btn--secondary {
  border: 2px solid var(--color-auxiliary);
  background-color: var(--color-white);
  color: var(--color-midgray);
}
  </style>
</head>
<body>
  <div class="fdl-empty-state-demo-page">
    <div class="fdl-empty-state-demo__grid" id="fdl-empty-state-demo-root"></div>
  </div>

  <script>
(function () {
  var statuses = [
    {
      label: "系统繁忙",
      image: "https://gw.alicdn.com/imgextra/i1/O1CN01ICkfw41gQnelapjBh_!!6000000004137-2-tps-476-372.png",
      title: "系统繁忙，请稍后再试",
      description: "服务器开小差了，工程师正在紧急处理",
      buttons: [
        { text: "返回首页", type: "secondary" },
        { text: "刷新", type: "primary" }
      ]
    },
    {
      label: "无结果",
      image: "https://gw.alicdn.com/imgextra/i1/O1CN013X9vJX1MLUknD6oqf_!!6000000001418-2-tps-476-372.png",
      title: "没有找到相关内容",
      description: "换个关键词或筛选条件试试吧",
      buttons: []
    },
    {
      label: "为空",
      image: "https://gw.alicdn.com/imgextra/i4/O1CN01ld6A931wHDDYdkxf3_!!6000000006282-2-tps-476-372.png",
      title: "您的收藏夹是空的",
      description: "快去发现一些好玩的地方并收藏起来吧！",
      buttons: [{ text: "去逛逛", type: "primary" }]
    },
    {
      label: "无网络",
      image: "https://gw.alicdn.com/imgextra/i2/O1CN01DiChHk1ThCq58I8Wt_!!6000000002413-2-tps-476-372.png",
      title: "网络连接不可用",
      description: "请检查您的网络设置或稍后重试",
      buttons: [
        { text: "检查设置", type: "secondary" },
        { text: "重试", type: "primary" }
      ]
    },
    {
      label: "操作成功",
      image: "https://gw.alicdn.com/imgextra/i3/O1CN01i1SJrS210KhROUxX5_!!6000000006922-2-tps-476-372.png",
      title: "支付成功！",
      description: "您的订单已确认，祝您旅途愉快！",
      buttons: [
        { text: "查看订单", type: "secondary" },
        { text: "返回首页", type: "primary" }
      ]
    }
  ];

  var root = document.getElementById("fdl-empty-state-demo-root");
  if (!root) return;

  statuses.forEach(function (cfg, index) {
    var section = document.createElement("section");
    section.className = "fdl-empty-state-demo__card";
    section.setAttribute("aria-labelledby", "fdl-empty-state-demo-h-" + index);

    var titleBar = document.createElement("p");
    titleBar.className = "fdl-empty-state-demo__card-title";
    titleBar.id = "fdl-empty-state-demo-h-" + index;
    titleBar.textContent = cfg.label;

    var inner = document.createElement("div");
    inner.className = "fdl-empty-state";
    inner.setAttribute("role", "region");
    inner.setAttribute("aria-labelledby", "fdl-empty-state-title-" + index);

    var img = document.createElement("img");
    img.className = "fdl-empty-state__image";
    img.src = cfg.image;
    img.alt = cfg.title;

    var content = document.createElement("div");
    content.className = "fdl-empty-state__content";

    var h2 = document.createElement("h2");
    h2.className = "fdl-empty-state__title";
    h2.id = "fdl-empty-state-title-" + index;
    h2.textContent = cfg.title;

    content.appendChild(h2);
    if (cfg.description) {
      var p = document.createElement("p");
      p.className = "fdl-empty-state__description";
      p.textContent = cfg.description;
      content.appendChild(p);
    }

    inner.appendChild(img);
    inner.appendChild(content);

    if (cfg.buttons && cfg.buttons.length) {
      var actions = document.createElement("div");
      actions.className = "fdl-empty-state__actions";
      cfg.buttons.forEach(function (b) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className =
          "fdl-empty-state__btn fdl-empty-state__btn--" + (b.type === "secondary" ? "secondary" : "primary");
        btn.textContent = b.text;
        actions.appendChild(btn);
      });
      inner.appendChild(actions);
    }

    section.appendChild(titleBar);
    section.appendChild(inner);
    root.appendChild(section);
  });
})();
  </script>
</body>
</html>
