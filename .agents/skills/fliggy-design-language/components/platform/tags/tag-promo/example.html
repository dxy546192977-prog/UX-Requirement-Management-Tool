<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDL — tag-promo（大促类 / 促销标签）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 32px;
  padding: 48px 24px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

/* ========== fdl-tag-promo ========== */
.fdl-tag-promo {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  width: 52px;
  height: 28px;
  border-radius: 4px;
  box-sizing: border-box;
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-tag-promo__icon svg {
  display: block;
}

.fdl-tag-promo--double-11 {
  background-color: var(--color-promo-1);
}

.fdl-tag-promo--pre-sale {
  background-color: var(--color-promo-2);
}

.fdl-tag-promo__text {
  font-weight: 600;
  font-size: 22px;
  line-height: 1;
  color: var(--color-white);
}
  </style>
</head>
