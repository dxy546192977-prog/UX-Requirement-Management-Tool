<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>导航栏组件示例</title>
    <style>
        :root {
            --color-primary: #0E131B;
            --color-secondary: #90949A;
            --color-price: #FF4119;
            --color-accent: #009DAA;
            --color-white: #FFFFFF;
            --color-bg: #F2F3F5;
            --color-bg-light: #F7F8FA;
            --color-bg-card: #FAFAFA;
            --color-border: #E6E7EB;
            --color-divider: #E0E0E0;
            --color-selected: #FFE747;
            --color-selected-bg: #FFFCE9;
            --color-selected-border: #FFDF00;
            --color-heart: #212121;
            --color-heart-icon: #FFD600;
            --radius-xl: 24px;
            --radius-l: 12px;
            --radius-m: 6px;
            --radius-s: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F5F5F5;
        }

        .navbar-container {
            width: 750px;
            height: 176px;
            background-color: var(--color-white);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .status-bar {
            width: 750px;
            height: 88px;
            background-color: var(--color-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .time {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-primary);
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-icons {
            width: 134px;
            height: 24px;
        }

        .navbar {
            width: 750px;
            height: 88px;
            background-color: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            position: relative;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            position: absolute;
            left: 24px;
            top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-icon {
            width: 48px;
            height: 48px;
        }

        .od-cities {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .city {
            font-family: 'PingFang SC';
            font-size: 30px;
            font-weight: 500;
            color: var(--color-primary);
            line-height: 42px;
        }

        .arrow-icon {
            width: 42px;
            height: 42px;
        }

        .dropdown-icon {
            width: 20px;
            height: 20px;
        }

        .nav-icons {
            position: absolute;
            right: 24px;
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 0;
            gap: 12px;
            width: 168px;
            height: 48px;
        }

        .travel-alert {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            gap: 3px;
            width: 48px;
            height: 48px;
            flex: none;
        }

        .travel-alert-icon {
            width: 33px;
            height: 36px;
            flex: none;
        }

        .travel-alert-text {
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 12px;
            line-height: 17px;
            text-align: center;
            color: var(--color-primary);
            width: 48px;
            flex: none;
            align-self: stretch;
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon img {
            width: 100%;
            height: 100%;
        }

        .price-alert {
            width: 48px;
            height: 48px;
            position: relative;
            flex: none;
        }

        .price-alert img {
            position: absolute;
            width: 36px;
            height: 36px;
            left: 6px;
            top: 0;
        }

        .price-alert-text {
            position: absolute;
            width: 50px;
            height: 17px;
            left: calc(50% - 50px/2);
            top: calc(50% - 17px/2 + 23.5px);
            font-family: 'PingFang SC';
            font-style: normal;
            font-weight: 400;
            font-size: 12px;
            line-height: 17px;
            text-align: center;
            color: var(--color-primary);
        }

        .content-placeholder {
            margin-top: 176px;
            padding: 24px;
            text-align: center;
            color: var(--color-lightgray);
        }
    </style>
</head>
<body>
    <div class="navbar-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-left">
                <span class="time">9:41</span>
            </div>
            <div class="status-right">
                <img class="status-icons" src="https://gw.alicdn.com/imgextra/i1/O1CN01fDXHWq1je1wcx12ia_!!6000000004572-2-tps-134-24.png" alt="状态栏图标">
            </div>
        </div>

        <!-- 导航栏 -->
        <div class="navbar">
            <!-- 返回箭头 -->
            <div class="back-btn">
                <img class="back-icon" src="https://gw.alicdn.com/imgextra/i1/O1CN01DTmWga1piVVizwK8x_!!6000000005394-2-tps-48-48.png" alt="返回">
            </div>

            <!-- OD城市区 -->
            <div class="od-cities">
                <span class="city">杭州</span>
                <img class="arrow-icon" src="https://gw.alicdn.com/imgextra/i1/O1CN015RbuWn1af6KRGgKmO_!!6000000003356-2-tps-42-42.png" alt="箭头">
                <span class="city">北京</span>
                <img class="dropdown-icon" src="https://gw.alicdn.com/imgextra/i1/O1CN01zck7uV1dv4zfuDTnt_!!6000000003797-2-tps-20-20.png" alt="下拉">
            </div>

            <!-- 右侧图标组 -->
            <div class="nav-icons">
                <!-- 出行提醒 -->
                <div class="travel-alert">
                    <img class="travel-alert-icon" src="https://gw.alicdn.com/imgextra/i3/O1CN01IeFyHa1IyBkceWSy1_!!6000000000961-2-tps-34-36.png" alt="出行提醒">
                    <span class="travel-alert-text">出行提醒</span>
                </div>
                <!-- 低价提醒 -->
                <div class="price-alert">
                    <img src="https://gw.alicdn.com/imgextra/i1/O1CN015uzCtj1heN0PLsbOK_!!6000000004302-2-tps-36-36.png" alt="低价提醒">
                    <span class="price-alert-text">低价提醒</span>
                </div>
                <!-- 更多 -->
                <div class="nav-icon">
                    <img src="https://gw.alicdn.com/imgextra/i1/O1CN014bSFyZ1xCv7asQHR9_!!6000000006408-2-tps-48-48.png" alt="更多">
                </div>
            </div>
        </div>
    </div>

    <!-- 内容占位区 -->
    <div class="content-placeholder">
        <p>机票列表内容区域</p>
    </div>
</body>
</html>
