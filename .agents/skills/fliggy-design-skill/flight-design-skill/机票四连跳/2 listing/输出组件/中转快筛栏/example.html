<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>中转快筛栏组件示例</title>
  <style>
    :root {
      --color-primary: #0E131B;
      --color-secondary: #90949A;
      --color-white: #FFFFFF;
      --color-bg: #F2F3F5;
      --color-bg-light: #F7F8FA;
      --color-selected-bg: #FFFCE9;
      --color-selected-border: #FFDF00;
      --radius-m: 6px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'SimHei', sans-serif;
      background-color: var(--color-bg-light);
      min-height: 100vh;
    }

    /* 飞机中转 筛选栏 - 外层容器 */
    .transfer-filter-wrapper {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0;
      isolation: isolate;
      width: 750px;
      height: 84px;
      background: linear-gradient(0deg, #FFFFFF, #FFFFFF), linear-gradient(0deg, #FFFFFF, #FFFFFF), #F9F9F9;
      border-bottom: 1px solid #F2F3F5;
      overflow: hidden;
      position: relative;
    }

    /* 快筛栏 - 内层可滚动区域 */
    .transfer-filter-bar {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px;
      gap: 12px;
      isolation: isolate;
      width: auto;
      min-width: 854px;
      height: 84px;
      background: linear-gradient(0deg, #FFFFFF, #FFFFFF), linear-gradient(0deg, #FFFFFF, #FFFFFF), #F9F9F9;
      border-bottom: 1px solid #F2F3F5;
      overflow-x: auto;
      overflow-y: hidden;
    }

    /* 隐藏滚动条 */
    .transfer-filter-bar::-webkit-scrollbar {
      display: none;
    }

    /* 筛选项0：筛选（隐藏） */
    .transfer-filter-item--hidden {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px 18px;
      gap: 6px;
      width: 116px;
      height: 60px;
      background: #F7F8FA;
      border-radius: 6px;
      flex: none;
      display: none;
    }

    /* 筛选项（普通态） */
    .transfer-filter-item {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px 18px;
      gap: 6px;
      height: 60px;
      background: #F7F8FA;
      border-radius: 6px;
      flex: none;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }

    /* 筛选项（选中态） */
    .transfer-filter-item.active {
      background: #FFFCE9;
      border: 1px solid #FFDF00;
      isolation: isolate;
    }

    /* 筛选项文字（普通态） */
    .transfer-filter-text {
      font-family: 'PingFang SC';
      font-style: normal;
      font-weight: 400;
      font-size: 24px;
      line-height: 140%;
      color: #0E131B;
      flex: none;
      white-space: nowrap;
    }

    /* 选中态文字加粗 */
    .transfer-filter-item.active .transfer-filter-text {
      font-weight: 500;
    }

    /* 选中勾图标 */
    .transfer-filter-check {
      position: absolute;
      width: 24px;
      height: 21px;
      right: 0;
      bottom: 0;
      overflow: hidden;
      border-radius: 0 0 6px 0;
    }

    .transfer-filter-check img {
      width: 24px;
      height: 21px;
      display: block;
    }

    /* 下拉箭头（普通筛选项隐藏） */
    .transfer-filter-arrow {
      display: none;
      width: 20px;
      height: 20px;
      flex: none;
    }

    /* 带箭头的筛选项：箭头可见 */
    .transfer-filter-arrow.visible {
      display: block;
    }

    .transfer-filter-arrow img {
      width: 20px;
      height: 20px;
      display: block;
    }

    /* 人均价（隐藏） */
    .transfer-filter-avg-price {
      display: none;
      flex-direction: row;
      justify-content: flex-end;
      align-items: center;
      padding: 0;
      position: absolute;
      width: 230px;
      height: 60px;
      right: 0;
      top: calc(50% - 60px/2);
    }
  </style>
</head>
<body>
  <div class="transfer-filter-wrapper">
    <div class="transfer-filter-bar">
      <!-- 筛选项0：筛选（隐藏） -->
      <div class="transfer-filter-item--hidden">
        <span class="transfer-filter-text">筛选</span>
      </div>
      <!-- 筛选项1：智能推荐（选中态） -->
      <div class="transfer-filter-item active">
        <span class="transfer-filter-text">智能推荐</span>
        <div class="transfer-filter-check">
          <img src="https://gw.alicdn.com/imgextra/i2/O1CN01x9n4nt1MKZxdcQRl1_!!6000000001416-2-tps-24-21.png" alt="选中">
        </div>
      </div>
      <!-- 筛选项2：当日达 -->
      <div class="transfer-filter-item">
        <span class="transfer-filter-text">当日达</span>
      </div>
      <!-- 筛选项3：北京中转 -->
      <div class="transfer-filter-item">
        <span class="transfer-filter-text">北京中转</span>
      </div>
      <!-- 筛选项4：郑州中转 -->
      <div class="transfer-filter-item">
        <span class="transfer-filter-text">郑州中转</span>
      </div>
      <!-- 筛选项5：重庆中转 -->
      <div class="transfer-filter-item">
        <span class="transfer-filter-text">重庆中转</span>
      </div>
      <!-- 筛选项6：大连中转 -->
      <div class="transfer-filter-item">
        <span class="transfer-filter-text">大连中转</span>
      </div>
    </div>
  </div>
</body>
</html>
