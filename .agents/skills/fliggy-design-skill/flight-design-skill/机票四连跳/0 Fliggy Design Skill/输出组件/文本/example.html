<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=750, user-scalable=no">
    <title>文章排版组件 (Typography Skill) 预览</title>
    <style>
        :root {
            --color-darkgray: #0f131a;
            --color-midgray: #5c5f66;
            --color-lightgray: #919499;
            --color-indigo-1: #6666ff;
            --color-indigo-4: #EBEBFF;
            --color-warning-1: #ff3333;
            --color-pay-1: #ff5533;
            --color-white: #ffffff;
            --color-label: #F7F8FA;
            --color-bg: #f2f3f5;
            --radius-xl: 36px;
            --radius-l: 24px;
            --radius-m: 12px;
            --radius-s: 6px;
        }

        /* 
         * 预览环境样式
         */
        body {
            background-color: var(--color-label); /* 页面背景色 color_bg */
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }

        /* 
         ================================================
         == 文章排版 (Typography) Skill 组件
         ================================================
         文本直接平铺在页面浅灰背景上，不包裹白底卡片。
        */

        /* 文章内容容器 —— 无背景色、无圆角、无阴影 */
        .article-content {
            width: 690px;
        }

        /* 清除默认 margin，统一由 margin-top 控制 */
        .article-content h1,
        .article-content h2,
        .article-content h3,
        .article-content p {
            margin: 0;
            color: var(--color-darkgray);
            font-family: 'PingFang SC', 'SimHei', sans-serif;
        }
        
        /* H1 级标题 */
        .article-content h1 {
            font-weight: 500;
            font-size: 42px;
            line-height: 1.4;
        }
        
        /* H2 级标题 */
        .article-content h2 {
            font-weight: 500;
            font-size: 36px;
            line-height: 1.4;
            margin-top: 42px;
        }
        
        /* H3 级标题 */
        .article-content h3 {
            font-weight: 500;
            font-size: 30px;
            line-height: 1.4;
            margin-top: 24px;
        }
        
        /* 正文段落 */
        .article-content p {
            font-weight: 400;
            font-size: 30px;
            line-height: 1.7;
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <!-- 文本直接平铺在页面背景上 -->
    <div class="article-content">
        <h1>这是H1级主标题</h1>
        
        <h2>这是H2级副标题</h2>
        
        <p>这是正文段落。它定义了文章内容的基础样式，具有更大的行高（170%），以确保长时间阅读的舒适性。我们在这里填充一些文本来观察它的实际效果。</p>
        
        <h3>这是H3级小节标题</h3>
        
        <p>在H3标题之后，通常会跟随更多的正文内容，进一步阐述观点。这个组件系统确保了标题和段落之间的间距是一致且和谐的。</p>
        
        <h3>这是另一个H3小节标题</h3>

        <p>您可以继续添加更多的段落和标题，它们都会自动应用正确的样式和间距。</p>
    </div>

</body>
</html>
