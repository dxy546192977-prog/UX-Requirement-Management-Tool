<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no">
  <title>行程卡示例</title>
  <style>
    @font-face {
      font-family: "Fliggy Sans 102";
      src:
        local("Fliggy Sans 102"),
        local("FliggySans102-Md"),
        url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --color-page-bg: #f2f3f5;
      --color-text-primary: #0e131b;
      --color-text-secondary: #5b5f67;
      --color-text-tertiary: #90949a;
      --color-info: #009daa;
      --color-info-pill-bg: rgba(0, 157, 170, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--color-page-bg);
      color: var(--color-text-primary);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    img {
      display: block;
    }

    .stage {
      position: relative;
      width: 750px;
      margin: 0 auto;
      padding: 24px 0 0;
      background: linear-gradient(178.95deg, #ffffff 50%, #f2f3f5 99%);
    }

    .journey-pill {
      position: absolute;
      top: 16px;
      right: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 48px;
      padding: 0 14px 0 12px;
      border: 0;
      border-radius: 30px 0 0 30px;
      background: var(--color-info-pill-bg);
      color: var(--color-text-secondary);
      font-size: 22px;
      line-height: 31px;
    }

    .journey-pill img:first-child {
      width: 26px;
      height: 26px;
    }

    .journey-pill img:last-child {
      width: 12px;
      height: 12px;
    }

    .journey-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0 30px 30px;
    }

    .journey-summary {
      font-size: 18px;
      line-height: 24px;
      color: var(--color-text-secondary);
    }

    .journey-od {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 12px;
      width: 458px;
      height: 42px;
      background: #ffffff;
    }

    .journey-time-group {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 6px;
      width: 256px;
      height: 42px;
      flex: none;
    }

    .journey-time-start {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      width: 98px;
      height: 42px;
      flex: none;
    }

    .journey-time-end {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      width: 104px;
      height: 42px;
      flex: none;
    }

    .journey-time {
      width: 100%;
      height: 42px;
      font-family: "Fliggy Sans 102", "PingFang SC", sans-serif;
      font-size: 42px;
      line-height: 42px;
      font-weight: 400;
      color: var(--color-text-primary);
      letter-spacing: -0.03em;
    }

    .journey-oneway-icon {
      width: 42px;
      height: 42px;
      flex: none;
    }

    .journey-airport-group {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 6px;
      width: 190px;
      height: 42px;
      flex: none;
      align-self: stretch;
    }

    .journey-airport-route {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2px;
      width: 190px;
      height: 42px;
      flex: none;
    }

    .journey-airport-start {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      width: 73px;
      height: 31px;
      flex: none;
    }

    .journey-airport-end {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4px;
      width: 105px;
      height: 31px;
      flex: none;
    }

    .journey-airport-copy {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 2px;
      flex: none;
    }

    .journey-airport-copy span {
      font-size: 22px;
      line-height: 31px;
      font-weight: 400;
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    .journey-airport-divider-wrap {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
      width: 8px;
      height: 31px;
      flex: none;
    }

    .journey-airport-divider {
      width: 8px;
      border-top: 1.5px solid #000000;
    }

    .journey-service-tag {
      width: 28px;
      height: 28px;
      flex: none;
    }

    .journey-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 22px;
      line-height: 31px;
      color: var(--color-text-tertiary);
    }

    .journey-meta .accent {
      color: var(--color-info);
    }

    .journey-meta .flight-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .journey-meta img.logo {
      width: 22px;
      height: 22px;
    }

    .journey-meta img.separator {
      width: 2px;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <button class="journey-pill" aria-label="出行提醒">
      <img src="https://gw.alicdn.com/imgextra/i1/O1CN01CCuCiC1SguyQWAkf3_!!6000000002277-2-tps-26-26.png" alt="">
      <span>出行提醒</span>
      <img src="https://gw.alicdn.com/imgextra/i3/O1CN01r65nUg1Eh0QgL9Edx_!!6000000000382-2-tps-12-12.png" alt="">
    </button>
    <div class="journey-card">
      <div class="journey-summary">06-24 周二 · 直飞2h25m</div>
      <div class="journey-od">
        <div class="journey-time-group">
          <div class="journey-time-start">
            <div class="journey-time">07:10</div>
          </div>
          <img class="journey-oneway-icon" src="https://gw.alicdn.com/imgextra/i3/O1CN013xUKFA1fIGf6QEliq_!!6000000003983-2-tps-42-42.png" alt="单程">
          <div class="journey-time-end">
            <div class="journey-time">09:20</div>
          </div>
        </div>
        <div class="journey-airport-group">
          <div class="journey-airport-route">
            <div class="journey-airport-start">
              <div class="journey-airport-copy">
                <span>萧山</span>
                <span>T3</span>
              </div>
            </div>
            <div class="journey-airport-divider-wrap">
              <div class="journey-airport-divider"></div>
            </div>
            <div class="journey-airport-end">
              <div class="journey-airport-copy">
                <span>首都</span>
                <span>T3</span>
              </div>
              <img class="journey-service-tag" src="https://gw.alicdn.com/imgextra/i3/O1CN01xS7HS4258M6FdMh3k_!!6000000007481-2-tps-28-28.png" alt="新">
            </div>
          </div>
        </div>
      </div>
      <div class="journey-meta">
        <div class="flight-chip">
          <img class="logo" src="https://gw.alicdn.com/imgextra/i1/O1CN019HfUvn1PTggSJApOx_!!6000000001842-2-tps-22-22.png" alt="国航">
          <span>国航CA1742</span>
        </div>
        <img class="separator" src="https://gw.alicdn.com/imgextra/i4/O1CN01KYPosW1eXYGNaNvHV_!!6000000003881-2-tps-2-20.png" alt="">
        <span>波音787(大)</span>
        <img class="separator" src="https://gw.alicdn.com/imgextra/i4/O1CN01KYPosW1eXYGNaNvHV_!!6000000003881-2-tps-2-20.png" alt="">
        <span class="accent">梦想宽体机</span>
      </div>
    </div>
  </div>
</body>
</html>
