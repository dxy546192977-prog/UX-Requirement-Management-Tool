<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>下单页 - 火车票引流弹窗（FDG fdl-dialog）</title>
  <style>
    @font-face {
      font-family: 'Fliggy Sans 102';
      src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }

    :root {
      /* FDG Design Tokens */
      --color-darkgray: #0f131a;
      --color-midgray: #5c5f66;
      --color-lightgray: #919499;
      --color-auxiliary: #d2d4d9;
      --color-bg: #f2f3f5;
      --color-label: #f7f8fa;
      --color-white: #ffffff;
      --color-brand-1: #ffe033;
      --color-brand-2: #fffceb;
      --color-brand-4: #fff7cc;
      --color-indigo-1: #6666ff;
      --color-indigo-4: #ebebff;
      --color-warning-1: #ff3333;
      --color-pay-1: #ff5533;
      --color-pay-2: #ff8c1a;
      --color-notice-tint: #fff6ee;
      --color-promo-1: #ff0036;
      --color-promo-2: #9537fd;
      --color-green-0: #149aa8;
      --color-safeguard-4: #fef5ec;
      --color-safeguard-5: #5d3521;
      --radius-l: 24px;
      --radius-m: 12px;
      --radius-s: 6px;
      --shadow-dialog: 0 20px 64px rgba(15, 19, 26, 0.24);
      --screen-max-width: 750px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-darkgray);
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 下单页背景模拟 ===== */
    .page-backdrop {
      width: min(100vw, var(--screen-max-width));
      margin: 0 auto;
      min-height: 100vh;
      background: linear-gradient(180deg, #f4f5f7 0%, #eef0f3 100%);
      display: flex;
      flex-direction: column;
      padding: 28px 24px 220px;
    }
    .page-backdrop__nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 18px;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.4;
    }
    .page-backdrop__card {
      background: var(--color-white);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(15, 19, 26, 0.05);
      margin-bottom: 18px;
    }
    .page-backdrop__title {
      font-size: 32px;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    .page-backdrop__text {
      font-size: 24px;
      line-height: 1.6;
      color: var(--color-midgray);
    }
    .page-backdrop__chips {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .page-backdrop__chip {
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 22px;
      line-height: 1.4;
      background: var(--color-label);
      color: var(--color-midgray);
    }
    .page-backdrop__bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(100vw, var(--screen-max-width));
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid #eceef1;
      padding: 16px 24px calc(26px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1;
      backdrop-filter: blur(8px);
    }
    .page-backdrop__price {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .page-backdrop__price-label {
      font-size: 24px;
      color: var(--color-lightgray);
      line-height: 1.2;
    }
    .page-backdrop__price-value {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 44px;
      line-height: 1;
      color: var(--color-pay-1);
      font-weight: 700;
    }
    .page-backdrop__pay-btn {
      height: 84px;
      min-width: 240px;
      border-radius: 42px;
      border: none;
      background: linear-gradient(90deg, #ff6c33 0%, #ff4d2a 100%);
      color: #fff;
      font-size: 30px;
      line-height: 1.4;
      font-weight: 500;
    }

    /* ==========================================================
       fdl-dialog — 火车票引流弹窗
       基于 FDG 平台组件 dialog (components/platform/feedback/dialog)
       扩展：橙色渐变头部、航线信息、价格对比、关闭按钮
       ========================================================== */

    /* 遮罩层（fdl-dialog 标准） */
    .fdl-dialog {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: rgba(15, 19, 26, 0.7);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .fdl-dialog--visible {
      opacity: 1;
      visibility: visible;
    }

    /* 面板（扩展宽度至 630px 以适配设计稿） */
    .fdl-dialog__panel {
      display: flex;
      flex-direction: column;
      width: 630px;
      max-width: 100%;
      max-height: 90vh;
      background: var(--color-white);
      border-radius: var(--radius-l);
      overflow: hidden;
      box-shadow: var(--shadow-dialog);
      transform: translateY(16px) scale(0.96);
      transition: transform 0.3s ease;
    }
    .fdl-dialog--visible .fdl-dialog__panel {
      transform: translateY(0) scale(1);
    }

    /* 关闭按钮（扩展：标准 dialog 无此元素） */
    .fdl-dialog__close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border: none;
      background: color-mix(in srgb, var(--color-darkgray) 15%, transparent);
      border-radius: 50%;
      cursor: pointer;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .fdl-dialog__close:focus-visible {
      outline: 2px solid var(--color-indigo-1);
      outline-offset: 2px;
    }
    .fdl-dialog__close::before,
    .fdl-dialog__close::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 2px;
      background: var(--color-white);
      border-radius: 1px;
    }
    .fdl-dialog__close::before { transform: rotate(45deg); }
    .fdl-dialog__close::after { transform: rotate(-45deg); }

    /* 头部（扩展：橙色渐变背景，覆盖标准 header 样式） */
    .fdl-dialog__header--gradient {
      padding: 36px 30px 30px;
      background: linear-gradient(180deg, #ff9b3d 0%, #ff6235 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .fdl-dialog__header--gradient::after {
      content: '';
      position: absolute;
      right: -24px;
      top: -34px;
      width: 190px;
      height: 190px;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.36) 0%, rgba(255, 255, 255, 0) 70%);
      pointer-events: none;
    }
    .fdl-dialog__header-graphic {
      width: 124px;
      height: 72px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .fdl-dialog__header-bars {
      width: 14px;
      border-radius: 9px 9px 3px 3px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.4);
    }
    .fdl-dialog__header-bars:nth-child(1) { height: 22px; }
    .fdl-dialog__header-bars:nth-child(2) { height: 31px; }
    .fdl-dialog__header-bars:nth-child(3) { height: 41px; }
    .fdl-dialog__header-bars:nth-child(4) { height: 52px; }
    .fdl-dialog__header-arrow {
      position: absolute;
      right: 4px;
      top: 0;
      width: 20px;
      height: 20px;
      border-top: 5px solid rgba(255, 255, 255, 0.95);
      border-right: 5px solid rgba(255, 255, 255, 0.95);
      transform: rotate(45deg);
    }
    .fdl-dialog__title--white {
      margin: 0;
      font-weight: 500;
      font-size: 36px;
      line-height: 1.4;
      text-align: center;
      color: var(--color-white);
    }
    .fdl-dialog__subtitle {
      font-weight: 400;
      font-size: 26px;
      line-height: 1.4;
      text-align: center;
      color: color-mix(in srgb, var(--color-white) 80%, transparent);
      margin-top: 6px;
    }

    /* 身体（标准 fdl-dialog__body） */
    .fdl-dialog__body {
      padding: 0 30px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 航线信息区 */
    .fdl-dialog__route {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 30px 18px 22px;
    }
    .fdl-dialog__route-city {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 100px;
    }
    .fdl-dialog__route-city-name {
      font-size: 40px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-darkgray);
    }
    .fdl-dialog__route-city-code {
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
      color: var(--color-lightgray);
    }
    .fdl-dialog__route-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: 4px 12px 0;
    }
    .fdl-dialog__route-dash {
      width: 100%;
      height: 20px;
      display: flex;
      align-items: center;
    }
    .fdl-dialog__route-dash::before {
      content: '';
      flex: 1;
      height: 0;
      border-top: 3px dashed #ff7d38;
    }
    .fdl-dialog__route-dash::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 10px solid #ff7d38;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      flex-shrink: 0;
    }
    .fdl-dialog__route-duration {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.4;
      color: #ff7d38;
      white-space: nowrap;
      margin-top: 6px;
    }

    /* 价格对比区 */
    .fdl-dialog__price-section {
      padding: 18px 0 0;
      display: flex;
      flex-direction: column;
    }
    .fdl-dialog__promo-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--color-notice-tint);
      border-radius: var(--radius-s);
      margin-bottom: 20px;
      align-self: flex-start;
    }
    .fdl-dialog__promo-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--color-pay-1);
      flex-shrink: 0;
    }
    .fdl-dialog__promo-text {
      font-size: 22px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--color-pay-1);
    }
    .fdl-dialog__price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }
    .fdl-dialog__price-row + .fdl-dialog__price-row {
      border-top: 1px solid var(--color-bg);
    }
    .fdl-dialog__price-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .fdl-dialog__price-badge {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
    }
    .fdl-dialog__price-badge--flight {
      background: #5f6dff;
    }
    .fdl-dialog__price-badge--train {
      background: #ff7d38;
    }
    .fdl-dialog__price-label-text {
      font-size: 26px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--color-darkgray);
    }
    .fdl-dialog__price-value {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-darkgray);
    }
    .fdl-dialog__price-compare {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .fdl-dialog__price-original {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 26px;
      font-weight: 400;
      line-height: 1;
      color: var(--color-lightgray);
      text-decoration: line-through;
    }
    .fdl-dialog__price-current {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-pay-1);
    }
    .fdl-dialog__savings {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      padding: 28px 0 8px;
    }
    .fdl-dialog__savings-label {
      font-size: 28px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-pay-1);
    }
    .fdl-dialog__savings-amount {
      font-family: 'Fliggy Sans 102', 'PingFang SC', sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      color: var(--color-pay-1);
    }

    /* 脚部（标准 fdl-dialog__footer） */
    .fdl-dialog__footer {
      padding: 22px 24px 26px;
    }
    .fdl-dialog__actions {
      display: flex;
      gap: 18px;
    }
    .fdl-dialog__btn {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 84px;
      border: none;
      border-radius: 9999px;
      font-family: inherit;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.4;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .fdl-dialog__btn:hover {
      opacity: 0.92;
    }
    .fdl-dialog__btn:active {
      transform: scale(0.98);
    }
    .fdl-dialog__btn:focus-visible {
      outline: 2px solid var(--color-indigo-1);
      outline-offset: 2px;
      opacity: 1;
    }
    /* 次按钮：使用 --color-bg 底色（设计稿灰底） */
    .fdl-dialog__btn--secondary {
      background: var(--color-bg);
      color: var(--color-midgray);
    }
    /* 主按钮：使用 --color-pay-1 底色（设计稿橙红 CTA） */
    .fdl-dialog__btn--primary {
      background: var(--color-pay-1);
      color: var(--color-white);
    }

    @media (prefers-reduced-motion: reduce) {
      .fdl-dialog,
      .fdl-dialog__panel,
      .fdl-dialog__btn {
        transition: none;
      }
    }

    @media (max-width: 640px) {
      .fdl-dialog__panel {
        width: calc(100vw - 36px);
      }
      .fdl-dialog__title--white {
        font-size: 32px;
      }
      .fdl-dialog__subtitle {
        font-size: 24px;
      }
      .fdl-dialog__btn {
        height: 78px;
        font-size: 28px;
      }
      .fdl-dialog__price-current {
        font-size: 34px;
      }
      .fdl-dialog__savings-amount {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <!-- 下单页主体内容（优化展示） -->
  <div class="page-backdrop">
    <div class="page-backdrop__nav">
      <span>填写订单</span>
      <span>···</span>
    </div>
    <div class="page-backdrop__card">
      <h3 class="page-backdrop__title">北京 - 上海 | 2月13日 18:50</h3>
      <p class="page-backdrop__text">成人 ¥655 + 税费 ¥70，提前改期免费，托运20kg</p>
      <div class="page-backdrop__chips">
        <span class="page-backdrop__chip">极速出票</span>
        <span class="page-backdrop__chip">含行李额</span>
      </div>
    </div>
    <div class="page-backdrop__card">
      <h3 class="page-backdrop__title">已选择：2位乘机人</h3>
      <p class="page-backdrop__text">支持更换证件与座席偏好，提交后可锁定当前价格。</p>
    </div>
  </div>
  <div class="page-backdrop__bottom" aria-hidden="true">
    <div class="page-backdrop__price">
      <span class="page-backdrop__price-label">共2人</span>
      <span class="page-backdrop__price-value">¥725</span>
    </div>
    <button type="button" class="page-backdrop__pay-btn">去支付</button>
  </div>

  <!-- ==========================================================
       火车票引流弹窗（fdl-dialog 扩展）
       基于 FDG 平台组件 dialog，扩展橙色渐变头部与价格对比内容
       触发条件：
       1. 机票经济舱惠后价 - 高铁直达二等座最低价 > 阈值
       2. 仅高铁动车直达 (G/D/C/S)
       3. 用户已勾选乘机人
       4. 当天同OD未超过频控次数
       5. 无更高优先级弹窗 (crm > 火车票引流 > 兜底挽留)
       ========================================================== -->
  <div class="fdl-dialog fdl-dialog--visible"
       id="fdl-dialog-train-diversion"
       aria-hidden="false"
       data-spm="train-diversion-modal">

    <div class="fdl-dialog__panel"
         role="dialog"
         aria-modal="true"
         aria-labelledby="fdl-dialog-train-title">

      <!-- 关闭按钮（扩展） -->
      <button type="button"
              class="fdl-dialog__close"
              aria-label="关闭弹窗"
              data-fdl-dialog-close></button>

      <!-- 头部：橙色渐变（扩展 fdl-dialog__header） -->
      <header class="fdl-dialog__header--gradient">
        <div class="fdl-dialog__header-graphic" aria-hidden="true">
          <span class="fdl-dialog__header-bars"></span>
          <span class="fdl-dialog__header-bars"></span>
          <span class="fdl-dialog__header-bars"></span>
          <span class="fdl-dialog__header-bars"></span>
          <span class="fdl-dialog__header-arrow"></span>
        </div>
        <h2 class="fdl-dialog__title--white" id="fdl-dialog-train-title">机票价波动，试试高铁更省</h2>
        <p class="fdl-dialog__subtitle">同线路可直达，预计可再省 ¥287</p>
      </header>

      <!-- 身体：航线信息 + 价格对比 -->
      <div class="fdl-dialog__body">
        <!-- 航线信息 -->
        <div class="fdl-dialog__route">
          <div class="fdl-dialog__route-city">
            <span class="fdl-dialog__route-city-name">北京</span>
            <span class="fdl-dialog__route-city-code">PEK</span>
          </div>
          <div class="fdl-dialog__route-line">
            <div class="fdl-dialog__route-dash"></div>
            <span class="fdl-dialog__route-duration">约 4.5 小时</span>
          </div>
          <div class="fdl-dialog__route-city">
            <span class="fdl-dialog__route-city-name">上海</span>
            <span class="fdl-dialog__route-city-code">SHA</span>
          </div>
        </div>

        <!-- 价格对比区 -->
        <div class="fdl-dialog__price-section">
          <!-- 优惠标签 -->
          <div class="fdl-dialog__promo-tag">
            <span class="fdl-dialog__promo-dot"></span>
            <span class="fdl-dialog__promo-text">限时优惠 减20元</span>
          </div>

          <!-- 机票价格行 -->
          <div class="fdl-dialog__price-row">
            <div class="fdl-dialog__price-label">
              <span class="fdl-dialog__price-badge fdl-dialog__price-badge--flight" aria-hidden="true">机</span>
              <span class="fdl-dialog__price-label-text">机票总价（含税费）</span>
            </div>
            <span class="fdl-dialog__price-value">¥820</span>
          </div>

          <!-- 高铁价格行 -->
          <div class="fdl-dialog__price-row">
            <div class="fdl-dialog__price-label">
              <span class="fdl-dialog__price-badge fdl-dialog__price-badge--train" aria-hidden="true">铁</span>
              <span class="fdl-dialog__price-label-text">高铁二等座</span>
            </div>
            <div class="fdl-dialog__price-compare">
              <span class="fdl-dialog__price-original">¥553</span>
              <span class="fdl-dialog__price-current">¥533</span>
            </div>
          </div>

          <!-- 立省金额 -->
          <div class="fdl-dialog__savings">
            <span class="fdl-dialog__savings-label">立省</span>
            <span class="fdl-dialog__savings-amount">¥287</span>
          </div>
        </div>
      </div>

      <!-- 脚部：操作按钮（标准 fdl-dialog__footer） -->
      <footer class="fdl-dialog__footer">
        <div class="fdl-dialog__actions">
          <button type="button"
                  class="fdl-dialog__btn fdl-dialog__btn--secondary"
                  data-fdl-dialog-close>狠心离开</button>
          <button type="button"
                  class="fdl-dialog__btn fdl-dialog__btn--primary"
                  data-fdl-dialog-close>立即抢订</button>
        </div>
      </footer>

    </div>
  </div>

  <script>
  (function () {
    function closeDialog(dialogElement) {
      if (!dialogElement || !dialogElement.classList.contains('fdl-dialog')) return;
      dialogElement.classList.remove('fdl-dialog--visible');
      dialogElement.setAttribute('aria-hidden', 'true');
    }

    /* 点击遮罩关闭（仅点击遮罩本身，不冒泡面板内容） */
    document.querySelectorAll('.fdl-dialog').forEach(function (overlay) {
      overlay.addEventListener('click', function (event) {
        if (event.target === overlay) closeDialog(overlay);
      });
    });

    /* 点击 data-fdl-dialog-close 按钮关闭 */
    document.querySelectorAll('[data-fdl-dialog-close]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var overlay = btn.closest('.fdl-dialog');
        closeDialog(overlay);
      });
    });

    /* Escape 关闭 */
    document.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape') return;
      document.querySelectorAll('.fdl-dialog--visible').forEach(function (overlay) {
        closeDialog(overlay);
      });
    });
  })();
  </script>

</body>
</html>
