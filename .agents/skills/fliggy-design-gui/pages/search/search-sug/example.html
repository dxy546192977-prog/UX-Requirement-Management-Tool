<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>搜索 Sug 页</title>
  <style>
    :root {
      --bg-page: #f2f3f5;
      --bg-panel: #ffffff;
      --primary: #6666ff;
      --brand: #ff5533;
      --color-darkgray: #0f131a;
      --text-primary: #0f131a;
      --text-secondary: #919499;
      --divider: #f2f3f5;
      --color-black: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 750px;
      margin: 0 auto;
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text-primary);
    }

    .page {
      width: 750px;
      min-height: 100vh;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-bar {
      width: 750px;
      height: 88px;
      background: rgba(0, 0, 0, 0);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .status-time {
      font-size: 30px;
      line-height: 42px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-right svg {
      color: var(--text-primary);
    }

    .status-battery {
      width: 48px;
      height: 24px;
      border: 2px solid var(--text-primary);
      border-radius: 5px;
      position: relative;
      padding: 2px;
    }

    .status-battery::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 8px;
      background: var(--text-primary);
      border-radius: 0 2px 2px 0;
    }

    .status-battery-inner {
      width: 70%;
      height: 100%;
      background: var(--text-primary);
      border-radius: 2px;
    }

    .search-wrap {
      width: 750px;
      padding: 8px 18px 0;
      background: var(--bg-panel);
    }

    .search-box {
      width: 714px;
      height: 180px;
      padding: 12px 12px 12px 6px;
      display: flex;
      align-items: stretch;
      background: var(--bg-panel);
      border: 3px solid var(--primary);
      border-radius: 18px;
    }

    .search-box__inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
    }

    .back {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .back img { width: 48px; height: 48px; display: block; }

    .search-content {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .input-row {
      height: 48px;
      display: flex;
      align-items: center;
      min-width: 0;
      margin-top: 6px;
    }

    .cursor-bar {
      width: 3px;
      height: 32px;
      background: var(--text-primary);
      border-radius: 2px;
      flex: 0 0 auto;
      margin-left: 6px;
    }

    .placeholder {
      font-size: 28px;
      line-height: 1.4;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding-right: 6px;
      padding-bottom: 6px;
    }

    .btn-primary {
      width: 120px;
      height: 60px;
      border: 0;
      border-radius: 42px;
      background: var(--primary);
      color: var(--bg-panel);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1.4;
      font-weight: 500;
      cursor: pointer;
    }

    .panel {
      width: 750px;
      border-radius: 24px 24px 0 0;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .list {
      width: 714px;
      padding: 0;
      margin: 0;
    }

    .item {
      width: 714px;
      min-height: 96px;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .content {
      width: 714px;
      height: 96px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 24px 0;
      margin: -1px 0;
    }

    .icon {
      width: 36px;
      height: 36px;
      flex: none;
      display: grid;
      place-items: center;
    }

    .icon img {
      width: 36px;
      height: 36px;
      display: block;
    }

    .right {
      width: 666px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .texts {
      width: 606px;
      height: 42px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      overflow: hidden;
    }

    .title {
      font-size: 30px;
      line-height: 42px;
      font-weight: 500;
      color: var(--color-darkgray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: none;
    }

    .title .hit {
      color: var(--brand);
    }

    .sub {
      font-size: 24px;
      line-height: 34px;
      font-weight: 400;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: none;
    }

    .arrow {
      width: 48px;
      height: 48px;
      flex: none;
      display: grid;
      place-items: center;
    }

    .arrow img {
      width: 48px;
      height: 48px;
      display: block;
    }

    .divider {
      width: 714px;
      height: 0;
      padding: 0 18px 0 44px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .divider::after {
      content: "";
      width: 670px;
      border-top: 1px solid var(--divider);
    }

    .item--hotel { min-height: 132px; }

    .item--hotel .content {
      height: 132px;
      align-items: flex-start;
    }

    .item--hotel .right {
      height: 84px;
      align-items: center;
      width: 670px;
      flex: none;
    }

    .item--hotel .texts {
      height: 84px;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
      width: 670px;
    }

    .hotel-top {
      width: 670px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .hotel-title {
      font-size: 30px;
      line-height: 42px;
      font-weight: 500;
      color: var(--color-darkgray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 460px;
    }

    .price {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      color: var(--brand);
      font-family: "Alibaba Sans 102", "PingFang SC", system-ui, sans-serif;
      font-weight: 700;
      white-space: nowrap;
    }

    .price .yen { font-size: 24px; line-height: 22px; }
    .price .num { font-size: 36px; line-height: 28px; }

    .price .qi {
      font-family: "PingFang SC", system-ui, sans-serif;
      font-weight: 400;
      font-size: 24px;
      line-height: 24px;
      margin-left: 2px;
    }

    .hotel-sub {
      font-size: 24px;
      line-height: 34px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 670px;
    }
  </style>
</head>
