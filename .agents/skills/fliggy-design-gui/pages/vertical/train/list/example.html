<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>火车票列表 — FDL example-full（同步 listing-page/demo）</title>
<style>
  :root {
    --page-scale: 1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f3f5;
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }
  @font-face {
    font-family: 'Fliggy Sans 102';
    src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
  }
</style>
</head>
<body>

<!-- ==================== 子组件定义 ==================== -->
<script>
/* TrainTag - 原始组件 */
class TrainTag extends HTMLElement {
  static get observedAttributes() { return ['variant', 'text']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const variant = this.getAttribute('variant') || 'positive';
    const text = this.getAttribute('text') || '';
    const isPositive = variant === 'positive';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; }
        .tag { display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; height: 14px; border-radius: 2px; font-size: 10px; line-height: 14px; font-family: 'PingFang SC', sans-serif; white-space: nowrap; background: ${isPositive ? '#e7f5f6' : '#fff2ef'}; color: ${isPositive ? '#149aa8' : '#ff5533'}; }
      </style>
      <span class="tag">${text}</span>`;
  }
}
customElements.define('train-tag', TrainTag);

/* SmallLabel - 原始组件 */
class SmallLabel extends HTMLElement {
  static get observedAttributes() { return ['text']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const text = this.getAttribute('text') || '';
    const isLong = text.length > 1;
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; }
        .label { display: inline-flex; align-items: center; justify-content: center; height: 12px; padding: 0 ${isLong ? '2px' : '0'}; min-width: 12px; border: 0.5px solid rgba(145, 148, 153, 0.5); border-radius: 2px; font-size: 8px; line-height: 11px; color: #919499; font-family: 'PingFang SC', sans-serif; }
      </style>
      <span class="label">${text}</span>`;
  }
}
customElements.define('small-label', SmallLabel);

/* TrainSeat - 原始组件（横排：level + 有票/无票/抢） */
class TrainSeat extends HTMLElement {
  static get observedAttributes() { return ['level', 'status']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const level = this.getAttribute('level') || '二等';
    const status = this.getAttribute('status') || 'available';
    const statusConfig = {
      available: { text: '有票', color: '#149aa8' },
      unavailable: { text: '无票', color: '#919499' },
      grab: { text: '抢', color: '#ff5533' }
    };
    const config = statusConfig[status] || statusConfig.available;
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-flex; align-items: baseline; white-space: nowrap; }
        .level { font-size: 11px; line-height: 15.5px; color: #5c5f66; font-family: 'PingFang SC', sans-serif; }
        .status { font-size: 11px; line-height: 15.5px; color: ${config.color}; font-family: 'PingFang SC', sans-serif; margin-left: 3px; }
      </style>
      <span class="level">${level}</span><span class="status">${config.text}</span>`;
  }
}
customElements.define('train-seat', TrainSeat);

/* TrainPrice - 原始组件（红色价格） */
class TrainPrice extends HTMLElement {
  static get observedAttributes() { return ['price']; }
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  attributeChangedCallback() { this.render(); }
  render() {
    const price = this.getAttribute('price') || '456';
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
        .price-row { display: flex; align-items: baseline; line-height: 1; }
        .yen { font-family: 'Fliggy Sans 102', sans-serif; font-size: 12px; font-weight: 700; color: #ff5533; line-height: 12px; }
        .amount { font-family: 'Fliggy Sans 102', sans-serif; font-size: 21px; color: #ff5533; line-height: 13.5px; }
      </style>
      <div class="price-row"><span class="yen">¥</span><span class="amount">${price}</span></div>`;
  }
}
customElements.define('train-price', TrainPrice);
</script>

<!-- ==================== ListingTrainCard ==================== -->
<script>
class ListingTrainCard extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); }
  connectedCallback() { this.render(); }
  getAttr(n, f='') { return this.getAttribute(n) || f; }
  hasAttr(n) { return this.hasAttribute(n); }

  calcDuration(dep, arr) {
    const [dh, dm] = dep.split(':').map(Number);
    const [ah, am] = arr.split(':').map(Number);
    let d = dh * 60 + dm, a = ah * 60 + am;
    if (a < d) a += 1440;
    const diff = a - d, h = Math.floor(diff / 60), m = diff % 60;
    if (h === 0) return `${m}分`;
    if (m === 0) return `${h}时`;
    return `${h}时${m}分`;
  }

  renderTrainInfoTags() {
    const tags = [];
    if (this.hasAttr('show-berth-tag')) tags.push('卧');
    if (this.hasAttr('show-fuxing-tag')) tags.push('复兴号');
    if (this.hasAttr('show-points-tag')) tags.push('积分');
    if (this.hasAttr('show-smart-tag')) tags.push('智能动车');
    return tags.map(t => `<small-label text="${t}"></small-label>`).join('');
  }

  render() {
    const depTime = this.getAttr('departure-time', '09:00');
    const arrTime = this.getAttr('arrival-time', '13:22');
    const depStation = this.getAttr('departure-station', '杭州东');
    const arrStation = this.getAttr('arrival-station', '北京南');
    const trainNum = this.getAttr('train-number', 'G1');
    const duration = this.calcDuration(depTime, arrTime);
    const showStart = this.hasAttr('show-start');
    const showEnd = this.hasAttr('show-end');
    const showTag1 = this.hasAttr('show-tag1');
    const showTag2 = this.hasAttr('show-tag2');
    const price = this.getAttr('price', '456');
    const hasTags = showTag1 || showTag2;
    const trainInfoTags = this.renderTrainInfoTags();

    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; width: 375px; font-family: 'PingFang SC', sans-serif; }
        .card { background: #fff; }
        .card-body { padding: 0 15px 15px; }
        .top-spacer { height: 15px; }
        .top-area { display: flex; align-items: flex-start; justify-content: space-between; padding-bottom: 9px; font-size: 0; line-height: 0; }
        .top-tags { display: flex; gap: 3px; align-items: flex-start; font-size: 0; line-height: 0; }
        .trip-price-row { display: flex; align-items: flex-start; justify-content: space-between; }
        .trip-section { display: flex; align-items: center; justify-content: space-between; width: 240px; flex-shrink: 0; }
        .od-item { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; width: 75px; gap: 4px; }
        .od-item.arrival { align-items: flex-end; }
        .od-time { font-family: 'Fliggy Sans 102', sans-serif; font-size: 21px; line-height: 16px; color: #0f131a; }
        .od-station-row { display: flex; align-items: center; gap: 3px; }
        .od-station { font-size: 12px; line-height: 17px; color: #0f131a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
        .train-info { display: flex; flex-direction: column; align-items: center; width: 78px; gap: 1px; flex-shrink: 0; }
        .train-duration { font-size: 10px; line-height: 14px; color: #5c5f66; text-align: center; }
        .train-arrow { width: 75px; height: 7px; }
        .train-number-row { display: flex; align-items: center; justify-content: center; gap: 2px; flex-wrap: wrap; max-width: 78px; }
        .train-number-text { font-size: 10px; line-height: 14px; color: #5c5f66; text-align: center; }
        .price-section { flex-shrink: 0; display: flex; align-items: flex-start; padding-top: 2px; }
        .seat-section { margin-top: 12px; }
        .seat-row { display: flex; align-items: baseline; }
        .seat-left-group { display: flex; width: 240px; flex-shrink: 0; gap: 6px; }
        .seat-slot-1 { width: 76px; flex: none; display: flex; justify-content: flex-start; }
        .seat-slot-2 { width: 76px; flex: none; display: flex; justify-content: center; }
        .seat-slot-3 { width: 76px; flex: none; display: flex; justify-content: flex-end; }
        .seat-slot-4 { margin-left: auto; display: flex; justify-content: flex-end; }
      </style>
      <div class="card">
        <div class="card-body">
          ${hasTags ? `<div class="top-area"><div class="top-tags">
            ${showTag1 ? `<train-tag variant="${this.getAttr('tag1-variant', 'positive')}" text="${this.getAttr('tag1-text', '')}"></train-tag>` : ''}
            ${showTag2 ? `<train-tag variant="${this.getAttr('tag2-variant', 'emphasis')}" text="${this.getAttr('tag2-text', '')}"></train-tag>` : ''}
          </div></div>` : '<div class="top-spacer"></div>'}
          <div class="trip-price-row">
            <div class="trip-section">
              <div class="od-item">
                <span class="od-time">${depTime}</span>
                <div class="od-station-row">
                  <span class="od-station">${depStation}</span>
                  ${showStart ? '<small-label text="始"></small-label>' : ''}
                </div>
              </div>
              <div class="train-info">
                <span class="train-duration">${duration}</span>
                <svg class="train-arrow" viewBox="0 0 150 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path opacity="0.1" d="M0 7C0 5.89543 0.895431 5 2 5H142V9H2C0.895432 9 0 8.10457 0 7Z" fill="#0F131A"/>
                  <g clip-path="url(#ac${trainNum})"><path opacity="0.1" d="M143.653 2.42344C143.004 1.86514 142 2.32565 142 3.18113V9H148.595C149.522 9 149.95 7.84743 149.247 7.24231L143.653 2.42344Z" fill="#0F131A"/></g>
                  <defs><clipPath id="ac${trainNum}"><rect width="8" height="8" fill="white" transform="translate(142 1)"/></clipPath></defs>
                </svg>
                <div class="train-number-row">
                  <span class="train-number-text">${trainNum}</span>
                  ${trainInfoTags}
                </div>
              </div>
              <div class="od-item arrival">
                <span class="od-time">${arrTime}</span>
                <div class="od-station-row">
                  ${showEnd ? '<small-label text="终"></small-label>' : ''}
                  <span class="od-station">${arrStation}</span>
                </div>
              </div>
            </div>
            <div class="price-section">
              <train-price price="${price}"></train-price>
            </div>
          </div>
          <div class="seat-section">
            <div class="seat-row">
              <div class="seat-left-group">
                <div class="seat-slot-1"><slot name="seat1"></slot></div>
                <div class="seat-slot-2"><slot name="seat2"></slot></div>
                <div class="seat-slot-3"><slot name="seat3"></slot></div>
              </div>
              <div class="seat-slot-4"><slot name="seat4"></slot></div>
            </div>
          </div>
        </div>
      </div>`;
  }
}
customElements.define('listing-train-card', ListingTrainCard);
</script>

<!-- ==================== ListingTitlebar ==================== -->

<!-- ==================== ListingCalendarBar ==================== -->
<script>
class ListingCalendarBar extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); this._selectedIndex = 0; }
  connectedCallback() { this._dates = this.generateDates(30); this.render(); this.bindEvents(); }
  getHolidayData() { return { festivals: { '4-5': '清明节' }, rest: ['4-4', '4-5', '4-6'], work: [] }; }
  generateDates(count) {
    const today = new Date(), holidays = this.getHolidayData();
    const weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
    const dates = [];
    for (let i = 0; i < count; i++) {
      const date = new Date(today); date.setDate(today.getDate() + i);
      const month = date.getMonth() + 1, day = date.getDate(), key = `${month}-${day}`;
      const pad = n => String(n).padStart(2, '0');
      let topLabel = i === 0 ? '今天' : i === 1 ? '明天' : weekDays[date.getDay()];
      const festival = holidays.festivals[key] || '';
      let tag = ''; if (holidays.rest.includes(key)) tag = '休'; else if (holidays.work.includes(key)) tag = '班';
      dates.push({ month, day, topLabel, festival, tag, dayStr: pad(day), selectedStr: `${pad(month)}-${pad(day)}`, fullDate: `${date.getFullYear()}-${pad(month)}-${pad(day)}` });
    }
    return dates;
  }
  getSelectedDate() { return this._dates[this._selectedIndex].fullDate; }
  render() {
    const itemsHtml = this._dates.map((d, i) => {
      const sel = i === this._selectedIndex;
      const tagHtml = d.tag ? `<span class="tag ${sel ? 'tag-sel' : ''} ${d.tag === '休' ? 'tag-rest' : 'tag-work'}">${d.tag}</span>` : '';
      const secondLine = d.festival ? d.festival : (sel ? d.selectedStr : d.dayStr);
      const isFestival = !!d.festival;
      return `<div class="item${sel ? ' sel' : ''}" data-i="${i}"><div class="row1">${d.topLabel}${tagHtml}</div><div class="row2${isFestival ? ' festival' : ''}">${secondLine}</div></div>`;
    }).join('');
    this.shadowRoot.innerHTML = `
      <style>
        @font-face { font-family: 'Fliggy Sans 102'; src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype'); }
        :host { display: block; width: 375px; background: #fff; }
        .bar { display: flex; height: 56px; position: relative; }
        .scroll { display: flex; flex: 1; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 6px 0 6px 8px; gap: 0; align-items: center; }
        .scroll::-webkit-scrollbar { display: none; }
        .item { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 56px; height: 44px; border-radius: 8px; cursor: pointer; flex-shrink: 0; padding: 4px 8px; gap: 2px; }
        .item.sel { background: #FFE866; }
        .row1 { display: flex; align-items: center; gap: 2px; font-size: 11px; line-height: 15px; color: #919499; white-space: nowrap; }
        .item.sel .row1 { color: #0f131a; }
        .row2 { font-family: 'Fliggy Sans 102', sans-serif; font-size: 15px; line-height: 20px; color: #0f131a; font-weight: 600; white-space: nowrap; }
        .item.sel .row2 { font-size: 15px; line-height: 20px; font-weight: 600; }
        .row2.festival { font-family: 'PingFang SC', sans-serif; font-size: 12px; line-height: 17px; color: #0f131a; font-weight: 500; }
        .item.sel .row2.festival { font-family: 'PingFang SC', sans-serif; font-size: 12px; line-height: 17px; color: #0f131a; font-weight: 500; }
        .tag { font-size: 9px; width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; border-radius: 2px; font-weight: 500; flex-shrink: 0; }
        .tag-rest { color: #0f131a; background: #FFE866; }
        .tag-work { color: #fff; background: #919499; }
        .tag-sel.tag-rest { color: #0f131a; background: #ffffff; }
        .tag-sel.tag-work { color: #fff; background: #919499; }
        .cal-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; height: 56px; flex-shrink: 0; cursor: pointer; background: #fff; position: relative; z-index: 2; gap: 2px; box-shadow: -4px 0 8px rgba(0,0,0,0.08); }
        .cal-btn svg { width: 20px; height: 20px; }
        .cal-arrow { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid #919499; }
      </style>
      <div class="bar">
        <div class="scroll">${itemsHtml}</div>
        <div class="cal-btn">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M10.5 5.625H25.5C29.0208 5.625 31.875 8.47918 31.875 12V24C31.875 27.5208 29.0208 30.375 25.5 30.375H10.5C6.97919 30.375 4.125 27.5208 4.125 24V12C4.125 8.47919 6.97919 5.625 10.5 5.625Z" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M11.25 3.75V7.5" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M24.75 3.75V7.5" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/><path d="M8.25 13.5H27.75" stroke="#0F131A" stroke-width="2.25" stroke-linecap="round"/></svg>
          <div class="cal-arrow"></div>
        </div>
      </div>`;
  }
  bindEvents() {
    const scrollEl = this.shadowRoot.querySelector('.scroll');
    this.shadowRoot.querySelectorAll('.item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.i, 10);
        if (idx !== this._selectedIndex) {
          this._selectedIndex = idx;
          const sl = scrollEl.scrollLeft;
          this.render();
          this.shadowRoot.querySelector('.scroll').scrollLeft = sl;
          this.bindEvents();
          this.dispatchEvent(new CustomEvent('date-change', { detail: { date: this.getSelectedDate() }, bubbles: true }));
        }
      });
    });
  }
}
customElements.define('listing-calendar-bar', ListingCalendarBar);
</script>

<!-- ==================== ListingTab ==================== -->
<script>
class ListingTab extends HTMLElement {
  constructor() { super(); this.attachShadow({ mode: 'open' }); this._selectedIndex = 0; this._lowestPrice = this.getAttribute('lowest-price') || '0元起'; }
  static get observedAttributes() { return ['lowest-price']; }
  attributeChangedCallback(n, o, v) { if (n === 'lowest-price' && o !== v) { this._lowestPrice = v; this.render(); this.bindEvents(); } }
  connectedCallback() { this.render(); this.bindEvents(); }
  getTabs() { return [{ title: '火车票', subtitle: this._lowestPrice }, { title: '智能中转', subtitle: '余票充足' }, { title: '机票', subtitle: '专项低价' }]; }
  setLowestPrice(p) { this._lowestPrice = p; this.render(); this.bindEvents(); }
  render() {
    const tabs = this.getTabs();

// ==================== 页面逻辑 ====================
class TrainListPage {
  constructor() {
    this.trainData = [...TRAIN_DATA];
    this.sortedData = [...TRAIN_DATA];
    this.currentSort = { key: 'departure', direction: 0 };
    this.tabVisible = true;
    this.lastScrollTop = 0;

    this.listEl = document.getElementById('train-list');
    this.scrollEl = document.getElementById('scroll-container');
    this.tabWrapper = document.getElementById('tab-wrapper');
    this.bottomBar = document.getElementById('bottom-bar');
    this.listingTab = document.getElementById('listing-tab');

    this.init();
  }

  init() {
    // 默认"出发 早-晚"选中
    this.bottomBar.setActiveSort(3, 0);

    // 排序并渲染
    this.sortData();
    this.renderList();
    this.updateLowestPrice();
    this.updateStatusBarTime();

    // 绑定事件
    this.bindScrollEvent();
    this.bindBottomBarEvent();

    // 定时更新状态栏时间
    setInterval(() => this.updateStatusBarTime(), 60000);
  }

  updateStatusBarTime() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('sb-time').textContent = `${hours}:${minutes}`;
  }

  calcDurationMinutes(depTime, arrTime, crossDay = false) {
    const [dh, dm] = depTime.split(':').map(Number);
    const [ah, am] = arrTime.split(':').map(Number);
    let depMin = dh * 60 + dm;
    let arrMin = ah * 60 + am;
    if (crossDay || arrMin < depMin) arrMin += 1440;
    return arrMin - depMin;
  }

  sortData() {
    const { key, direction } = this.currentSort;
    this.sortedData = [...this.trainData];

    switch (key) {
      case 'price':
        this.sortedData.sort((a, b) => direction === 0 ? a.price - b.price : b.price - a.price);
        break;
      case 'duration':
        this.sortedData.sort((a, b) => {
          const durA = this.calcDurationMinutes(a.depTime, a.arrTime, a.crossDay);
          const durB = this.calcDurationMinutes(b.depTime, b.arrTime, b.crossDay);
          return direction === 0 ? durA - durB : durB - durA;
        });
        break;
      case 'departure':
        this.sortedData.sort((a, b) => {
          const [ah, am] = a.depTime.split(':').map(Number);
          const [bh, bm] = b.depTime.split(':').map(Number);
          const aMin = ah * 60 + am, bMin = bh * 60 + bm;
          return direction === 0 ? aMin - bMin : bMin - aMin;
        });
        break;
    }
  }

  renderList() {
    this.listEl.innerHTML = '';
    this.sortedData.forEach(train => {
      const card = document.createElement('listing-train-card');
      card.setAttribute('departure-time', train.depTime);
      card.setAttribute('arrival-time', train.arrTime);
      card.setAttribute('departure-station', train.depStation);
      card.setAttribute('arrival-station', train.arrStation);
      card.setAttribute('train-number', train.trainNo);
      card.setAttribute('price', String(train.price));

      if (train.showFuxing) card.setAttribute('show-fuxing-tag', '');
      if (train.showBerth) card.setAttribute('show-berth-tag', '');

      if (train.tags && train.tags.length > 0) {
        card.setAttribute('show-tag1', '');
        card.setAttribute('tag1-text', train.tags[0].text);
        card.setAttribute('tag1-variant', train.tags[0].variant);
        if (train.tags.length > 1) {
          card.setAttribute('show-tag2', '');
          card.setAttribute('tag2-text', train.tags[1].text);
          card.setAttribute('tag2-variant', train.tags[1].variant);
        }
      }

      // 添加座席 slot（最多4个：前3个在左侧240px区域，第4个右对齐）
      train.seats.forEach((seat, idx) => {
        if (idx >= 4) return;
        const seatEl = document.createElement('train-seat');
        seatEl.setAttribute('level', seat.level);
        seatEl.setAttribute('status', seat.status);
        if (seat.count) seatEl.setAttribute('count', seat.count);
        seatEl.setAttribute('slot', `seat${idx + 1}`);
        card.appendChild(seatEl);
      });

      this.listEl.appendChild(card);
    });
  }

  updateLowestPrice() {
    const minPrice = Math.min(...this.trainData.map(t => t.price));
    this.listingTab.setLowestPrice(`¥${minPrice}起`);
  }

  bindScrollEvent() {
    let ticking = false;
    this.scrollEl.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const currentScrollTop = this.scrollEl.scrollTop;
          const delta = currentScrollTop - this.lastScrollTop;

          if (delta > 5 && this.tabVisible && currentScrollTop > 10) {
            // 上滑 → 隐藏 tab
            this.tabVisible = false;
            this.tabWrapper.classList.add('hidden');
            this.scrollEl.classList.add('tab-hidden');
          } else if (delta < -5 && !this.tabVisible) {
            // 下滑 → 显示 tab
            this.tabVisible = true;
            this.tabWrapper.classList.remove('hidden');
            this.scrollEl.classList.remove('tab-hidden');
          }

          this.lastScrollTop = currentScrollTop;
          ticking = false;
        });
        ticking = true;
      }
    });
  }

  bindBottomBarEvent() {
    this.bottomBar.addEventListener('tab-change', (e) => {
      const { tab, direction } = e.detail;
      if (tab === 'filter') return; // 高级筛选暂不处理

      this.currentSort = { key: tab, direction: direction || 0 };
      this.sortData();
      this.renderList();
      // 滚动回顶部
      this.scrollEl.scrollTop = 0;
    });
  }
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', () => {
  const updatePageScale = () => {
    const designWidth = 375;
    const designHeight = 812;
    const scaleByWidth = window.innerWidth / designWidth;
    const scaleByHeight = window.innerHeight / designHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    document.documentElement.style.setProperty('--page-scale', String(scale));
  };

  updatePageScale();
  window.addEventListener('resize', updatePageScale);

  // 从 train_data.js 中的 PAGE_CONFIG 读取城市名，更新 titlebar
  if (typeof PAGE_CONFIG !== 'undefined') {
    const titlebar = document.getElementById('listing-titlebar');
    if (titlebar && PAGE_CONFIG.fromCity) titlebar.setAttribute('departure-city', PAGE_CONFIG.fromCity);
    if (titlebar && PAGE_CONFIG.toCity) titlebar.setAttribute('arrival-city', PAGE_CONFIG.toCity);
  }
  new TrainListPage();
});
