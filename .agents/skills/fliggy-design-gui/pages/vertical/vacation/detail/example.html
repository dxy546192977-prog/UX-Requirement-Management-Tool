<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=750, user-scalable=no, viewport-fit=cover">
  <title>门票商详 — 整页串联 · vertical.vacation.detail</title>
  <style>
    :root {
      --color-bg: #f2f3f5;
      --color-midgray: #5c5f66;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-bg);
      font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 0;
    }
    a { text-decoration: none; color: inherit; }

    .page-container {
      width: 750px;
      max-width: 100%;
      margin: 0 auto;
      background: var(--color-bg);
      position: relative;
      padding-bottom: 172px;
    }

    /* ========== Header（与 line-detail 一致：头图 + 叠层状态栏/导航） ========== */
    .header-section {
      position: relative;
      width: 750px;
      height: 750px;
      max-width: 100%;
    }

    .media-container {
      width: 750px;
      max-width: 100%;
      height: 750px;
      position: relative;
      overflow: hidden;
    }

    .media-container .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gradient-overlay {
      position: absolute;
      width: 750px;
      max-width: 100%;
      height: 120px;
      left: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.15) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .header-bg-scrim {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 750px;
      max-width: 100%;
      height: 176px;
      background: #ffffff;
      opacity: 0;
      z-index: 108;
      pointer-events: none;
      transition: opacity 0.16s ease-out;
    }

    .status-overlay {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 750px;
      max-width: 100%;
      height: 176px;
      z-index: 110;
      --header-bg-progress: 0;
      transition: box-shadow 0.16s ease-out;
    }

    .status-overlay.is-scrolled {
      box-shadow: 0 1px 0 rgba(210, 212, 217, 0.8);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      width: 750px;
      max-width: 100%;
      height: 88px;
      background: transparent;
      transition: background-color 0.16s ease-out;
    }

    .status-time {
      font-family: 'SF Pro', 'PingFang SC', sans-serif;
      font-weight: 590;
      font-size: 32px;
      color: #ffffff;
      transition: color 0.16s ease-out;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      transition: color 0.16s ease-out;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      width: 750px;
      max-width: 100%;
      height: 88px;
      transition: color 0.16s ease-out;
    }

    .nav-bar__action {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 48px;
      height: 48px;
      color: #ffffff;
      text-decoration: none;
      transition: color 0.16s ease-out;
    }

    .status-overlay.is-scrolled .status-bar {
      background: rgba(255, 255, 255, 0.92);
    }

    .status-overlay.is-scrolled .status-time,
    .status-overlay.is-scrolled .status-icons,
    .status-overlay.is-scrolled .nav-bar,
    .status-overlay.is-scrolled .nav-bar__action {
      color: #0f131a;
    }

    .nav-bar__actions-right {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 30px;
    }

    /* Tab（与 line-detail tab-indicator 一致） */
    .tab-indicator-section {
      display: flex;
      justify-content: center;
      padding: 18px 0;
    }

    .tab-indicator {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: fit-content;
      height: 48px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      padding: 4px;
    }

    .tab-indicator__list {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .tab-indicator__button {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 40px;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      font-family: 'PingFang SC', sans-serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 24px;
      white-space: nowrap;
      background-color: transparent;
      color: #ffffff;
      border-radius: 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .tab-indicator__button.is-active {
      background-color: #ffe033;
      color: #0f131a;
    }

    /* 正文卡片 */
    .vd-stack { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 0 18px 24px; }
    .vd-card714 {
      width: 714px;
      max-width: 100%;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }
    .vd-bi { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .vd-bi-price { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 6px; color: #ff5533; }
    .vd-bi-price .n { font-size: 42px; font-weight: 700; font-family: 'Alibaba Sans 102', sans-serif; }
    .vd-bi-title { font-size: 32px; font-weight: 600; line-height: 44px; color: #0f131a; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vd-shelf-h { padding: 24px 24px 0; font-size: 36px; font-weight: 500; margin: 0; color: #0f131a; }
    .vd-shelf-row { display: flex; justify-content: space-between; padding: 24px; border-top: 1px solid #f1f2f4; }
    .vd-shelf-row:first-of-type { border-top: none; }
    .vd-book { width: 84px; height: 84px; background: #ff7300; border: none; border-radius: 12px; color: #fff; font-size: 36px; font-weight: 600; }
    .vd-poi-h { padding: 24px; font-size: 36px; font-weight: 500; margin: 0; }
    .vd-poi-sub { padding: 0 24px 24px; font-size: 24px; color: #5c5f66; }
    .vd-rich-h { padding: 24px; font-size: 36px; font-weight: 500; margin: 0; }
    .vd-rich-body { position: relative; max-height: 400px; overflow: hidden; }
    .vd-rich-body img { width: 100%; display: block; vertical-align: middle; }
    .vd-rich-fade {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 72px;
      background: linear-gradient(to top, #fff 55%, rgba(255, 255, 255, 0));
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .vd-rich-fade button { border: none; background: none; font-size: 26px; font-weight: 500; color: #292c33; cursor: pointer; }

    /* ========== Bottom Action Bar（与 line-detail 一致） ========== */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 750px;
      max-width: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      z-index: 100;
    }

    .bottom-bar__divider {
      width: 750px;
      max-width: 100%;
      height: 1px;
      background: #d2d4d9;
    }

    .bottom-bar__main {
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 12px 24px 12px 36px;
      gap: 36px;
      width: 750px;
      max-width: 100%;
      height: 108px;
    }

    .icon-nav {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 42px;
      flex-grow: 1;
    }

    .icon-nav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .icon-nav__icon {
      width: 42px;
      height: 42px;
    }

    .icon-nav__label {
      font-size: 20px;
      line-height: 20px;
      color: #5c5f66;
      white-space: nowrap;
    }

    .action-buttons {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 400px;
      height: 84px;
      flex-shrink: 0;
    }

    .action-buttons__button {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 200px;
      height: 84px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-size: 30px;
      line-height: 36px;
      color: #ffffff;
    }

    .action-buttons__button--add-to-cart {
      background: #ffb300;
      border-radius: 42px 0 0 42px;
    }

    .action-buttons__button--buy-now {
      background: #ff6200;
      border-radius: 0 42px 42px 0;
    }

    .bottom-bar__safe-area {
      width: 750px;
      max-width: 100%;
      height: 64px;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 12px;
    }

    .bottom-bar__home-indicator {
      width: 268px;
      height: 10px;
      background: #000000;
      border-radius: 20px;
      opacity: 0.25;
    }
  </style>
</head>

  <script>
    (function () {
      var header = document.querySelector('.status-overlay');
      var scrim = document.querySelector('.header-bg-scrim');
      var THRESHOLD = 220;

      function syncHeader() {
        var y = window.scrollY || document.documentElement.scrollTop || 0;
        var progress = Math.min(Math.max(y / THRESHOLD, 0), 1);
        if (scrim) scrim.style.opacity = String(progress);
        if (header) header.classList.toggle('is-scrolled', progress > 0.6);
      }

      document.querySelectorAll('.tab-indicator__button').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.tab-indicator__button').forEach(function (b) {
            b.classList.remove('is-active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('is-active');
          btn.setAttribute('aria-selected', 'true');
        });
      });

      window.addEventListener('scroll', syncHeader, { passive: true });
      syncHeader();
    })();
  </script>
