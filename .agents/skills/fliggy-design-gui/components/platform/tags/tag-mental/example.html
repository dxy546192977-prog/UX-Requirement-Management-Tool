<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — tag-mental（心智类 / 利益点标签）示例</title>
  <style>
@font-face {
  font-family: 'Fliggy Fonts';
  src: url('https://g.alicdn.com/trip/common-assets/1.1.31/fonts/FliggyFonts-MediumItalicVer0711.ttf') format('truetype');
  font-weight: 500;
  font-style: italic;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 32px;
  padding: 48px 24px;
  background: var(--color-white);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-tag-mental-demo {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.fdl-tag-mental-demo__caption {
  font-size: 24px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--color-midgray);
}

/* 主题演示：蓝 / 红 尽量 token；绿为供稿营销色，非全局 token */
.fdl-tag-mental-demo--blue {
  --main-bg-color: var(--color-indigo-4);
  --main-text-color: var(--color-indigo-1);
  --desc-bg-color: color-mix(in srgb, var(--color-indigo-4) 55%, var(--color-white));
  --desc-text-color: var(--color-midgray);
}

.fdl-tag-mental-demo--red {
  --main-bg-color: color-mix(in srgb, var(--color-pay-1) 14%, var(--color-white));
  --main-text-color: var(--color-pay-1);
  --desc-bg-color: var(--color-bg);
  --desc-text-color: var(--color-midgray);
}

.fdl-tag-mental-demo--green {
  --main-bg-color: #e3f9e9;
  --main-text-color: #00a629;
  --desc-bg-color: #f0f9f2;
  --desc-text-color: #008821;
}

/* ========== fdl-tag-mental ========== */
.fdl-tag-mental {
  --main-bg-color: var(--color-brand-1);
  --main-text-color: var(--color-darkgray);
  --desc-bg-color: var(--color-bg);
  --desc-text-color: var(--color-midgray);

  display: inline-flex;
  flex-direction: row;
  align-items: center;
  height: 28px;
}

.fdl-tag-mental__main {
  display: flex;
  align-items: center;
  padding: 0 6px;
  height: 100%;
  background-color: var(--main-bg-color);
  color: var(--main-text-color);
  font-family: 'Fliggy Fonts', 'PingFang SC', 'SimHei', sans-serif;
  font-style: italic;
  font-weight: 500;
  font-size: 22px;
  line-height: 1;
  border-radius: 4px;
}

.fdl-tag-mental__main:not(:last-child) {
  border-radius: 4px 0 0 4px;
}

.fdl-tag-mental__description {
  display: flex;
  align-items: center;
  padding: 0 6px;
  height: 100%;
  background-color: var(--desc-bg-color);
  color: var(--desc-text-color);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-weight: 400;
  font-size: 20px;
  line-height: 1.4;
  border-radius: 0 4px 4px 0;
  white-space: nowrap;
}
  </style>
</head>
<body>

  <div class="fdl-tag-mental-demo">
    <div class="fdl-tag-mental-demo__caption">默认（带描述）</div>
    <span class="fdl-tag-mental">
      <span class="fdl-tag-mental__main">极速入园</span>
      <span class="fdl-tag-mental__description">10秒出票·出票即用·无需取票</span>
    </span>
  </div>

  <div class="fdl-tag-mental-demo">
    <div class="fdl-tag-mental-demo__caption">仅主标签</div>
    <span class="fdl-tag-mental">
      <span class="fdl-tag-mental__main">极速入园</span>
    </span>
  </div>

  <div class="fdl-tag-mental-demo">
    <div class="fdl-tag-mental-demo__caption">主题：蓝（token + color-mix）</div>
    <span class="fdl-tag-mental fdl-tag-mental-demo--blue">
      <span class="fdl-tag-mental__main">官方直连</span>
      <span class="fdl-tag-mental__description">官方授权，品质保障</span>
    </span>
  </div>

  <div class="fdl-tag-mental-demo">
    <div class="fdl-tag-mental-demo__caption">主题：红（pay-1 系）</div>
    <span class="fdl-tag-mental fdl-tag-mental-demo--red">
      <span class="fdl-tag-mental__main">限时特惠</span>
    </span>
  </div>

  <div class="fdl-tag-mental-demo">
    <div class="fdl-tag-mental-demo__caption">主题：绿（营销色，供稿演示）</div>
    <span class="fdl-tag-mental fdl-tag-mental-demo--green">
      <span class="fdl-tag-mental__main">可订明日</span>
      <span class="fdl-tag-mental__description">最晚今日23:00前可订</span>
    </span>
  </div>

</body>
</html>
