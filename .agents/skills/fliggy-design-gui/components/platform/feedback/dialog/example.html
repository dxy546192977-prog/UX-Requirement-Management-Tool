<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — 对话框（模态）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-pay-2: #ff8c1a;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 48px 24px 64px;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-dialog-demo__toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  max-width: 750px;
  margin: 0 auto 32px;
}

.fdl-dialog-demo__open {
  padding: 12px 24px;
  font-size: 26px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  background: var(--color-white);
  border: 1px solid var(--color-auxiliary);
  border-radius: var(--radius-m);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-dialog-demo__open:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-dialog-demo__open:hover {
  background: var(--color-label);
}

/* ========== fdl-dialog ========== */
.fdl-dialog {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  background: color-mix(in srgb, var(--color-darkgray) 60%, transparent);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.fdl-dialog--visible {
  opacity: 1;
  visibility: visible;
}

.fdl-dialog__panel {
  display: flex;
  flex-direction: column;
  width: 600px;
  max-width: 100%;
  max-height: 90vh;
  background: var(--color-white);
  border-radius: var(--radius-l);
  overflow: hidden;
  transform: scale(0.95);
  transition: transform 0.3s ease;
}

.fdl-dialog--visible .fdl-dialog__panel {
  transform: scale(1);
}

.fdl-dialog__header {
  padding: 36px 30px 18px;
}

.fdl-dialog__title {
  margin: 0;
  font-weight: 500;
  font-size: 36px;
  line-height: 1.4;
  text-align: center;
  color: var(--color-darkgray);
}

.fdl-dialog__body {
  padding: 0 30px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.fdl-dialog__text {
  margin: 0;
  font-weight: 400;
  font-size: 30px;
  line-height: 1.7;
  text-align: center;
  color: var(--color-darkgray);
}

.fdl-dialog__image {
  display: block;
  width: 100%;
  height: auto;
  border-radius: var(--radius-m);
}

.fdl-dialog__footer {
  padding: 24px;
}

.fdl-dialog__actions {
  display: flex;
  gap: 18px;
}

.fdl-dialog__btn {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 84px;
  border: none;
  border-radius: 9999px;
  font-family: inherit;
  font-size: 30px;
  font-weight: 500;
  line-height: 1.4;
  cursor: pointer;
  transition: opacity 0.2s ease, filter 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.fdl-dialog__btn:hover {
  opacity: 0.92;
}

.fdl-dialog__btn:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
  opacity: 1;
}

.fdl-dialog__btn--secondary {
  background: var(--color-label);
  color: var(--color-midgray);
}

.fdl-dialog__btn--primary {
  background: var(--color-brand-1);
  color: var(--color-darkgray);
}

.fdl-dialog__meta {
  margin: 24px 0 0;
  font-size: 24px;
  line-height: 1.4;
  text-align: center;
  color: var(--color-lightgray);
}
  </style>
</head>
<body>
  <div class="fdl-dialog-demo__toolbar">
    <button type="button" class="fdl-dialog-demo__open" data-fdl-dialog-open="fdl-dialog-ex-standard">标准双按钮</button>
    <button type="button" class="fdl-dialog-demo__open" data-fdl-dialog-open="fdl-dialog-ex-image">带配图</button>
    <button type="button" class="fdl-dialog-demo__open" data-fdl-dialog-open="fdl-dialog-ex-meta">带说明小字</button>
    <button type="button" class="fdl-dialog-demo__open" data-fdl-dialog-open="fdl-dialog-ex-single">单按钮</button>
  </div>

  <!-- 标准 -->
  <div
    class="fdl-dialog"
    id="fdl-dialog-ex-standard"
    aria-hidden="true"
  >
    <div
      class="fdl-dialog__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="fdl-dialog-ex-standard-title"
    >
      <header class="fdl-dialog__header">
        <h2 class="fdl-dialog__title" id="fdl-dialog-ex-standard-title">确认要离开吗？</h2>
      </header>
      <div class="fdl-dialog__body">
        <p class="fdl-dialog__text">离开后，当前填写的信息将不会被保存，您需要重新填写。</p>
      </div>
      <footer class="fdl-dialog__footer">
        <div class="fdl-dialog__actions">
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--secondary" data-fdl-dialog-close>再想想</button>
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--primary" data-fdl-dialog-close>确认离开</button>
        </div>
      </footer>
    </div>
  </div>

  <!-- 配图：image-library 共享池 -->
  <div class="fdl-dialog" id="fdl-dialog-ex-image" aria-hidden="true">
    <div
      class="fdl-dialog__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="fdl-dialog-ex-image-title"
    >
      <header class="fdl-dialog__header">
        <h2 class="fdl-dialog__title" id="fdl-dialog-ex-image-title">新功能上线！</h2>
      </header>
      <div class="fdl-dialog__body">
        <img
          class="fdl-dialog__image"
          src="https://fli.alicdn.com/upload/creative-platform/MXzrOt8y8C4bd1d0434df0165a.png?x-oss-process=image/format,webp"
          alt="新功能示意图"
        />
      </div>
      <footer class="fdl-dialog__footer">
        <div class="fdl-dialog__actions">
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--secondary" data-fdl-dialog-close>我知道了</button>
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--primary" data-fdl-dialog-close>立即体验</button>
        </div>
      </footer>
    </div>
  </div>

  <!-- 带 meta -->
  <div class="fdl-dialog" id="fdl-dialog-ex-meta" aria-hidden="true">
    <div
      class="fdl-dialog__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="fdl-dialog-ex-meta-title"
    >
      <header class="fdl-dialog__header">
        <h2 class="fdl-dialog__title" id="fdl-dialog-ex-meta-title">会员升级确认</h2>
      </header>
      <div class="fdl-dialog__body">
        <p class="fdl-dialog__text">您将升级为钻石会员，享受全年无限次贵宾厅服务。</p>
      </div>
      <footer class="fdl-dialog__footer">
        <div class="fdl-dialog__actions">
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--secondary" data-fdl-dialog-close>取消</button>
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--primary" data-fdl-dialog-close>确认升级</button>
        </div>
        <p class="fdl-dialog__meta">升级后将立即扣除 5,000 积分</p>
      </footer>
    </div>
  </div>

  <!-- 单按钮 -->
  <div class="fdl-dialog" id="fdl-dialog-ex-single" aria-hidden="true">
    <div
      class="fdl-dialog__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="fdl-dialog-ex-single-title"
    >
      <header class="fdl-dialog__header">
        <h2 class="fdl-dialog__title" id="fdl-dialog-ex-single-title">操作成功</h2>
      </header>
      <div class="fdl-dialog__body">
        <p class="fdl-dialog__text">您的设置已保存成功！</p>
      </div>
      <footer class="fdl-dialog__footer">
        <div class="fdl-dialog__actions">
          <button type="button" class="fdl-dialog__btn fdl-dialog__btn--primary" data-fdl-dialog-close>好的</button>
        </div>
      </footer>
    </div>
  </div>

  <script>
(function () {
  function open(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.add("fdl-dialog--visible");
    el.setAttribute("aria-hidden", "false");
  }

  function close(el) {
    if (!el || !el.classList.contains("fdl-dialog")) return;
    el.classList.remove("fdl-dialog--visible");
    el.setAttribute("aria-hidden", "true");
  }

  document.querySelectorAll("[data-fdl-dialog-open]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      open(btn.getAttribute("data-fdl-dialog-open"));
    });
  });

  document.querySelectorAll(".fdl-dialog").forEach(function (overlay) {
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) close(overlay);
    });
  });

  document.querySelectorAll("[data-fdl-dialog-close]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var overlay = btn.closest(".fdl-dialog");
      close(overlay);
    });
  });

  document.addEventListener("keydown", function (e) {
    if (e.key !== "Escape") return;
    document.querySelectorAll(".fdl-dialog--visible").forEach(function (overlay) {
      close(overlay);
    });
  });
})();
  </script>
</body>
</html>
