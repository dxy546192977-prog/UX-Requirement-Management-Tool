<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — fab（浮动按钮）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 200vh;
  padding: 48px 24px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-fab-demo__hint {
  margin: 0 0 12px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-fab-demo__sub {
  margin: 0;
  font-size: 24px;
  line-height: 1.4;
  color: var(--color-midgray);
}

.fdl-fab-demo__dock {
  position: fixed;
  right: 30px;
  bottom: 30px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* ========== fdl-fab ========== */
.fdl-fab {
  position: relative;
  width: 86px;
  height: 86px;
  margin: 0;
  background: var(--color-white);
  border-radius: 50%;
  border: none;
  padding: 0;
  filter: drop-shadow(0 6px 20px color-mix(in srgb, var(--color-darkgray) 10%, transparent));
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s ease-out, filter 0.2s ease-out;
  text-decoration: none;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}

.fdl-fab:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-fab:focus:not(:focus-visible) {
  outline: none;
}

.fdl-fab__icon {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 48px;
  height: 48px;
  color: var(--color-darkgray);
}

.fdl-fab__icon svg {
  display: block;
}

.fdl-fab--with-text {
  flex-direction: column;
  gap: 2px;
  padding: 9px 0;
  box-sizing: border-box;
}

.fdl-fab--with-text .fdl-fab__icon {
  width: 42px;
  height: 42px;
}

.fdl-fab__text {
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  font-size: 18px;
  line-height: 1.4;
  color: var(--color-darkgray);
  text-align: center;
}

.fdl-fab:hover:not(:disabled) {
  transform: translateY(-4px);
  filter: drop-shadow(0 10px 25px color-mix(in srgb, var(--color-darkgray) 15%, transparent));
}

.fdl-fab:active:not(:disabled) {
  transform: translateY(-1px);
}

.fdl-fab:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  pointer-events: none;
  filter: drop-shadow(0 6px 20px color-mix(in srgb, var(--color-darkgray) 5%, transparent));
}
  </style>
</head>
<body>

  <p class="fdl-fab-demo__hint">向下滚动页面…</p>
  <p class="fdl-fab-demo__sub">右下角为固定示例区（带文字 / 仅图标 / 禁用）</p>

  <div class="fdl-fab-demo__dock">
    <button type="button" class="fdl-fab fdl-fab--with-text">
      <span class="fdl-fab__icon" aria-hidden="true">
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M28 14L21 7L14 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 7V28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M35 24.5V35H7V24.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="fdl-fab__text">选车型</span>
    </button>

    <button type="button" class="fdl-fab" aria-label="返回顶部">
      <span class="fdl-fab__icon" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 13V35" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 24L24 13L35 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>

    <button type="button" class="fdl-fab" disabled aria-label="返回顶部（不可用）">
      <span class="fdl-fab__icon" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 13V35" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 24L24 13L35 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
  </div>

</body>
</html>
