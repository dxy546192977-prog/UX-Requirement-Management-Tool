<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — 选项卡 Tab 样式一（分类导航栏）示例</title>
  <style>
:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-pay-2: #ff8c1a;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 48px 24px 64px;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-tabs-style-1-demo-page {
  max-width: 750px;
  margin: 0 auto;
}

.fdl-tabs-style-1-demo__heading {
  margin: 0 0 16px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--color-darkgray);
}

.fdl-tabs-style-1-demo__heading:not(:first-child) {
  margin-top: 48px;
}

.fdl-tabs-style-1-demo__card {
  margin-bottom: 24px;
  border: 1px solid var(--color-auxiliary);
  border-radius: var(--radius-m);
  overflow: hidden;
  background: var(--color-white);
  box-shadow: 0 4px 12px color-mix(in srgb, var(--color-darkgray) 8%, transparent);
}

.fdl-tabs-style-1-demo__card-title {
  margin: 0;
  padding: 12px 20px;
  font-size: 24px;
  font-weight: 500;
  color: var(--color-midgray);
  background: var(--color-label);
  border-bottom: 1px solid var(--color-auxiliary);
}

/* ========== fdl-tabs-style-1 ========== */
.fdl-tabs-style-1 {
  height: 80px;
  width: 100%;
  background: var(--color-white);
  overflow: hidden;
}

.fdl-tabs-style-1__list {
  display: flex;
  align-items: center;
  list-style: none;
  padding: 0 24px;
  margin: 0;
  height: 100%;
}

.fdl-tabs-style-1__item {
  position: relative;
}

.fdl-tabs-style-1__link {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.2s ease;
}

.fdl-tabs-style-1__link:hover {
  opacity: 0.88;
}

.fdl-tabs-style-1__link:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
  border-radius: var(--radius-s);
  opacity: 1;
}

.fdl-tabs-style-1__content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.fdl-tabs-style-1__bubble-wrap {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fdl-tabs-style-1__bubble {
  background-color: var(--color-promo-1);
  color: var(--color-white);
  font-size: 18px;
  font-weight: 500;
  line-height: 1;
  padding: 2px 8px;
  border-radius: var(--radius-s);
}

.fdl-tabs-style-1__text {
  font-size: 30px;
  line-height: 1;
  color: var(--color-midgray);
  font-weight: 400;
  white-space: nowrap;
  transition: font-weight 0.2s ease, color 0.2s ease;
}

.fdl-tabs-style-1__indicator {
  width: 54px;
  height: 6px;
  background: transparent;
  border-radius: 9999px;
  transition: background-color 0.2s ease;
  flex-shrink: 0;
}

.fdl-tabs-style-1:not(.fdl-tabs-style-1--scroll) .fdl-tabs-style-1__list {
  justify-content: space-around;
}

.fdl-tabs-style-1:not(.fdl-tabs-style-1--scroll) .fdl-tabs-style-1__item {
  flex: 1;
}

.fdl-tabs-style-1--scroll .fdl-tabs-style-1__list {
  overflow-x: auto;
  justify-content: flex-start;
  gap: 66px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.fdl-tabs-style-1--scroll .fdl-tabs-style-1__list::-webkit-scrollbar {
  display: none;
}

.fdl-tabs-style-1__item--active .fdl-tabs-style-1__text {
  font-weight: 500;
  color: var(--color-darkgray);
}

.fdl-tabs-style-1__item--active .fdl-tabs-style-1__indicator {
  background: var(--color-darkgray);
}
  </style>
</head>
<body>
  <div class="fdl-tabs-style-1-demo-page">
    <h1 class="fdl-tabs-style-1-demo__heading">分类导航栏（fdl-tabs-style-1）</h1>

    <div class="fdl-tabs-style-1-demo__card">
      <p class="fdl-tabs-style-1-demo__card-title">均分模式（2～5 项）</p>
      <nav class="fdl-tabs-style-1" id="fdl-tabs-style-1-fixed" aria-label="内容分类">
        <ul class="fdl-tabs-style-1__list"></ul>
      </nav>
    </div>

    <div class="fdl-tabs-style-1-demo__card">
      <p class="fdl-tabs-style-1-demo__card-title">横滑模式（&gt;5 项）</p>
      <nav class="fdl-tabs-style-1 fdl-tabs-style-1--scroll" id="fdl-tabs-style-1-scroll" aria-label="内容分类">
        <ul class="fdl-tabs-style-1__list"></ul>
      </nav>
    </div>
  </div>

  <script>
(function () {
  var fixedData = [
    { text: "国内", bubbleText: "HOT" },
    { text: "国际/港澳台" },
    { text: "周边游" },
    { text: "门票" }
  ];

  var scrollData = [
    { text: "推荐" },
    { text: "酒店" },
    { text: "机票", bubbleText: "NEW" },
    { text: "火车票" },
    { text: "度假" },
    { text: "景点" },
    { text: "租车" }
  ];

  function render(navId, data) {
    var nav = document.getElementById(navId);
    if (!nav) return;
    var list = nav.querySelector(".fdl-tabs-style-1__list");
    if (!list) return;

    list.innerHTML = "";
    data.forEach(function (item, index) {
      var li = document.createElement("li");
      li.className = "fdl-tabs-style-1__item";
      if (index === 0) li.classList.add("fdl-tabs-style-1__item--active");

      var bubbleHtml = item.bubbleText
        ? '<span class="fdl-tabs-style-1__bubble" aria-hidden="true">' + item.bubbleText + "</span>"
        : "";

      li.innerHTML =
        '<a href="#" class="fdl-tabs-style-1__link">' +
        '<div class="fdl-tabs-style-1__content">' +
        '<div class="fdl-tabs-style-1__bubble-wrap">' +
        bubbleHtml +
        "</div>" +
        '<span class="fdl-tabs-style-1__text">' +
        item.text +
        "</span>" +
        "</div>" +
        '<span class="fdl-tabs-style-1__indicator" aria-hidden="true"></span>' +
        "</a>";

      list.appendChild(li);
    });

    function setCurrent(activeLi) {
      list.querySelectorAll(".fdl-tabs-style-1__item").forEach(function (item) {
        item.classList.remove("fdl-tabs-style-1__item--active");
        var a = item.querySelector(".fdl-tabs-style-1__link");
        if (a) a.removeAttribute("aria-current");
      });
      activeLi.classList.add("fdl-tabs-style-1__item--active");
      var link = activeLi.querySelector(".fdl-tabs-style-1__link");
      if (link) link.setAttribute("aria-current", "true");
    }

    setCurrent(list.querySelector(".fdl-tabs-style-1__item--active"));

    list.addEventListener("click", function (e) {
      var link = e.target.closest(".fdl-tabs-style-1__link");
      if (!link) return;
      e.preventDefault();
      var item = link.closest(".fdl-tabs-style-1__item");
      if (item) setCurrent(item);
    });
  }

  render("fdl-tabs-style-1-fixed", fixedData);
  render("fdl-tabs-style-1-scroll", scrollData);
})();
  </script>
</body>
</html>
