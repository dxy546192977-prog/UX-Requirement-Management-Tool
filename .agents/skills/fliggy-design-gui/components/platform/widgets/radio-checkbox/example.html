<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — radio-checkbox（圆形复选）示例</title>
  <style>
@font-face {
  font-family: 'Fliggy Sans 102';
  src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 18px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
}

.fdl-preview-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 48px 36px;
  background: var(--color-white);
  padding: 36px 48px;
  border-radius: var(--radius-m);
  box-shadow: 0 8px 24px rgba(15, 19, 26, 0.08);
  border: 1px solid var(--color-auxiliary);
}

.fdl-radio-demo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.fdl-radio-demo__label {
  font-weight: 500;
  color: var(--color-darkgray);
  font-size: 26px;
  line-height: 1.4;
  text-align: center;
}

.fdl-radio-demo__label-state {
  font-weight: 400;
  color: var(--color-midgray);
  font-size: 22px;
}

/* ========== fdl-radio-check ========== */
.fdl-radio-check {
  position: relative;
  width: 48px;
  height: 48px;
  cursor: pointer;
  flex-shrink: 0;
}

.fdl-radio-check__visual {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background-color 0.2s ease, border-color 0.2s ease;
  background-color: var(--color-white);
  border: 3px solid var(--color-auxiliary);
}

.fdl-radio-check__icon {
  width: 22px;
  height: 22px;
  stroke: var(--color-darkgray);
  stroke-width: 4;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.fdl-radio-check--checked .fdl-radio-check__visual {
  background-color: var(--color-brand-1);
  border-color: var(--color-brand-1);
}

.fdl-radio-check--checked .fdl-radio-check__icon {
  opacity: 1;
  transform: scale(1);
}

.fdl-radio-check--disabled {
  cursor: not-allowed;
}

.fdl-radio-check:not(.fdl-radio-check--checked).fdl-radio-check--disabled .fdl-radio-check__visual {
  background-color: var(--color-label);
  /* 供稿 #ECEDF0；用 --color-bg 作弱边框以符合仅 foundations token */
  border-color: var(--color-bg);
}

.fdl-radio-check--checked.fdl-radio-check--disabled .fdl-radio-check__icon {
  opacity: 0.2;
}
  </style>
</head>
<body>

  <div class="fdl-preview-container" role="presentation">
    <div class="fdl-radio-demo">
      <div class="fdl-radio-demo__label">未选中 <span class="fdl-radio-demo__label-state">(启用)</span></div>
      <div class="fdl-radio-check" role="checkbox" aria-checked="false" aria-disabled="false" tabindex="0">
        <div class="fdl-radio-check__visual">
          <svg class="fdl-radio-check__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
      </div>
    </div>

    <div class="fdl-radio-demo">
      <div class="fdl-radio-demo__label">已选中 <span class="fdl-radio-demo__label-state">(启用)</span></div>
      <div class="fdl-radio-check fdl-radio-check--checked" role="checkbox" aria-checked="true" aria-disabled="false" tabindex="0">
        <div class="fdl-radio-check__visual">
          <svg class="fdl-radio-check__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
      </div>
    </div>

    <div class="fdl-radio-demo">
      <div class="fdl-radio-demo__label">未选中 <span class="fdl-radio-demo__label-state">(禁用)</span></div>
      <div class="fdl-radio-check fdl-radio-check--disabled" role="checkbox" aria-checked="false" aria-disabled="true">
        <div class="fdl-radio-check__visual">
          <svg class="fdl-radio-check__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
      </div>
    </div>

    <div class="fdl-radio-demo">
      <div class="fdl-radio-demo__label">已选中 <span class="fdl-radio-demo__label-state">(禁用)</span></div>
      <div class="fdl-radio-check fdl-radio-check--checked fdl-radio-check--disabled" role="checkbox" aria-checked="true" aria-disabled="true">
        <div class="fdl-radio-check__visual">
          <svg class="fdl-radio-check__icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var controls = document.querySelectorAll('.fdl-radio-check[aria-disabled="false"]');
      if (!controls.length) return;

      function toggle(control) {
        var checked = control.classList.toggle('fdl-radio-check--checked');
        control.setAttribute('aria-checked', checked ? 'true' : 'false');
      }

      controls.forEach(function (control) {
        control.addEventListener('click', function () {
          toggle(control);
        });

        control.addEventListener('keydown', function (event) {
          if (event.key === ' ' || event.key === 'Enter') {
            event.preventDefault();
            toggle(control);
          }
        });
      });
    })();
  </script>
</body>
</html>
