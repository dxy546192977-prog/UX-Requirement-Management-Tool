<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — timeline（时间轴）示例</title>
  <style>
@font-face {
  font-family: 'Fliggy Sans 102';
  src: url('https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf') format('truetype');
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 40px 24px;
  background: var(--color-bg);
  font-family: 'PingFang SC', 'SimHei', sans-serif;
  color: var(--color-darkgray);
}

.fdl-timeline-demo {
  max-width: 760px;
  margin: 0 auto;
}

.fdl-timeline-demo__caption {
  margin-bottom: 16px;
  font-size: 28px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--color-darkgray);
}

/* ========== fdl-timeline ========== */
.fdl-timeline {
  width: 714px;
  max-width: 100%;
  background: var(--color-white);
  border-radius: var(--radius-m);
  padding: 30px 32px 30px 33px;
}

.fdl-timeline__steps {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
}

.fdl-timeline__step {
  display: grid;
  grid-template-columns: 30px 1fr;
  column-gap: 15px;
  align-items: start;
}

.fdl-timeline__axis {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
}

.fdl-timeline__node {
  width: 30px;
  height: 30px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 6px;
}

.fdl-timeline__node--done::before {
  content: "";
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--color-indigo-1) 70%, transparent);
  display: block;
}

.fdl-timeline__node--done::after {
  content: "";
  position: absolute;
  width: 8px;
  height: 4px;
  border-left: 2px solid var(--color-white);
  border-bottom: 2px solid var(--color-white);
  transform: rotate(-45deg);
  top: 11px;
  left: 10px;
}

.fdl-timeline__node--current::before {
  content: "";
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--color-indigo-1);
  display: block;
}

.fdl-timeline__node--pending::before {
  content: "";
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--color-auxiliary);
  background: var(--color-white);
  display: block;
}

.fdl-timeline__line {
  width: 2px;
  margin-top: 6px;
  background: var(--color-indigo-4);
  flex: 1;
  min-height: 48px;
}

.fdl-timeline__line--fade {
  background: linear-gradient(
    180deg,
    var(--color-indigo-4) 59.89%,
    var(--color-white) 100%
  );
}

.fdl-timeline__content {
  padding-bottom: 28px;
}

.fdl-timeline__step:last-child .fdl-timeline__content {
  padding-bottom: 0;
}

.fdl-timeline__step:last-child .fdl-timeline__line {
  display: none;
}

.fdl-timeline__title {
  margin: 0;
  font-size: 28px;
  line-height: 1.4;
  font-weight: 400;
  color: var(--color-lightgray);
}

.fdl-timeline__title--active {
  font-weight: 500;
  font-family: 'Fliggy Sans 102', 'PingFang SC', 'SimHei', sans-serif;
  color: var(--color-darkgray);
}

.fdl-timeline__meta {
  margin: 12px 0 0;
  font-size: 24px;
  line-height: 1.4;
  font-weight: 400;
  color: var(--color-lightgray);
}
  </style>
</head>
<body>

  <div class="fdl-timeline-demo">
    <div class="fdl-timeline-demo__caption">时间轴 / 进度栏</div>

    <section class="fdl-timeline" aria-label="处理进度">
      <ol class="fdl-timeline__steps">
        <li class="fdl-timeline__step">
          <div class="fdl-timeline__axis" aria-hidden="true">
            <div class="fdl-timeline__node fdl-timeline__node--done"></div>
            <div class="fdl-timeline__line"></div>
          </div>
          <div class="fdl-timeline__content">
            <p class="fdl-timeline__title">提交修改申请</p>
            <p class="fdl-timeline__meta">7月17日 12:37</p>
          </div>
        </li>

        <li class="fdl-timeline__step">
          <div class="fdl-timeline__axis" aria-hidden="true">
            <div class="fdl-timeline__node fdl-timeline__node--done"></div>
            <div class="fdl-timeline__line"></div>
          </div>
          <div class="fdl-timeline__content">
            <p class="fdl-timeline__title">开始处理</p>
            <p class="fdl-timeline__meta">7月17日 12:39</p>
          </div>
        </li>

        <li class="fdl-timeline__step" aria-current="step">
          <div class="fdl-timeline__axis" aria-hidden="true">
            <div class="fdl-timeline__node fdl-timeline__node--current"></div>
            <div class="fdl-timeline__line fdl-timeline__line--fade"></div>
          </div>
          <div class="fdl-timeline__content">
            <p class="fdl-timeline__title fdl-timeline__title--active">等待商家确认结果</p>
            <p class="fdl-timeline__meta">最晚将在北京时间 5月30日 10:15 为您处理</p>
          </div>
        </li>

        <li class="fdl-timeline__step">
          <div class="fdl-timeline__axis" aria-hidden="true">
            <div class="fdl-timeline__node fdl-timeline__node--pending"></div>
            <div class="fdl-timeline__line"></div>
          </div>
          <div class="fdl-timeline__content">
            <p class="fdl-timeline__title">处理结果</p>
          </div>
        </li>
      </ol>
    </section>
  </div>

</body>
</html>
