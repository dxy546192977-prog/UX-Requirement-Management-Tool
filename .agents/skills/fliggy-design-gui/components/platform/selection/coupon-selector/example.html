<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=750, user-scalable=no" />
  <title>FDG — 优惠券（券卡片）示例</title>
  <style>
@font-face {
  font-family: "Fliggy Sans 102";
  src: url("https://g.alicdn.com/trip/common-assets/1.1.9/fonts/FliggySans102-Md.ttf") format("truetype");
  font-weight: 500;
  font-display: swap;
}

:root {
  --color-darkgray: #0f131a;
  --color-midgray: #5c5f66;
  --color-lightgray: #919499;
  --color-auxiliary: #d2d4d9;
  --color-bg: #f2f3f5;
  --color-label: #f7f8fa;
  --color-white: #ffffff;
  --color-brand-1: #ffe033;
  --color-brand-2: #fffceb;
  --color-brand-4: #fff7cc;
  --color-indigo-1: #6666ff;
  --color-indigo-4: #ebebff;
  --color-warning-1: #ff3333;
  --color-pay-1: #ff5533;
  --color-pay-2: #ff8c1a;
  --color-promo-1: #ff0036;
  --color-promo-2: #9537fd;
  --color-green-0: #149aa8;
  --color-safeguard-4: #fef5ec;
  --color-safeguard-5: #5d3521;
  --radius-l: 24px;
  --radius-m: 12px;
  --radius-s: 6px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 48px 24px 64px;
  background: var(--color-bg);
  font-family: "PingFang SC", "SimHei", sans-serif;
}

.fdl-coupon-selector-demo-page {
  max-width: 702px;
  margin: 0 auto;
}

.fdl-coupon-selector-demo__heading {
  margin: 0 0 12px;
  font-size: 24px;
  font-weight: 500;
  color: var(--color-safeguard-5);
}

.fdl-coupon-selector-demo__block {
  margin-bottom: 36px;
}

/* ========== fdl-coupon-selector ========== */
.fdl-coupon-selector {
  display: flex;
  height: 168px;
  overflow: hidden;
  border-radius: var(--radius-m);
  background-color: var(--color-brand-2);
  position: relative;
}

.fdl-coupon-selector__value {
  display: flex;
  width: 173px;
  flex-direction: column;
  flex-shrink: 0;
  justify-content: center;
  align-items: center;
  padding: 20px;
  gap: 6px;
  background-color: var(--color-white);
}

.fdl-coupon-selector__amount {
  display: flex;
  align-items: baseline;
  line-height: 1;
  color: var(--color-pay-1);
}

.fdl-coupon-selector__currency {
  font-size: 24px;
  font-weight: 500;
}

.fdl-coupon-selector__number {
  font-family: "Fliggy Sans 102", "PingFang SC", "SimHei", sans-serif;
  font-size: 60px;
  font-weight: 700;
}

.fdl-coupon-selector__threshold {
  font-size: 22px;
  line-height: 1.4;
  color: var(--color-pay-1);
}

.fdl-coupon-selector__divider {
  position: relative;
  flex-shrink: 0;
  width: 14px;
  height: 100%;
  background-color: var(--color-white);
  background-image: radial-gradient(circle at 0 0, transparent 0, transparent 7px, var(--color-white) 7px),
    radial-gradient(circle at 0 100%, transparent 0, transparent 7px, var(--color-white) 7px);
  background-repeat: no-repeat, no-repeat;
  background-position: top, bottom;
  background-size: 14px 14px;
}

.fdl-coupon-selector__divider-line {
  position: absolute;
  top: 10px;
  bottom: 10px;
  left: 50%;
  width: 2px;
  transform: translateX(-50%);
  background-image: linear-gradient(
    to bottom,
    var(--color-brand-1) 60%,
    transparent 40%
  );
  background-repeat: repeat-y;
  background-size: 2px 8px;
}

.fdl-coupon-selector__info {
  display: flex;
  min-width: 0;
  flex: 1 1 auto;
  flex-direction: column;
  justify-content: flex-start;
  padding: 24px 18px;
  gap: 8px;
  overflow: hidden;
  background-color: var(--color-white);
}

.fdl-coupon-selector__title {
  margin: 0;
  overflow: hidden;
  font-size: 30px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--color-darkgray);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fdl-coupon-selector__rule,
.fdl-coupon-selector__expiry {
  font-size: 20px;
  line-height: 1.4;
  color: var(--color-midgray);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.fdl-coupon-selector__action {
  display: flex;
  width: 156px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  padding: 0 18px;
  background-color: var(--color-white);
}

.fdl-coupon-selector__btn {
  display: flex;
  width: 120px;
  height: 60px;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 9999px;
  font-family: inherit;
  font-size: 28px;
  font-weight: 500;
  line-height: 1.4;
  text-decoration: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.fdl-coupon-selector__btn:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-coupon-selector__btn--primary {
  background: var(--color-brand-1);
  color: var(--color-darkgray);
}

.fdl-coupon-selector__btn--secondary {
  border: 2px solid var(--color-pay-1);
  background: transparent;
  color: var(--color-pay-1);
}

.fdl-coupon-selector__btn--muted {
  background: var(--color-label);
  color: var(--color-lightgray);
  cursor: default;
  pointer-events: none;
}

.fdl-coupon-selector__check {
  width: 48px;
  height: 48px;
  padding: 0;
  border: 3px solid var(--color-auxiliary);
  border-radius: 50%;
  background: none;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.fdl-coupon-selector__check:focus-visible {
  outline: 2px solid var(--color-indigo-1);
  outline-offset: 2px;
}

.fdl-coupon-selector__check--checked {
  border-color: var(--color-brand-1);
  background-color: var(--color-brand-1);
}

.fdl-coupon-selector__check--checked::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 20px;
  border: solid var(--color-darkgray);
  border-width: 0 4px 4px 0;
  transform: translate(-50%, -60%) rotate(45deg);
}

.fdl-coupon-selector--disabled {
  filter: grayscale(1);
  pointer-events: none;
}

.fdl-coupon-selector--disabled .fdl-coupon-selector__btn:not(.fdl-coupon-selector__btn--muted) {
  background: var(--color-label);
  color: var(--color-lightgray);
  border: none;
}
  </style>
</head>
<body>
  <div class="fdl-coupon-selector-demo-page">
    <div class="fdl-coupon-selector-demo__block">
      <p class="fdl-coupon-selector-demo__heading">去领取</p>
      <article class="fdl-coupon-selector">
        <div class="fdl-coupon-selector__value">
          <div class="fdl-coupon-selector__amount">
            <span class="fdl-coupon-selector__currency">¥</span>
            <span class="fdl-coupon-selector__number">5</span>
          </div>
          <span class="fdl-coupon-selector__threshold">满 100 可用</span>
        </div>
        <div class="fdl-coupon-selector__divider" aria-hidden="true">
          <span class="fdl-coupon-selector__divider-line"></span>
        </div>
        <div class="fdl-coupon-selector__info">
          <h4 class="fdl-coupon-selector__title">5 元度假叠加券</h4>
          <div class="fdl-coupon-selector__rule">使用范围：全场可用</div>
          <div class="fdl-coupon-selector__expiry">有效期：2023.01.01 - 2024.01.01</div>
        </div>
        <div class="fdl-coupon-selector__action">
          <a href="#" class="fdl-coupon-selector__btn fdl-coupon-selector__btn--primary">去领取</a>
        </div>
      </article>
    </div>

    <div class="fdl-coupon-selector-demo__block">
      <p class="fdl-coupon-selector-demo__heading">去使用</p>
      <article class="fdl-coupon-selector">
        <div class="fdl-coupon-selector__value">
          <div class="fdl-coupon-selector__amount">
            <span class="fdl-coupon-selector__currency">¥</span>
            <span class="fdl-coupon-selector__number">10</span>
          </div>
          <span class="fdl-coupon-selector__threshold">无门槛</span>
        </div>
        <div class="fdl-coupon-selector__divider" aria-hidden="true">
          <span class="fdl-coupon-selector__divider-line"></span>
        </div>
        <div class="fdl-coupon-selector__info">
          <h4 class="fdl-coupon-selector__title">10 元酒店通用券</h4>
          <div class="fdl-coupon-selector__rule">使用范围：酒店预订</div>
          <div class="fdl-coupon-selector__expiry">有效期：2023.12.01 - 2023.12.31</div>
        </div>
        <div class="fdl-coupon-selector__action">
          <a href="#" class="fdl-coupon-selector__btn fdl-coupon-selector__btn--secondary">去使用</a>
        </div>
      </article>
    </div>

    <div class="fdl-coupon-selector-demo__block">
      <p class="fdl-coupon-selector-demo__heading">可勾选</p>
      <article class="fdl-coupon-selector">
        <div class="fdl-coupon-selector__value">
          <div class="fdl-coupon-selector__amount">
            <span class="fdl-coupon-selector__number">8.8</span>
            <span class="fdl-coupon-selector__currency">折</span>
          </div>
          <span class="fdl-coupon-selector__threshold">最高减 ¥50</span>
        </div>
        <div class="fdl-coupon-selector__divider" aria-hidden="true">
          <span class="fdl-coupon-selector__divider-line"></span>
        </div>
        <div class="fdl-coupon-selector__info">
          <h4 class="fdl-coupon-selector__title">全场 88 折优惠</h4>
          <div class="fdl-coupon-selector__rule">使用范围：全场可用</div>
          <div class="fdl-coupon-selector__expiry">有效期至：2024.01.31</div>
        </div>
        <div class="fdl-coupon-selector__action">
          <button
            type="button"
            class="fdl-coupon-selector__check"
            role="checkbox"
            aria-checked="false"
            aria-label="选择该优惠券"
            id="fdl-coupon-selector-check-demo"
          ></button>
        </div>
      </article>
    </div>

    <div class="fdl-coupon-selector-demo__block">
      <p class="fdl-coupon-selector-demo__heading">已失效</p>
      <article class="fdl-coupon-selector fdl-coupon-selector--disabled" aria-disabled="true">
        <div class="fdl-coupon-selector__value">
          <div class="fdl-coupon-selector__amount">
            <span class="fdl-coupon-selector__currency">¥</span>
            <span class="fdl-coupon-selector__number">20</span>
          </div>
          <span class="fdl-coupon-selector__threshold">满 200 可用</span>
        </div>
        <div class="fdl-coupon-selector__divider" aria-hidden="true">
          <span class="fdl-coupon-selector__divider-line"></span>
        </div>
        <div class="fdl-coupon-selector__info">
          <h4 class="fdl-coupon-selector__title">20 元机票券</h4>
          <div class="fdl-coupon-selector__rule">使用范围：国内机票</div>
          <div class="fdl-coupon-selector__expiry">有效期：2022.01.01 - 2023.01.01</div>
        </div>
        <div class="fdl-coupon-selector__action">
          <span class="fdl-coupon-selector__btn fdl-coupon-selector__btn--muted">已失效</span>
        </div>
      </article>
    </div>
  </div>

  <script>
(function () {
  document.querySelectorAll('.fdl-coupon-selector__btn[href="#"]').forEach(function (a) {
    a.addEventListener("click", function (e) {
      e.preventDefault();
    });
  });

  var check = document.getElementById("fdl-coupon-selector-check-demo");
  if (check) {
    check.addEventListener("click", function () {
      var on = check.classList.toggle("fdl-coupon-selector__check--checked");
      check.setAttribute("aria-checked", on ? "true" : "false");
    });
  }
})();
  </script>
</body>
</html>
